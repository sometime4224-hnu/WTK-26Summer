<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소담한 마을 NEXT</title>
    <link rel="stylesheet" href="../../shared/project-topbar-compact.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="top-nav" aria-label="상단 이동">
      <a href="../../index.html">메인</a>
      <span>|</span>
      <a href="../index.html">14과</a>
      <span>|</span>
      <a href="../farming-game/index.html">기존판</a>
    </nav>

    <main class="prototype-shell">
      <section class="game-stage" aria-label="소담한 마을 NEXT 프로토타입">
        <canvas id="gameCanvas" width="960" height="640" aria-label="농촌 마을 프로토타입 화면"></canvas>

        <div class="hud">
          <div class="hud__cluster hud__cluster--quest">
            <span class="hud__label">현재 목표</span>
            <strong id="questTitle">이모에게 오늘 일을 듣기</strong>
            <p id="questDetail">버스 정류장 옆 이모에게 다가가 Space를 누르세요.</p>
          </div>
          <div class="hud__cluster hud__cluster--stats">
            <span><b id="clockText">06:20</b> <em id="stageText">아침</em></span>
            <span>온기 <b id="warmthText">0</b></span>
            <span>바구니 <b id="basketText">0</b></span>
          </div>
        </div>

        <div class="mini-map-card" aria-label="미니맵">
          <canvas id="miniMap" width="168" height="126" aria-label="마을 미니맵"></canvas>
        </div>

        <div id="prompt" class="prompt hidden"></div>
        <div id="toast" class="toast hidden" aria-live="polite"></div>

        <section id="dialogue" class="dialogue hidden" aria-live="polite">
          <span id="speakerName" class="dialogue__speaker">이모</span>
          <p id="dialogueText"></p>
          <button id="dialogueNext" type="button">다음</button>
        </section>

        <section id="finishCard" class="finish-card hidden" aria-live="polite">
          <span class="finish-card__tag">Vertical Slice Complete</span>
          <h1>첫 실험 구역 완성</h1>
          <p>대화, 작물 심기, 물주기, 수확, 납품까지 한 흐름이 연결되었습니다.</p>
          <p id="finishSummary" class="finish-summary">오늘의 손맛을 정리하는 중입니다.</p>
          <button id="restartButton" type="button">다시 보기</button>
        </section>

        <div class="toolbelt" aria-label="조작">
          <button type="button" data-action="move" data-dir="up">위</button>
          <button type="button" data-action="move" data-dir="left">왼쪽</button>
          <button type="button" data-action="interact">행동</button>
          <button type="button" data-action="move" data-dir="right">오른쪽</button>
          <button type="button" data-action="move" data-dir="down">아래</button>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel-block">
          <span class="panel-label">Village Journal</span>
          <h2>마을 기록</h2>
          <ol id="questList" class="quest-list"></ol>
          <p id="saveStatus" class="save-status">자동 저장 준비</p>
          <div class="panel-actions">
            <button id="continueButton" class="ghost-button hidden" type="button">저장 불러오기</button>
            <button id="resetRunButton" class="ghost-button" type="button">처음부터</button>
          </div>
        </section>
        <section class="panel-block">
          <span class="panel-label">Skill Notes</span>
          <h2>오늘의 손맛</h2>
          <div id="skillSummary" class="skill-summary"></div>
          <ol id="actionLog" class="action-log"></ol>
        </section>
        <section class="panel-block">
          <span class="panel-label">Expressions</span>
          <ul id="expressionList" class="expression-list"></ul>
        </section>
      </aside>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
