    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f6faf7;
            --panel: #ffffff;
            --ink: #162033;
            --muted: #64748b;
            --line: #d8e5dd;
            --soft: #f8fafc;
            --green: #15803d;
            --green-dark: #166534;
            --green-soft: #dcfce7;
            --blue: #1d4ed8;
            --amber: #b45309;
            --purple: #7c3aed;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--ink);
            background: var(--bg);
            font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        }

        img {
            display: block;
            max-width: 100%;
        }

        button,
        a {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 52px;
            padding: 9px max(14px, calc((100vw - 1320px) / 2 + 14px));
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .topbar__links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .topbar a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 0 10px;
            border-radius: 8px;
            color: var(--green-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .topbar a:hover {
            background: #ecfdf5;
        }

        .topbar strong {
            color: #475569;
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
        }

        .shell {
            width: min(1320px, calc(100% - 24px));
            margin: 10px auto 26px;
        }

        .viewer {
            display: grid;
            grid-template-columns: 270px minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-height: calc(100dvh - 88px);
        }

        .rail,
        .stage {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .rail {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
        }

        .rail__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .eyebrow {
            margin: 0 0 4px;
            color: var(--green);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        h1,
        h2,
        p {
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            color: #0f172a;
            font-size: 24px;
            line-height: 1.2;
        }

        h2 {
            color: #0f172a;
            font-size: 19px;
            line-height: 1.3;
        }

        .count {
            flex: 0 0 auto;
            min-width: 48px;
            padding: 5px 8px;
            border-radius: 8px;
            background: #fffbeb;
            color: var(--amber);
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .thumb-list {
            display: grid;
            gap: 8px;
            overflow: auto;
            padding-right: 2px;
        }

        .thumb-button {
            display: grid;
            grid-template-columns: 78px minmax(0, 1fr);
            align-items: center;
            gap: 9px;
            width: 100%;
            min-height: 82px;
            padding: 7px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: #1f2937;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
        }

        .thumb-button:hover,
        .thumb-button[aria-current="true"] {
            border-color: #22c55e;
            background: #f0fdf4;
            box-shadow: 0 10px 22px rgba(34, 197, 94, 0.12);
        }

        .thumb-button:focus-visible,
        .icon-button:focus-visible,
        .choice-button:focus-visible,
        .next-check:focus-visible {
            outline: 3px solid rgba(34, 197, 94, 0.32);
            outline-offset: 2px;
        }

        .thumb-button img {
            width: 78px;
            height: 58px;
            aspect-ratio: 1448 / 1086;
            border: 1px solid #dce6ee;
            border-radius: 6px;
            object-fit: contain;
            background: var(--soft);
        }

        .thumb-title {
            display: block;
            color: #0f172a;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.35;
        }

        .thumb-meta {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.35;
        }

        .rail__nav {
            display: grid;
            gap: 8px;
            margin-top: auto;
        }

        .rail__link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 38px;
            padding: 0 9px;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            background: #ffffff;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: 900;
            text-decoration: none;
        }

        .stage {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .stage__bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 2px 8px;
        }

        .stage__title {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-width: 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #075985;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .icon-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            text-decoration: none;
        }

        .icon-button:hover {
            border-color: #22c55e;
            color: var(--green-dark);
            background: #f0fdf4;
        }

        .button-symbol {
            font-size: 21px;
            font-weight: 900;
            line-height: 1;
        }

        .stage__body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 310px;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        .stage__viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            overflow: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .stage__image {
            width: 100%;
            height: auto;
            max-height: calc(100dvh - 154px);
            object-fit: contain;
            background: #ffffff;
        }

        .check-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            padding: 14px;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            background: linear-gradient(180deg, #f0fdf4, #ffffff);
        }

        .check-panel__label {
            margin: 0;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: 950;
        }

        .check-panel__prompt {
            margin: 8px 0 0;
            color: #172033;
            font-size: 17px;
            font-weight: 950;
            line-height: 1.55;
        }

        .choices {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }

        .choice-button {
            min-height: 46px;
            padding: 10px 12px;
            border: 2px solid #d7e0ea;
            border-radius: 8px;
            background: #ffffff;
            color: #172033;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.35;
        }

        .choice-button:not(:disabled):hover {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .choice-button.correct {
            border-color: #16a34a;
            background: #dcfce7;
            color: #166534;
        }

        .choice-button.wrong {
            border-color: #fb7185;
            background: #fff1f2;
            color: #be123c;
        }

        .choice-button.dimmed {
            color: #94a3b8;
            background: #f8fafc;
        }

        .feedback {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
        }

        .feedback.ok {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .feedback.bad {
            border-color: #fecdd3;
            background: #fff1f2;
        }

        .feedback strong {
            display: block;
            color: #172033;
            font-size: 14px;
            font-weight: 950;
        }

        .feedback p {
            margin: 7px 0 0;
            color: #334155;
            font-size: 13px;
            font-weight: 760;
            line-height: 1.55;
        }

        .next-check {
            margin-top: auto;
            min-height: 42px;
            border: 1px solid var(--green);
            border-radius: 8px;
            background: var(--green);
            color: #ffffff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 950;
        }

        .next-check:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 980px) {
            .shell {
                width: min(100% - 16px, 1320px);
                margin-top: 8px;
            }

            .viewer {
                grid-template-columns: 1fr;
                min-height: 0;
            }

            .stage {
                order: 1;
            }

            .rail {
                order: 2;
                padding: 10px;
            }

            .thumb-list {
                grid-template-columns: repeat(4, minmax(150px, 1fr));
                overflow-x: auto;
                padding-bottom: 2px;
            }

            .thumb-button {
                grid-template-columns: 1fr;
                align-content: start;
                min-height: 126px;
            }

            .thumb-button img {
                width: 100%;
                height: auto;
            }

            .rail__nav {
                display: flex;
                flex-wrap: wrap;
                margin-top: 0;
            }

            .stage__body {
                grid-template-columns: 1fr;
            }

            .stage__image {
                max-height: none;
            }

            .next-check {
                margin-top: 12px;
            }
        }

        @media (max-width: 560px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            h1 {
                font-size: 21px;
            }

            h2 {
                font-size: 17px;
            }

            .stage__bar {
                align-items: flex-start;
                flex-direction: column;
            }

            .icon-actions {
                width: 100%;
            }

            .icon-button {
                flex: 1 1 0;
            }

            .check-panel__prompt {
                font-size: 16px;
            }
        }
    </style>
</head>

                            alt="-아야/어야가 어떤 행동이나 상태가 꼭 필요하고 그래야 다음 일이 가능함을 설명하는 이미지"
                            width="1448"

                            decoding="async" />
                    </div>

    <script>
        const ASSET_BASE = "../assets/c12/grammar/images/grammar4-support-activity1/";
        const ITEMS = [
            {
                tag: "핵심",
                title: "무엇을 하려면 꼭 필요한 조건",
                file: "01-core-meaning.webp",
                alt: "-아야/어야가 어떤 행동이나 상태가 꼭 필요하고 그래야 다음 일이 가능함을 설명하는 이미지",
                prompt: "이 이미지에서 앞 문장은 무엇을 말하나요?",
                options: ["필요한 조건", "이미 끝난 결과", "상대에게 하는 명령"],
                answer: "필요한 조건",
                feedback: "맞아요. -아야/어야 앞부분은 뒤 결과를 위해 꼭 필요한 조건입니다."
            },
            {
                tag: "형태",
                title: "A/V-아야/어야 만들기",
                file: "02-form-guide.webp",
                alt: "ㅏ, ㅗ는 아야, 그 외 모음은 어야, 하다는 해야로 바꾸는 방법을 설명하는 이미지",
                prompt: "하다 동사는 -아야/어야와 만나면 어떻게 바뀌나요?",
                options: ["해야", "하아야", "하야"],
                answer: "해야",
                feedback: "좋아요. 공부하다, 운동하다처럼 하다 동사는 해야로 자연스럽게 줄어듭니다."
            },
            {
                tag: "예문",
                title: "예문으로 이해해요",
                file: "03-example-conditions.webp",
                alt: "버스, 한국어 말하기, 김밥 만들기, 병원 상황으로 -아야/어야 예문을 보여 주는 이미지",
                prompt: "버스를 타려면 카드를 어떻게 해야 하나요?",
                options: ["챙겨야 해요", "말해야 해요", "신선해야 해요"],
                answer: "챙겨야 해요",
                feedback: "정확해요. 버스를 타는 결과를 위해 카드를 챙기는 것이 필요한 조건입니다."
            },
            {
                tag: "연습",
                title: "같이 연습해요",
                file: "04-gap-practice.webp",
                alt: "일찍 자야, 공부해야, 운동해야 형태를 빈칸에 넣어 연습하는 이미지",
                prompt: "건강하려면 자주 ______ 해요.",
                options: ["운동해야", "공부해야", "자야"],
                answer: "운동해야",
                feedback: "맞습니다. 건강하려면 자주 운동해야 해요처럼 조건과 결과를 연결합니다."
            }
        ];

        const refs = {
            currentNo: document.getElementById("currentNo"),
            thumbList: document.getElementById("thumbList"),
            stageTag: document.getElementById("stageTag"),
            stageTitle: document.getElementById("stageTitle"),
            stageImage: document.getElementById("stageImage"),
            openAsset: document.getElementById("openAsset"),
            prevBtn: document.getElementById("prevBtn"),
            nextBtn: document.getElementById("nextBtn"),
            checkPrompt: document.getElementById("checkPrompt"),
            choiceList: document.getElementById("choiceList"),
            feedbackBox: document.getElementById("feedbackBox"),
            nextCheckBtn: document.getElementById("nextCheckBtn")
        };

        let currentIndex = 0;

        function assetPath(item) {
            return ASSET_BASE + item.file;
        }

        function renderThumbs() {
            refs.thumbList.innerHTML = ITEMS.map((item, index) => `
                <button class="thumb-button" type="button" data-index="${index}" aria-current="${index === currentIndex ? "true" : "false"}">
                    <img src="${assetPath(item)}" alt="" width="1448" height="1086" loading="eager" decoding="async" />
                    <span>
                        <span class="thumb-title">${index + 1}. ${item.title}</span>
                        <span class="thumb-meta">${item.tag}</span>
                    </span>
                </button>
            `).join("");
        }

        function renderChoices(item) {
            refs.choiceList.innerHTML = "";
            item.options.forEach((option) => {
                const button = document.createElement("button");
                button.className = "choice-button";
                button.type = "button";
                button.textContent = option;
                button.addEventListener("click", () => answerCurrent(option));
                refs.choiceList.appendChild(button);
            });
            refs.feedbackBox.hidden = true;
            refs.feedbackBox.className = "feedback";
            refs.feedbackBox.innerHTML = "";
        }

        function setCurrent(index) {
            currentIndex = (index + ITEMS.length) % ITEMS.length;
            const item = ITEMS[currentIndex];
            const src = assetPath(item);

            refs.currentNo.textContent = String(currentIndex + 1);
            refs.stageTag.textContent = item.tag;
            refs.stageTitle.textContent = item.title;
            refs.stageImage.src = src;
            refs.stageImage.alt = item.alt;
            refs.openAsset.href = src;
            refs.checkPrompt.textContent = item.prompt;
            refs.nextCheckBtn.textContent = currentIndex === ITEMS.length - 1 ? "처음으로" : "다음 이미지";

            renderChoices(item);
            refs.thumbList.querySelectorAll(".thumb-button").forEach((button, buttonIndex) => {
                button.setAttribute("aria-current", buttonIndex === currentIndex ? "true" : "false");
            });
        }

        function answerCurrent(option) {
            const item = ITEMS[currentIndex];
            const ok = option === item.answer;
            refs.choiceList.querySelectorAll(".choice-button").forEach((button) => {
                button.disabled = true;
                if (button.textContent === item.answer) {
                    button.classList.add("correct");
                } else if (button.textContent === option) {
                    button.classList.add("wrong");
                } else {
                    button.classList.add("dimmed");
                }
            });
            refs.feedbackBox.className = `feedback ${ok ? "ok" : "bad"}`;
            refs.feedbackBox.innerHTML = `
                <strong>${ok ? "정답입니다." : "다시 확인해 보세요."}</strong>
                <p>${item.feedback}</p>
            `;
            refs.feedbackBox.hidden = false;
        }

        renderThumbs();
        setCurrent(0);

        refs.thumbList.addEventListener("click", (event) => {
            const button = event.target.closest(".thumb-button");
            if (!button) return;
            setCurrent(Number(button.dataset.index));
        });

        refs.prevBtn.addEventListener("click", () => setCurrent(currentIndex - 1));
        refs.nextBtn.addEventListener("click", () => setCurrent(currentIndex + 1));
        refs.nextCheckBtn.addEventListener("click", () => setCurrent(currentIndex + 1));

        window.addEventListener("keydown", (event) => {
            if (event.key === "ArrowLeft") setCurrent(currentIndex - 1);
            if (event.key === "ArrowRight") setCurrent(currentIndex + 1);
        });
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
