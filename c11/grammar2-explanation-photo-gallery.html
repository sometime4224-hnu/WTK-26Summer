    <style>

        .topbar {

        .topbar__links {
            display: flex;

            align-items: center;
            gap: 6px;
            min-height: 36px;
            padding: 0 10px;

            font-weight: 800;

        }

        .shell {

        .viewer {

            align-items: start;
        }

        .rail,
        .stage {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);

        .rail {

            top: 74px;
            padding: 14px;

        .rail__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;

            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;

            color: var(--accent);

        .thumb-list {
            display: grid;
            gap: 8px;
            max-height: calc(100vh - 188px);
            margin-top: 12px;
            overflow: auto;
            padding-right: 2px;
        }

        .thumb-button {
            display: grid;
            grid-template-columns: 58px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            width: 100%;
            min-height: 86px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: #1f2937;
            cursor: pointer;
            padding: 8px;
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;

        .thumb-button:hover,

            border-color: #14b8a6;
            background: #f0fdfa;
            box-shadow: 0 10px 22px rgba(20, 184, 166, 0.12);
        }

        .thumb-button img {
            display: block;
            width: 58px;
            height: auto;
            aspect-ratio: 1055 / 1491;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            object-fit: cover;
            background: var(--soft);

        .thumb-title {
            display: block;
            color: #0f172a;
            font-size: 13px;
            font-weight: 900;

            font-weight: 800;
            line-height: 1.35;

            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 4px 4px 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        .stage h2 {
            margin: 6px 0 0;
            color: #0f172a;
            font-size: clamp(1.25rem, 2vw, 1.8rem);
            line-height: 1.25;
            letter-spacing: 0;
        }

        .stage p {
            margin: 8px 0 0;
            color: #475569;
            font-size: 14px;
            line-height: 1.7;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 9px;
            border-radius: 8px;
            background: #ecfdf5;
            color: var(--brand-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.16s ease, background-color 0.16s ease, color 0.16s ease;
        }

        .icon-button:hover {
            border-color: #0f766e;
            background: #f0fdfa;
            color: var(--brand-dark);
        }

        .photo-frame {
            margin: 14px 0 0;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .photo-frame img {
            display: block;
            width: min(100%, 980px);
            height: auto;
            margin: 0 auto;
            border-radius: 6px;
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);

        .caption {

            color: #64748b;
            font-size: 12px;
            line-height: 1.55;
            text-align: center;
        }

        @media (max-width: 860px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar__title { white-space: normal; }

            .shell {
                width: min(100% - 16px, 760px);
                margin-top: 10px;
            }

            .viewer { grid-template-columns: 1fr; }
            .rail { position: static; }

            .thumb-list {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }

            .thumb-button {
                grid-template-columns: 1fr;
                min-height: 0;
                padding: 6px;
            }

            .thumb-button img { width: 100%; }
            .thumb-copy { display: none; }
            .stage__bar { flex-direction: column; }

            .controls {
                align-self: stretch;
                justify-content: flex-end;
            }
        }

        @media (max-width: 460px) {
            .thumb-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .stage,
            .rail { padding: 10px; }
            .photo-frame { padding: 6px; }

    <script>
        const PHOTO_BASE = "../assets/c11/grammar/images/grammar2-neundamyeon/photos/";
        const THUMB_BASE = "../assets/c11/grammar/images/grammar2-neundamyeon/thumbs/";
        const photos = [
            { id: "meaning-overview", tag: "의미", title: "V-는다면 / A-다면 의미", description: "가정해서 말할 때 쓰는 형태와 기본 예문을 한눈에 정리합니다.", file: "01-meaning-overview.webp", thumb: "01-meaning-overview-thumb.webp", alt: "V-는다면 / A-다면의 의미, 형태, 구조, 예문을 정리한 설명 사진" },
            { id: "meaning-comparison", tag: "비교", title: "비슷한 표현과 차이", description: "-(으)면과 -다면의 의미 차이를 현실 조건과 가정 상황으로 비교합니다.", file: "02-meaning-comparison.webp", thumb: "02-meaning-comparison-thumb.webp", alt: "-(으)면과 -다면의 의미 차이를 비교하는 설명 사진" },
            { id: "usage1-real-condition", tag: "용법 1", title: "실제로 가능한 조건", description: "앞으로 일어날 수 있는 상황을 가정해 결과를 말하는 기본 용법입니다.", file: "03-usage1-real-condition.webp", thumb: "03-usage1-real-condition-thumb.webp", alt: "V-는다면 / A-다면 용법 1 실제로 가능한 조건 설명 사진" },
            { id: "usage1-real-condition-examples", tag: "용법 1 예시", title: "실제로 가능한 조건 예시", description: "시간, 날씨, 돈처럼 현실에서 가능한 조건을 예문으로 확인합니다.", file: "04-usage1-real-condition-examples.webp", thumb: "04-usage1-real-condition-examples-thumb.webp", alt: "실제로 가능한 조건을 보여 주는 용법 1 예시 설명 사진" },
            { id: "usage2-future-hypothesis", tag: "용법 2", title: "미래 상황 가정", description: "아직 일어나지 않은 일을 가정하고 미래 결과나 계획을 말합니다.", file: "05-usage2-future-hypothesis.webp", thumb: "05-usage2-future-hypothesis-thumb.webp", alt: "미래 상황을 가정하는 용법 2 설명 사진" },
            { id: "usage2-future-hypothesis-examples", tag: "용법 2 예시", title: "미래 상황 가정 예시", description: "졸업, 자격증, 한국어 실력처럼 미래 목표를 가정하는 예문입니다.", file: "06-usage2-future-hypothesis-examples.webp", thumb: "06-usage2-future-hypothesis-examples-thumb.webp", alt: "미래 상황 가정 예시를 보여 주는 용법 2 설명 사진" },
            { id: "usage3-unreal-imagination", tag: "용법 3", title: "현실과 다른 상상", description: "실제로는 아니지만 상상한 상황을 앞에 놓고 바람이나 아쉬움을 말합니다.", file: "07-usage3-unreal-imagination.webp", thumb: "07-usage3-unreal-imagination-thumb.webp", alt: "현실과 다른 상상 상황을 설명하는 용법 3 사진" },
            { id: "usage4-advice-choice", tag: "용법 4 예시", title: "조언과 선택", description: "조건이 따라올 때 선택하거나 조언하는 문장 흐름을 예문으로 보여 줍니다.", file: "08-usage4-advice-choice.webp", thumb: "08-usage4-advice-choice-thumb.webp", alt: "조언과 선택 상황에서 쓰는 용법 4 예시 설명 사진" }
        ];

        const state = { index: 0 };
        const thumbList = document.getElementById("thumbList");
        const visualImage = document.getElementById("visualImage");
        const visualTitle = document.getElementById("visualTitle");
        const visualTag = document.getElementById("visualTag");
        const visualDescription = document.getElementById("visualDescription");
        const visualCaption = document.getElementById("visualCaption");
        const photoCount = document.getElementById("photoCount");
        const openPhoto = document.getElementById("openPhoto");

        function renderThumbs() {
            thumbList.innerHTML = photos.map(function (photo, index) {
                return '<button class="thumb-button" type="button" data-index="' + index + '" aria-label="' + photo.title + '" aria-current="' + (index === state.index ? "true" : "false") + '">' +
                    '<img src="' + THUMB_BASE + photo.thumb + '" alt="" width="320" height="452" loading="lazy" decoding="async" />' +
                    '<span class="thumb-copy"><span class="thumb-title">' + photo.title + '</span><span class="thumb-meta">' + photo.tag + '</span></span>' +
                '</button>';
            }).join("");

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                button.addEventListener("click", function () {
                    setActive(Number(button.dataset.index), true);
                });
            });
        }

        function setActive(index, updateHash) {
            state.index = (index + photos.length) % photos.length;
            const photo = photos[state.index];
            visualImage.src = PHOTO_BASE + photo.file;
            visualImage.alt = photo.alt;
            visualTitle.textContent = photo.title;
            visualTag.textContent = photo.tag;
            visualDescription.textContent = photo.description;
            visualCaption.textContent = photo.alt;
            photoCount.textContent = (state.index + 1) + " / " + photos.length;
            openPhoto.href = PHOTO_BASE + photo.file;

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                const current = Number(button.dataset.index) === state.index;
                button.setAttribute("aria-current", current ? "true" : "false");
            });

            if (updateHash && history.replaceState) {
                history.replaceState(null, "", "#" + photo.id);
            }
        }

        function activeFromHash() {
            const hash = decodeURIComponent(window.location.hash.replace("#", ""));
            if (!hash || hash === "visualExamples") return 0;
            const matched = photos.findIndex(function (photo) { return photo.id === hash; });
            return matched >= 0 ? matched : 0;
        }

        document.getElementById("prevPhoto").addEventListener("click", function () {
            setActive(state.index - 1, true);
        });
        document.getElementById("nextPhoto").addEventListener("click", function () {
            setActive(state.index + 1, true);
        });
        window.addEventListener("hashchange", function () {
            setActive(activeFromHash(), false);
        });

        renderThumbs();
        setActive(activeFromHash(), false);
    </script>
