<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12과 동작 표현 타이핑 연습</title>
    <link rel="stylesheet" href="../../../../shared/multilang-toggle.css">
    <style>
      :root {
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe4f0;
        --blue: #2563eb;
        --blue-soft: #dbeafe;
        --green: #15803d;
        --green-soft: #dcfce7;
        --orange: #ea580c;
        --red: #dc2626;
        --red-soft: #fee2e2;
        --yellow-soft: #fef3c7;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fafc 0%, #eef6ff 52%, #ecfdf5 100%);
        color: var(--ink);
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", system-ui, sans-serif;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page-shell {
        width: min(1280px, calc(100vw - 28px));
        margin: 0 auto 40px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 46px;
        padding: 8px 0;
        background: rgba(248, 250, 252, 0.92);
        backdrop-filter: blur(14px);
      }

      .home-link,
      .reset-button,
      .ghost-button {
        min-height: 38px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #1e293b;
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
      }

      .home-link,
      .reset-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
      }

      .topbar-title {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 15px;
        font-weight: 950;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .topbar-title span {
        margin-right: 6px;
        color: var(--orange);
      }

      .progress-dots {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        margin: 12px 0;
      }

      .progress-dot {
        min-width: 0;
        min-height: 38px;
        padding: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #64748b;
        font-size: 11px;
        font-weight: 950;
        line-height: 1.15;
      }

      .progress-dot.is-current {
        border-color: var(--ink);
        background: var(--ink);
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.22);
      }

      .progress-dot.is-done {
        border-color: #86efac;
        background: var(--green-soft);
        color: var(--green);
      }

      .workspace-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.48fr);
        gap: 16px;
        align-items: start;
      }

      .mission-panel,
      .motion-panel {
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      }

      .mission-panel {
        min-width: 0;
        padding: clamp(18px, 3vw, 32px);
        border: 4px solid var(--blue);
      }

      .mission-panel.is-current-task {
        box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.12), 0 28px 70px rgba(37, 99, 235, 0.18);
      }

      .mission-head {
        display: grid;
        gap: 8px;
      }

      .stage-meta {
        color: var(--orange);
        font-size: 14px;
        font-weight: 950;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 4.6vw, 60px);
        letter-spacing: 0;
        line-height: 1.08;
      }

      .mission-prompt {
        max-width: 760px;
        margin: 0;
        color: #334155;
        font-size: clamp(16px, 2vw, 22px);
        font-weight: 850;
        line-height: 1.52;
      }

      .language-row {
        margin: 14px 0 4px;
      }

      .typing-target {
        display: grid;
        gap: 8px;
        min-height: 218px;
        align-content: center;
        justify-items: center;
        margin-top: 12px;
        padding: 16px;
        border: 2px solid rgba(37, 99, 235, 0.42);
        border-radius: 10px;
        background: rgba(219, 234, 254, 0.62);
        text-align: center;
      }

      .typing-target > span {
        color: var(--blue);
        font-size: 13px;
        font-weight: 950;
      }

      .typing-target strong.target-expression {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: center;
        gap: 0 0.08em;
        max-width: 100%;
        color: var(--ink);
        font-size: clamp(32px, 5.6vw, 64px);
        font-weight: 950;
        line-height: 1.08;
        overflow-wrap: normal;
        word-break: normal;
      }

      .typing-target strong.target-expression.is-hidden-target {
        color: #334155;
        font-size: clamp(30px, 5vw, 54px);
      }

      .typing-target strong.target-expression.is-long-target {
        font-size: 50px;
      }

      .target-chunk {
        display: inline-flex;
        flex-wrap: nowrap;
        white-space: pre;
      }

      .target-gap {
        display: inline-block;
        width: 0.32em;
        flex: 0 0 0.32em;
      }

      .target-char {
        position: relative;
        display: inline-block;
        min-width: 0.45em;
        border-radius: 8px;
        padding: 0 0.015em;
        transition: background-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
      }

      .target-char.is-punctuation {
        background: #dbeafe;
        color: #1d4ed8;
        box-shadow: inset 0 -0.08em 0 rgba(37, 99, 235, 0.45);
      }

      .target-char.is-next {
        background: var(--yellow-soft);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
      }

      .target-char.is-wrong {
        background: var(--red-soft);
        color: #991b1b;
        box-shadow: inset 0 -0.16em 0 #ef4444, 0 0 0 3px rgba(239, 68, 68, 0.18);
      }

      .target-char.is-revealed-correct,
      .target-expression.is-answer-revealed .target-char {
        background: #dcfce7;
        color: #166534;
        box-shadow: inset 0 -0.12em 0 rgba(22, 163, 74, 0.38);
      }

      .target-char.is-extra-error::after {
        position: absolute;
        right: -0.18em;
        bottom: -0.22em;
        color: var(--red);
        content: "+";
        font-size: 0.36em;
        font-weight: 950;
      }

      .punctuation-note {
        margin: 0;
        padding: 7px 10px;
        border: 1px solid #bfdbfe;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 13px;
        font-weight: 950;
        line-height: 1.2;
      }

      .cue {
        margin: 0;
        color: #334155;
        font-size: clamp(16px, 2vw, 21px);
        font-weight: 850;
        line-height: 1.45;
      }

      .note {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.5;
      }

      .translation-panel {
        width: min(100%, 760px);
      }

      .hint-panel {
        display: grid;
        gap: 4px;
        width: min(100%, 760px);
        padding: 10px 12px;
        border: 1px dashed #f59e0b;
        border-radius: 8px;
        background: #fffbeb;
        color: #92400e;
        text-align: left;
      }

      .hint-panel span {
        font-size: 12px;
        font-weight: 950;
      }

      .hint-panel strong {
        font-size: 15px;
        line-height: 1.45;
      }

      .spotlight-input {
        margin-top: 16px;
        padding: 10px;
        border: 4px solid #0f172a;
        border-radius: 14px;
        background: #fefce8;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
      }

      input {
        width: 100%;
        min-height: 78px;
        border: 0;
        border-radius: 12px;
        background: #ffffff;
        color: var(--ink);
        font-size: clamp(25px, 4.4vw, 48px);
        font-weight: 950;
        line-height: 1.14;
        text-align: center;
        outline: none;
      }

      input:focus {
        box-shadow: inset 0 0 0 4px #facc15;
      }

      .status-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #334155;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.45;
      }

      .status-line.is-good {
        border-color: #86efac;
        background: var(--green-soft);
        color: #166534;
      }

      .status-line.is-bad {
        border-color: #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }

      .status-line.is-warn {
        border-color: #fde68a;
        background: #fffbeb;
        color: #92400e;
      }

      kbd {
        padding: 2px 6px;
        border: 1px solid #cbd5e1;
        border-bottom-width: 2px;
        border-radius: 5px;
        background: #ffffff;
        color: #0f172a;
        font-size: 12px;
        font-weight: 950;
      }

      .assist-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .ghost-button {
        flex: 1 1 130px;
        padding: 0 14px;
      }

      .ghost-button[hidden] {
        display: none;
      }

      .ghost-button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .report-panel {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .report-card {
        padding: 16px;
        border: 1px solid #dbe4f0;
        border-radius: 8px;
        background: #f8fafc;
        text-align: center;
      }

      .report-card strong {
        display: block;
        color: var(--blue);
        font-size: 34px;
        font-weight: 950;
      }

      .review-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding-left: 20px;
        color: #334155;
        font-weight: 850;
      }

      .motion-panel {
        position: sticky;
        top: 68px;
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid rgba(37, 99, 235, 0.22);
      }

      .motion-panel__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .motion-panel__head span {
        color: var(--orange);
        font-size: 12px;
        font-weight: 950;
      }

      .motion-panel__head strong {
        font-size: 18px;
        font-weight: 950;
      }

      .motion-caption {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.45;
      }

      .motion-stage {
        width: 100%;
        aspect-ratio: 360 / 430;
        min-height: 410px;
        border-radius: 10px;
        background:
          linear-gradient(180deg, #eef6ff 0%, #ffffff 58%, #e7f8ed 100%);
        overflow: hidden;
      }

      .motion-ground {
        fill: #bbf7d0;
      }

      .motion-step {
        fill: #dbeafe;
        stroke: #60a5fa;
        stroke-width: 2;
        opacity: 0.44;
      }

      .motion-air {
        fill: none;
        stroke: #38bdf8;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 8 10;
        opacity: 0;
      }

      .motion-line {
        fill: none;
        stroke: #334155;
        stroke-width: 13;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .motion-foot {
        fill: none;
        stroke: #334155;
        stroke-width: 9;
        stroke-linecap: round;
      }

      .motion-body {
        fill: #f8fafc;
        stroke: #334155;
        stroke-width: 7;
      }

      .motion-head {
        fill: #fff7ed;
        stroke: #334155;
        stroke-width: 7;
      }

      .motion-joint {
        fill: #ffffff;
        stroke: #334155;
        stroke-width: 4;
      }

      .motion-waist-cue {
        fill: none;
        stroke: #64748b;
        stroke-width: 5;
        stroke-linecap: round;
        opacity: 0.62;
      }

      .motion-face {
        fill: none;
        stroke: #334155;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .motion-eye {
        fill: #334155;
      }

      [data-motion-part].is-focus {
        stroke: #ea580c;
        filter: drop-shadow(0 0 9px rgba(234, 88, 12, 0.52));
      }

      .motion-head.is-focus,
      .motion-body.is-focus,
      .motion-joint.is-focus,
      .motion-waist-cue.is-focus {
        stroke: #ea580c;
        opacity: 1;
      }

      .motion-head.is-focus,
      .motion-body.is-focus,
      .motion-joint.is-focus {
        fill: #ffedd5;
      }

      .scene-steps.is-focus .motion-step {
        opacity: 1;
        stroke: #ea580c;
        filter: drop-shadow(0 0 8px rgba(234, 88, 12, 0.42));
      }

      .motion-air.is-focus {
        opacity: 1;
        stroke: #0284c7;
      }

      .motion-foot.is-focus {
        stroke: #ea580c;
      }

      .motion-figure {
        filter: drop-shadow(0 11px 18px rgba(15, 23, 42, 0.16));
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }

      @media (max-width: 920px) {
        .page-shell {
          width: min(100vw - 16px, 760px);
        }

        .workspace-grid {
          grid-template-columns: 1fr;
        }

        .motion-panel {
          position: static;
          order: -1;
          padding: 12px;
        }

        .motion-stage {
          min-height: 240px;
          max-height: 320px;
        }

        .topbar {
          grid-template-columns: auto minmax(0, 1fr) auto;
          gap: 6px;
        }

        .topbar-title {
          font-size: 13px;
        }

        .progress-dot {
          min-height: 32px;
          padding: 4px 2px;
          font-size: 9px;
        }

        .mission-panel {
          padding: 14px;
          border-width: 3px;
        }

        .typing-target {
          min-height: 176px;
        }

        .typing-target strong.target-expression.is-long-target {
          font-size: 30px;
        }

        .target-char {
          min-width: 0.4em;
        }

        input {
          min-height: 66px;
          font-size: 28px;
        }

        .report-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a class="home-link" href="../../../../c12/index.html">12과</a>
        <div class="topbar-title" aria-label="12과 동작 표현 타이핑 연습">
          <span>PC 입력</span>
          <strong>12과 동작 표현 타이핑 연습</strong>
        </div>
        <button class="reset-button" id="resetTrainer" type="button">처음부터</button>
      </header>

      <div class="progress-dots" id="progressDots" aria-label="동작 표현 타이핑 진행 단계"></div>

      <div class="workspace-grid">
        <section class="mission-panel is-current-task" id="missionPanel" aria-labelledby="stageTitle">
          <div class="mission-head">
            <span class="stage-meta" id="stageMeta">1단계</span>
            <h1 id="stageTitle">한/영 확인</h1>
            <p class="mission-prompt" id="missionPrompt">한글 입력 모드로 짧게 시작합니다. 아래 칸에 동작을 입력하세요.</p>
          </div>

          <div class="language-row" data-multilang-bar></div>

          <div class="typing-target" id="targetCard">
            <span id="itemMeta">시작 확인</span>
            <strong id="targetText">동작</strong>
            <p class="punctuation-note" id="punctuationNote" hidden>문장부호도 똑같이 입력하세요.</p>
            <p class="cue" id="cueKo">한글 입력 모드인지 확인합니다.</p>
            <p class="note" id="noteText">정확히 입력하면 동작 표현으로 이동합니다.</p>
            <div class="translation-panel" id="translationPanel" aria-label="선택 언어 보조 설명"></div>
            <div class="hint-panel" id="hintPanel" hidden>
              <span>힌트</span>
              <strong id="hintText"></strong>
            </div>
          </div>

          <div class="spotlight-input" id="inputWrap">
            <input id="typingInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="동작">
          </div>

          <section class="report-panel" id="reportPanel" aria-label="학습 리포트" hidden>
            <div class="report-grid">
              <div class="report-card"><span>연습 항목</span><strong id="totalMetric">0</strong></div>
              <div class="report-card"><span>정답 처리</span><strong id="correctMetric">0</strong></div>
              <div class="report-card"><span>힌트 사용</span><strong id="hintMetric">0</strong></div>
            </div>
            <div>
              <h2>재연습 추천 표현</h2>
              <ul class="review-list" id="reviewList"></ul>
            </div>
          </section>

          <div class="status-line" id="statusLine" aria-live="polite">
            <span id="feedbackText">한글 입력 모드에서 "동작"을 입력하세요.</span>
            <span id="shortcutText"><kbd>자동</kbd> 정확히 입력하면 이동</span>
          </div>

          <div class="assist-actions">
            <button class="ghost-button" id="prevButton" type="button">이전</button>
            <button class="ghost-button" id="hintButton" type="button">Ctrl+H 힌트</button>
            <button class="ghost-button" id="checkButton" type="button">확인</button>
            <button class="ghost-button" id="retryButton" type="button" hidden>재연습</button>
          </div>
        </section>

        <aside class="motion-panel" id="motionPanel" data-motion-id="ready" aria-label="현재 동작 애니메이션">
          <div class="motion-panel__head">
            <div>
              <span>Motion cue</span>
              <strong id="motionTitle">동작 준비</strong>
            </div>
            <span id="motionSource">준비</span>
          </div>
          <p class="motion-caption" id="motionCaption">한글 입력 모드를 확인하면 동작 표현 애니메이션이 함께 바뀝니다.</p>
          <svg id="motionStage" class="motion-stage" data-motion-id="ready" viewBox="0 0 360 430" role="img" aria-labelledby="motionSvgTitle motionSvgDesc">
            <title id="motionSvgTitle">동작 표현 애니메이션</title>
            <desc id="motionSvgDesc">현재 타이핑할 동작 표현을 보여 주는 단순화된 사람 뼈대 애니메이션입니다.</desc>
            <rect width="360" height="430" fill="transparent"></rect>
            <g class="scene-steps" data-motion-part="stairs">
              <rect class="motion-step" x="224" y="332" width="90" height="20" rx="3"></rect>
              <rect class="motion-step" x="248" y="302" width="86" height="20" rx="3"></rect>
              <rect class="motion-step" x="272" y="272" width="72" height="20" rx="3"></rect>
            </g>
            <path id="motionAir" class="motion-air" data-motion-part="air" d="M54 130 C98 96, 128 98, 154 122 M42 171 C92 136, 122 142, 154 166"></path>
            <rect class="motion-ground" x="0" y="352" width="360" height="78" rx="0"></rect>
            <g id="motionFigure" class="motion-figure">
              <path id="motionBody" class="motion-body" data-motion-part="torso"></path>
              <path id="motionNeck" class="motion-line" data-motion-part="head"></path>
              <path id="leftArmPath" class="motion-line" data-motion-part="arms"></path>
              <path id="rightArmPath" class="motion-line" data-motion-part="arms"></path>
              <path id="leftLegPath" class="motion-line" data-motion-part="legs"></path>
              <path id="rightLegPath" class="motion-line" data-motion-part="legs"></path>
              <path id="leftFootPath" class="motion-foot" data-motion-part="heels"></path>
              <path id="rightFootPath" class="motion-foot" data-motion-part="heels"></path>
              <circle id="headCircle" class="motion-head" data-motion-part="head" r="30"></circle>
              <circle id="leftHand" class="motion-joint" data-motion-part="hands" r="9"></circle>
              <circle id="rightHand" class="motion-joint" data-motion-part="hands" r="9"></circle>
              <path id="waistJoint" class="motion-waist-cue" data-motion-part="waist"></path>
              <circle id="leftHeel" class="motion-joint" data-motion-part="heels" r="7"></circle>
              <circle id="rightHeel" class="motion-joint" data-motion-part="heels" r="7"></circle>
              <circle id="leftToe" class="motion-joint" data-motion-part="heels" r="5"></circle>
              <circle id="rightToe" class="motion-joint" data-motion-part="heels" r="5"></circle>

        function normalize(value) {
          return String(value || "").replace(/\s+/g, " ").trim();
        }

        function hasEnglish(value) {
          return /[A-Za-z]/.test(value);
        }

        function isPunctuation(char) {
          return /[.?!,]/.test(char);
        }

        function hasPunctuation(value) {
          return Array.from(value || "").some(isPunctuation);
        }

        function isRecallStage(stageId) {
          return RECALL_STAGE_IDS.indexOf(stageId) !== -1;
        }

        function recallShortcut() {
          return "<kbd>Enter</kbd> 확인 <kbd>Ctrl+H</kbd> 힌트";
        }

        function isRevealedCharacter(char) {
          return /[0-9A-Za-z가-힣ㄱ-ㅎㅏ-ㅣ]/.test(char);
        }

        function visibleCharCount(value) {
          return Array.from(value || "").filter(isRevealedCharacter).length;
        }

        function getInitialConsonants(value) {
          return Array.from(value || "").map((char) => {
            const code = char.charCodeAt(0);
            if (code >= 0xac00 && code <= 0xd7a3) return INITIALS[Math.floor((code - 0xac00) / 588)];
            if (/\s/.test(char)) return " ";
            if (isPunctuation(char)) return char;
            return isRevealedCharacter(char) ? "?" : char;
          }).join("");
        }

        function maskByLength(value) {
          const chars = Array.from(value || "");
          const revealLimit = visibleCharCount(value) <= 4 ? 1 : 2;
          let revealed = 0;
          return chars.map((char) => {
            if (!isRevealedCharacter(char)) return char;
            revealed += 1;
            return revealed <= revealLimit ? char : "?";
          }).join("");
        }

        function recallDisplayText(stageId, item) {
          if (!item) return "";
          if (stageId === "recall1") return getInitialConsonants(item.target);
          if (stageId === "recall2") return maskByLength(item.target);
          return item.target;
        }

        function makeRecallHint(item) {
          if (!item) return "";
          return "뜻/상황: " + item.cueKo + " · 사용 단서: " + item.note + " · 글자 수: " + visibleCharCount(item.target) + "자";
        }

        function compareToTarget(input, target) {
          const inputChars = Array.from(normalize(input));
          const targetChars = Array.from(target || "");
          const minLength = Math.min(inputChars.length, targetChars.length);
          const wrongIndices = [];
          for (let index = 0; index < minLength; index += 1) {
            if (inputChars[index] !== targetChars[index]) wrongIndices.push(index);
          }
          const exact = wrongIndices.length === 0 && inputChars.length === targetChars.length;
          const extra = inputChars.length > targetChars.length;
          const prefix = wrongIndices.length === 0 && inputChars.length < targetChars.length;
          const rest = prefix ? targetChars.slice(inputChars.length) : [];
          const missingPunctuation = prefix && rest.length > 0 && rest.every(isPunctuation);
          const missingIndices = missingPunctuation ? rest.map((_, offset) => inputChars.length + offset) : [];
          const index = wrongIndices[0] == null
            ? extra ? Math.max(targetChars.length - 1, 0) : inputChars.length
            : wrongIndices[0];
          return { exact, prefix, index, extra, missingPunctuation, wrongIndices, missingIndices };
        }

        function clearMismatch() {
          state.mismatch = null;
          state.revealAnswer = null;
        }

        function setMismatch(item, input) {
          const normalizedInput = normalize(input);
          const analysis = compareToTarget(input, item ? item.target : "");
          const fallbackIndex = Math.max(Array.from(item ? item.target : "").length - 1, 0);
          const indices = analysis.missingPunctuation
            ? analysis.missingIndices
            : analysis.wrongIndices.length > 0
              ? analysis.wrongIndices
              : [analysis.extra ? fallbackIndex : analysis.index];
          const targetChars = Array.from(item ? item.target : "");
          const inputChars = Array.from(normalizedInput);
          const matchedIndices = [];
          targetChars.forEach((char, index) => {
            if (inputChars[index] === char && char !== " ") matchedIndices.push(index);
          });
          state.mismatch = item ? { itemId: item.id, input: normalizedInput, index: analysis.index, indices, matchedIndices, extra: analysis.extra, missingPunctuation: analysis.missingPunctuation } : null;
          return analysis;
        }

        function chunkTargetText(item, displayText) {
          if (item && Array.isArray(item.displayChunks) && item.displayChunks.join(" ") === displayText) return item.displayChunks;
          return String(displayText || "").split(" ");
        }

        function nearestVisibleIndex(displayText, index) {
          const chars = Array.from(displayText || "");
          if (chars.length === 0) return 0;
          const bounded = Math.max(0, Math.min(index, chars.length - 1));
          if (chars[bounded] !== " ") return bounded;
          for (let next = bounded + 1; next < chars.length; next += 1) if (chars[next] !== " ") return next;
          for (let previous = bounded - 1; previous >= 0; previous -= 1) if (chars[previous] !== " ") return previous;
          return bounded;
        }

        function visibleIndices(displayText, indices) {
          const seen = new Set();
          return indices.map((index) => nearestVisibleIndex(displayText, index)).filter((index) => {
            if (seen.has(index)) return false;
            seen.add(index);
            return true;
          });
        }

        function targetRenderState(stageId, item, displayText) {
          const target = item ? item.target : displayText;
          const value = normalize(els.typingInput.value);
          const displayLastIndex = Math.max(Array.from(displayText || "").length - 1, 0);
          if (item && state.revealAnswer === item.id) return { answerRevealed: true };
          if (!value) return { nextIndex: nearestVisibleIndex(displayText, 0) };
          const analysis = compareToTarget(value, target);
          const forced = item && state.mismatch && state.mismatch.itemId === item.id;
          if (analysis.exact) return {};
          const index = nearestVisibleIndex(displayText, Math.max(0, Math.min(analysis.index, displayLastIndex)));
          const wrongIndices = visibleIndices(displayText, forced ? state.mismatch.indices : analysis.wrongIndices);
          if (isRecallStage(stageId)) return forced ? { wrongIndices: wrongIndices.length ? wrongIndices : [index], revealedIndices: state.mismatch.matchedIndices || [], extra: analysis.extra } : { nextIndex: index };
          if (!forced && analysis.prefix) return { nextIndex: index };
          return { wrongIndices: wrongIndices.length ? wrongIndices : [index], extra: analysis.extra };
        }

        function recallFeedbackDisplayText(stageId, item) {
          const clue = recallDisplayText(stageId, item);
          if (!item || !state.mismatch || state.mismatch.itemId !== item.id) return clue;
          const clueChars = Array.from(clue);
          const targetChars = Array.from(item.target);
          const inputChars = Array.from(state.mismatch.input || "");
          return targetChars.map((char, index) => {
            if (char === " ") return " ";
            return inputChars[index] === char ? char : clueChars[index] || "?";
          }).join("");
        }

        function escapeHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function renderTargetExpression(displayText, item, options) {
          const stageId = options && options.stageId ? options.stageId : currentStage().id;
          const renderState = targetRenderState(stageId, item, displayText);
          const chunks = chunkTargetText(item, displayText);
          let charIndex = 0;
          els.targetText.className = "target-expression";
          els.targetText.classList.toggle("is-hidden-target", Boolean(options && options.hidden));
          els.targetText.classList.toggle("is-answer-revealed", Boolean(renderState.answerRevealed));
          els.targetText.classList.toggle("is-long-target", Array.from(displayText || "").length > 16);
          els.targetText.setAttribute("aria-label", displayText || "");
          const wrongIndexSet = new Set(renderState.wrongIndices || []);
          const revealedIndexSet = new Set(renderState.revealedIndices || []);
          els.targetText.innerHTML = chunks.map((chunk, chunkIndex) => {
            const gap = chunkIndex === 0 ? "" : '<span class="target-gap" aria-hidden="true"> </span>';
            if (chunkIndex > 0) charIndex += 1;
            const chars = Array.from(chunk).map((char) => {
              const classes = ["target-char"];
              if (isPunctuation(char)) classes.push("is-punctuation");
              if (renderState.nextIndex === charIndex) classes.push("is-next");
              if (revealedIndexSet.has(charIndex)) classes.push("is-revealed-correct");
              if (wrongIndexSet.has(charIndex)) classes.push("is-wrong");
              if (renderState.extra && wrongIndexSet.has(charIndex)) classes.push("is-extra-error");
              const html = '<span class="' + classes.join(" ") + '" data-char-index="' + charIndex + '">' + escapeHtml(char) + "</span>";
              charIndex += 1;
              return html;
            }).join("");
            return gap + '<span class="target-chunk" data-chunk="' + escapeHtml(chunk) + '">' + chars + "</span>";
          }).join("");
        }

        function syncMultilangBlocks() {

        function practiceItems() {
          return MOTION_TYPING_ITEMS.concat(RECALL1_ITEMS, RECALL2_ITEMS);
        }

        function stageItems(stageId) {
          if (stageId === "motion") return MOTION_TYPING_ITEMS;
          if (stageId === "recall1") return RECALL1_ITEMS;

        }

        function currentItem() {
          const stage = currentStage();
          const items = stageItems(stage.id);

        function currentItemIndex() {
          const stage = currentStage();

        }

        function stageDone(stageId) {
          if (stageId === "warmup") return state.stageIndex > 0;
          if (stageId === "report") return state.stageIndex === STAGES.length - 1;
          const items = stageItems(stageId);

        function setFeedback(message, kind, shortcut) {

        function saveState() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        function loadState() {
          try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            Object.assign(state, saved);
            state.itemIndexByStage = Object.assign({}, DEFAULT_ITEM_INDEX_BY_STAGE, saved.itemIndexByStage || {});
            state.results = saved.results && typeof saved.results === "object" ? saved.results : {};
            state.stageIndex = Math.max(0, Math.min(Number(state.stageIndex) || 0, STAGES.length - 1));
            INDEXED_STAGE_IDS.forEach((stageId) => {
              const max = Math.max(stageItems(stageId).length - 1, 0);
              state.itemIndexByStage[stageId] = Math.max(0, Math.min(Number(state.itemIndexByStage[stageId]) || 0, max));
            });
            state.hintVisible = false;
            state.mismatch = null;
            state.revealAnswer = null;
            state.composing = false;

        function focusInput(selectText) {
          if (state.composing || currentStage().id === "report") return;

        function clearTimers() {
          window.clearTimeout(advanceTimer);

        function recordAttempt(item, correct) {
          const previous = state.results[item.id] || { id: item.id, target: item.target, section: item.source, attempts: 0, hint: false, correct: false };
          state.results[item.id] = {
            id: item.id,
            target: item.target,
            section: item.source,
            attempts: previous.attempts + 1,
            hint: previous.hint || state.hintVisible,
            correct: previous.correct || correct
          };
        }

        function markHintUsed() {
          const item = currentItem();
          if (!item || !isRecallStage(currentStage().id)) return;
          const previous = state.results[item.id] || { id: item.id, target: item.target, section: item.source, attempts: 0, hint: false, correct: false };
          state.results[item.id] = Object.assign({}, previous, { hint: true });
        }

        function goToStage(index, options) {
          clearTimers();
          state.stageIndex = Math.max(0, Math.min(index, STAGES.length - 1));
          state.hintVisible = false;
          clearMismatch();
          render(options);
        }

        function advanceItem() {
          const stage = currentStage();
          const items = stageItems(stage.id);
          const nextIndex = currentItemIndex() + 1;
          state.hintVisible = false;
          clearMismatch();
          if (nextIndex < items.length) {
            state.itemIndexByStage[stage.id] = nextIndex;

            setFeedback("좋아요. 다음 표현을 입력하세요.", "good", isRecallStage(stage.id) ? recallShortcut() : "<kbd>자동</kbd> 정확히 치면 이동");
            return;

          goToStage(state.stageIndex + 1, { selectText: true });

            setFeedback(isRecallStage(currentStage().id) ? "단서를 보고 기억나는 표현을 입력하세요." : "다음 단계로 넘어갑니다.", "good", isRecallStage(currentStage().id) ? recallShortcut() : "<kbd>자동</kbd>");
          }

        function completeWarmup() {
          clearMismatch();

          clearMismatch();

        function submitRecallItem() {
          const item = currentItem();
          if (!item) return;
          const value = normalize(els.typingInput.value);
          if (hasEnglish(value)) {
            setFeedback("한/영 키 확인: 지금은 한글 입력 모드가 필요합니다.", "bad", "<kbd>한/영</kbd> " + recallShortcut());
            focusInput(true);
            return;
          }
          if (value === item.target) {
            clearMismatch();
            state.revealAnswer = item.id;
            recordAttempt(item, true);
            els.typingInput.value = "";
            renderTarget();
            setFeedback("정확해요. 정답을 확인하고 다음으로 넘어갑니다.", "good", "<kbd>자동 이동</kbd>");
            saveState();
            advanceTimer = window.setTimeout(advanceItem, 850);
            return;
          }
          recordAttempt(item, false);
          setMismatch(item, value);
          renderTarget();
          setFeedback("다시 입력하세요.", "bad", recallShortcut());
          saveState();
          focusInput(true);
        }

        function handleTypingInput() {
          if (state.composing) return;
          const stage = currentStage();
          const value = normalize(els.typingInput.value);
          if (state.revealAnswer) return;
          clearTimers();
          if (hasEnglish(value)) {
            setFeedback("한/영 키 확인: 지금은 한글 입력 모드가 필요합니다.", "bad", "<kbd>한/영</kbd>");
            renderTarget();
            return;
          }
          if (stage.id === "warmup") {
            if (value === WARMUP_TARGET) completeWarmup();
            else {
              renderTarget();
              setFeedback('"동작"을 입력하세요.', "warn", "<kbd>자동</kbd> 정확히 입력하면 이동");
            }
            return;
          }
          if (isRecallStage(stage.id)) {
            if (state.mismatch && currentItem() && state.mismatch.itemId === currentItem().id) {
              setMismatch(currentItem(), value);
              renderTarget();
            }
            setFeedback("단서를 보고 기억나는 표현을 입력한 뒤 Enter를 누르세요.", "", recallShortcut());
            return;
          }
          const item = currentItem();
          if (item && value === item.target) {
            completeCopyItem(item);
            return;
          }
          if (item) {
            renderTarget();
            setFeedback("목표 표현을 그대로 입력하세요.", "", "<kbd>자동</kbd> 정확히 치면 이동");
          }
        }

        function showHint() {
          const item = currentItem();
          if (!item || !isRecallStage(currentStage().id)) return;
          state.hintVisible = true;

          setFeedback("힌트를 보고 다시 입력하세요.", "warn", recallShortcut());
          render({ preserveInput: true, preserveFocus: true });
          focusInput();
        }

        function goPrev() {
          if (state.stageIndex === 0) return;
          goToStage(state.stageIndex - 1, { selectText: true });
        }

        function retryRecall() {
          state.stageIndex = STAGES.findIndex((stage) => stage.id === "recall1");
          state.itemIndexByStage.recall1 = 0;
          state.itemIndexByStage.recall2 = 0;
          state.hintVisible = false;
          clearMismatch();
          render({ selectText: true });

        }

        function resetTrainer() {
          clearTimers();
          Object.assign(state, {
            stageIndex: 0,
            itemIndexByStage: Object.assign({}, DEFAULT_ITEM_INDEX_BY_STAGE),
            results: {},
            hintVisible: false,
            mismatch: null,
            revealAnswer: null,
            composing: false

          lastRenderKey = "";
          localStorage.removeItem(STORAGE_KEY);
          els.typingInput.value = "";
          setFeedback('한글 입력 모드에서 "동작"을 입력하세요.', "", "<kbd>자동</kbd> 정확히 입력하면 이동");
          render({ selectText: true });
        }

        function renderProgressDots() {
          els.progressDots.innerHTML = STAGES.map((stage, index) => {
            const classes = ["progress-dot"];
            if (index === state.stageIndex) classes.push("is-current");
            if (stageDone(stage.id)) classes.push("is-done");
            return '<button class="' + classes.join(" ") + '" type="button" data-stage-index="' + index + '">' + (index + 1) + ". " + stage.label + "</button>";
          }).join("");
        }

        function renderReport() {
          const items = practiceItems();
          const results = Object.values(state.results);
          const correct = results.filter((result) => result.correct).length;
          const hints = results.filter((result) => result.hint).length;
          const review = items.filter((item) => {
            const result = state.results[item.id];
            return !result || !result.correct || result.hint || result.attempts > 1;
          });
          const fallback = items.filter((item) => !review.some((entry) => entry.id === item.id)).slice(-3);
          const reviewItems = review.concat(fallback).slice(0, 3);
          els.totalMetric.textContent = String(items.length);
          els.correctMetric.textContent = String(correct);
          els.hintMetric.textContent = String(hints);
          els.reviewList.innerHTML = reviewItems.map((item) => "<li>" + item.target + "</li>").join("");
          setFeedback("학습 리포트가 준비되었습니다.", "good", "<kbd>재연습</kbd> 또는 처음부터");
          renderMotion(null);
        }

        function renderTarget() {
          const stage = currentStage();
          const item = currentItem();
          if (stage.id === "warmup") {
            els.itemMeta.textContent = "시작 확인";
            renderTargetExpression(WARMUP_TARGET, null, { stageId: stage.id });
            els.punctuationNote.hidden = true;
            els.cueKo.textContent = "한글 입력 모드인지 확인합니다.";
            els.noteText.textContent = "정확히 입력하면 동작 표현으로 이동합니다.";
            renderTranslations(WARMUP_TRANSLATIONS);
            els.hintPanel.hidden = true;
            els.typingInput.placeholder = WARMUP_TARGET;
            renderMotion(null);
            return;
          }
          if (!item) return;
          const items = stageItems(stage.id);
          els.itemMeta.textContent = stage.title + " " + (currentItemIndex() + 1) + " / " + items.length;
          els.cueKo.textContent = item.cueKo;
          els.noteText.textContent = item.note;
          renderTranslations(item.translations);
          els.typingInput.placeholder = isRecallStage(stage.id) ? "기억나는 표현 입력" : "목표 표현 입력";
          els.punctuationNote.hidden = !hasPunctuation(item.target);
          renderMotion(item);
          if (isRecallStage(stage.id)) {
            if (state.revealAnswer === item.id) {
              renderTargetExpression(item.target, item, { stageId: stage.id });
            } else {
              renderTargetExpression(recallFeedbackDisplayText(stage.id, item), item, { stageId: stage.id, hidden: true });
            }
            els.hintText.textContent = makeRecallHint(item);
            els.hintPanel.hidden = !state.hintVisible;
            return;
          }
          renderTargetExpression(item.target, item, { stageId: stage.id });
          els.hintPanel.hidden = true;
        }

        function n(value) {
          return String(Math.round(Number(value) * 10) / 10);
        }

        function d(point) {
          return n(point.x) + " " + n(point.y);
        }

        function setAttrs(node, attrs) {
          if (!node) return;
          Object.keys(attrs).forEach((key) => {
            node.setAttribute(key, attrs[key]);
          });
        }

        function setCircle(node, point) {
          setAttrs(node, { cx: n(point.x), cy: n(point.y) });
        }

        function setPath(node, value) {
          if (node) node.setAttribute("d", value);
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function easeInOut(t) {
          return 0.5 - Math.cos(t * Math.PI) / 2;
        }

        function interpolatePose(start, end, t) {
          const eased = easeInOut(t);
          const pose = {};
          POINT_KEYS.forEach((key) => {
            pose[key] = {
              x: lerp(start[key].x, end[key].x, eased),
              y: lerp(start[key].y, end[key].y, eased)
            };
          });
          POSE_SCALARS.forEach((key) => {
            pose[key] = lerp(Number(start[key] || 0), Number(end[key] || 0), eased);
          });
          return pose;
        }

        function motionDefinition(motionId) {
          return MOTION_POSES[motionId] || MOTION_POSES.ready;
        }

        function prefersReducedMotion() {
          return Boolean(reducedMotionQuery && reducedMotionQuery.matches);
        }

        function motionPoseAt(definition, elapsed) {
          const frames = definition.frames || MOTION_POSES.ready.frames;
          if (frames.length < 2) return clonePose(frames[0].pose);
          const total = frames.reduce((sum, frame) => sum + frame.duration, 0);
          let remaining = total ? elapsed % total : 0;
          for (let index = 0; index < frames.length; index += 1) {
            const frame = frames[index];
            if (remaining <= frame.duration) {
              const next = frames[(index + 1) % frames.length];
              return interpolatePose(frame.pose, next.pose, remaining / frame.duration);
            }
            remaining -= frame.duration;
          }
          return clonePose(frames[0].pose);
        }

        function posterPose(definition) {
          const index = Math.min(definition.posterFrame || 0, definition.frames.length - 1);
          return clonePose(definition.frames[index].pose);
        }

        function renderMotionPose(pose) {
          currentMotionPose = clonePose(pose);
          const leftShoulder = pose.leftShoulder;
          const rightShoulder = pose.rightShoulder;
          const leftHip = pose.leftHip;
          const rightHip = pose.rightHip;
          const chest = pose.chest;
          const waist = pose.waist;
          const bodyPath = [
            "M", d(leftShoulder),
            "C", d({ x: chest.x - 22, y: chest.y - 24 }), d({ x: chest.x + 22, y: chest.y - 24 }), d(rightShoulder),
            "L", d(rightHip),
            "C", d({ x: waist.x + 22, y: waist.y + 20 }), d({ x: waist.x - 22, y: waist.y + 20 }), d(leftHip),
            "Z"
          ].join(" ");

          setPath(motionEls.body, bodyPath);
          setPath(motionEls.neck, "M " + d({ x: pose.head.x, y: pose.head.y + 29 }) + " L " + d(pose.neck) + " L " + d(chest));
          setPath(motionEls.leftArm, "M " + d(leftShoulder) + " L " + d(pose.leftElbow) + " L " + d(pose.leftHand));
          setPath(motionEls.rightArm, "M " + d(rightShoulder) + " L " + d(pose.rightElbow) + " L " + d(pose.rightHand));
          setPath(motionEls.leftLeg, "M " + d(leftHip) + " L " + d(pose.leftKnee) + " L " + d(pose.leftAnkle));
          setPath(motionEls.rightLeg, "M " + d(rightHip) + " L " + d(pose.rightKnee) + " L " + d(pose.rightAnkle));
          setPath(motionEls.leftFoot, "M " + d(pose.leftHeel) + " L " + d(pose.leftToe));
          setPath(motionEls.rightFoot, "M " + d(pose.rightHeel) + " L " + d(pose.rightToe));

          setCircle(motionEls.head, pose.head);
          setCircle(motionEls.leftHand, pose.leftHand);
          setCircle(motionEls.rightHand, pose.rightHand);
          setPath(motionEls.waist, "M " + d({ x: leftHip.x + 4, y: leftHip.y + 2 }) + " C " + d({ x: waist.x - 11, y: waist.y + 9 }) + " " + d({ x: waist.x + 11, y: waist.y + 9 }) + " " + d({ x: rightHip.x - 4, y: rightHip.y + 2 }));
          setCircle(motionEls.leftHeel, pose.leftHeel);
          setCircle(motionEls.rightHeel, pose.rightHeel);
          setCircle(motionEls.leftToe, pose.leftToe);
          setCircle(motionEls.rightToe, pose.rightToe);

          const faceDir = Number(pose.faceDir || 0);
          const eyeShift = faceDir * 8;
          const eyeSpread = 9 - Math.abs(faceDir) * 1.6;
          setCircle(motionEls.leftEye, { x: pose.head.x - eyeSpread + eyeShift, y: pose.head.y - 5 });
          setCircle(motionEls.rightEye, { x: pose.head.x + eyeSpread + eyeShift, y: pose.head.y - 5 });
          setPath(motionEls.nose, "M " + d({ x: pose.head.x + eyeShift * 0.65, y: pose.head.y + 2 }) + " L " + d({ x: pose.head.x + eyeShift + 5 * Math.sign(faceDir || 1), y: pose.head.y + 9 }));

          if (motionEls.air) {
            if (pose.airOpacity > 0) {
              motionEls.air.style.opacity = String(Math.max(0.35, Math.min(1, pose.airOpacity)));
              motionEls.air.style.strokeDashoffset = String(-pose.airOffset);
            } else {
              motionEls.air.style.opacity = "";
              motionEls.air.style.strokeDashoffset = "";
            }
          }
        }

        function stopMotionAnimation() {
          if (motionAnimationFrame) cancelAnimationFrame(motionAnimationFrame);
          motionAnimationFrame = 0;
        }

        function animateMotion(now) {
          const definition = motionDefinition(currentMotionId);
          if (prefersReducedMotion()) {
            stopMotionAnimation();
            renderMotionPose(posterPose(definition));
            return;
          }
          renderMotionPose(motionPoseAt(definition, now - motionStartAt));
          motionAnimationFrame = requestAnimationFrame(animateMotion);
        }

        function startMotionAnimation(motionId, force) {
          const nextMotionId = MOTION_POSES[motionId] ? motionId : "ready";
          const sameMotion = currentMotionId === nextMotionId;
          const definition = motionDefinition(nextMotionId);
          if (sameMotion && motionAnimationFrame && !force && !prefersReducedMotion()) return;
          if (sameMotion && !motionAnimationFrame && !force && prefersReducedMotion()) return;

          stopMotionAnimation();
          currentMotionId = nextMotionId;
          if (!sameMotion || !motionStartAt) motionStartAt = performance.now();

          if (prefersReducedMotion() || definition.frames.length < 2) {
            renderMotionPose(posterPose(definition));
            return;
          }

          renderMotionPose(motionPoseAt(definition, performance.now() - motionStartAt));
          motionAnimationFrame = requestAnimationFrame(animateMotion);
        }

        if (reducedMotionQuery) {
          const handleReducedMotionChange = () => startMotionAnimation(currentMotionId || "ready", true);
          if (reducedMotionQuery.addEventListener) reducedMotionQuery.addEventListener("change", handleReducedMotionChange);
          else if (reducedMotionQuery.addListener) reducedMotionQuery.addListener(handleReducedMotionChange);
        }

        window.__C12_MOTION_TYPING__ = {
          getMotionState() {
            return {
              motionId: currentMotionId || "ready",
              reducedMotion: prefersReducedMotion(),
              pose: clonePose(currentMotionPose)
            };
          }
        };

        function renderMotion(item) {
          const motion = item && item.motion ? item.motion : { id: "ready", title: "동작 준비", source: "준비", caption: "한글 입력 모드를 확인하면 동작 표현 애니메이션이 함께 바뀝니다.", focusParts: [] };
          els.motionPanel.dataset.motionId = motion.id;
          els.motionStage.dataset.motionId = motion.id;
          els.motionTitle.textContent = motion.title;
          els.motionSource.textContent = motion.source;
          els.motionCaption.textContent = motion.caption;
          const focus = new Set(motion.focusParts || []);
          document.querySelectorAll("[data-motion-part]").forEach((node) => {
            node.classList.toggle("is-focus", focus.has(node.dataset.motionPart));
          });
          startMotionAnimation(motion.id);
        }

        function render(options) {
          const stage = currentStage();
          const item = currentItem();
          const renderKey = stage.id + ":" + (item ? item.id : "none");
          const isReport = stage.id === "report";
          els.stageMeta.textContent = stage.meta;
          els.stageTitle.textContent = stage.title;
          els.missionPrompt.textContent = stage.prompt;
          els.targetCard.hidden = isReport;
          els.typingInput.parentElement.hidden = isReport;
          els.reportPanel.hidden = !isReport;
          els.hintButton.hidden = !isRecallStage(stage.id);
          els.checkButton.hidden = isReport;
          els.retryButton.hidden = !isReport;
          els.prevButton.disabled = state.stageIndex === 0;

          if (!options || !options.preserveInput) {
            if (renderKey !== lastRenderKey) els.typingInput.value = "";
          }
          lastRenderKey = renderKey;

          if (isReport) renderReport();
          else renderTarget();
          renderProgressDots();
          saveState();

          if (!options || !options.preserveFocus) focusInput(Boolean(options && options.selectText));
        }

        function checkCurrent() {
          const stage = currentStage();
          const value = normalize(els.typingInput.value);
          if (stage.id === "warmup") {
            if (value === WARMUP_TARGET) completeWarmup();
            else setFeedback('"동작"을 입력하세요.', "warn", "<kbd>자동</kbd> 정확히 입력하면 이동");
            return;
          }
          if (isRecallStage(stage.id)) {
            submitRecallItem();
            return;
          }
          const item = currentItem();
          if (item && value === item.target) completeCopyItem(item);
          else if (item) {
            const analysis = setMismatch(item, value);
            renderTarget();
            setFeedback(analysis.missingPunctuation ? "문장부호까지 입력하세요." : analysis.extra ? "추가 입력 확인" : "목표 표현을 그대로 입력하세요.", "warn", "<kbd>자동</kbd> 정확히 치면 이동");
          }
        }

        document.addEventListener("click", (event) => {
          const stageButton = event.target.closest("[data-stage-index]");
          if (stageButton) goToStage(Number(stageButton.dataset.stageIndex), { selectText: true });
        });

        document.addEventListener("compositionstart", () => {
          state.composing = true;
          clearTimers();
        });

        document.addEventListener("compositionend", () => {
          state.composing = false;
          handleTypingInput();
          focusInput();
        });

        els.typingInput.addEventListener("input", handleTypingInput);
        els.typingInput.addEventListener("keydown", (event) => {
          if (event.ctrlKey && event.key.toLowerCase() === "h") {
            event.preventDefault();
            showHint();
            return;
          }
          if (event.key === "Enter") {
            event.preventDefault();
            if (isRecallStage(currentStage().id)) submitRecallItem();
            else checkCurrent();
          }
        });
        els.prevButton.addEventListener("click", goPrev);
        els.hintButton.addEventListener("click", showHint);
        els.checkButton.addEventListener("click", checkCurrent);
        els.retryButton.addEventListener("click", retryRecall);
        els.resetTrainer.addEventListener("click", resetTrainer);

        loadState();
        setFeedback('한글 입력 모드에서 "동작"을 입력하세요.', "", "<kbd>자동</kbd> 정확히 입력하면 이동");
        render({ selectText: true });
      })();
    </script>
    <script src="../../../../shared/multilang-toggle.js"></script>
    <script src="../../../../shared/site-copyright.js"></script>
    <script src="../../../../shared/page-qr.js"></script>
      <script src="../activity-tracker.js"></script>
