    <title>11과 문법 3 보조 활동 3 | 의문사 + 든지 이미지 카드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f5f7f2;
            --ink: #172033;
            --muted: #64748b;
            --line: #d8e1ec;
            --panel: #ffffff;
            --soft: #f8fafc;
            --brand: #0f766e;
            --brand-dark: #115e59;
            --blue: #2563eb;
            --green: #4d7c0f;
            --amber: #b45309;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--ink);
            background: var(--bg);
            font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        }

        h1,
        h2,
        p {
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 58px;
            padding: 9px max(14px, calc((100vw - 1180px) / 2 + 14px));
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(10px);
        }

        .topbar__links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 0;
        }

        .topbar a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 38px;
            padding: 0 10px;
            border-radius: 8px;
            color: var(--brand-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a:hover {
            background: #ecfdf5;
        }

        .topbar__title {
            flex: 0 0 auto;
            color: #475569;
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 10px auto 24px;
        }

        .viewer {
            display: grid;
            grid-template-columns: 224px minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-height: calc(100dvh - 92px);
        }

        .rail,
        .stage {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .rail {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
        }

        .rail__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .eyebrow {
            margin: 0 0 4px;
            color: var(--brand);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            color: #0f172a;
            font-size: 24px;
            line-height: 1.22;
            letter-spacing: 0;
        }

        .count {
            flex: 0 0 auto;
            min-width: 46px;
            padding: 5px 8px;
            border-radius: 8px;
            background: #fffbeb;
            color: var(--amber);
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .thumb-list {
            display: grid;
            gap: 8px;
            overflow: auto;
            padding-right: 2px;
        }

        .thumb-button {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            align-items: center;
            gap: 9px;
            width: 100%;
            min-height: 78px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: #1f2937;
            cursor: pointer;
            padding: 7px;
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
        }

        .thumb-button:hover,
        .thumb-button[aria-current="true"] {
            border-color: #14b8a6;
            background: #f0fdfa;
            box-shadow: 0 10px 22px rgba(20, 184, 166, 0.12);
        }

        .thumb-button img {
            display: block;
            width: 72px;
            height: auto;
            aspect-ratio: 360 / 203;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            object-fit: contain;
            background: var(--soft);
        }

        .thumb-title {
            display: block;
            color: #0f172a;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.35;
        }

        .thumb-meta {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.35;
        }

        .rail__foot {
            margin-top: auto;
            padding: 9px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #475569;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.55;
        }

        .stage {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .stage__bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 2px 8px;
        }

        .stage__bar > div:first-child {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-width: 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 9px;
            border-radius: 8px;
            background: #ecfdf5;
            color: var(--brand-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .stage h2 {
            margin: 0;
            color: #0f172a;
            font-size: 19px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.16s ease, background-color 0.16s ease, color 0.16s ease;
        }

        .icon-button:hover {
            border-color: #0f766e;
            background: #f0fdfa;
            color: var(--brand-dark);
        }

        .summary-row {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin: 0 2px 8px;
        }

        .summary-chip {
            min-width: 0;
            padding: 6px 9px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
            line-height: 1.2;
        }

        .summary-chip:nth-child(2n) {
            border-color: #bbf7d0;
            background: #f0fdf4;
            color: var(--green);
        }

        .photo-frame {
            flex: 1 1 auto;
            display: grid;
            place-items: center;
            min-height: 0;
            margin: 0;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .photo-frame img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: calc(100dvh - 214px);
            object-fit: contain;
            border-radius: 6px;
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        .caption-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 8px 4px 0;
        }

        .caption-panel p {
            margin: 0;
            color: #475569;
            font-size: 13px;
            line-height: 1.55;
        }

        .pattern {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 0 10px;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            background: #fff7ed;
            color: #9a3412;
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
        }

        @media (min-width: 761px) {
            .rail {
                position: sticky;
                top: 70px;
                align-self: start;
                max-height: calc(100dvh - 82px);
            }

            .thumb-list {
                max-height: calc(100dvh - 230px);
            }
        }

        @media (orientation: landscape) and (max-width: 1180px) {
            .shell {
                width: calc(100% - 16px);
                margin: 8px auto 16px;
            }

            .viewer {
                grid-template-columns: 204px minmax(0, 1fr);
                gap: 10px;
                min-height: calc(100dvh - 82px);
            }

            .rail,
            .stage {
                padding: 8px;
            }

            .rail__header {
                padding-bottom: 8px;
            }

            h1 {
                font-size: 20px;
            }

            .thumb-button {
                grid-template-columns: 62px minmax(0, 1fr);
                min-height: 68px;
                padding: 6px;
            }

            .thumb-button img {
                width: 62px;
            }

            .thumb-title {
                font-size: 12px;
            }

            .thumb-meta {
                font-size: 10px;
            }

            .rail__foot {
                display: none;
            }

            .stage h2 {
                font-size: 17px;
            }

            .stage__bar {
                padding-bottom: 6px;
            }

            .summary-row {
                margin-bottom: 6px;
            }

            .summary-chip {
                padding: 5px 8px;
                font-size: 11px;
            }

            .photo-frame {
                padding: 6px;
            }

            .photo-frame img {
                max-height: calc(100dvh - 186px);
            }

            .caption-panel {
                padding-top: 6px;
            }
        }

        @media (max-width: 760px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar__title {
                white-space: normal;
            }

            .shell {
                width: min(100% - 16px, 680px);
                margin-top: 8px;
            }

            .viewer {
                grid-template-columns: 1fr;
                min-height: 0;
            }

            .rail {
                position: static;
            }

            .thumb-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }

            .thumb-button {
                grid-template-columns: 1fr;
                min-height: 0;
                padding: 6px;
            }

            .thumb-button img {
                width: 100%;
            }

            .stage__bar,
            .caption-panel {
                grid-template-columns: 1fr;
                align-items: flex-start;
            }

            .stage__bar {
                flex-direction: column;
            }

            .controls {
                width: 100%;
                justify-content: flex-end;
            }

            .photo-frame img {
                max-height: none;
            }
        }

        @media (max-width: 420px) {
            .thumb-list {
                grid-template-columns: 1fr;
            }

            .caption-panel {
                display: block;
            }

            .pattern {
                margin-top: 8px;
                white-space: normal;
            }
        }
    </style>
</head>

                <p class="rail__foot">기본 순서: 의문사-든지 → 무슨 N(이)든지 → 의문사-도 → 아무도</p>

                        <button id="prevCard" class="icon-button" type="button" aria-label="이전 이미지" title="이전 이미지">
                            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                        </button>
                        <button id="nextCard" class="icon-button" type="button" aria-label="다음 이미지" title="다음 이미지">

                        </button>
                        <a id="openAsset" class="icon-button" href="../assets/c11/grammar/images/grammar3-support-activity3/02-mueos-ideunji.webp" target="_blank" rel="noopener" aria-label="새 탭에서 열기" title="새 탭에서 열기">
                            <i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>
                        </a>
                    </div>

                <div id="summaryRow" class="summary-row" aria-label="핵심 표현"></div>

                <figure class="photo-frame">
                    <img
                        id="mainImage"
                        data-testid="grammar3-support-main-image"
                        src="../assets/c11/grammar/images/grammar3-support-activity3/02-mueos-ideunji.webp"
                        alt="무엇이든지의 뜻, 쓰임, 형태와 음식 및 질문 예문을 보여 주는 설명 이미지"
                        width="1280"
                        height="721"
                        fetchpriority="high"
                        decoding="async"
                    />
                </figure>

                <div class="caption-panel">
                    <p id="cardSummary">사물이나 내용을 가리지 않고 모두 가능할 때 씁니다.</p>
                    <span id="cardPattern" class="pattern">무엇 + 이든지</span>
                </div>
            </section>
        </section>

    <script>
        const ASSET_BASE = "../assets/c11/grammar/images/grammar3-support-activity3/";
        const cards = [
            {
                id: "mueos-ideunji",
                title: "무엇이든지",
                tag: "의문사-든지",
                pattern: "무엇 + 이든지",
                summary: "사물이나 내용을 가리지 않고 모두 가능할 때 씁니다.",
                file: "02-mueos-ideunji.webp",
                thumb: "thumbs/02-mueos-ideunji.webp",
                alt: "무엇이든지의 뜻, 쓰임, 형태와 음식 및 질문 예문을 보여 주는 설명 이미지",
                chips: ["의문사-든지", "아무 것이나", "사물·내용", "무엇 + 이든지"]
            },
            {
                id: "nugu-deunji",
                title: "누구든지",
                tag: "의문사-든지",
                pattern: "누구 + 든지",
                summary: "사람을 가리지 않고 모두 가능하다는 뜻으로 씁니다.",
                file: "03-nugu-deunji.webp",
                thumb: "thumbs/03-nugu-deunji.webp",
                alt: "누구든지의 뜻, 쓰임, 형태와 연습 및 열린 교실 예문을 보여 주는 설명 이미지",
                chips: ["의문사-든지", "아무 사람이나", "사람 무관", "누구 + 든지"]
            },
            {
                id: "eonje-deunji",
                title: "언제든지",
                tag: "의문사-든지",
                pattern: "언제 + 든지",
                summary: "시간을 가리지 않고 어느 때라도 가능하다는 뜻으로 씁니다.",
                file: "04-eonje-deunji.webp",
                thumb: "thumbs/04-eonje-deunji.webp",
                alt: "언제든지의 뜻, 쓰임, 형태와 연락 및 공부 예문을 보여 주는 설명 이미지",
                chips: ["의문사-든지", "아무 때나", "시간 무관", "언제 + 든지"]
            },
            {
                id: "museun-n-ideunji",
                title: "무슨 N(이)든지",
                tag: "무슨 N(이)든지",
                pattern: "무슨 + 명사 + (이)든지",
                summary: "종류를 가리지 않고 어떤 명사든 모두 가능할 때 씁니다.",
                file: "01-museun-n-ideunji.webp",
                thumb: "thumbs/01-museun-n-ideunji.webp",
                alt: "무슨 N(이)든지의 뜻, 쓰임, 형태와 음식 및 질문 예문을 보여 주는 설명 이미지",
                chips: ["무슨 N(이)든지", "종류 무관", "받침 O: 이든지", "받침 X: 든지"]
            },
            {
                id: "amudo",
                title: "아무도",
                tag: "의문사-도",
                pattern: "아무 + 도",
                summary: "사람을 모두 부정할 때 부정 표현과 함께 씁니다.",
                file: "05-amudo.webp",
                thumb: "thumbs/05-amudo.webp",
                alt: "아무도의 뜻, 쓰임, 형태와 빈 교실 및 모르는 답 예문을 보여 주는 설명 이미지",
                chips: ["의문사-도", "아무 + 도", "사람 전체 부정", "부정 표현"]
            }
        ];

        const state = { index: 0 };
        const thumbList = document.getElementById("thumbList");
        const mainImage = document.getElementById("mainImage");
        const assetCount = document.getElementById("assetCount");
        const cardTag = document.getElementById("cardTag");
        const cardTitle = document.getElementById("cardTitle");
        const cardSummary = document.getElementById("cardSummary");
        const cardPattern = document.getElementById("cardPattern");
        const summaryRow = document.getElementById("summaryRow");
        const openAsset = document.getElementById("openAsset");

        function esc(text) {
            return String(text == null ? "" : text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderThumbs() {
            thumbList.innerHTML = cards.map(function (card, index) {
                return '<button class="thumb-button" type="button" data-index="' + index + '" aria-label="' + esc(card.title) + '" aria-current="' + (index === state.index ? "true" : "false") + '">' +
                    '<img src="' + ASSET_BASE + card.thumb + '" alt="" width="360" height="203" loading="lazy" decoding="async" />' +
                    '<span class="thumb-copy"><span class="thumb-title">' + esc(card.title) + '</span><span class="thumb-meta">' + esc(card.tag) + '</span></span>' +
                '</button>';
            }).join("");

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                button.addEventListener("click", function () {
                    setActive(Number(button.dataset.index), true);
                });
            });
        }

        function setActive(index, updateHash) {
            state.index = (index + cards.length) % cards.length;
            const card = cards[state.index];

            mainImage.src = ASSET_BASE + card.file;
            mainImage.alt = card.alt;
            openAsset.href = ASSET_BASE + card.file;
            assetCount.textContent = (state.index + 1) + " / " + cards.length;
            cardTag.textContent = card.tag;
            cardTitle.textContent = card.title;
            cardSummary.textContent = card.summary;
            cardPattern.textContent = card.pattern;
            summaryRow.innerHTML = card.chips.map(function (chip) {
                return '<span class="summary-chip">' + esc(chip) + '</span>';
            }).join("");

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                const current = Number(button.dataset.index) === state.index;
                button.setAttribute("aria-current", current ? "true" : "false");
            });

            if (updateHash && history.replaceState) {
                history.replaceState(null, "", "#" + card.id);
            }
        }

        function activeFromHash() {
            const hash = decodeURIComponent(window.location.hash.replace("#", ""));
            const found = cards.findIndex(function (card) { return card.id === hash; });
            return found >= 0 ? found : 0;
        }

        document.getElementById("prevCard").addEventListener("click", function () {
            setActive(state.index - 1, true);
        });

        document.getElementById("nextCard").addEventListener("click", function () {
            setActive(state.index + 1, true);
        });

        window.addEventListener("keydown", function (event) {
            if (event.key === "ArrowLeft") setActive(state.index - 1, true);
            if (event.key === "ArrowRight") setActive(state.index + 1, true);
        });

        window.addEventListener("hashchange", function () {
            setActive(activeFromHash(), false);
        });

        renderThumbs();
        setActive(activeFromHash(), false);
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
