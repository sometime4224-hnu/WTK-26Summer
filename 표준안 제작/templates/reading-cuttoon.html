<html lang="ko">

  사용법: ★ 채우기. 이미지가 없으면 이미지 없이 텍스트만도 가능.
-->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>★[N]과 읽기 컷툰 | ★[제목]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../shared/design-tokens.css" />
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <link rel="stylesheet" href="../shared/multilang-toggle.css" />
    <style>
        body { background:linear-gradient(180deg,#f8fafc 0%,#f1f5f9 100%); }
        .shell { width:var(--shell-width); margin:var(--shell-margin); display:grid; gap:14px; }

        .topbar { position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;
            min-height:48px;padding:0 14px;background:rgba(255,255,255,.94);
            border-bottom:1px solid var(--line);backdrop-filter:blur(12px); }
        .topbar a { color:var(--accent-dark);font-size:13px;font-weight:900;text-decoration:none; }
        .topbar span { color:#cbd5e1; }

        /* hero */
        .hero { border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--surface);
            box-shadow:var(--shadow);padding:20px 22px; }
        .eyebrow { color:var(--reading);font-size:11px;font-weight:900;
            letter-spacing:.08em;text-transform:uppercase;margin:0 0 6px; }
        .hero h1 { margin:0 0 8px;font-size:clamp(20px,3.5vw,28px); }
        .lead { color:var(--muted);font-size:14px;font-weight:700;margin:0 0 14px; }
        .hero-actions { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px; }
        .btn { display:inline-flex;align-items:center;gap:6px;min-height:36px;
            border:1px solid var(--accent-line);border-radius:var(--radius-pill);
            padding:0 14px;background:#fff;color:var(--accent-dark);font-size:13px;font-weight:900;text-decoration:none; }
        .btn.primary { border-color:var(--accent-dark);background:var(--accent);color:#fff; }
        .btn.secondary { border-color:var(--line);color:var(--muted); }

        /* 컷 그리드 */
        .cuttoon-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px; }

        .cut { border:1px solid var(--line);border-radius:var(--radius-lg);
            background:var(--surface);box-shadow:var(--shadow-sm);overflow:hidden; }
        .cut figure { margin:0; }
        .cut figure img { width:100%;height:auto;display:block; }
        .cut figcaption { padding:14px 16px; }

        .cut-num { display:inline-flex;align-items:center;justify-content:center;
            width:26px;height:26px;border-radius:50%;background:var(--reading);
            color:#fff;font-size:12px;font-weight:900;margin-bottom:8px; }
        .cut-caption { margin:0 0 6px;font-size:15px;font-weight:900;line-height:1.5;color:var(--ink); }
        .cut-grammar { margin:0 0 8px;font-size:13px;font-weight:700;color:var(--accent-dark); }
        .cut-grammar code { border-radius:6px;padding:1px 6px;background:var(--accent-soft);
            color:var(--accent-dark);font-family:inherit;font-weight:900; }

        .footer-nav { display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between; }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <nav class="topbar" aria-label="상단 이동">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인</a>
        <span>|</span>
        <a href="index.html">★[N]과 목록</a>
        <span>|</span>
        <a href="reading.html">지문 읽기</a>
        <span>|</span>
        <strong style="font-size:13px;font-weight:900">컷툰</strong>
    </nav>

    <main class="shell">

        <section class="hero">
            <p class="eyebrow">Reading Cuttoon</p>
            <h1>★[N]과 컷툰</h1>
            <p class="lead">★[컷툰 안내 — 몇 개의 컷, 어떤 내용]</p>
            <div class="hero-actions">
                <a class="btn secondary" href="reading.html"><i class="fa-solid fa-book-open"></i> 지문 읽기</a>
                <a class="btn" href="writing-cut.html"><i class="fa-solid fa-pen-nib"></i> 컷 쓰기</a>
            </div>
            <!-- 번역 블록이 있는 경우에만 삽입 -->
            <div data-multilang-bar></div>
        </section>

        <section aria-label="컷툰 보기">
            <div class="cuttoon-grid">

                <!-- 컷 1 -->
                <article class="cut" id="cut-01">
                    <figure>
                        <img
                            src="../assets/c★[N]/reading-writing/images/cuttoon/★파일명-01.webp"
                            alt="★장면 설명"
                            loading="eager">
                        <figcaption>
                            <div class="cut-num" aria-label="1번 컷">1</div>
                            <p class="cut-caption">★[한국어 캡션]</p>
                            <!-- 문법 포인트가 있으면 표시 -->
                            <p class="cut-grammar"><code>★[문법 표현]</code> — ★[짧은 해설]</p>
                            <div data-lang="vi" class="lang-box">★베트남어 번역</div>
                            <div data-lang="en" class="lang-box">★English</div>
                        </figcaption>
                    </figure>
                </article>

                <!-- 컷 2 -->
                <article class="cut" id="cut-02">
                    <figure>
                        <img
                            src="../assets/c★[N]/reading-writing/images/cuttoon/★파일명-02.webp"
                            alt="★장면 설명"
                            loading="lazy">
                        <figcaption>
                            <div class="cut-num" aria-label="2번 컷">2</div>
                            <p class="cut-caption">★[한국어 캡션]</p>
                            <div data-lang="vi" class="lang-box">★베트남어 번역</div>
                        </figcaption>
                    </figure>
                </article>

                <!-- 컷 반복 (loading="lazy" 유지) -->

            </div>
        </section>

        <nav class="footer-nav" aria-label="페이지 이동">
            <a class="btn" href="reading.html"><i class="fa-solid fa-arrow-left"></i> 지문 읽기</a>
            <a class="btn" href="index.html">★[N]과 목록</a>
            <a class="btn primary" href="writing-cut.html">컷 쓰기 <i class="fa-solid fa-pen-nib"></i></a>
        </nav>
    </main>

    <script src="../shared/multilang-toggle.js"></script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
