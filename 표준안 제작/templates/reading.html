        .eyebrow { color:var(--reading);font-size:11px;font-weight:900;letter-spacing:.08em;

        .btn.secondary { border-color:var(--line);color:var(--muted); }
        .badge { display:inline-flex;align-items:center;border-radius:var(--radius-pill);
            padding:3px 10px;font-size:11px;font-weight:900;margin-bottom:8px; }
        .badge.prep { background:var(--accent-soft);color:var(--accent-dark); }
        .badge.goal { background:#fff7ed;color:var(--amber); }
        .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
        .reading-panel { font-size:15px;font-weight:700;line-height:1.9;color:#1e293b; }
        .reading-panel p { margin:0 0 14px; }
        .section-title { font-size:13px;font-weight:900;color:var(--muted);
            letter-spacing:.06em;text-transform:uppercase;margin:0 0 12px; }
        .check-list { display:grid;gap:10px; }
        .check-item { border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px; }

        .check-opts { display:grid;gap:6px; }

        .check-opt.correct { border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok); }

        </nav>

    <script>
    /* ── 이해 확인 문항 데이터 ★ ──────────────────────── */
    const CHECK_ITEMS = [
        {
            q: "★문항 1",
            choices: ["★a", "★b", "★c", "★d"],
            answer: 0
        }
        // 문항 반복
    ];

    (function () {
        const list = document.getElementById("checkList");
        if (!list || !CHECK_ITEMS.length) return;
        CHECK_ITEMS.forEach(function (item, qi) {
            const el = document.createElement("div");
            el.className = "check-item";
            el.innerHTML = "<p>" + (qi + 1) + ". " + item.q + "</p>" +
                "<div class=\"check-opts\">" +
                item.choices.map(function (c, ci) {
                    return "<button type=\"button\" class=\"check-opt\" data-qi=\"" + qi + "\" data-ci=\"" + ci + "\">" + c + "</button>";
                }).join("") + "</div>";
            list.appendChild(el);
        });
        list.addEventListener("click", function (e) {
            const btn = e.target.closest(".check-opt");
            if (!btn) return;
            const qi = Number(btn.dataset.qi);
            const ci = Number(btn.dataset.ci);
            list.querySelectorAll("[data-qi=\"" + qi + "\"]").forEach(function (b) {
                b.disabled = true;
                b.classList.add(Number(b.dataset.ci) === CHECK_ITEMS[qi].answer ? "correct" : "wrong");
            });
        });
    })();
    </script>
