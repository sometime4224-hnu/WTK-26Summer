<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10과 듣기 학생 퀴즈</title>
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --line: rgba(148, 163, 184, 0.32);
            --sky: #0284c7;
            --orange: #ea580c;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #fff7ed 0%, #f0f9ff 48%, #f8fafc 100%);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 48px;
            padding: 0 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .topbar a {
            display: inline-flex;
            align-items: center;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
            text-decoration: none;
        }

        .topbar a:hover { color: var(--sky); }

        .shell {
            width: min(980px, calc(100% - 28px));
            margin: 18px auto 34px;
        }

        .page-head {
            display: grid;
            gap: 8px;
            padding: 18px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 2.1rem);
            line-height: 1.16;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .quiz-links {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .quiz-card {
            display: grid;
            gap: 8px;
            min-height: 142px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.94);
            color: inherit;
            text-decoration: none;
            box-shadow: var(--shadow);
        }

        .quiz-card:hover {
            border-color: rgba(14, 165, 233, 0.34);
            transform: translateY(-1px);
        }

        .quiz-card strong {
            font-size: 19px;
            line-height: 1.25;
        }

        .quiz-card span {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.5;
        }

        .quiz-card b {
            align-self: end;
            width: fit-content;
            padding: 8px 11px;
            border-radius: 999px;
            background: linear-gradient(135deg, #fb923c, #0ea5e9);
            color: #fff;
            font-size: 13px;
        }

        @media (max-width: 640px) {
            .shell { width: min(100% - 20px, 980px); margin-top: 10px; }
            .quiz-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <a href="../index.html">메인으로</a>
        <a href="index.html">10과</a>
        <a href="listening1.html">교사용 듣기1</a>
        <a href="listening2.html">교사용 듣기2</a>
    </nav>

    <main class="shell">
        <header class="page-head">
            <h1>10과 듣기 학생 퀴즈</h1>
            <p>학생에게 열어 줄 듣기 퀴즈 페이지를 선택하세요.</p>
        </header>

        <section class="quiz-links" aria-label="학생 퀴즈 선택">
            <a class="quiz-card" href="listening1-student-quiz.html">
                <strong>듣기1 학생 퀴즈</strong>
                <span>수상 인터뷰, 결혼 소식, 만난 계기</span>
                <b>열기</b>
            </a>
            <a class="quiz-card" href="listening2-student-quiz.html">
                <strong>듣기2 학생 퀴즈</strong>
                <span>라디오 사연, 일본 유학, 빵집 계획</span>
                <b>열기</b>
            </a>
        </section>
    </main>
</body>
</html>
