    <style>
        :root {
            --ink: #172033;
            --muted: #667085;
            --paper: #ffffff;
            --page: #f5f8fa;
            --line: #d8e1ea;
            --rumor: #0f766e;
            --rumor-dark: #115e59;
            --rumor-soft: #dcf5ef;
            --spread: #4f46e5;
            --spread-soft: #eef2ff;
            --danger: #be123c;
            --danger-soft: #fff1f2;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --topbar-height: 48px;
        }
        * { box-sizing: border-box; }
        html { min-height: 100%; background: var(--page); }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, #fbfdff 0%, #f5f8fa 54%, #f3f7f2 100%);
            font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
        }
        button { font: inherit; cursor: pointer; }

        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; z-index: 20;
            min-height: var(--topbar-height);
            display: grid;
            grid-template-columns: auto minmax(0,1fr) auto;
            align-items: center; gap: 10px;
            padding: 7px 12px;
            background: rgba(255,255,255,0.94);
            border-bottom: 1px solid rgba(216,225,234,0.92);
            backdrop-filter: blur(14px);
        }
        .topbar__links {
            display: flex; gap: 6px; align-items: center;
            overflow-x: auto; min-width: 0;
        }
        .topbar a, .topbar button {
            min-height: 34px;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            border: 1px solid rgba(23,32,51,0.1);
            border-radius: 8px;
            background: rgba(23,32,51,0.04);
            color: var(--ink); padding: 0 10px;
            font-size: 0.8rem; font-weight: 900;
            text-decoration: none; white-space: nowrap;
        }
        .topbar__title {
            text-align: center; font-size: 0.9rem; font-weight: 900;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* SHELL */
        .shell {
            width: min(1180px, 100% - 28px);
            margin: 0 auto; padding: 18px 0 40px;
        }

        /* HERO */
        .hero {
            padding: 16px 0 14px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 20px;
        }
        .eyebrow {
            margin: 0 0 6px; color: var(--rumor);
            font-size: 0.76rem; font-weight: 900;
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        h1 { margin: 0; font-size: clamp(1.6rem,3.5vw,2.6rem); font-weight: 900; line-height: 1.1; }
        .hero__sub {
            margin: 8px 0 0; color: #475467;
            font-size: clamp(0.92rem,1.5vw,1.05rem); line-height: 1.65; font-weight: 700;
        }

        /* MAIN LAYOUT */
        .diagram-layout {
            display: grid;
            grid-template-columns: 220px minmax(0,1fr);
            gap: 18px;
            align-items: start;
        }

        /* VOCAB BUTTON PANEL */
        .vocab-panel {
            position: sticky;
            top: calc(var(--topbar-height) + 12px);
            display: flex; flex-direction: column; gap: 8px;
        }
        .panel-label {
            font-size: 0.72rem; font-weight: 900;
            color: var(--muted); letter-spacing: 0.07em;
            text-transform: uppercase; padding: 0 4px; margin-bottom: 2px;
        }
        .vocab-btn {
            display: flex; align-items: center; gap: 10px;
            min-height: 50px; padding: 0 14px;
            border: 2px solid var(--line);
            border-radius: 10px;
            background: var(--paper);
            color: var(--ink);
            font-size: 0.95rem; font-weight: 900;
            text-align: left;
            transition: border-color 0.18s, background 0.18s, transform 0.15s, box-shadow 0.18s;
        }
        .vocab-btn:hover {
            transform: translateX(3px);
            border-color: #98a2b3;
        }
        .vocab-btn.active {
            border-color: var(--active-color, var(--rumor));
            background: var(--active-bg, var(--rumor-soft));
            color: var(--active-color, var(--rumor-dark));
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .vocab-btn .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--dot-color, var(--rumor));
            flex-shrink: 0;
        }
        .vocab-btn .korean { font-size: 0.97rem; font-weight: 900; }
        .vocab-btn .english { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-top: 1px; }
        .vocab-btn-inner { display: flex; flex-direction: column; }

        .reset-btn {
            margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            min-height: 38px; padding: 0 12px;
            border: 1px solid var(--line); border-radius: 8px;
            background: #f8fafc; color: var(--muted);
            font-size: 0.82rem; font-weight: 900;
            transition: background 0.15s;
        }
        .reset-btn:hover { background: #eef4f6; }

        /* DIAGRAM AREA */
        .diagram-wrap {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--paper);
            box-shadow: 0 12px 32px rgba(17,24,39,0.06);
            overflow: hidden;
        }
        .diagram-svg-wrap {
            width: 100%;
            aspect-ratio: 16/10;
            position: relative;
        }
        .diagram-svg-wrap svg {
            width: 100%; height: 100%;
            display: block;
        }

        /* INFO BOX */
        .info-box {
            min-height: 68px;
            padding: 14px 18px;
            border-top: 1px solid var(--line);
            background: #f8fbfc;
            transition: background 0.2s;
        }
        .info-box .vocab-word {
            font-size: 1.15rem; font-weight: 900; color: var(--ink);
        }
        .info-box .vocab-meaning {
            font-size: 0.92rem; font-weight: 700; color: #344054; margin-top: 2px; line-height: 1.55;
        }
        .info-box .vocab-example {
            font-size: 0.88rem; font-weight: 700; color: var(--muted); margin-top: 4px;
            font-style: italic;
        }
        .info-box .vocab-prompt {
            font-size: 0.88rem; font-weight: 800; color: #98a2b3;
        }

        /* SVG highlight zones */
        .zone { transition: opacity 0.25s; }
        .zone-highlight {
            stroke-width: 3;
            fill: none;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .zone-fill-highlight {
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .zone-highlight.show { opacity: 1; }
        .zone-fill-highlight.show { opacity: 0.18; }

        /* Arrow animations */
        @keyframes dash {
            to { stroke-dashoffset: -24; }
        }
        .flow-arrow {
            stroke-dasharray: 8 6;
            stroke-dashoffset: 0;
        }
        .flow-arrow.animated {
            animation: dash 0.6s linear infinite;
        }

        /* Pulse animation for highlighted characters */
        @keyframes pulse-ring {
            0% { r: 28; opacity: 0.7; }
            100% { r: 38; opacity: 0; }
        }
        .pulse-circle {
            opacity: 0;
            fill: none;
        }
        .pulse-circle.show {
            animation: pulse-ring 1.2s ease-out infinite;
        }

        @media (max-width: 800px) {
            .diagram-layout {
                grid-template-columns: 1fr;
            }
            .vocab-panel {
                position: static;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
            .panel-label, .reset-btn { grid-column: 1 / -1; }
        }
        @media (max-width: 500px) {
            .vocab-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>

        example: "서로 이야기해서 오해를 풀었어요.",
        zones: ["zone-solve"],
        fills: ["fill-solve"],
        pulses: ["pulse-solve"],
        arrows: [],
        color: "#0369a1"
    },
    "reconcile": {
        korean: "화해하다",
        english: "to reconcile",
        meaning: "다툰 뒤 관계를 다시 좋게 하다",
        example: "두 사람은 다시 화해했어요.",
        zones: ["zone-reconcile"],
        fills: ["fill-reconcile"],
        pulses: ["pulse-reconcile"],
        arrows: [],
        color: "#15803d"
    }
};

let activeVocab = null;

function clearAll() {
    // zones
    document.querySelectorAll('.zone-highlight').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.zone-fill-highlight').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.pulse-circle').forEach(el => el.classList.remove('show'));
    // arrows
    document.querySelectorAll('.flow-arrow').forEach(el => {
        el.style.opacity = '';
        el.classList.remove('animated');
    });
    // buttons
    document.querySelectorAll('.vocab-btn').forEach(el => el.classList.remove('active'));
    // info box
    document.getElementById('info-box').innerHTML = '<p class="vocab-prompt">← 왼쪽 어휘 버튼을 클릭하면 해당 장면이 강조됩니다.</p>';
    activeVocab = null;
}

function activate(vocabId) {
    clearAll();
    if (!vocabData[vocabId]) return;

    activeVocab = vocabId;
    const data = vocabData[vocabId];

    // Highlight zones
    data.zones.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('show');
    });
    data.fills.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('show');
    });
    data.pulses.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('show');
    });
    // Animate arrows
    data.arrows.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.style.opacity = '1';
            el.classList.add('animated');
        }
    });

    // Highlight button
    const btn = document.querySelector(`[data-vocab="${vocabId}"]`);
    if (btn) btn.classList.add('active');

    // Info box
    const infoBox = document.getElementById('info-box');
    infoBox.style.background = data.color + '0d'; // very light tint
    infoBox.innerHTML = `
        <div class="vocab-word" style="color:${data.color}">${data.korean} <span style="color:#94a3b8;font-size:0.85rem;font-weight:700;">${data.english}</span></div>
        <div class="vocab-meaning">${data.meaning}</div>
        <div class="vocab-example">예) ${data.example}</div>
    `;
}

// Event listeners
document.querySelectorAll('.vocab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const vocabId = btn.dataset.vocab;
        if (activeVocab === vocabId) {
            clearAll();
        } else {
            activate(vocabId);
        }
    });
});

document.getElementById('reset-btn').addEventListener('click', clearAll);
</script>
