<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css">
    <style>
        :root {
            --ink: #172033;
            --muted: #667085;
            --paper: #ffffff;
            --page: #f5f8fa;
            --line: #d8e1ea;
            --disappointed: #b45309;
            --argue: #be123c;
            --misunderstand: #4f46e5;
            --solve: #0f766e;
            --reconcile: #047857;
            --shadow: 0 18px 44px rgba(17, 24, 39, 0.08);
            --topbar-height: 48px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--page);
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, #fbfdff 0%, #f5f8fa 58%, #f3f7f2 100%);
            font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
            letter-spacing: 0;
        }

        button {
            font: inherit;
            cursor: pointer;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            min-height: var(--topbar-height);
            display: grid;
            grid-template-columns: minmax(0, auto) minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid rgba(216, 225, 234, 0.92);
            backdrop-filter: blur(14px);
        }

        .topbar__links {
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 0;
            overflow-x: auto;
        }

        .topbar a {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: rgba(23, 32, 51, 0.04);
            color: var(--ink);
            padding: 0 10px;
            font-size: 0.8rem;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar__title {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #475467;
            font-size: 0.9rem;
            font-weight: 900;
        }

        .shell {
            width: min(1180px, 100% - 28px);
            margin: 0 auto;
            padding: 18px 0 34px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 18px;
            padding: 18px 0 14px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--solve);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.9rem, 4vw, 3.6rem);
            line-height: 1.08;
            letter-spacing: 0;
        }

        .hero__copy {
            max-width: 780px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.65;
            font-weight: 700;
        }

        .flow-key {
            display: grid;
            grid-template-columns: repeat(5, auto);
            align-items: center;
            gap: 7px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .flow-key span {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 9px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--tone) 10%, #fff);
            color: var(--tone);
            font-size: 0.78rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .activity {
            display: grid;
            grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
            gap: 14px;
            margin-top: 16px;
        }

        .panel {
            border: 1px solid rgba(216, 225, 234, 0.95);
            border-radius: 8px;
            background: var(--paper);
            box-shadow: 0 12px 30px rgba(17, 24, 39, 0.05);
            overflow: hidden;
        }

        .panel__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 15px;
            border-bottom: 1px solid var(--line);
        }

        .panel__head h2 {
            margin: 0;
            font-size: 1.06rem;
            line-height: 1.25;
        }

        .badge {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 9px;
            border-radius: 999px;
            background: #eef4f6;
            color: #475467;
            font-size: 0.76rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .story-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            padding: 12px;
        }

        .story-tab {
            min-height: 62px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            text-align: left;
            font-weight: 900;
            line-height: 1.35;
        }

        .story-tab span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
        }

        .story-tab.active {
            border-color: var(--solve);
            background: color-mix(in srgb, var(--solve) 8%, #fff);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .context {
            margin: 0 12px 12px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .context h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .context p {
            margin: 8px 0 0;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.5;
        }

        .card-bank {
            display: grid;
            gap: 9px;
            padding: 0 12px 12px;
        }

        .event-card {
            width: 100%;
            min-height: 92px;
            display: grid;
            grid-template-columns: 82px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: inherit;
            text-align: left;
        }

        .event-card:disabled {
            cursor: default;
            opacity: 0.42;
        }

        .event-card img {
            width: 82px;
            height: 72px;
            border-radius: 8px;
            object-fit: cover;
        }

        .event-card strong {
            display: inline-flex;
            min-height: 26px;
            align-items: center;
            padding: 0 8px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--tone) 11%, #fff);
            color: var(--tone);
            font-size: 0.86rem;
            font-weight: 900;
        }

        .event-card p {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
            font-weight: 800;
        }

        .board {
            display: grid;
            gap: 14px;
            padding: 15px;
        }

        .timeline {
            display: grid;
            gap: 10px;
            position: relative;
        }

        .slot {
            position: relative;
            min-height: 104px;
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            align-items: stretch;
            gap: 10px;
            padding: 10px;
            border: 1px dashed #b8c4d3;
            border-radius: 8px;
            background: #fbfdff;
            color: inherit;
            text-align: left;
        }

        .slot.filled {
            border-style: solid;
            background: #fff;
        }

        .slot.correct {
            border-color: var(--solve);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .slot.wrong {
            border-color: var(--argue);
            box-shadow: 0 0 0 3px rgba(190, 18, 60, 0.1);
        }

        .slot-number {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            align-self: center;
            border-radius: 50%;
            background: #eef4f6;
            color: #475467;
            font-weight: 900;
        }

        .slot-content {
            min-width: 0;
            display: grid;
            align-content: center;
            gap: 5px;
        }

        .slot-content strong {
            color: var(--tone, #475467);
            font-size: 1rem;
        }

        .slot-content p {
            margin: 0;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.45;
            font-weight: 800;
        }

        .slot-placeholder {
            color: #98a2b3;
            font-weight: 900;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-btn {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            padding: 0 13px;
            font-weight: 900;
        }

        .action-btn.primary {
            border-color: var(--solve);
            background: var(--solve);
            color: #fff;
        }

        .feedback {
            min-height: 88px;
            display: grid;
            align-content: center;
            gap: 5px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .feedback strong {
            color: var(--solve);
            font-size: 1rem;
        }

        .feedback p {
            margin: 0;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.48;
        }

        .reference {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .reference-card {
            min-height: 176px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.04);
        }

        .reference-card img {
            width: 100%;
            height: 92px;
            display: block;
            object-fit: cover;
        }

        .reference-card__body {
            padding: 10px;
        }

        .reference-card h3 {
            margin: 0;
            color: var(--tone);
            font-size: 0.96rem;
            line-height: 1.25;
        }

        .reference-card p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.42;
            font-weight: 800;
        }

        @media (max-width: 1040px) {
            .hero,
            .activity {
                grid-template-columns: 1fr;
            }

            .flow-key,
            .reference {
                grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 12px, 1180px);

            .topbar a {

            .topbar__title {
                display: none;
            }

            .hero {
                gap: 8px;
                padding: 10px 0 8px;
            }

            .eyebrow {
                margin-bottom: 4px;
                font-size: 0.68rem;
            }

            h1 {
                font-size: 1.55rem;
                line-height: 1.12;
            }

            .hero__copy {
                display: none;
            }

            .flow-key {
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 5px;
                padding: 7px;
            }

            .flow-key span {
                min-height: 28px;
                padding: 0 4px;
                font-size: 0.7rem;
            }

            .activity {
                gap: 8px;
                margin-top: 8px;
            }

            .panel__head {
                padding: 10px;
            }

            .panel__head h2 {
                font-size: 0.98rem;
            }

            .badge {
                min-height: 24px;
                padding: 0 8px;

            }

            .story-tabs {
                grid-template-columns: repeat(3, minmax(0, 1fr));

            }

            .story-tab {
                min-height: 38px;
                padding: 6px;

            }

                display: none;
            }

            .context {
                margin: 0 10px 8px;

            }

            .context h3 {
                font-size: 0.94rem;
            }

            .context p {
                margin-top: 4px;

            }

            .card-bank {
                display: flex;

            }

            .card-bank::-webkit-scrollbar {

            }

            .event-card {
                flex: 0 0 170px;

                gap: 5px;

                scroll-snap-align: start;
            }

            .event-card img {
                display: none;
            }

            .event-card strong {
                min-height: 23px;
                padding: 0 7px;
                font-size: 0.78rem;
            }

            .event-card p {
                margin-top: 4px;
                display: -webkit-box;
                overflow: hidden;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 2;
                font-size: 0.74rem;
                line-height: 1.28;
            }

            .board {
                gap: 8px;

            }

            .timeline {
                gap: 6px;
            }

            .slot {
                grid-template-columns: 38px minmax(0, 1fr);
                min-height: 62px;

            }

            .slot-number {
                width: 38px;
                height: 38px;
            }

            .slot-content {
                gap: 3px;
            }

            .slot-content strong {
                font-size: 0.86rem;
            }

            .slot-content p {
                display: -webkit-box;
                overflow: hidden;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 2;
                font-size: 0.74rem;
                line-height: 1.28;
            }

            .slot-placeholder {
                font-size: 0.78rem;
            }

            .actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }

            .action-btn {
                min-height: 36px;

                font-size: 0.8rem;
            }

            .feedback {
                min-height: 58px;
                padding: 9px;
            }

            .feedback strong {
                font-size: 0.88rem;

            .feedback p {
                font-size: 0.78rem;
                line-height: 1.34;
            }

                grid-template-columns: repeat(2, minmax(0, 1fr));

                margin-top: 8px;
            }

            .reference-card {
                min-height: 0;
            }

            .reference-card img {
                display: none;
            }

            .reference-card__body {
                padding: 8px;
            }

            .reference-card h3 {
                font-size: 0.86rem;
            }

            .reference-card p {
                margin-top: 4px;
                font-size: 0.72rem;
                line-height: 1.3;
            }
        }

    <main class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Vocabulary Support 3</p>
                <h1>오해 사건 순서 배열</h1>
                <p class="hero__copy">섞여 있는 사건 카드를 눌러 감정 변화와 관계 회복의 순서를 완성합니다.</p>
            </div>
            <div class="flow-key" aria-label="기본 흐름">
                <span style="--tone: var(--disappointed);">실망</span>
                <span style="--tone: var(--argue);">다툼</span>
                <span style="--tone: var(--misunderstand);">오해</span>
                <span style="--tone: var(--solve);">풀기</span>
                <span style="--tone: var(--reconcile);">화해</span>
            </div>
        </header>

        <section class="activity" aria-label="오해 사건 순서 배열 활동">
            <aside class="panel">
                <div class="panel__head">
                    <h2>섞인 사건 카드</h2>
                    <span id="story-badge" class="badge">이야기 1 / 3</span>
                </div>
                <div id="story-tabs" class="story-tabs" aria-label="이야기 선택"></div>
                <div class="context">
                    <h3 id="story-title"></h3>
                    <p id="story-context"></p>
                </div>
                <div id="card-bank" class="card-bank"></div>
            </aside>

            <section class="panel">
                <div class="panel__head">
                    <h2>타임라인 완성</h2>
                    <span id="progress-badge" class="badge">0 / 5</span>
                </div>
                <div class="board">
                    <div id="timeline" class="timeline"></div>
                    <div class="actions">
                        <button id="check-btn" class="action-btn primary" type="button"><i class="fa-solid fa-check"></i> 순서 확인</button>
                        <button id="reset-btn" class="action-btn" type="button"><i class="fa-solid fa-rotate-right"></i> 다시 배열</button>
                        <button id="reveal-btn" class="action-btn" type="button"><i class="fa-solid fa-eye"></i> 정답 보기</button>
                        <button id="next-btn" class="action-btn" type="button"><i class="fa-solid fa-arrow-right"></i> 다음 이야기</button>
                    </div>
                    <div id="feedback" class="feedback" aria-live="polite">
                        <strong>카드를 순서대로 놓으세요.</strong>
                        <p>카드를 누르면 빈 칸에 들어가고, 타임라인 카드를 누르면 다시 카드 은행으로 돌아갑니다.</p>
                    </div>
                </div>
            </section>
        </section>

        <section id="reference" class="reference" aria-label="오해와 화해 어휘 정리"></section>

    <script>
        const imageBasePath = "../assets/c17/vocabulary/images/cards";
        const termData = [
            {
                id: "disappointed",
                label: "실망하다",
                color: "#b45309",
                image: `${imageBasePath}/repair-disappointed.webp`,
                meaning: "기대와 달라 마음이 상하다"
            },
            {
                id: "argue",
                label: "다투다",
                color: "#be123c",
                image: `${imageBasePath}/repair-argue.webp`,
                meaning: "서로 말이나 행동으로 싸우다"
            },
            {
                id: "misunderstand",
                label: "오해하다",
                color: "#4f46e5",
                image: `${imageBasePath}/repair-misunderstand.webp`,
                meaning: "잘못 이해하다"
            },
            {
                id: "solve",
                label: "오해를 풀다",
                color: "#0f766e",
                image: `${imageBasePath}/repair-solve-reconcile.webp`,
                meaning: "잘못 이해한 것을 바로잡다"
            },
            {
                id: "reconcile",
                label: "화해하다",
                color: "#047857",
                image: `${imageBasePath}/repair-solve-reconcile.webp`,
                meaning: "다툰 뒤 관계를 다시 좋게 하다"
            }
        ];

        const storyData = [
            {
                title: "생일 약속 오해",
                short: "생일",
                context: "민지는 생일 모임에 친구가 일부러 오지 않았다고 생각했습니다.",
                cards: {
                    disappointed: "친구가 일부러 안 온 줄 알고 민지는 크게 실망했어요.",
                    argue: "민지는 친구에게 서운한 말을 했고 두 사람은 다투었어요.",
                    misunderstand: "사실은 친구가 장소를 잘못 알고 있었는데, 민지는 일부러 안 왔다고 오해했어요.",
                    solve: "두 사람은 메시지를 다시 확인하며 오해를 풀었어요.",
                    reconcile: "친구가 사과하고 민지도 이해해서 두 사람은 화해했어요."
                }
            },
            {
                title: "조별 발표 오해",
                short: "발표",
                context: "준호는 발표 자료가 빠진 것을 보고 같은 조 친구가 일을 안 했다고 생각했습니다.",
                cards: {
                    disappointed: "준호는 준비가 안 된 줄 알고 친구에게 실망했어요.",
                    argue: "서로 책임을 묻다가 두 사람은 다투었어요.",
                    misunderstand: "알고 보니 파일 이름이 바뀌었는데, 준호는 친구가 일을 안 했다고 오해했어요.",
                    solve: "저장 위치를 함께 확인하면서 오해를 풀었어요.",
                    reconcile: "발표를 같이 마무리하고 두 사람은 화해했어요."
                }
            },
            {
                title: "소문 때문에 생긴 오해",
                short: "소문",
                context: "수아는 친구가 자기 이야기를 퍼뜨렸다는 소문을 들었습니다.",
                cards: {
                    disappointed: "수아는 믿었던 친구에게 실망했어요.",
                    argue: "수아가 따지자 친구도 억울해서 두 사람은 다투었어요.",
                    misunderstand: "다른 사람이 말을 잘못 전했는데, 수아는 친구가 소문을 냈다고 오해했어요.",
                    solve: "셋이 함께 이야기를 확인하며 오해를 풀었어요.",
                    reconcile: "수아가 사과하고 친구도 받아 주면서 두 사람은 화해했어요."
                }
            }
        ];

        const correctOrder = ["disappointed", "argue", "misunderstand", "solve", "reconcile"];
        const fixedBankOrder = ["misunderstand", "reconcile", "disappointed", "solve", "argue"];

        const storyTabsEl = document.getElementById("story-tabs");
        const storyBadgeEl = document.getElementById("story-badge");
        const storyTitleEl = document.getElementById("story-title");
        const storyContextEl = document.getElementById("story-context");
        const cardBankEl = document.getElementById("card-bank");
        const timelineEl = document.getElementById("timeline");
        const progressBadgeEl = document.getElementById("progress-badge");
        const feedbackEl = document.getElementById("feedback");
        const referenceEl = document.getElementById("reference");
        const checkBtn = document.getElementById("check-btn");
        const resetBtn = document.getElementById("reset-btn");
        const revealBtn = document.getElementById("reveal-btn");
        const nextBtn = document.getElementById("next-btn");

        let currentStoryIndex = 0;
        let selectedOrder = [];
        let checked = false;

        function getTerm(id) {
            return termData.find((term) => term.id === id);
        }

        function currentStory() {
            return storyData[currentStoryIndex];
        }

        function cardSentence(story, termId) {
            return story.cards[termId];
        }

        function renderStoryTabs() {
            storyTabsEl.innerHTML = storyData.map((story, index) => `
                <button class="story-tab${index === currentStoryIndex ? " active" : ""}" data-index="${index}" type="button">
                    ${story.title}
                    <span>${story.short} 사건</span>
                </button>
            `).join("");
        }

        function renderBank() {
            const story = currentStory();
            cardBankEl.innerHTML = fixedBankOrder.map((termId) => {
                const term = getTerm(termId);
                const isUsed = selectedOrder.includes(termId);
                return `
                    <button class="event-card" data-term="${termId}" style="--tone: ${term.color};" type="button" ${isUsed ? "disabled" : ""}>
                        <img src="${term.image}" alt="" loading="lazy" decoding="async">
                        <span>
                            <strong>${term.label}</strong>
                            <p>${cardSentence(story, termId)}</p>
                        </span>
                    </button>
                `;
            }).join("");
        }

        function renderTimeline() {
            const story = currentStory();
            timelineEl.innerHTML = Array.from({ length: correctOrder.length }, (_, index) => {
                const termId = selectedOrder[index];
                const term = termId ? getTerm(termId) : null;
                const resultClass = checked && termId
                    ? termId === correctOrder[index] ? " correct" : " wrong"
                    : "";
                return `
                    <button class="slot${termId ? " filled" : ""}${resultClass}" data-slot="${index}" type="button">
                        <span class="slot-number">${index + 1}</span>
                        <span class="slot-content" style="${term ? `--tone: ${term.color};` : ""}">
                            ${term ? `
                                <strong>${term.label}</strong>
                                <p>${cardSentence(story, termId)}</p>
                            ` : `<span class="slot-placeholder">여기에 ${index + 1}번째 카드를 놓기</span>`}
                        </span>
                    </button>
                `;
            }).join("");
            progressBadgeEl.textContent = `${selectedOrder.length} / ${correctOrder.length}`;
        }

        function renderReference() {
            referenceEl.innerHTML = termData.map((term) => `
                <article class="reference-card" style="--tone: ${term.color};">
                    <img src="${term.image}" alt="" loading="lazy" decoding="async">
                    <div class="reference-card__body">
                        <h3>${term.label}</h3>
                        <p>${term.meaning}</p>
                    </div>
                </article>
            `).join("");
        }

        function renderAll() {
            const story = currentStory();
            storyBadgeEl.textContent = `이야기 ${currentStoryIndex + 1} / ${storyData.length}`;
            storyTitleEl.textContent = story.title;
            storyContextEl.textContent = story.context;
            renderStoryTabs();
            renderBank();
            renderTimeline();
        }

        function resetOrder() {
            selectedOrder = [];
            checked = false;
            feedbackEl.innerHTML = `
                <strong>카드를 순서대로 놓으세요.</strong>
                <p>감정이 상한 장면에서 시작해, 원인을 확인하고 관계를 회복하는 흐름을 만듭니다.</p>
            `;
            renderAll();
        }

        function showStory(index) {
            currentStoryIndex = index;
            resetOrder();
        }

        function checkOrder() {
            if (selectedOrder.length < correctOrder.length) {
                feedbackEl.innerHTML = `
                    <strong>아직 카드가 부족합니다.</strong>
                    <p>5개의 사건 카드를 모두 타임라인에 놓은 뒤 확인하세요.</p>
                `;
                return;
            }
            checked = true;
            const correctCount = selectedOrder.filter((termId, index) => termId === correctOrder[index]).length;
            feedbackEl.innerHTML = correctCount === correctOrder.length
                ? `<strong>좋아요. 사건 흐름이 자연스럽습니다.</strong><p>실망과 다툼 뒤에 원인이 오해였음을 확인하고, 오해를 푼 다음 화해합니다.</p>`
                : `<strong>${correctCount}개 위치가 맞았습니다.</strong><p>오해를 깨닫는 단계는 다툼 뒤에 오고, 관계 회복은 오해를 푼 뒤에 옵니다.</p>`;
            renderAll();
        }

        function revealAnswer() {
            selectedOrder = [...correctOrder];
            checked = true;
            feedbackEl.innerHTML = `
                <strong>정답 흐름을 표시했습니다.</strong>
                <p>실망하다 → 다투다 → 오해하다 → 오해를 풀다 → 화해하다</p>
            `;
            renderAll();
        }

        function nextStory() {
            showStory((currentStoryIndex + 1) % storyData.length);
        }

        storyTabsEl.addEventListener("click", (event) => {
            const button = event.target.closest(".story-tab");
            if (!button) return;
            showStory(Number(button.dataset.index));
        });

        cardBankEl.addEventListener("click", (event) => {
            const button = event.target.closest(".event-card");
            if (!button || button.disabled || selectedOrder.length >= correctOrder.length) return;
            selectedOrder.push(button.dataset.term);
            checked = false;
            feedbackEl.innerHTML = `
                <strong>${selectedOrder.length}번째 카드가 들어갔습니다.</strong>
                <p>위치를 바꾸려면 타임라인에서 카드를 눌러 다시 빼세요.</p>
            `;
            renderAll();
        });

        timelineEl.addEventListener("click", (event) => {
            const slot = event.target.closest(".slot");
            if (!slot) return;
            const slotIndex = Number(slot.dataset.slot);
            if (!selectedOrder[slotIndex]) return;
            selectedOrder.splice(slotIndex, 1);
            checked = false;
            feedbackEl.innerHTML = `
                <strong>카드를 다시 뺐습니다.</strong>
                <p>카드 은행에서 다시 눌러 원하는 순서로 놓으세요.</p>
            `;
            renderAll();
        });

        checkBtn.addEventListener("click", checkOrder);
        resetBtn.addEventListener("click", resetOrder);
        revealBtn.addEventListener("click", revealAnswer);
        nextBtn.addEventListener("click", nextStory);

        renderReference();
        resetOrder();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
