<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3B-6반 한 명 뽑기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --student-name-scale: 1;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      margin: 0;
      background: #f8fafc;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      gap: 18px;
      width: min(680px, calc(100% - 32px));
    }

    .page-title {
      margin: 0;
      color: #1e3a8a;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 900;
      text-align: center;
    }

    button {
      width: 100%;
      min-height: 88px;
      border: 0;
      border-radius: 18px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      font-weight: 900;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    #student-name {
      display: grid;
      place-items: center;
      min-height: 160px;
      padding: 18px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid #dbeafe;
      font-size: clamp(
        calc(1.5rem * var(--student-name-scale)),
        calc(8vw * var(--student-name-scale)),
        calc(5rem * var(--student-name-scale))
      );
      font-weight: 900;
      line-height: 1.18;
      text-align: center;
      word-break: keep-all;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
      transition: font-size 160ms ease;
    }

    .zoom-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .reset-pool-button {
      justify-self: center;
      width: min(220px, 100%);
      min-height: 48px;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 1rem;
      box-shadow: none;
    }

    .zoom-button {
      display: inline-grid;
      place-items: center;
      width: 44px;
      min-height: 44px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      font-size: 1.45rem;
      line-height: 1;
      box-shadow: none;
    }

    .zoom-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="page-title">3B-6반 한 명 뽑기</h1>
    <button type="button" id="draw-button">뽑기</button>
    <div id="student-name" aria-live="polite"></div>
    <button type="button" class="reset-pool-button" id="reset-pool-button">풀 리셋</button>
    <div class="zoom-controls" aria-label="학생 이름 크기 조절">
      <button type="button" class="zoom-button" id="zoom-out" aria-label="학생 이름 축소">-</button>
      <button type="button" class="zoom-button" id="zoom-in" aria-label="학생 이름 확대">+</button>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const students = [
        '칭 텐 김',
        '찡 황 칸 후엔',
        '응우엔 빈 빈',
        '응웬 반 짭',
        '응웬 티 홍 낫',
        '레 띠에우 방',
        '응웬 프엉 마이',
        '팜 티 응옥 니',
        '응우엔 티 후옌',
        '르우 반 뒤',
        '쯔엉 민 황안',
        '장티김아잉',
        '응웬 황 티 터',
        '쩐 부 바오',
        '응웬 반 팅',
        '베갈리나 말리카',
        '부티 탕 쭉',
        '응우옌 티 화이',
        '레 티 하이리',
        '반 티 튀 항',
        '팜 홍 타이',
        '응우옌 티 투 후에',
        '팜 쑤안 휘',
        '부 티 응아',
        '이잉잉'
      ];

      const button = document.getElementById('draw-button');
      const output = document.getElementById('student-name');
      const resetPoolButton = document.getElementById('reset-pool-button');
      const zoomOutButton = document.getElementById('zoom-out');
      const zoomInButton = document.getElementById('zoom-in');
      const storageKey = 'korean3b:single-student-draw-3b6-state';
      const scaleStorageKey = 'korean3b:single-student-draw-3b6-name-scale';
      const rosterKey = students.join('|');
      const minNameScale = 0.7;
      const maxNameScale = 1.5;
      const nameScaleStep = 0.1;

      const savedState = loadDrawState();
      let remainingStudents = savedState.remainingStudents;
      let lastPickedStudent = savedState.lastPickedStudent;
      let nameScale = loadNameScale();

      updateNameScale(0);

      function shuffle(list) {
        const copy = [...list];

        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }

        return copy;
      }

      function loadDrawState() {
        try {
          const rawState = localStorage.getItem(storageKey);
          if (!rawState) {
            return { remainingStudents: [], lastPickedStudent: '' };
          }

          const parsedState = JSON.parse(rawState);
          const validStudents = new Set(students);

          if (parsedState.rosterKey !== rosterKey || !Array.isArray(parsedState.remainingStudents)) {
            return { remainingStudents: [], lastPickedStudent: '' };
          }

          return {
            remainingStudents: parsedState.remainingStudents.filter((student, index, list) => (
              validStudents.has(student) && list.indexOf(student) === index
            )),
            lastPickedStudent: validStudents.has(parsedState.lastPickedStudent) ? parsedState.lastPickedStudent : ''
          };
        } catch {
          return { remainingStudents: [], lastPickedStudent: '' };
        }
      }

      function saveDrawState() {
        try {
          localStorage.setItem(storageKey, JSON.stringify({
            rosterKey,
            remainingStudents,
            lastPickedStudent
          }));
        } catch {
          // Keep the draw usable even when browser storage is blocked.
        }
      }

      function loadNameScale() {
        try {
          const savedScale = Number(localStorage.getItem(scaleStorageKey));

          if (Number.isFinite(savedScale) && savedScale >= minNameScale && savedScale <= maxNameScale) {
            return savedScale;
          }
        } catch {
          // Default to the regular size when browser storage is unavailable.
        }

        return 1;
      }

      function updateNameScale(delta) {
        nameScale = Math.round(Math.min(maxNameScale, Math.max(minNameScale, nameScale + delta)) * 10) / 10;
        document.documentElement.style.setProperty('--student-name-scale', String(nameScale));
        zoomOutButton.disabled = nameScale <= minNameScale;
        zoomInButton.disabled = nameScale >= maxNameScale;

        try {
          localStorage.setItem(scaleStorageKey, String(nameScale));
        } catch {
          // Keep the controls responsive even when browser storage is blocked.
        }
      }

      function createDrawPool() {
        const pool = shuffle(students);

        if (pool.length > 1 && pool[pool.length - 1] === lastPickedStudent) {
          pool.unshift(pool.pop());
        }

        return pool;
      }

      function resetDrawPool() {
        remainingStudents = [];
        lastPickedStudent = '';
        output.textContent = '';

        try {
          localStorage.removeItem(storageKey);
        } catch {
          // Keep the reset usable even when browser storage is blocked.
        }
      }

      button.addEventListener('click', () => {
        if (remainingStudents.length === 0) {
          remainingStudents = createDrawPool();
        }

        const pickedStudent = remainingStudents.pop();
        lastPickedStudent = pickedStudent;
        saveDrawState();

        output.textContent = pickedStudent;
      });

      resetPoolButton.addEventListener('click', resetDrawPool);
      zoomOutButton.addEventListener('click', () => updateNameScale(-nameScaleStep));
      zoomInButton.addEventListener('click', () => updateNameScale(nameScaleStep));
    })();
  </script>
  <script src="../../shared/page-qr.js"></script>
</body>
</html>
