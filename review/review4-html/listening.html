<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>복습 4 듣기</title>
    <link rel="stylesheet" href="assets/styles.css">
    <style>
      .listening-transcript-fallback {
        position: fixed;
        left: 50%;
        bottom: calc(16px + env(safe-area-inset-bottom));
        z-index: 50;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #1e5663;
        color: #fffaf2;
        box-shadow: 0 14px 28px rgba(24, 61, 70, 0.24);
        font-weight: 900;
        text-decoration: none;
      }

      .listening-transcript-fallback[hidden] {
        display: none;
      }

      @media (max-width: 520px) {
        .listening-transcript-fallback {
          width: calc(100% - 32px);
        }
      }
    </style>
  </head>
  <body data-role="section" data-section="listening">
    <div id="app"></div>
    <a id="listeningTranscriptFallback" class="listening-transcript-fallback" href="listening-transcripts.html">듣기 지문 보기</a>
    <script src="assets/data.js"></script>
    <script src="assets/feedback-i18n.js"></script>
    <script src="../../shared/homework-firebase-config.js"></script>
    <script src="../../shared/homework-submitter.js" defer></script>
    <script src="assets/app.js"></script>
    <script src="../../shared/page-qr.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var fallback = document.getElementById("listeningTranscriptFallback");
        var renderedLink = document.querySelector('#app a[href="listening-transcripts.html"]');
        if (fallback && renderedLink) {
          fallback.hidden = true;
        }
      });
    </script>
  </body>
</html>
