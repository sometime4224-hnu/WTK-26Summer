<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11과 쓰기 활동2 | 사동태 문장 쓰기</title>
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --line: rgba(148, 163, 184, 0.14);
            --panel: rgba(255, 255, 255, 0.78);
            --soft: #f8fafc;

            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --blue-glow: rgba(37, 99, 235, 0.2);

            --green: #0f766e;
            --green-soft: #ecfdf5;
            --green-glow: rgba(15, 118, 110, 0.2);

            --amber: #ea580c;
            --amber-soft: #fff7ed;

            --rose: #be123c;
            --rose-soft: #fff1f2;

            --shadow: 0 20px 32px -12px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.02);
            --radius-box: 16px;
            --radius-btn: 12px;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 20%, rgba(20, 184, 166, 0.06), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.06), transparent 35%),
                linear-gradient(185deg, #ffffff 0%, #f4f8fa 50%, #edf1f4 100%);
            font-family: "Outfit", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button,
        input {
            font: inherit;
        }

        button {
            touch-action: manipulation;
        }

        .activity {
            width: min(1200px, calc(100% - 32px));
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 16px;
            margin: 0 auto;
            padding: 16px 0 24px;
        }

        .top-strip,
        .image-panel,
        .write-panel,
        .token-tray {
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--radius-box);
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .top-strip {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            min-height: 62px;
            padding: 10px 16px;
        }

        .mini-link,
        .badge,
        .counter,
        .suffix-btn,
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border-radius: var(--radius-btn);
            font-size: 0.9rem;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mini-link {
            padding: 8px 14px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            background: var(--blue-soft);
            color: var(--blue);
            text-decoration: none;
        }

        .mini-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
        }

        .badge {
            padding: 8px 14px;
            background: #1e293b;
            color: #ffffff;
            letter-spacing: 0.05em;
        }

        .counter {
            padding: 8px 14px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            background: var(--blue-soft);
            color: var(--blue);
        }

        .suffix-strip {
            min-width: 0;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 2px;
            scrollbar-width: none;
        }

        .suffix-strip::-webkit-scrollbar {
            display: none;
        }

        .suffix-btn {
            flex: 0 0 auto;
            min-width: 58px;
            padding: 8px 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: #ffffff;
            color: #475569;
            cursor: pointer;
        }

        .suffix-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(148, 163, 184, 0.4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
        }

        .suffix-btn[aria-pressed="true"] {
            border-color: transparent;
            background: linear-gradient(135deg, var(--green), #14b8a6);
            color: #ffffff;
            box-shadow: 0 6px 14px rgba(15, 118, 110, 0.25);
        }

        .workspace {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(320px, 0.86fr) minmax(0, 1.14fr);
            gap: 18px;
        }

        .image-panel,
        .write-panel {
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .image-panel {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 12px;
            padding: 16px;
        }

        .verb-line {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            min-height: 58px;
        }

        .verb-pill {
            min-width: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 8px 14px;
            border-radius: 12px;
            background: #ffffff;
            color: #0f172a;
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.1;
            overflow-wrap: anywhere;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        #baseVerb {
            border: 1px solid rgba(59, 130, 246, 0.16);
            background: rgba(59, 130, 246, 0.04);
            color: #1d4ed8;
        }

        #causativeVerb {
            border: 1px solid rgba(234, 88, 12, 0.16);
            background: rgba(234, 88, 12, 0.04);
            color: #c2410c;
        }

        .verb-arrow {
            color: #94a3b8;
            font-size: 1.3rem;
            font-weight: 900;
            animation: pulseArrow 2s infinite ease-in-out;
        }

        @keyframes pulseArrow {
            0%, 100% { transform: translateX(0); opacity: 0.6; }
            50% { transform: translateX(4px); opacity: 1; }
        }

        .image-wrap {
            min-height: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            background: #ffffff;
            box-shadow: inset 0 2px 8px rgba(15, 23, 42, 0.02);
            padding: 8px;
        }

        .drill-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.5s ease;
        }

        .flow-stage {
            position: relative;
            min-height: 62px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            background: #f8fafc;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .flow-stage::before {
            content: "";
            position: absolute;
            left: 12%;
            right: 12%;
            top: 50%;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--blue), var(--green), var(--amber));
            transform: translateY(-50%) scaleX(0.72);
            transform-origin: left center;
            opacity: 0.18;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-stage.is-success::before {
            opacity: 1;
            transform: translateY(-50%) scaleX(1);
            animation: shimmerLine 2s infinite linear;
            background-size: 200% auto;
            background-image: linear-gradient(90deg, var(--blue), var(--green), var(--amber), var(--blue));
        }

        @keyframes shimmerLine {
            to { background-position: -200% center; }
        }

        .flow-dot {
            position: absolute;
            top: 50%;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            color: #475569;
            font-size: 0.85rem;
            font-weight: 800;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-dot[data-point="a"] { left: 16%; }
        .flow-dot[data-point="b"] { left: 50%; }
        .flow-dot[data-point="c"] { left: 84%; }

        .flow-stage.is-success .flow-dot {
            border-color: transparent;
            background: var(--green);
            color: #ffffff;
            box-shadow: 0 0 12px var(--green-glow);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .write-panel {
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) auto;
            gap: 12px;
            padding: 16px;
        }

        .slot-board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            padding: 16px 10px 10px;
            border: 2px solid rgba(37, 99, 235, 0.18);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(239, 246, 255, 0.76), rgba(255, 255, 255, 0.72));
            box-shadow: 0 0 18px rgba(37, 99, 235, 0.08);
        }

        .slot {
            position: relative;
            overflow: hidden;
            min-width: 0;
            min-height: 84px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 4px;
            padding: 8px 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .slot.is-empty {
            animation: slotBreath 1.8s infinite ease-in-out;
        }

        .slot.is-empty::after {
            content: "+";
            position: absolute;
            inset: 8px 8px auto auto;
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.1);
            color: var(--blue);
            font-size: 1rem;
            font-weight: 900;
        }

        .slot.is-ready {
            border-color: var(--blue);
            background: var(--blue-soft);
            box-shadow: 0 0 14px var(--blue-glow);
            transform: translateY(-2px);
        }

        .slot.is-filled {
            border-style: solid;
            border-color: #93c5fd;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .slot.is-correct {
            border-color: transparent;
            background: var(--green-soft);
            border: 2px solid #10b981;
            color: #065f46;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.1);
        }

        .slot.is-error {
            border-color: transparent;
            background: var(--rose-soft);
            border: 2px solid #f87171;
            color: #9f1239;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.1);
            animation: shakeSlot 0.4s ease;
        }

        .slot-mark,
        .slot-particle {
            color: #64748b;
            font-size: 0.76rem;
            font-weight: 800;
            line-height: 1;
        }

        .slot-word {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            color: #0f172a;
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.1;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .slot.is-empty .slot-word {
            color: #cbd5e1;
            font-size: 1.5rem;
        }

        .slot-particle {
            text-align: right;
            color: var(--blue);
        }

        .slot.is-correct .slot-particle {
            color: var(--green);
        }

        .target-verb {
            min-height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(234, 88, 12, 0.16);
            border-radius: 12px;
            background: var(--amber-soft);
            color: #c2410c;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
        }

        .token-tray {
            position: relative;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 18px 10px 10px;
            overflow: auto;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(239, 246, 255, 0.66));
            border: 2px solid rgba(37, 99, 235, 0.2);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.08);
        }

        .token-chip {
            position: relative;
            min-width: 0;
            min-height: 54px;
            display: grid;
            place-items: center;
            padding: 8px 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            background: #ffffff;
            color: #334155;
            cursor: grab;
            font-weight: 800;
            text-align: center;
            word-break: keep-all;
            overflow-wrap: anywhere;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .token-chip::after {
            content: "↗";
            position: absolute;
            top: 5px;
            right: 8px;
            color: #94a3b8;
            font-size: 0.78rem;
            font-weight: 900;
            opacity: 0.78;
        }

        .token-chip:hover {
            transform: translateY(-3px);
            border-color: rgba(148, 163, 184, 0.4);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.08);
        }

        .token-chip:active {
            cursor: grabbing;
        }

        .token-chip[aria-pressed="true"] {
            border-color: transparent;
            background: var(--blue-soft);
            border: 1.5px solid var(--blue);
            color: #1d4ed8;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.15);
            transform: translateY(-1px);
        }

        .input-row {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto auto;
            gap: 10px;
            align-items: stretch;
            padding: 18px 12px 12px;
            border: 2px solid rgba(234, 88, 12, 0.18);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 247, 237, 0.78), rgba(255, 255, 255, 0.9));
            box-shadow: 0 0 18px rgba(234, 88, 12, 0.08);
        }

        .input-row.is-active {
            border-color: rgba(234, 88, 12, 0.44);
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.08), 0 0 20px rgba(234, 88, 12, 0.12);
        }

        .slot-board::before,
        .token-tray::before,
        .input-row::before {
            content: attr(data-step);
            position: absolute;
            top: -12px;
            left: -10px;
            z-index: 2;
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            color: #ffffff;
            font-size: 0.92rem;
            font-weight: 950;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
        }

        .token-tray::before {
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
        }

        .slot-board::before {
            background: linear-gradient(135deg, var(--green), #0d9488);
        }

        .input-row::before {
            background: linear-gradient(135deg, var(--amber), #f59e0b);
        }

        .sentence-input {
            min-width: 0;
            min-height: 52px;
            padding: 10px 16px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            background: #ffffff;
            color: #0f172a;
            font-size: 1.1rem;
            font-weight: 800;
            transition: all 0.25s ease;
        }

        .sentence-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
            outline: none;
        }

        .sentence-input:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            border-color: #cbd5e1;
            opacity: 0.7;
        }

        .sentence-input.is-correct {
            border-color: #10b981;
            background: var(--green-soft);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }

        .sentence-input.is-error {
            border-color: #f87171;
            background: var(--rose-soft);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.15);
            animation: shakeSlot 0.4s ease;
        }

        .action-btn {
            min-width: 80px;
            padding: 8px 14px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #475569;
            cursor: pointer;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #94a3b8;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04);
        }

        .action-btn.primary {
            border: none;
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .action-btn.primary:hover:not(:disabled) {
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.3);
        }

        .action-btn.success {
            border: none;
            background: linear-gradient(135deg, var(--green), #0d9488);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(15, 118, 110, 0.2);
        }

        .action-btn.success:hover:not(:disabled) {
            box-shadow: 0 6px 14px rgba(15, 118, 110, 0.3);
        }

        .action-btn.success.is-available:not(:disabled) {
            animation: nextReadyPulse 1.35s ease-in-out infinite;
        }

        .action-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.42;
            cursor: default;
            transform: none !important;
            box-shadow: none !important;
        }

        .status-light {
            width: 44px;
            min-width: 44px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .status-light.is-ready {
            border-color: var(--blue);
            background: #3b82f6;
            box-shadow: 0 0 10px var(--blue-glow);
            animation: pulseGlowBlue 1.5s infinite ease-in-out;
        }

        .status-light.is-good {
            border-color: transparent;
            background: #10b981;
            box-shadow: 0 0 12px var(--green-glow);
        }

        .status-light.is-good::after {
            content: "✓";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 900;
        }

        .status-light.is-bad {
            border-color: transparent;
            background: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .status-light.is-bad::after {
            content: "✗";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 900;
        }

        @keyframes pulseGlowBlue {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .slot:focus-visible,
        .token-chip:focus-visible,
        .suffix-btn:focus-visible,
        .action-btn:focus-visible,
        .mini-link:focus-visible,
        .sentence-input:focus-visible {
            outline: 3px solid rgba(59, 130, 246, 0.3);
            outline-offset: 2px;
        }

        @keyframes shakeSlot {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        @keyframes nextReadyPulse {
            0%, 100% {
                box-shadow: 0 4px 10px rgba(15, 118, 110, 0.2), 0 0 0 0 rgba(16, 185, 129, 0.24);
            }
            50% {
                box-shadow: 0 6px 14px rgba(15, 118, 110, 0.3), 0 0 0 7px rgba(16, 185, 129, 0);
            }
        }

        @keyframes slotBreath {
            0%, 100% {
                border-color: #cbd5e1;
                box-shadow: none;
            }
            50% {
                border-color: rgba(37, 99, 235, 0.62);
                box-shadow: 0 0 14px rgba(37, 99, 235, 0.12);
            }
        }

        @media (max-width: 900px) {
            .activity {
                width: min(100% - 24px, 1200px);
                min-height: auto;
            }

            .top-strip,
            .workspace {
                grid-template-columns: 1fr;
            }

            .workspace {
                min-height: auto;
                gap: 16px;
            }

            .image-panel {
                min-height: 440px;
            }
        }

        @media (max-width: 620px) {
            .slot-board {
                grid-template-columns: 1fr;
            }
            .token-tray {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .input-row {
                grid-template-columns: 1fr auto;
                gap: 8px;
            }

            .sentence-input,
            .status-light {
                grid-column: 1 / -1;
            }

            .action-btn {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <main class="activity" data-testid="causative-writing">
        <header class="top-strip" aria-label="쓰기 활동2">
            <a class="mini-link" href="index.html" aria-label="11과 목록">11과</a>
            <span class="badge">쓰기2</span>
            <div class="suffix-strip" id="suffixStrip" data-testid="suffix-strip" aria-label="접미사"></div>
            <span class="counter" id="counter" data-testid="counter">1 / 28</span>
        </header>

        <div class="workspace">
            <section class="image-panel" aria-label="그림 카드">
                <div class="verb-line">
                    <span class="verb-pill" id="baseVerb" data-testid="base-verb"></span>
                    <span class="verb-arrow" aria-hidden="true">→</span>
                    <span class="verb-pill is-causative" id="causativeVerb" data-testid="causative-verb"></span>
                </div>
                <div class="image-wrap">
                    <img class="drill-image" id="drillImage" data-testid="drill-image" alt="사동 그림" decoding="async" fetchpriority="high" />

            <section class="write-panel" aria-label="문형 쓰기">
                <div class="slot-board" id="slotBoard" data-testid="slot-board" data-step="2"></div>
                <div class="target-verb" id="targetVerb" data-testid="target-verb"></div>

                    <span class="status-light" id="statusLight" data-testid="status-light" aria-hidden="true"></span>
                </div>
            </section>
        </div>
        <span class="sr-only" id="liveStatus" aria-live="polite"></span>
    </main>

    <script>
        const STORAGE_KEY = "writing_activity2_c11_causative_v2";
        const ASSET_BASE = "../assets/c11/grammar/images/grammar1-support-material1/cards/";
        const FILTERS = ["전체", "-이", "-히", "-리", "-기", "-우", "-구", "-추"];
        const DRILLS = [
            { id: "hide", suffix: "-기", base: "숨다", causative: "숨기다", image: "cut02-hide-causative.webp", verb: "숨긴다", slots: [["causer", "A", "아이", "가"], ["target", "B", "곰 인형", "을"]] },
            { id: "wash", suffix: "-기", base: "씻다", causative: "씻기다", image: "cut04-wash-causative.webp", verb: "씻긴다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "를"]] },
            { id: "ride", suffix: "-우", base: "타다", causative: "태우다", image: "cut06-ride-causative.webp", verb: "태운다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "를"], ["object", "C", "버스", "에"]] },
            { id: "heat", suffix: "-구", base: "달다", causative: "달구다", image: "cut08-heat-up-causative.webp", verb: "달군다", slots: [["causer", "A", "아이", "가"], ["target", "B", "팬", "을"]] },
            { id: "delay", suffix: "-추", base: "늦다", causative: "늦추다", image: "cut10-delay.webp", verb: "늦춘다", slots: [["causer", "A", "직원", "이"], ["target", "B", "일정", "을"]] },
            { id: "lower", suffix: "-추", base: "낮다", causative: "낮추다", image: "cut14-lower.webp", verb: "낮춘다", slots: [["causer", "A", "아이", "가"], ["target", "B", "소리", "를"]] },
            { id: "stand", suffix: "-우", base: "서다", causative: "세우다", image: "cut16-stand-causative.webp", verb: "세운다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "를"]] },
            { id: "cover", suffix: "-우", base: "쓰다", causative: "씌우다", image: "cut18-put-hat-on.webp", verb: "씌운다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "모자", "를"]] },
            { id: "sleep", suffix: "-우", base: "자다", causative: "재우다", image: "cut20-put-to-sleep.webp", verb: "재운다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아기", "를"]] },
            { id: "wake", suffix: "-우", base: "깨다", causative: "깨우다", image: "cut22-wake-causative.webp", verb: "깨운다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "를"]] },
            { id: "lie", suffix: "-히", base: "눕다", causative: "눕히다", image: "cut24-lay-down.webp", verb: "눕힌다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아기", "를"]] },
            { id: "cook", suffix: "-히", base: "익다", causative: "익히다", image: "cut26-cook.webp", verb: "익힌다", slots: [["causer", "A", "아이", "가"], ["target", "B", "고구마", "를"]] },
            { id: "cry", suffix: "-리", base: "울다", causative: "울리다", image: "cut28-make-cry.webp", verb: "울린다", slots: [["causer", "A", "아이", "가"], ["target", "B", "친구", "를"]] },
            { id: "know", suffix: "-리", base: "알다", causative: "알리다", image: "cut30-inform.webp", verb: "알린다", slots: [["causer", "A", "선생님", "이"], ["target", "B", "학생들", "에게"], ["object", "C", "소식", "을"]] },
            { id: "save", suffix: "-리", base: "살다", causative: "살리다", image: "cut32-save.webp", verb: "살린다", slots: [["causer", "A", "아이", "가"], ["target", "B", "물고기", "를"]] },
            { id: "fly", suffix: "-리", base: "날다", causative: "날리다", image: "cut34-make-fly.webp", verb: "날린다", slots: [["causer", "A", "아이", "가"], ["target", "B", "종이비행기", "를"]] },
            { id: "turn", suffix: "-리", base: "돌다", causative: "돌리다", image: "cut36-turn.webp", verb: "돌린다", slots: [["causer", "A", "아이", "가"], ["target", "B", "바퀴", "를"]] },
            { id: "laugh", suffix: "-기", base: "웃다", causative: "웃기다", image: "cut38-make-laugh.webp", verb: "웃긴다", slots: [["causer", "A", "광대", "가"], ["target", "B", "아이", "를"]] },
            { id: "undress", suffix: "-기", base: "벗다", causative: "벗기다", image: "cut40-take-off-causative.webp", verb: "벗긴다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "외투", "를"]] },
            { id: "putshoes", suffix: "-기", base: "신다", causative: "신기다", image: "cut42-put-shoes-on.webp", verb: "신긴다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "신발", "을"]] },
            { id: "eat", suffix: "-이", base: "먹다", causative: "먹이다", image: "cut44-feed.webp", verb: "먹인다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "밥", "을"]] },
            { id: "boil", suffix: "-이", base: "끓다", causative: "끓이다", image: "cut46-boil-causative.webp", verb: "끓인다", slots: [["causer", "A", "아이", "가"], ["target", "B", "국", "을"]] },
            { id: "reduce", suffix: "-이", base: "줄다", causative: "줄이다", image: "cut48-reduce.webp", verb: "줄인다", slots: [["causer", "A", "아이", "가"], ["target", "B", "과자", "를"]] },
            { id: "attach", suffix: "-이", base: "붙다", causative: "붙이다", image: "cut50-attach.webp", verb: "붙인다", slots: [["causer", "A", "아이", "가"], ["target", "B", "스티커", "를"]] },
            { id: "heighten", suffix: "-이", base: "높다", causative: "높이다", image: "cut52-raise.webp", verb: "높인다", slots: [["causer", "A", "아이", "가"], ["target", "B", "트로피", "를"]] },
            { id: "sit", suffix: "-히", base: "앉다", causative: "앉히다", image: "cut54-seat.webp", verb: "앉힌다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "를"]] },
            { id: "wear", suffix: "-히", base: "입다", causative: "입히다", image: "cut56-dress.webp", verb: "입힌다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "옷", "을"]] },
            { id: "read", suffix: "-히", base: "읽다", causative: "읽히다", image: "cut58-make-read.webp", verb: "읽힌다", slots: [["causer", "A", "엄마", "가"], ["target", "B", "아이", "에게"], ["object", "C", "책", "을"]] }
        ].map((drill) => ({
            ...drill,
            slots: drill.slots.map((slot) => ({
                id: slot[0],
                mark: slot[1],
                text: slot[2],
                particle: slot[3]
            }))
        }));

        const VERB_VARIANTS = {
            "숨긴다": ["숨겨요", "숨기어요", "숨깁니다"],
            "씻긴다": ["씻겨요", "씻기어요", "씻깁니다"],
            "태운다": ["태워요", "태웁니다"],
            "달군다": ["달궈요", "달구어요", "달굽니다"],
            "늦춘다": ["늦춰요", "늦추어요", "늦춥니다"],
            "낮춘다": ["낮춰요", "낮추어요", "낮춥니다"],
            "세운다": ["세워요", "세웁니다"],
            "씌운다": ["씌워요", "씌웁니다"],
            "재운다": ["재워요", "재웁니다"],
            "깨운다": ["깨워요", "깨웁니다"],
            "눕힌다": ["눕혀요", "눕히어요", "눕힙니다"],
            "익힌다": ["익혀요", "익히어요", "익힙니다"],
            "울린다": ["울려요", "울리어요", "울립니다"],
            "알린다": ["알려요", "알리어요", "알립니다"],
            "살린다": ["살려요", "살리어요", "살립니다"],
            "날린다": ["날려요", "날리어요", "날립니다"],
            "돌린다": ["돌려요", "돌리어요", "돌립니다"],
            "웃긴다": ["웃겨요", "웃기어요", "웃깁니다"],
            "벗긴다": ["벗겨요", "벗기어요", "벗깁니다"],
            "신긴다": ["신겨요", "신기어요", "신깁니다"],
            "먹인다": ["먹여요", "먹이어요", "먹입니다"],
            "끓인다": ["끓여요", "끓이어요", "끓입니다"],
            "줄인다": ["줄여요", "줄이어요", "줄입니다"],
            "붙인다": ["붙여요", "붙이어요", "붙입니다"],
            "높인다": ["높여요", "높이어요", "높입니다"],
            "앉힌다": ["앉혀요", "앉히어요", "앉힙니다"],
            "입힌다": ["입혀요", "입히어요", "입힙니다"],
            "읽힌다": ["읽혀요", "읽히어요", "읽힙니다"]
        };

        const refs = {
            suffixStrip: document.getElementById("suffixStrip"),
            counter: document.getElementById("counter"),
            baseVerb: document.getElementById("baseVerb"),
            causativeVerb: document.getElementById("causativeVerb"),
            drillImage: document.getElementById("drillImage"),
            flowStage: document.getElementById("flowStage"),
            slotBoard: document.getElementById("slotBoard"),
            targetVerb: document.getElementById("targetVerb"),
            tokenTray: document.getElementById("tokenTray"),
            inputRow: document.getElementById("inputRow"),
            sentenceInput: document.getElementById("sentenceInput"),
            checkButton: document.getElementById("checkButton"),
            nextButton: document.getElementById("nextButton"),
            resetButton: document.getElementById("resetButton"),
            statusLight: document.getElementById("statusLight"),
            liveStatus: document.getElementById("liveStatus")
        };

        const state = loadState();
        let selectedTokenId = null;
        let lastResult = "idle";

        function esc(value) {
            return String(value || "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function loadState() {
            const fallback = {
                currentId: DRILLS[0].id,
                filter: "전체",
                done: [],
                attempted: [],
                answers: {},
                slots: {}
            };
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                if (!saved || !DRILLS.some((drill) => drill.id === saved.currentId)) return fallback;
                return {
                    currentId: saved.currentId,
                    filter: FILTERS.includes(saved.filter) ? saved.filter : "전체",
                    done: Array.isArray(saved.done) ? saved.done.filter((id) => DRILLS.some((drill) => drill.id === id)) : [],
                    attempted: Array.isArray(saved.attempted) ? saved.attempted.filter((id) => DRILLS.some((drill) => drill.id === id)) : [],
                    answers: saved.answers && typeof saved.answers === "object" ? saved.answers : {},
                    slots: saved.slots && typeof saved.slots === "object" ? saved.slots : {}
                };
            } catch (error) {
                return fallback;
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function filteredDrills() {
            if (state.filter === "전체") return DRILLS;
            return DRILLS.filter((drill) => drill.suffix === state.filter);
        }

        function currentDrill() {
            const drills = filteredDrills();
            if (!drills.some((drill) => drill.id === state.currentId)) {
                state.currentId = drills[0] ? drills[0].id : DRILLS[0].id;
            }
            return DRILLS.find((drill) => drill.id === state.currentId) || DRILLS[0];
        }

        function currentIndex() {
            const drills = filteredDrills();
            return Math.max(0, drills.findIndex((drill) => drill.id === state.currentId));
        }

        function slotState(drill) {
            if (!state.slots[drill.id]) state.slots[drill.id] = {};
            return state.slots[drill.id];
        }

        function tokenById(drill, id) {
            return drill.slots.find((slot) => slot.id === id);
        }

        function targetSentence(drill) {
            return drill.slots.map((slot) => slot.text + slot.particle).join(" ") + " " + drill.verb;
        }

        function targetSentences(drill) {
            const subjectPart = drill.slots.map((slot) => slot.text + slot.particle).join(" ");
            const verbs = [drill.verb].concat(VERB_VARIANTS[drill.verb] || []);
            return verbs.map((verb) => subjectPart + " " + verb);
        }

        function normalizeSentence(value) {
            return String(value || "")
                .replace(/[.。]/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function sentenceKey(value) {
            return normalizeSentence(value).replace(/\s+/g, "");
        }

        function sentenceMatches(drill, value) {
            const candidate = sentenceKey(value);
            return Boolean(candidate) && targetSentences(drill).some((sentence) => sentenceKey(sentence) === candidate);
        }

        function slotsComplete(drill) {
            const filled = slotState(drill);
            return drill.slots.every((slot) => Boolean(filled[slot.id]));
        }

        function slotsCorrect(drill) {
            const filled = slotState(drill);
            return drill.slots.every((slot) => filled[slot.id] === slot.id);
        }

        function isDone(drill) {
            return state.done.includes(drill.id);
        }

        function isAttempted(drill) {
            return state.attempted.includes(drill.id);
        }

        function canAdvance(drill) {
            return isDone(drill) || isAttempted(drill);
        }

        function addUnique(list, id) {
            if (!list.includes(id)) list.push(id);
        }

        function clearAttempt(drill) {
            state.done = state.done.filter((id) => id !== drill.id);
            state.attempted = state.attempted.filter((id) => id !== drill.id);
        }

        function setResult(result) {
            lastResult = result;
            refs.statusLight.className = "status-light";
            refs.flowStage.classList.remove("is-success");
            refs.sentenceInput.classList.remove("is-correct", "is-error");

            if (result === "ready") refs.statusLight.classList.add("is-ready");
            if (result === "good") {
                refs.statusLight.classList.add("is-good");
                refs.flowStage.classList.add("is-success");
                refs.sentenceInput.classList.add("is-correct");
                refs.liveStatus.textContent = "정답";
            }
            if (result === "bad") {
                refs.statusLight.classList.add("is-bad");
                refs.sentenceInput.classList.add("is-error");
                refs.liveStatus.textContent = "다시";
            }
        }

        function renderFilters() {
            refs.suffixStrip.innerHTML = FILTERS.map((suffix) => (
                '<button class="suffix-btn" data-testid="suffix-button" type="button" data-suffix="' + esc(suffix) + '" aria-pressed="' + (suffix === state.filter ? "true" : "false") + '">' + esc(suffix) + '</button>'
            )).join("");

            refs.suffixStrip.querySelectorAll(".suffix-btn").forEach((button) => {
                button.addEventListener("click", () => {
                    state.filter = button.dataset.suffix;
                    const drills = filteredDrills();
                    state.currentId = drills[0] ? drills[0].id : DRILLS[0].id;
                    selectedTokenId = null;
                    lastResult = "idle";
                    saveState();
                    render();
                });
            });
        }

        function renderSlots(drill) {
            const filled = slotState(drill);
            refs.slotBoard.innerHTML = drill.slots.map((slot) => {
                const token = tokenById(drill, filled[slot.id]);
                const hasToken = Boolean(token);
                const correctClass = lastResult === "good" && filled[slot.id] === slot.id ? " is-correct" : "";
                const errorClass = lastResult === "bad" && filled[slot.id] !== slot.id ? " is-error" : "";
                const readyClass = selectedTokenId ? " is-ready" : "";
                return '<button class="slot ' + (hasToken ? "is-filled" : "is-empty") + readyClass + correctClass + errorClass + '" data-testid="slot" type="button" data-slot="' + esc(slot.id) + '" aria-label="' + esc(slot.mark + slot.particle) + '">' +
                    '<span class="slot-mark">' + esc(slot.mark) + '</span>' +
                    '<span class="slot-word">' + esc(hasToken ? token.text : "___") + '</span>' +
                    '<span class="slot-particle">' + esc(slot.particle) + '</span>' +
                '</button>';
            }).join("");

            refs.slotBoard.querySelectorAll(".slot").forEach((button) => {
                button.addEventListener("click", () => {
                    if (!selectedTokenId) return;
                    fillSlot(drill, button.dataset.slot, selectedTokenId);
                });
                button.addEventListener("dragover", (event) => {
                    if (!hasTransferType(event, "application/x-causative-token")) return;
                    event.preventDefault();
                    button.classList.add("is-ready");
                });
                button.addEventListener("dragleave", () => {
                    button.classList.remove("is-ready");
                });
                button.addEventListener("drop", (event) => {
                    event.preventDefault();
                    button.classList.remove("is-ready");
                    const tokenId = event.dataTransfer.getData("application/x-causative-token");
                    fillSlot(drill, button.dataset.slot, tokenId);
                });
            });
        }

        function renderTokens(drill) {
            refs.tokenTray.innerHTML = drill.slots.map((slot) => (
                '<button class="token-chip" data-testid="token-chip" type="button" draggable="true" data-token="' + esc(slot.id) + '" aria-pressed="' + (slot.id === selectedTokenId ? "true" : "false") + '">' + esc(slot.text) + '</button>'
            )).join("");

            refs.tokenTray.querySelectorAll(".token-chip").forEach((button) => {
                button.addEventListener("click", () => {
                    selectedTokenId = selectedTokenId === button.dataset.token ? null : button.dataset.token;
                    lastResult = "idle";
                    render();
                });
                button.addEventListener("dragstart", (event) => {
                    selectedTokenId = button.dataset.token;
                    event.dataTransfer.setData("application/x-causative-token", button.dataset.token);
                    event.dataTransfer.effectAllowed = "copy";
                    lastResult = "idle";
                    render();
                });
            });
        }

        function render() {
            const drill = currentDrill();
            const drills = filteredDrills();
            const index = currentIndex();
            const inputReady = slotsComplete(drill);
            const done = isDone(drill);
            const advanceReady = canAdvance(drill);
            const visualResult = done ? "good" : lastResult === "bad" ? "bad" : inputReady ? "ready" : "idle";
            lastResult = visualResult;

            renderFilters();
            refs.counter.textContent = (index + 1) + " / " + drills.length;
            refs.baseVerb.textContent = drill.base;
            refs.causativeVerb.textContent = drill.causative;
            refs.targetVerb.textContent = drill.verb;
            refs.drillImage.src = ASSET_BASE + drill.image;
            refs.drillImage.alt = drill.causative;
            refs.sentenceInput.disabled = !inputReady;
            refs.sentenceInput.value = state.answers[drill.id] || "";
            refs.checkButton.disabled = !inputReady;
            refs.inputRow.classList.toggle("is-active", inputReady);
            refs.nextButton.disabled = !advanceReady;
            refs.nextButton.classList.toggle("is-available", advanceReady);

            renderSlots(drill);
            renderTokens(drill);
            setResult(visualResult);
        }

        function hasTransferType(event, type) {
            return Array.from(event.dataTransfer.types || []).includes(type);
        }

        function fillSlot(drill, slotId, tokenId) {
            if (!tokenById(drill, tokenId)) return;
            slotState(drill)[slotId] = tokenId;
            selectedTokenId = null;
            clearAttempt(drill);
            lastResult = "idle";
            saveState();
            render();
            if (slotsComplete(drill)) refs.sentenceInput.focus();
        }

        function triggerConfetti() {
            const container = document.getElementById("confetti-container") || (() => {
                const c = document.createElement("div");
                c.id = "confetti-container";
                c.style.position = "fixed";
                c.style.inset = "0";
                c.style.pointerEvents = "none";
                c.style.zIndex = "9999";
                document.body.appendChild(c);
                return c;
            })();

            const colors = ["#8b5cf6", "#3b82f6", "#ea580c", "#10b981", "#ff4582", "#ffd300"];
            for (let i = 0; i < 45; i++) {
                const p = document.createElement("div");
                p.style.position = "absolute";
                p.style.left = "0";
                p.style.top = "0";
                p.style.width = Math.random() * 8 + 6 + "px";
                p.style.height = Math.random() * 12 + 6 + "px";
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.borderRadius = "2px";

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 8 + 6;
                let vx = Math.cos(angle) * velocity;
                let vy = Math.sin(angle) * velocity - 6; // Upward initial velocity

                let posX = window.innerWidth / 2;
                let posY = window.innerHeight / 2;

                p.style.transform = `translate(${posX}px, ${posY}px) rotate(${Math.random() * 360}deg)`;
                container.appendChild(p);

                let opacity = 1;
                const startTime = Date.now();

                function update() {
                    const elapsed = (Date.now() - startTime) / 1000;
                    if (elapsed > 1.8) {
                        p.remove();
                        return;
                    }
                    vy += 0.35; // Gravity
                    posX += vx;
                    posY += vy;
                    opacity = Math.max(0, 1 - elapsed / 1.8);

                    p.style.transform = `translate(${posX}px, ${posY}px) rotate(${elapsed * 360}deg)`;
                    p.style.opacity = opacity;
                    requestAnimationFrame(update);
                }

                requestAnimationFrame(update);
            }
        }

        function checkCurrent() {
            const drill = currentDrill();
            state.answers[drill.id] = refs.sentenceInput.value;
            const correct = slotsCorrect(drill) && sentenceMatches(drill, refs.sentenceInput.value);
            addUnique(state.attempted, drill.id);

            if (correct) {
                addUnique(state.done, drill.id);
                lastResult = "good";
                try {
                    triggerConfetti();
                } catch(e) {}
            } else {
                state.done = state.done.filter((id) => id !== drill.id);
                lastResult = "bad";
            }

            saveState();
            render();
        }

        function nextDrill() {
            const drills = filteredDrills();
            const nextIndex = (currentIndex() + 1) % drills.length;
            state.currentId = drills[nextIndex].id;
            selectedTokenId = null;
            lastResult = "idle";
            saveState();
            render();
        }

        function resetCurrent() {
            const drill = currentDrill();
            delete state.answers[drill.id];
            delete state.slots[drill.id];
            clearAttempt(drill);
            selectedTokenId = null;
            lastResult = "idle";
            saveState();
            render();
        }

        refs.sentenceInput.addEventListener("input", () => {
            const drill = currentDrill();
            state.answers[drill.id] = refs.sentenceInput.value;
            clearAttempt(drill);
            lastResult = slotsComplete(drill) ? "ready" : "idle";
            saveState();
            setResult(lastResult);
            refs.nextButton.classList.remove("is-available");
            refs.nextButton.disabled = true;
        });
        refs.sentenceInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                checkCurrent();
            }
        });
        refs.checkButton.addEventListener("click", checkCurrent);
        refs.nextButton.addEventListener("click", nextDrill);
        refs.resetButton.addEventListener("click", resetCurrent);

        window.__C11_CAUSATIVE_WRITING = {
            getCurrentDrill: () => currentDrill(),
            getState: () => JSON.parse(JSON.stringify(state)),
            normalizeSentence,
            setDrill: (id) => {
                if (!DRILLS.some((drill) => drill.id === id)) return false;
                state.filter = "전체";
                state.currentId = id;
                selectedTokenId = null;
                lastResult = "idle";
                saveState();
                render();
                return true;
            }
        };

        render();
    </script>
</body>
</html>
