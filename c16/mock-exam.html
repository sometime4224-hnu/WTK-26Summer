            font-size: 42px;
        }

        .q-media figcaption {

            font-size: 13px;
            font-weight: 900;
            line-height: 1.4;

            grid-template-columns: repeat(2, minmax(0, 1fr));

        .option {

        .option strong {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: #f1f5f9;

            font-size: 12px;
            font-weight: 900;

        .option span {
            align-self: center;
            min-width: 0;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
            overflow-wrap: break-word;

        .option.is-selected {
            border-color: var(--blue);
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .option.is-correct {

        .option.is-wrong {
            border-color: var(--red);
            background: var(--red-soft);
        }

        .feedback {
            display: none;

            color: #334155;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback.is-visible {
            display: block;
        }

        .footer {
            margin-top: 12px;
        }

            .exam-head .btn {

            .question-nav {

            }

            .nav-dot {
                flex: 0 0 24px;

            .question-list {

            .q-number {

            }

            .q-media img,
            .q-media__emoji {
                width: 56px;
                border-radius: 6px;
            }

            .q-media__emoji {
                font-size: 30px;
            }

            .q-media figcaption {
                font-size: 12px;
                line-height: 1.32;
            }

            .stats,
            .options {
                grid-template-columns: 1fr;
            }

            .options {
                gap: 6px;
            }

            .option {
                grid-template-columns: 24px 1fr;
                min-height: 42px;
                gap: 7px;

            }

            .option strong {
                width: 24px;
                height: 24px;

            }

            .option span {
                font-size: 13px;
                line-height: 1.34;
            }

            .feedback {
                padding: 8px;
                font-size: 12px;
                line-height: 1.36;
            }

            .footer {
                display: none;
            }
        }

    <script>
        const STORAGE_KEY = 'korean3b:c16:mockExam:v1';
        const OPTION_LABELS = ['A', 'B', 'C', 'D'];

        const questions = [
            { id: 'v01', section: '어휘', skill: '심리 상태', prompt: '조용한 음악을 들은 뒤 긴장이 풀리고 마음이 안정될 때 알맞은 표현은?', context: '심리 상태 표현입니다.', choices: ['마음이 편안해지다', '가슴이 뛰다', '힘이 나다', '신이 나다'], answer: 0, explain: '긴장이 풀리고 안정되는 느낌은 “마음이 편안해지다”로 말합니다.' },
            { id: 'v02', section: '어휘', skill: '심리 상태', prompt: '시간에 쫓기지 않고 차분히 생각할 수 있게 되었을 때 알맞은 표현은?', context: '심리 상태 표현입니다.', choices: ['마음에 여유가 생기다', '마음이 설레다', '신이 나다', '힘이 나다'], answer: 0, explain: '바쁘거나 불안한 마음이 줄고 차분해지면 “마음에 여유가 생기다”라고 합니다.' },
            { id: 'v03', section: '어휘', skill: '심리 상태', prompt: '즐거워서 기분이 들뜨고 몸이 움직이고 싶을 때 알맞은 표현은?', context: '심리 상태 표현입니다.', choices: ['신이 나다', '마음이 편안해지다', '마음에 여유가 생기다', '가슴이 뛰다'], answer: 0, explain: '즐겁고 흥겨운 상태는 “신이 나다”입니다.' },
            { id: 'v04', section: '어휘', skill: '심리 상태', prompt: '기대가 되어 마음이 두근거릴 때 알맞은 표현은?', context: '심리 상태 표현입니다.', choices: ['마음이 설레다', '힘이 나다', '마음이 편안해지다', '마음에 여유가 생기다'], answer: 0, explain: '기대 때문에 마음이 두근거리는 느낌은 “마음이 설레다”입니다.' },
            { id: 'v05', section: '어휘', skill: '악기', prompt: '건반을 눌러 연주하는 악기는?', context: '악기 이름을 묻는 문제입니다.', choices: ['피아노', '바이올린', '트럼펫', '드럼'], answer: 0, explain: '건반을 누르는 악기는 “피아노”입니다.' },
            { id: 'v06', section: '어휘', skill: '악기', prompt: '활로 줄을 켜서 연주하는 악기는?', context: '악기 이름을 묻는 문제입니다.', choices: ['바이올린', '피아노', '기타', '트럼펫'], answer: 0, explain: '활로 줄을 켜는 악기는 “바이올린”입니다.' },

            { id: 'g12', section: '문법', skill: 'A/V-기로 유명하다', prompt: '이 악기는 모양이 둥글다는 점으로 잘 알려져 있어요.', context: '현재의 특징/평가입니다.', choices: ['이 악기는 모양이 둥글기로 유명해요.', '이 악기는 모양을 둥글기로 유명해요.', '이 악기는 모양이 둥근 유명해요.', '이 악기는 모양이 둥글기로 유명했어요.'], answer: 0, explain: '“둥글다”라는 특징으로 유명하면 “둥글기로 유명해요”라고 합니다.' }
        ];

        let state = loadState() || createAttempt();
        let currentId = state.questionOrder[0];

        const questionList = document.getElementById('questionList');
        const questionNav = document.getElementById('questionNav');
        const answeredStat = document.getElementById('answeredStat');
        const scoreStat = document.getElementById('scoreStat');
        const totalStat = document.getElementById('totalStat');
        const progressBar = document.getElementById('progressBar');
        const saveBadge = document.getElementById('saveBadge');
        const balanceStat = document.getElementById('balanceStat');
        const attemptChip = document.getElementById('attemptChip');
        const submitBtn = document.getElementById('submitBtn');
        const newAttemptBtn = document.getElementById('newAttemptBtn');
        const resumeBtn = document.getElementById('resumeBtn');

        function shuffle(items) {
            const copy = [...items];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function balancedPositions(count) {
            const positions = [];
            for (let i = 0; i < count; i++) positions.push(i % 4);
            return shuffle(positions);
        }

        function createOptionOrder(question, desiredCorrectPosition) {
            const indices = question.choices.map((_, index) => index);
            const distractors = shuffle(indices.filter((index) => index !== question.answer));
            const order = [];
            for (let i = 0; i < question.choices.length; i++) {
                order[i] = i === desiredCorrectPosition ? question.answer : distractors.shift();
            }
            return order;
        }

        function createAttempt() {
            const questionOrder = questions.map((question) => question.id);
            const positions = balancedPositions(questionOrder.length);
            const optionOrders = {};
            questionOrder.forEach((id, index) => {
                const question = getQuestion(id);
                optionOrders[id] = createOptionOrder(question, positions[index]);
            });
            return {
                version: 1,
                attemptId: Date.now().toString(36),
                startedAt: Date.now(),
                updatedAt: Date.now(),
                submitted: false,
                questionOrder,
                optionOrders,
                answers: {}
            };
        }

        function getQuestion(id) {
            return questions.find((question) => question.id === id);
        }

        function validState(candidate) {
            if (!candidate || candidate.version !== 1) return false;
            if (!Array.isArray(candidate.questionOrder) || candidate.questionOrder.length !== questions.length) return false;
            return candidate.questionOrder.every((id) => getQuestion(id) && Array.isArray(candidate.optionOrders?.[id]));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return null;
                const parsed = JSON.parse(saved);
                return validState(parsed) ? parsed : null;
            } catch (error) {
                return null;
            }
        }

        function saveState() {
            state.updatedAt = Date.now();
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                saveBadge.className = 'badge is-save';
                saveBadge.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 자동저장됨';
            } catch (error) {
                saveBadge.className = 'badge is-warn';
                saveBadge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> 저장 실패';
            }
        }

        function correctOptionPosition(id) {
            const question = getQuestion(id);
            return state.optionOrders[id].findIndex((choiceIndex) => choiceIndex === question.answer);
        }

        function correctDistribution() {
            const counts = [0, 0, 0, 0];
            state.questionOrder.forEach((id) => {
                counts[correctOptionPosition(id)] += 1;
            });
            return counts;
        }

        function answeredCount() {
            return Object.keys(state.answers).filter((id) => state.answers[id] !== undefined).length;
        }

        function score() {
            return state.questionOrder.reduce((sum, id) => {
                const question = getQuestion(id);
                return sum + (state.answers[id] === question.answer ? 1 : 0);
            }, 0);
        }

        function renderMedia(question) {
            if (!question.media) return '';
            const caption = question.media.caption || '';
            const visual = question.media.type === 'image'
                ? `<img src="${question.media.src}" alt="${question.media.alt || caption}" />`
                : `<div class="q-media__emoji" aria-hidden="true">${question.media.symbol}</div>`;
            return `
                <figure class="q-media">
                    ${visual}
                    <figcaption>${caption}</figcaption>
                </figure>
            `;
        }

        function selectAnswer(id, choiceIndex) {
            if (state.submitted) return;
            state.answers[id] = choiceIndex;
            currentId = id;
            saveState();
            render();
        }

        function submitExam() {
            state.submitted = true;
            saveState();
            render();
            const firstWrong = state.questionOrder.find((id) => state.answers[id] !== getQuestion(id).answer);
            if (firstWrong) scrollToQuestion(firstWrong);
        }

        function newAttempt() {
            state = createAttempt();
            currentId = state.questionOrder[0];
            saveState();
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restoreAttempt() {
            state = loadState() || createAttempt();
            currentId = state.questionOrder.find((id) => state.answers[id] === undefined) || state.questionOrder[0];
            render();
            scrollToQuestion(currentId);
        }

        function scrollToQuestion(id) {
            document.getElementById(`q-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderStats() {
            const answered = answeredCount();
            const total = questions.length;
            totalStat.textContent = total;
            answeredStat.textContent = answered;
            scoreStat.textContent = state.submitted ? `${score()} / ${total}` : '-';
            progressBar.style.setProperty('--value', `${Math.round(answered / total * 100)}%`);
            balanceStat.textContent = correctDistribution().join('/');
            attemptChip.textContent = `저장 ${new Date(state.updatedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
            submitBtn.disabled = answered < total;
        }

        function optionClass(id, choiceIndex) {
            const question = getQuestion(id);
            const selected = state.answers[id] === choiceIndex;
            if (!state.submitted) return selected ? 'is-selected' : '';
            if (choiceIndex === question.answer) return 'is-correct';
            if (selected) return 'is-wrong';
            return '';
        }

        function renderQuestions() {
            questionList.innerHTML = state.questionOrder.map((id, index) => {
                const question = getQuestion(id);
                const selected = state.answers[id];
                const isCurrent = currentId === id;
                const feedbackVisible = state.submitted ? 'is-visible' : '';
                return `
                    <article class="question-card panel ${isCurrent ? 'is-current' : ''}" id="q-${id}">
                        <div class="q-head">
                            <span class="q-number">${index + 1}</span>
                            <span class="badge">${question.section}</span>
                            <span class="chip">${question.skill}</span>
                        </div>
                        <p class="q-prompt">${question.prompt}</p>
                        <p class="q-context">${question.context}</p>
                        ${renderMedia(question)}
                        <div class="options">
                            ${state.optionOrders[id].map((choiceIndex, optionIndex) => `
                                <button class="option ${optionClass(id, choiceIndex)}" type="button" data-question="${id}" data-choice="${choiceIndex}">
                                    <strong>${OPTION_LABELS[optionIndex]}</strong>
                                    <span>${question.choices[choiceIndex]}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="feedback ${feedbackVisible}">
                            ${selected === question.answer ? '정답입니다.' : `정답: ${question.choices[question.answer]}`} ${question.explain}
                        </div>
                    </article>
                `;
            }).join('');

            questionList.querySelectorAll('[data-question]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectAnswer(button.dataset.question, Number(button.dataset.choice));
                });
            });
        }

        function renderNav() {
            questionNav.innerHTML = state.questionOrder.map((id, index) => {
                const question = getQuestion(id);
                const answered = state.answers[id] !== undefined;
                const wrong = state.submitted && state.answers[id] !== question.answer;
                return `
                    <button class="nav-dot ${answered ? 'is-answered' : ''} ${currentId === id ? 'is-current' : ''} ${wrong ? 'is-wrong' : ''}" type="button" data-jump="${id}">
                        ${index + 1}
                    </button>
                `;
            }).join('');

            questionNav.querySelectorAll('[data-jump]').forEach((button) => {
                button.addEventListener('click', () => {
                    currentId = button.dataset.jump;
                    render();
                    scrollToQuestion(currentId);
                });
            });

            questionNav.querySelector('.is-current')?.scrollIntoView({ block: 'nearest', inline: 'center' });
        }

        function render() {
            renderStats();
            renderQuestions();
            renderNav();
            saveBadge.innerHTML = state.submitted
                ? '<i class="fa-solid fa-lock"></i> 채점 완료'
                : '<i class="fa-solid fa-cloud-arrow-up"></i> 자동저장됨';
        }

        submitBtn.addEventListener('click', submitExam);
        newAttemptBtn.addEventListener('click', newAttempt);
        resumeBtn.addEventListener('click', restoreAttempt);

        saveState();
        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
