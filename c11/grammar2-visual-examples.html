        const state = { index: 0 };
        const thumbList = document.getElementById("thumbList");
        const visualImage = document.getElementById("visualImage");
        const visualTitle = document.getElementById("visualTitle");
        const visualTag = document.getElementById("visualTag");
        const visualDescription = document.getElementById("visualDescription");
        const visualCaption = document.getElementById("visualCaption");
        const photoCount = document.getElementById("photoCount");
        const openPhoto = document.getElementById("openPhoto");
        const hintList = document.getElementById("hintList");
        const visualRevealBtn = document.getElementById("visualRevealBtn");
        const visualAnswerPanel = document.getElementById("visualAnswerPanel");
        const visualAnswerExamples = document.getElementById("visualAnswerExamples");
        const visualNote = document.getElementById("visualNote");

        function esc(text) {
            return String(text == null ? "" : text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderThumbs() {
            thumbList.innerHTML = photos.map(function (photo, index) {
                return '<button class="thumb-button" type="button" data-index="' + index + '" aria-label="' + photo.title + '" aria-current="' + (index === state.index ? "true" : "false") + '">' +
                    '<img src="' + THUMB_BASE + photo.thumb + '" alt="" width="320" height="175" loading="lazy" decoding="async" />' +
                    '<span class="thumb-copy"><span class="thumb-title">' + esc(photo.title) + '</span><span class="thumb-meta">' + esc(photo.tag) + '</span></span>' +
                '</button>';
            }).join("");

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                button.addEventListener("click", function () {
                    setActive(Number(button.dataset.index), true);
                });
            });
        }

        function setActive(index, updateHash) {
            state.index = (index + photos.length) % photos.length;
            const photo = photos[state.index];
            visualImage.src = PHOTO_BASE + photo.file;
            visualImage.alt = photo.alt;
            visualTitle.textContent = photo.title;
            visualTag.textContent = photo.tag;
            visualDescription.textContent = photo.description;
            visualCaption.textContent = "이미지 안에는 문장이 없습니다. 먼저 장면을 보고 어떤 조건문을 만들 수 있을지 떠올려 보세요.";
            photoCount.textContent = (state.index + 1) + " / " + photos.length;
            openPhoto.href = PHOTO_BASE + photo.file;
            renderHints(photo);
            renderAnswers(photo);
            setAnswerVisible(true);

            thumbList.querySelectorAll("[data-index]").forEach(function (button) {
                const current = Number(button.dataset.index) === state.index;
                button.setAttribute("aria-current", current ? "true" : "false");
            });

            if (updateHash && history.replaceState) {
                history.replaceState(null, "", "#" + photo.id);
            }
        }

        function renderHints(photo) {
            hintList.innerHTML = photo.hintChips.map(function (hint) {
                return '<span class="hint-chip">' + esc(hint) + '</span>';
            }).join("");
        }

        function renderAnswers(photo) {
            visualAnswerExamples.innerHTML = photo.examples.map(function (example) {
                return '<article class="answer-card">' +
                    '<div class="answer-label"><span>' + esc(example.label) + '</span><span class="pattern-chip">' + esc(example.pattern) + '</span></div>' +
                    '<p class="answer-sentence">' + esc(example.sentence) + '</p>' +
                    '<p class="answer-nuance">' + esc(example.nuance) + '</p>' +
                '</article>';
            }).join("");
            visualNote.textContent = photo.note;
        }

        function setAnswerVisible(isVisible) {
            visualAnswerPanel.hidden = !isVisible;
            visualRevealBtn.setAttribute("aria-expanded", isVisible ? "true" : "false");
            visualRevealBtn.innerHTML = '<i class="fa-solid ' + (isVisible ? "fa-eye-slash" : "fa-eye") + '" aria-hidden="true"></i>' + (isVisible ? "예문 숨기기" : "예문 보기");
        }

        function activeFromHash() {
            const hash = decodeURIComponent(window.location.hash.replace("#", ""));
            if (!hash || hash === "visualExamples") return 0;
            const matched = photos.findIndex(function (photo) { return photo.id === hash; });
            return matched >= 0 ? matched : 0;
        }

        document.getElementById("prevPhoto").addEventListener("click", function () {
            setActive(state.index - 1, true);
        });
        document.getElementById("nextPhoto").addEventListener("click", function () {
            setActive(state.index + 1, true);
        });
        visualRevealBtn.addEventListener("click", function () {
            setAnswerVisible(visualAnswerPanel.hidden);
        });
        window.addEventListener("hashchange", function () {
            setActive(activeFromHash(), false);
        });

        renderThumbs();
        setActive(activeFromHash(), false);
    </script>
