<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11과 어휘 문장 조립</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --surface-soft: #f1f5f9;
            --ink: #172033;
            --muted: #64748b;
            --line: #d9e2ef;
            --line-strong: #b8c7da;
            --accent: #e4582e;
            --accent-dark: #9a3412;
            --blue: #2563eb;
            --green: #16a34a;
            --red: #dc2626;
            --amber: #f59e0b;
            --shadow: 0 14px 34px rgba(15, 23, 42, 0.09);
            --shadow-sm: 0 8px 18px rgba(15, 23, 42, 0.07);
        }

        * { box-sizing: border-box; }
        [hidden] { display: none !important; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(180deg, #f8fafc 0%, #eef6ff 55%, #fff7ed 100%);
            color: var(--ink);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        button { font: inherit; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            padding: 0 14px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(12px);
        }

        .topbar a {
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .topbar__divider {
            color: #cbd5e1;
            font-weight: 900;
        }

        .shell {
            width: min(1440px, calc(100vw - 28px));
            margin: 14px auto 36px;
        }

        .game-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: stretch;
            gap: 12px;
            margin-bottom: 12px;
        }

        .title-panel,
        .metrics,
        .game-panel,
        .paragraph-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-sm);
        }

        .title-panel {
            min-height: 86px;
            padding: 16px 18px;
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--accent);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.15;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(92px, 1fr));
            gap: 8px;
            min-width: min(430px, 100%);
            padding: 10px;
        }

        .metric {
            display: grid;
            align-content: center;
            min-height: 66px;
            padding: 9px 10px;
            border: 1px solid #e8eef6;
            border-radius: 8px;
            background: #f8fafc;
        }

        .metric strong {
            font-size: 21px;
            font-weight: 900;
            line-height: 1.1;
        }

        .metric span {
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .game-layout {
            display: grid;
            grid-template-columns: minmax(300px, 0.92fr) minmax(360px, 1.08fr) minmax(320px, 0.98fr);
            gap: 12px;
            align-items: start;
        }

        .game-panel {
            min-width: 0;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 48px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
        }

        .panel-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            display: inline-grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
        }

        .icon-btn:hover,
        .icon-btn:focus-visible {
            border-color: #93c5fd;
            color: var(--blue);
            outline: none;
        }

        .icon-btn:disabled {
            cursor: not-allowed;
            opacity: 0.42;
            box-shadow: none;
        }

        .icon-btn.is-ready {
            border-color: #fbbf24;
            background: #fffbeb;
            color: #b45309;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.14);
        }

        .picture-body {
            display: grid;
            gap: 10px;
            padding: 12px;
        }

        .current-sentence-card {
            display: grid;
            gap: 9px;
            border: 2px solid #fed7aa;
            border-radius: 8px;
            background:
                linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
            padding: 13px 14px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.74), 0 10px 22px rgba(249, 115, 22, 0.08);
        }

        .current-sentence-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #9a3412;
            font-size: 11px;
            font-weight: 900;
        }

        .current-sentence-progress {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            min-height: 24px;
            border-radius: 999px;
            background: #ffedd5;
            color: #9a3412;
        }

        .current-sentence-card .sentence-text {
            font-size: clamp(16px, 2vw, 19px);
            line-height: 1.85;
        }

        .picture-stage {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 300px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(135deg, #ffffff 0%, #f8fafc 44%, #eff6ff 100%);
            overflow: hidden;
        }

        .picture-stage.is-hot {
            border-color: #f97316;
            background:
                linear-gradient(135deg, #fff7ed 0%, #ffffff 48%, #eff6ff 100%);
            box-shadow: inset 0 0 0 3px rgba(249, 115, 22, 0.12), 0 12px 22px rgba(249, 115, 22, 0.12);
        }

        .picture-stage img {
            display: block;
            width: 100%;
            max-height: 292px;
            object-fit: contain;
            padding: 14px;
            pointer-events: none;
        }

        .complete-visual {
            display: grid;
            place-items: center;
            gap: 12px;
            min-height: 220px;
            color: #166534;
            font-size: 22px;
            font-weight: 900;
            pointer-events: none;
        }

        .complete-visual i {
            display: grid;
            place-items: center;
            width: 76px;
            height: 76px;
            border: 3px solid #86efac;
            border-radius: 999px;
            background: #dcfce7;
            font-size: 36px;
        }

        .picture-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 30px;
            padding: 0 10px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            background: rgba(239, 246, 255, 0.95);
            color: #1d4ed8;
            font-size: 11px;
            font-weight: 900;
            pointer-events: none;
        }

        .drop-zone {
            display: grid;
            place-items: center;
            min-height: 74px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #475569;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.35;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .drop-zone.is-hot,
        .drop-zone:focus-visible {
            border-color: #f97316;
            background: #fff7ed;
            color: #9a3412;
            outline: none;
            transform: translateY(-1px);
        }

        .drop-zone.is-correct {
            border-style: solid;
            border-color: #22c55e;
            background: #dcfce7;
            color: #166534;
        }

        .feedback {
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
            padding: 10px 12px;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback.is-correct {
            border-color: #86efac;
            background: #f0fdf4;
            color: #166534;
        }

        .feedback.is-wrong {
            border-color: #fecdd3;
            background: #fff1f2;
            color: #be123c;
        }

        .word-bank {
            display: grid;
            align-content: flex-start;
            gap: 12px;
            min-height: 450px;
            padding: 16px;
            background:
                linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }

        .word-group {
            display: grid;
            gap: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
        }

        .word-group.is-active {
            border-color: #f59e0b;
            background: #fffbeb;
            box-shadow: inset 4px 0 0 #f59e0b;
        }

        .word-group.is-complete {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .word-group__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
        }

        .word-group__head span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            min-height: 24px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #475569;
            font-size: 11px;
        }

        .word-group.is-active .word-group__head span {
            background: #fed7aa;
            color: #9a3412;
        }

        .word-group.is-complete .word-group__head span {
            background: #bbf7d0;
            color: #166534;
        }

        .word-group__chips {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 9px;
        }

        .word-chip {
            --tilt: 0deg;
            --lift: 0px;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            max-width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #1e293b;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 900;
            word-break: keep-all;
            cursor: grab;
            touch-action: manipulation;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
            transform: translateY(var(--lift)) rotate(var(--tilt));
            transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease, opacity 140ms ease;
        }

        .word-chip:hover,
        .word-chip:focus-visible,
        .word-chip.is-selected {
            border-color: #f97316;
            background: #fff7ed;
            color: #9a3412;
            outline: none;
            transform: translateY(calc(var(--lift) - 2px)) rotate(0deg);
        }

        .word-chip:active {
            cursor: grabbing;
        }

        .word-chip.is-used {
            opacity: 0.28;
            cursor: default;
            text-decoration: line-through;
            transform: none;
        }

        .word-chip.is-dragging {
            opacity: 0.72;
        }

        .word-chip.is-hint:not(.is-used) {
            border-color: #f59e0b;
            background: #fffbeb;
            color: #92400e;
            animation: hintWiggle 760ms ease-in-out infinite;
        }

        .text-body {
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .sentence-list,
        .paragraph-list {
            display: grid;
            gap: 8px;
        }

        .sentence-row {
            display: grid;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            padding: 12px;
        }

        .sentence-row.is-complete {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .sentence-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .sentence-progress {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            min-height: 24px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #475569;
        }

        .sentence-row.is-complete .sentence-progress {
            background: #bbf7d0;
            color: #166534;
        }

        .sentence-text {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            line-height: 1.8;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .blank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 76px;
            min-height: 30px;
            margin: 0 2px;
            border: 1px solid #bfdbfe;
            border-bottom: 3px solid #2563eb;
            border-radius: 8px;
            background: #eff6ff;
            color: #1d4ed8;
            padding: 0 8px;
            vertical-align: middle;
            font-size: 13px;
            font-weight: 900;
            white-space: normal;
        }

        button.blank {
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }

        button.blank:hover,
        button.blank:focus-visible {
            outline: none;
            border-color: #f97316;
            background: #fff7ed;
            color: #9a3412;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
        }

        .blank.is-filled {
            border-color: #fed7aa;
            border-bottom-color: #f97316;
            background: #fff7ed;
            color: #9a3412;
        }

        .blank.is-target {
            border-color: #2563eb;
            border-bottom-color: #f97316;
            background: linear-gradient(135deg, #2563eb 0%, #f97316 100%);
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12), 0 10px 20px rgba(249, 115, 22, 0.22);
            animation: targetPulse 960ms ease-in-out infinite;
        }

        .blank.is-drop-hot {
            border-color: #22c55e;
            border-bottom-color: #16a34a;
            background: #dcfce7;
            color: #166534;
            box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.18), 0 12px 22px rgba(22, 163, 74, 0.16);
        }

        .paragraph-panel {
            overflow: hidden;
        }

        .paragraph-body {
            display: grid;
            gap: 8px;
            padding: 12px;
            background: #f8fafc;
        }

        .text-group {
            display: grid;
            gap: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
            padding: 10px;
        }

        .text-group.is-active {
            border-color: #f59e0b;
            background: #fffbeb;
        }

        .text-group.is-complete {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .text-group__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
        }

        .text-group__head span {
            color: #64748b;
            font-size: 11px;
        }

        .text-group__list {
            display: grid;
            gap: 8px;
        }

        .paragraph-slot {
            min-height: 56px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            padding: 11px 12px;
            color: #64748b;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.55;
            word-break: keep-all;
            text-align: left;
            cursor: pointer;
        }

        button.paragraph-slot {
            width: 100%;
            font-family: inherit;
        }

        button.paragraph-slot:hover,
        button.paragraph-slot:focus-visible {
            outline: none;
            border-style: solid;
            border-color: #93c5fd;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .paragraph-slot.is-filled {
            border-style: solid;
            border-color: #86efac;
            background: #f0fdf4;
            color: #172033;
            animation: settle 360ms ease both;
        }

        .paragraph-slot.is-active {
            border-style: solid;
            border-color: #fbbf24;
            background: #fffbeb;
            color: #92400e;
            box-shadow: inset 4px 0 0 #f59e0b;
        }

        .paragraph-slot.is-rewarding {
            position: relative;
            border-color: #f59e0b;
            background:
                radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.95) 0 9%, transparent 10%),
                linear-gradient(135deg, #fef3c7 0%, #dcfce7 48%, #dbeafe 100%);
            color: #172033;
            overflow: hidden;
            animation: treasureSlot 1450ms ease both;
        }

        .paragraph-slot.is-rewarding::before,
        .paragraph-slot.is-rewarding::after {
            content: "";
            position: absolute;
            inset: -40%;
            pointer-events: none;
        }

        .paragraph-slot.is-rewarding::before {
            background:
                conic-gradient(from 0deg, transparent 0 12%, rgba(255, 255, 255, 0.92) 15%, transparent 20% 33%, rgba(250, 204, 21, 0.78) 36%, transparent 41% 64%, rgba(59, 130, 246, 0.42) 68%, transparent 74%);
            animation: rewardSpin 1200ms ease-out both;
        }

        .paragraph-slot.is-rewarding::after {
            background:
                radial-gradient(circle at 22% 28%, #ffffff 0 2px, transparent 3px),
                radial-gradient(circle at 66% 20%, #facc15 0 3px, transparent 4px),
                radial-gradient(circle at 84% 58%, #60a5fa 0 2px, transparent 3px),
                radial-gradient(circle at 35% 78%, #34d399 0 2px, transparent 3px);
            animation: sparklePop 1000ms ease-out both;
        }

        .reward-card {
            position: fixed;
            z-index: 80;
            display: grid;
            gap: 8px;
            pointer-events: none;
            border: 2px solid #fbbf24;
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 251, 235, 0.98) 0%, rgba(255, 255, 255, 0.98) 46%, rgba(239, 246, 255, 0.98) 100%);
            color: #172033;
            padding: 13px 14px;
            box-shadow:
                0 0 0 5px rgba(251, 191, 36, 0.15),
                0 28px 56px rgba(15, 23, 42, 0.26);
            transform-origin: center;
            overflow: hidden;
        }

        .reward-card::before {
            content: "";
            position: absolute;
            inset: -35%;
            background:
                linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.88) 45%, transparent 60%);
            animation: rewardSweep 900ms ease-in-out infinite;
        }

        .reward-card__badge,
        .reward-card__text {
            position: relative;
            z-index: 1;
        }

        .reward-card__badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: max-content;
            border-radius: 999px;
            background: #fffbeb;
            color: #b45309;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 900;
        }

        .reward-card__badge i {
            color: #2563eb;
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.35));
        }

        .reward-card__text {
            margin: 0;
            font-size: clamp(14px, 1.8vw, 18px);
            font-weight: 900;
            line-height: 1.65;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .reward-burst {
            position: fixed;
            z-index: 79;
            width: 220px;
            height: 220px;
            pointer-events: none;
            border-radius: 50%;
            background:
                radial-gradient(circle, rgba(255, 255, 255, 0.98) 0 8%, rgba(254, 243, 199, 0.86) 9% 16%, transparent 18%),
                conic-gradient(from 0deg, transparent 0 6%, rgba(250, 204, 21, 1) 8% 12%, transparent 13% 22%, rgba(37, 99, 235, 0.8) 24% 29%, transparent 30% 43%, rgba(52, 211, 153, 0.86) 46% 51%, transparent 52% 68%, rgba(249, 115, 22, 0.92) 71% 77%, transparent 78%),
                radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
                radial-gradient(circle at 78% 34%, rgba(250, 204, 21, 0.95) 0 3px, transparent 4px),
                radial-gradient(circle at 48% 84%, rgba(96, 165, 250, 0.9) 0 3px, transparent 4px);
            transform: translate(-50%, -50%) scale(0.18);
            animation: rewardBurst 1120ms ease-out both;
        }

        .paragraph-column .completion-banner {
            margin: 0 12px 12px;
        }

        .completion-banner {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-height: 56px;
            border: 2px solid #22c55e;
            border-radius: 8px;
            background: #dcfce7;
            color: #166534;
            font-size: 17px;
            font-weight: 900;
        }

        .completion-banner.is-visible {
            display: flex;
            animation: settle 360ms ease both;
        }

        @keyframes settle {

        }

        function currentSentence() {
            return sentenceById.get(state.viewSentenceId) || null;
        }

        function sentencesForText(text) {
            return text.sentenceIds.map((id) => sentenceById.get(id)).filter(Boolean);
        }

        function textSlots(text) {
            return sentencesForText(text).flatMap(sentenceSlots);
        }

        function isTextComplete(text) {
            return textSlots(text).every((slot) => state.matched.has(slot.wordId));
        }

        function activeTextId() {
            const slot = currentSlot();
            if (slot?.textId) return slot.textId;
            const sentence = currentSentence();
            return sentence?.textId || TEXTS[0].id;
        }

        function textWordIds(text) {
            return new Set(textSlots(text).map((slot) => slot.wordId));
        }

        function isSentenceComplete(sentence) {
            return sentenceSlots(sentence).every((slot) => state.matched.has(slot.wordId));
        }

        function completedSentenceText(sentence) {
            return sentence.parts.map((part) => {
                if (typeof part === "string") return part;
                return part.display;
            }).join("");
        }

        function setFeedback(message, mode) {
            els.feedback.textContent = message;
            els.feedback.classList.toggle("is-correct", mode === "correct");
            els.feedback.classList.toggle("is-wrong", mode === "wrong");
        }

        function firstUnmatchedSlot() {
            return orderedSlots.find((slot) => !state.matched.has(slot.wordId)) || null;
        }

        function firstUnmatchedSlotInSentence(sentenceId) {
            return orderedSlots.find((slot) => slot.sentenceId === sentenceId && !state.matched.has(slot.wordId)) || null;
        }

        function firstUnmatchedSlotAfter(wordId) {
            const current = orderedSlotByWordId.get(wordId);
            const startIndex = current ? current.index : -1;
            return orderedSlots.find((slot) => slot.index > startIndex && !state.matched.has(slot.wordId))
                || firstUnmatchedSlot();
        }

        function unmatchedSlotByDelta(delta) {
            const unmatched = orderedSlots.filter((slot) => !state.matched.has(slot.wordId));
            if (!unmatched.length) return null;
            const currentIndex = state.currentWordId
                ? unmatched.findIndex((slot) => slot.wordId === state.currentWordId)
                : -1;
            const baseIndex = currentIndex >= 0 ? currentIndex : 0;
            return unmatched[(baseIndex + delta + unmatched.length) % unmatched.length];
        }

        function validateBankOrder(order) {
            if (!Array.isArray(order) || order.length !== WORDS.length) return null;
            const validIds = new Set(WORDS.map((word) => word.id));
            const seen = new Set();
            for (const id of order) {
                if (!validIds.has(id) || seen.has(id)) return null;
                seen.add(id);
            }
            return order;
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    matched: [...state.matched],
                    selectedWordId: state.selectedWordId,
                    attempts: state.attempts,
                    bankOrder: state.bankOrder,
                    currentWordId: state.currentWordId,
                    viewSentenceId: state.viewSentenceId
                }));
            } catch (error) {
                // 저장 공간이 막힌 환경에서도 게임은 계속 진행됩니다.
            }
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                const validWordIds = new Set(WORDS.map((word) => word.id));
                const validSentenceIds = new Set(SENTENCES.map((sentence) => sentence.id));
                state.matched = new Set((Array.isArray(data.matched) ? data.matched : []).filter((id) => validWordIds.has(id)));
                state.selectedWordId = validWordIds.has(data.selectedWordId) && !state.matched.has(data.selectedWordId) ? data.selectedWordId : null;
                state.attempts = Number.isInteger(data.attempts) && data.attempts >= 0 ? data.attempts : 0;
                state.bankOrder = validateBankOrder(data.bankOrder) || shuffle(WORDS.map((word) => word.id));
                state.currentWordId = validWordIds.has(data.currentWordId) && !state.matched.has(data.currentWordId) ? data.currentWordId : null;
                state.viewSentenceId = validSentenceIds.has(data.viewSentenceId) ? data.viewSentenceId : SENTENCES[0].id;
                return true;
            } catch (error) {
                return false;
            }
        }

        function clearProgress() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (error) {
                // 저장소 접근이 막혀도 초기화 UI는 유지합니다.
            }
        }

        function normalizeCurrentPosition() {
            if (state.currentWordId && !state.matched.has(state.currentWordId)) {
                const slot = orderedSlotByWordId.get(state.currentWordId);
                if (slot) {
                    state.viewSentenceId = slot.sentenceId;
                    return;
                }
            }

            const next = firstUnmatchedSlotInSentence(state.viewSentenceId) || firstUnmatchedSlot();
            state.currentWordId = next ? next.wordId : null;
            if (next) state.viewSentenceId = next.sentenceId;
            if (!next && !sentenceById.has(state.viewSentenceId)) {
                state.viewSentenceId = SENTENCES[SENTENCES.length - 1].id;
            }
        }

        function hintCandidateIds() {
            const task = currentTask();
            if (!task) return new Set();
            const group = WORD_GROUPS[task.id];
            const sentence = currentSentence();
            const textIds = textWordIds(textById.get(activeTextId()) || TEXTS[0]);
            const candidates = [task.id];

            WORDS.forEach((word) => {
                if (word.id !== task.id && WORD_GROUPS[word.id] === group && textIds.has(word.id) && !state.matched.has(word.id)) {
                    candidates.push(word.id);
                }
            });

            if (sentence) {
                sentenceSlots(sentence).forEach((slot) => {
                    if (slot.wordId !== task.id && !state.matched.has(slot.wordId)) candidates.push(slot.wordId);
                });
            }

            return new Set(candidates.filter((id, index, array) => array.indexOf(id) === index).slice(0, 4));
        }

        function renderHintButton() {
            const canHint = Boolean(currentTask());
            els.hintBtn.disabled = !canHint || !state.hintReady;
            els.hintBtn.classList.toggle("is-ready", canHint && state.hintReady);
            els.hintBtn.title = canHint
                ? (state.hintReady ? "힌트 보기" : "10초 후 힌트")
                : "선택할 빈칸이 없습니다";
            els.hintBtn.setAttribute("aria-label", state.hintReady ? "힌트 보기" : "10초 후 힌트");
        }

        function restartHintTimer() {
            if (hintTimer) window.clearTimeout(hintTimer);
            hintTimer = null;
            state.hintReady = false;
            state.hintActive = false;
            renderHintButton();
            if (!currentTask()) return;

            hintTimer = window.setTimeout(() => {
                state.hintReady = true;
                state.hintActive = true;
                renderBank();
                renderHintButton();
                setFeedback("힌트가 켜졌습니다. 살짝 움직이는 후보를 보세요.", "");
            }, 10000);
        }

        function renderTask() {
            const task = currentTask();
            if (!task) {
                els.pictureCounter.textContent = `${state.matched.size} / ${orderedSlots.length}`;
                els.taskImage.removeAttribute("src");
                els.taskImage.alt = isAllComplete() ? "두 글 완성" : "문장 완성";
                els.taskImage.hidden = true;
                els.completeVisual.hidden = false;
                const completeText = els.completeVisual.querySelector("span");
                if (completeText) completeText.textContent = isAllComplete() ? "두 글 완성" : "문장 완성";
                els.dropZone.textContent = isAllComplete() ? "완성" : "빈칸을 선택하세요";
                els.dropZone.classList.toggle("is-correct", isAllComplete());
                return;
            }

            const slot = orderedSlotByWordId.get(task.id);
            els.pictureCounter.textContent = `${slot.index + 1} / ${orderedSlots.length}`;
            els.taskImage.src = task.image;
            els.taskImage.alt = `${task.term} 그림`;
            els.taskImage.hidden = false;
            els.completeVisual.hidden = true;
            els.dropZone.textContent = state.selectedWordId
                ? `${wordById.get(state.selectedWordId).term} 선택됨`
                : "표현 후보를 여기에 놓기";
            els.dropZone.classList.remove("is-correct");
        }

        function renderBank() {
            const order = state.bankOrder.length ? state.bankOrder : WORDS.map((word) => word.id);
            const hintIds = state.hintActive ? hintCandidateIds() : new Set();
            const activeId = activeTextId();
            els.wordBank.innerHTML = TEXTS.map((text) => {
                const ids = textWordIds(text);
                const groupOrder = order.filter((id) => ids.has(id));
                const usedCount = groupOrder.filter((id) => state.matched.has(id)).length;
                const complete = usedCount === groupOrder.length;
                const chips = groupOrder.map((id, index) => {
                    const word = wordById.get(id);
                    const used = state.matched.has(id);
                    const selected = state.selectedWordId === id;
                    return `
                        <button
                            class="word-chip${used ? " is-used" : ""}${selected ? " is-selected" : ""}${hintIds.has(id) ? " is-hint" : ""}"
                            type="button"
                            draggable="${used ? "false" : "true"}"
                            data-word-id="${escapeHtml(id)}"
                            style="--tilt:${tiltValues[index % tiltValues.length]}deg; --lift:${liftValues[index % liftValues.length]}px"
                            ${used ? "disabled" : ""}
                        >${escapeHtml(word.term)}</button>
                    `;
                }).join("");

                return `
                    <section class="word-group${text.id === activeId ? " is-active" : ""}${complete ? " is-complete" : ""}" aria-label="${escapeHtml(text.title)} 후보">
                        <div class="word-group__head">
                            <strong>${escapeHtml(text.title)} 후보</strong>
                            <span>${usedCount}/${groupOrder.length}</span>
                        </div>
                        <div class="word-group__chips">${chips}</div>
                    </section>
                `;
            }).join("");
        }

        function renderCurrentSentence() {
            const task = currentTask();
            const sentence = currentSentence();
            if (!sentence) {
                els.currentSentenceCard.innerHTML = `
                    <div class="current-sentence-meta">
                        <span>두 글 완성</span>
                        <span class="current-sentence-progress">${SENTENCES.length}/${SENTENCES.length}</span>
                    </div>
                    <p class="sentence-text">두 글의 모든 문장이 완성되었습니다.</p>
                `;
                return;
            }

            const ownedSlots = sentenceSlots(sentence);
            const done = ownedSlots.filter((slot) => state.matched.has(slot.wordId)).length;
            const text = textById.get(sentence.textId) || TEXTS[0];
            const sentenceIndex = sentencesForText(text).findIndex((item) => item.id === sentence.id);
            const html = sentence.parts.map((part) => {
                if (typeof part === "string") return escapeHtml(part);
                const isFilled = state.matched.has(part.wordId);
                const isTarget = task && !isFilled && part.wordId === task.id;
                const label = isFilled ? part.display : "____";
                if (isFilled) {
                    return `<span class="blank is-filled" data-slot="${escapeHtml(part.wordId)}">${escapeHtml(label)}</span>`;
                }
                return `<button class="blank${isTarget ? " is-target" : ""}" type="button" data-slot="${escapeHtml(part.wordId)}" aria-label="${escapeHtml(part.display)} 자리 선택">${escapeHtml(label)}</button>`;
            }).join("");

            els.currentSentenceCard.innerHTML = `
                <div class="current-sentence-meta">
                    <span>${escapeHtml(text.title)} · ${sentenceIndex + 1}. ${escapeHtml(sentence.title)}</span>
                    <span class="current-sentence-progress">${done}/${ownedSlots.length}</span>
                </div>
                <p class="sentence-text">${html}</p>
            `;
        }

        function renderParagraph() {
            const activeSlot = currentSlot();
            const activeId = activeTextId();
            els.paragraphList.innerHTML = TEXTS.map((text) => {
                const sentences = sentencesForText(text);
                const textOwnedSlots = textSlots(text);
                const doneInText = textOwnedSlots.filter((slot) => state.matched.has(slot.wordId)).length;
                const completeText = isTextComplete(text);
                const sentenceButtons = sentences.map((sentence, index) => {
                    const ownedSlots = sentenceSlots(sentence);
                    const done = ownedSlots.filter((slot) => state.matched.has(slot.wordId)).length;
                    const complete = isSentenceComplete(sentence);
                    const active = state.viewSentenceId === sentence.id || activeSlot?.sentenceId === sentence.id;
                    const sentenceText = complete
                        ? completedSentenceText(sentence)
                        : (active ? `${index + 1}. ${sentence.title} 조립 중 (${done}/${ownedSlots.length})` : `${index + 1}번 문장 대기`);
                    return `<button class="paragraph-slot${complete ? " is-filled" : ""}${active ? " is-active" : ""}" type="button" data-sentence-id="${escapeHtml(sentence.id)}">${escapeHtml(sentenceText)}</button>`;
                }).join("");

                return `
                    <section class="text-group${text.id === activeId ? " is-active" : ""}${completeText ? " is-complete" : ""}">
                        <div class="text-group__head">
                            <strong>${escapeHtml(text.title)}</strong>
                            <span>${doneInText}/${textOwnedSlots.length}</span>
                        </div>
                        <div class="text-group__list">${sentenceButtons}</div>
                    </section>
                `;
            }).join("");
        }

        function triggerSentenceReward(sentence, sourceRect) {
            const destination = els.paragraphList.querySelector(`[data-sentence-id="${CSS.escape(sentence.id)}"]`);
            if (!destination || !sourceRect) return;

            const destRect = destination.getBoundingClientRect();
            const width = Math.max(220, Math.min(sourceRect.width, 520));
            const height = Math.max(100, Math.min(sourceRect.height, 210));
            const startLeft = sourceRect.left + (sourceRect.width - width) / 2;
            const startTop = sourceRect.top + (sourceRect.height - height) / 2;
            const endLeft = destRect.left + (destRect.width - width) / 2;
            const endTop = destRect.top + (destRect.height - height) / 2;
            const dx = endLeft - startLeft;
            const dy = endTop - startTop;

            const card = document.createElement("div");
            card.className = "reward-card";
            card.style.left = `${startLeft}px`;
            card.style.top = `${startTop}px`;
            card.style.width = `${width}px`;
            card.style.minHeight = `${height}px`;
            card.innerHTML = `
                <span class="reward-card__badge"><i class="fa-solid fa-gem"></i> 문장 완성</span>
                <p class="reward-card__text">${escapeHtml(completedSentenceText(sentence))}</p>
            `;
            document.body.appendChild(card);

            let impactPlayed = false;
            function playImpact() {
                if (impactPlayed) return;
                impactPlayed = true;

                const impactTarget = els.paragraphList.querySelector(`[data-sentence-id="${CSS.escape(sentence.id)}"]`) || destination;
                const impactRect = impactTarget.getBoundingClientRect();
                const burst = document.createElement("div");
                burst.className = "reward-burst";
                burst.style.left = `${impactRect.left + impactRect.width / 2}px`;
                burst.style.top = `${impactRect.top + impactRect.height / 2}px`;
                document.body.appendChild(burst);

                impactTarget.classList.add("is-rewarding");

                const impact = card.animate([
                    { transform: `translate(${dx}px, ${dy}px) scale(0.52)`, opacity: 0.98, filter: "brightness(1.55)" },
                    { transform: `translate(${dx}px, ${dy}px) scale(0.32)`, opacity: 0, filter: "brightness(2)" }
                ], {
                    duration: 180,
                    easing: "cubic-bezier(.18, .9, .22, 1)",
                    fill: "forwards"
                });

                window.setTimeout(() => {
                    impactTarget.classList.remove("is-rewarding");
                }, 1500);

                window.setTimeout(() => {
                    burst.remove();
                }, 1150);

                impact.finished.then(() => {
                    card.remove();
                }).catch(() => {
                    card.remove();
                });
            }

            const travelDuration = 1180;
            const travel = card.animate([
                { transform: "translate(0, 0) scale(0.96)", opacity: 0, filter: "brightness(1)" },
                { transform: "translate(0, -18px) scale(1.14)", opacity: 1, filter: "brightness(1.2)", offset: 0.18 },
                { transform: `translate(${dx * 0.58}px, ${dy * 0.58 - 20}px) scale(1.08)`, opacity: 1, filter: "brightness(1.24)", offset: 0.66 },
                { transform: `translate(${dx * 0.92}px, ${dy * 0.92 - 4}px) scale(0.72)`, opacity: 1, filter: "brightness(1.35)", offset: 0.9 },
                { transform: `translate(${dx}px, ${dy}px) scale(0.52)`, opacity: 0.98, filter: "brightness(1.55)" }
            ], {
                duration: travelDuration,
                easing: "cubic-bezier(.16, .84, .22, 1)",
                fill: "forwards"
            });

            travel.finished.then(() => {
                playImpact();
            }).catch(() => {
                playImpact();
            });
            window.setTimeout(playImpact, travelDuration + 120);
        }

        function renderMetrics() {
            const sentenceDone = SENTENCES.filter(isSentenceComplete).length;
            els.matchedCount.textContent = `${state.matched.size} / ${WORDS.length}`;
            els.sentenceCount.textContent = `${sentenceDone} / ${SENTENCES.length}`;
            els.attemptCount.textContent = String(state.attempts);
            els.completionBanner.classList.toggle("is-visible", state.matched.size === WORDS.length);
        }

        function renderAll() {
            renderMetrics();
            renderTask();
            renderBank();
            renderCurrentSentence();
            renderParagraph();
            renderHintButton();
        }

        function setCurrentSlot(slot, message) {
            if (!slot) return;
            state.currentWordId = slot.wordId;
            state.viewSentenceId = slot.sentenceId;
            state.selectedWordId = null;
            saveProgress();
            renderAll();
            restartHintTimer();
            if (message) setFeedback(message, "");
        }

        function selectSentence(sentenceId) {
            if (!sentenceById.has(sentenceId)) return;
            const slot = firstUnmatchedSlotInSentence(sentenceId);
            state.viewSentenceId = sentenceId;
            state.selectedWordId = null;
            if (slot) {
                state.currentWordId = slot.wordId;
                saveProgress();
                renderAll();
                restartHintTimer();
                setFeedback(`${SENTENCES.find((sentence) => sentence.id === sentenceId).title} 문장으로 이동했습니다.`, "");
                return;
            }

            state.currentWordId = null;
            saveProgress();
            renderAll();
            restartHintTimer();
            setFeedback("이미 완성된 문장입니다. 다른 글의 문장도 선택할 수 있습니다.", "correct");
        }

        function tryAnswer(wordId) {
            const task = currentTask();
            if (!task) {
                setFeedback("먼저 빈칸을 선택하세요.", "wrong");
                return;
            }
            if (!wordId || state.matched.has(wordId)) return;

            state.attempts += 1;

            if (wordId !== task.id) {
                const selected = wordById.get(wordId);
                state.selectedWordId = null;
                state.hintReady = false;
                state.hintActive = false;
                saveProgress();
                renderAll();
                setFeedback(`‘${selected.term}’은 다른 그림에 어울립니다.`, "wrong");
                restartHintTimer();
                return;
            }

            const word = wordById.get(wordId);
            const slot = orderedSlotByWordId.get(wordId);
            const sentence = sentenceById.get(slot.sentenceId);
            const wasSentenceComplete = isSentenceComplete(sentence);
            const sourceRect = els.currentSentenceCard.getBoundingClientRect();
            state.matched.add(wordId);
            const nextSlot = firstUnmatchedSlotAfter(wordId);
            state.selectedWordId = null;
            state.currentWordId = nextSlot ? nextSlot.wordId : null;
            state.viewSentenceId = nextSlot ? nextSlot.sentenceId : sentence.id;
            state.hintReady = false;
            state.hintActive = false;
            saveProgress();
            renderAll();

            if (!wasSentenceComplete && isSentenceComplete(sentence)) {
                setFeedback(`‘${sentence.title}’ 문장이 완성되었습니다.`, "correct");
                window.requestAnimationFrame(() => triggerSentenceReward(sentence, sourceRect));
            } else {
                setFeedback(`‘${word.term}’ 표현이 문장에 들어갔습니다.`, "correct");
            }
            restartHintTimer();
        }

        function selectWord(wordId) {
            if (state.matched.has(wordId)) return;
            state.selectedWordId = state.selectedWordId === wordId ? null : wordId;
            saveProgress();
            renderAll();
        }

        function moveTask(delta) {
            const slot = unmatchedSlotByDelta(delta);
            if (slot) setCurrentSlot(slot);
        }

        function resetGame() {
            if (hintTimer) window.clearTimeout(hintTimer);
            hintTimer = null;
            clearProgress();
            state.matched.clear();
            state.selectedWordId = null;
            state.attempts = 0;
            state.bankOrder = shuffle(WORDS.map((word) => word.id));
            state.currentWordId = orderedSlots[0].wordId;
            state.viewSentenceId = orderedSlots[0].sentenceId;
            state.hintReady = false;
            state.hintActive = false;
            saveProgress();
            setFeedback("그림에 맞는 표현을 고르세요.", "");
            renderAll();
            restartHintTimer();
        }

        function initGame() {
            if (!loadProgress()) {
                state.bankOrder = shuffle(WORDS.map((word) => word.id));
                state.currentWordId = orderedSlots[0].wordId;
                state.viewSentenceId = orderedSlots[0].sentenceId;
                saveProgress();
            }
            normalizeCurrentPosition();
            renderAll();
            restartHintTimer();
        }

        function draggedWordId(event) {
            return event.dataTransfer?.getData("text/plain") || state.selectedWordId;
        }

        function clearDropHighlights() {
            els.dropZone.classList.remove("is-hot");
            els.pictureStage.classList.remove("is-hot");
            els.currentSentenceCard.querySelectorAll(".blank.is-drop-hot").forEach((blank) => {
                blank.classList.remove("is-drop-hot");
            });
        }

        function dropWordOnSlot(wordId, slotId) {
            const slot = orderedSlotByWordId.get(slotId);
            if (!wordId || !slot || state.matched.has(slot.wordId)) return;
            state.currentWordId = slot.wordId;
            state.viewSentenceId = slot.sentenceId;
            tryAnswer(wordId);
        }

        els.wordBank.addEventListener("click", (event) => {
            const chip = event.target.closest(".word-chip");
            if (!chip) return;
            selectWord(chip.dataset.wordId);
        });

        els.wordBank.addEventListener("dragstart", (event) => {
            const chip = event.target.closest(".word-chip");
            if (!chip || chip.disabled) return;
            event.dataTransfer.setData("text/plain", chip.dataset.wordId);
            event.dataTransfer.effectAllowed = "move";
            chip.classList.add("is-dragging");
        });

        els.wordBank.addEventListener("dragend", (event) => {
            const chip = event.target.closest(".word-chip");
            if (chip) chip.classList.remove("is-dragging");
        });

        els.currentSentenceCard.addEventListener("click", (event) => {
            const blank = event.target.closest(".blank");
            if (!blank || !blank.dataset.slot) return;
            const slot = orderedSlotByWordId.get(blank.dataset.slot);
            if (!slot || state.matched.has(slot.wordId)) return;
            if (state.selectedWordId) {
                dropWordOnSlot(state.selectedWordId, slot.wordId);
                return;
            }
            setCurrentSlot(slot, "선택한 빈칸으로 이동했습니다.");
        });

        els.currentSentenceCard.addEventListener("dragover", (event) => {
            const blank = event.target.closest(".blank");
            if (!blank || !blank.dataset.slot || state.matched.has(blank.dataset.slot)) return;
            event.preventDefault();
            els.currentSentenceCard.querySelectorAll(".blank.is-drop-hot").forEach((item) => {
                if (item !== blank) item.classList.remove("is-drop-hot");
            });
            blank.classList.add("is-drop-hot");
        });

        els.currentSentenceCard.addEventListener("dragleave", (event) => {
            const blank = event.target.closest(".blank");
            if (blank) blank.classList.remove("is-drop-hot");
        });

        els.currentSentenceCard.addEventListener("drop", (event) => {
            const blank = event.target.closest(".blank");
            if (!blank || !blank.dataset.slot) return;
            event.preventDefault();
            clearDropHighlights();
            dropWordOnSlot(draggedWordId(event), blank.dataset.slot);
        });

        els.paragraphList.addEventListener("click", (event) => {
            const paragraph = event.target.closest(".paragraph-slot");
            if (!paragraph || !paragraph.dataset.sentenceId) return;
            selectSentence(paragraph.dataset.sentenceId);
        });

        els.dropZone.addEventListener("click", () => {
            tryAnswer(state.selectedWordId);
        });

        els.dropZone.addEventListener("dragover", (event) => {
            event.preventDefault();
            els.dropZone.classList.add("is-hot");
        });

        els.dropZone.addEventListener("dragleave", () => {
            els.dropZone.classList.remove("is-hot");
        });

        els.dropZone.addEventListener("drop", (event) => {
            event.preventDefault();
            clearDropHighlights();
            tryAnswer(draggedWordId(event));
        });

        els.pictureStage.addEventListener("dragover", (event) => {
            if (!currentTask()) return;
            event.preventDefault();
            els.pictureStage.classList.add("is-hot");
        });

        els.pictureStage.addEventListener("dragleave", () => {
            els.pictureStage.classList.remove("is-hot");
        });

        els.pictureStage.addEventListener("drop", (event) => {
            event.preventDefault();
            clearDropHighlights();
            tryAnswer(draggedWordId(event));
        });

        els.prevTaskBtn.addEventListener("click", () => moveTask(-1));
        els.nextTaskBtn.addEventListener("click", () => moveTask(1));
        els.hintBtn.addEventListener("click", () => {
            if (!state.hintReady || !currentTask()) return;
            state.hintActive = true;
            renderBank();
            renderHintButton();
            setFeedback("힌트: 움직이는 후보 중 하나를 골라 보세요.", "");
        });
        els.shuffleBankBtn.addEventListener("click", () => {
            state.bankOrder = shuffle(state.bankOrder.length ? state.bankOrder : WORDS.map((word) => word.id));
            saveProgress();
            renderBank();
        });
        els.resetBtn.addEventListener("click", resetGame);

        initGame();
    }());
    </script>
</body>
</html>
