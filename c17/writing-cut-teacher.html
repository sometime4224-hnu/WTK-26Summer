        .teacher-banner {

            flex: 0 0 auto;
            min-height: 30px;
            border: 1px solid var(--accent-line, #93c5fd);
            border-radius: 999px;
            padding: 0 10px;
            background: var(--accent-soft, #dbeafe);
            color: var(--accent-dark, #1d4ed8);
            font-size: 11px;
