<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>발음 관문 러너</title>
    <meta name="description" content="태블릿 마이크로 발음 관문을 통과하는 한국어 말하기 게임 프로토타입">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="setup-view" id="setupView" aria-live="polite">
        <div class="setup-top">
          <a class="back-link" href="../index.html">공용 프로그램 허브</a>
          <span class="prototype-badge">Prototype</span>
        </div>

        <div class="setup-grid">
          <div class="setup-copy">
            <p class="eyebrow">한국어 말하기 게임</p>
            <h1>발음 관문 러너</h1>
            <p class="setup-status" id="setupStatus">마이크를 준비하면 시작할 수 있습니다.</p>

            <div class="setup-actions">
              <button class="primary-action" id="prepareMicButton" type="button">음성 준비</button>
              <button class="primary-action is-ready" id="startGameButton" type="button" hidden>게임 시작</button>
            </div>

            <div class="mode-panel" aria-label="진행 방식">
              <button class="mode-button is-selected" data-mode="practice" type="button">
                <span>연습</span>
                <small>3회 뒤 도움 통과</small>
              </button>
              <button class="mode-button" data-mode="challenge" type="button">
                <span>도전</span>
                <small>성공해야 통과</small>
              </button>
            </div>
          </div>

          <div class="preview-stage" aria-hidden="true">
            <canvas id="previewCanvas" width="520" height="420"></canvas>
          </div>
        </div>
      </section>

      <section class="game-view" id="gameView" hidden>
        <div class="game-hud">
          <a class="hud-link" href="../index.html">허브</a>
          <div class="hud-stat">
            <span>관문</span>
            <strong id="gateCount">1 / 8</strong>
          </div>
          <div class="hud-stat">
            <span>점수</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="hud-stat">
            <span>연속</span>
            <strong id="streakValue">0</strong>
          </div>
        </div>

        <div class="stage-wrap">
          <canvas id="gameCanvas" width="960" height="600" aria-label="발음 관문 러너 게임 화면"></canvas>

          <div class="gate-card" id="gateCard">
            <div class="gate-kind" id="gateKind">어휘 관문</div>
            <div class="gate-prompt" id="gatePrompt">사과</div>
            <div class="gate-focus" id="gateFocus">듣는 중</div>
            <div class="attempt-row">
              <span id="attemptLabel">시도 1 / 3</span>
              <span id="timerLabel">12초</span>
            </div>
          </div>
        </div>

        <div class="speech-dock">
          <div class="mic-meter" aria-hidden="true">
            <span class="mic-dot" id="micDot"></span>
            <span class="meter-track"><span id="meterFill"></span></span>
          </div>
          <div class="speech-copy">
            <strong id="speechStatus">출발합니다.</strong>
            <span id="transcriptText">관문 앞에서 자동으로 듣습니다.</span>
          </div>
          <form class="fallback-form" id="fallbackForm" hidden>
            <input id="fallbackInput" type="text" autocomplete="off" inputmode="text" placeholder="인식 대신 입력">
            <button type="submit">확인</button>
          </form>
        </div>
      </section>

      <section class="result-view" id="resultView" hidden>
        <div class="result-panel">
          <p class="eyebrow">완주 결과</p>
          <h2 id="resultTitle">완주 성공</h2>
          <div class="result-score" id="resultScore">0점</div>
          <div class="result-grid">
            <div>
              <span>통과</span>
              <strong id="passedCount">0</strong>
            </div>
            <div>
              <span>다시 연습</span>
              <strong id="practiceCount">0</strong>
            </div>
            <div>
              <span>최고 연속</span>
              <strong id="bestStreak">0</strong>
            </div>
          </div>
          <div class="review-list" id="reviewList"></div>
          <div class="result-actions">
            <button class="primary-action" id="retryButton" type="button">다시 하기</button>
            <a class="secondary-action" href="../index.html">허브로</a>
          </div>
        </div>
      </section>
    </main>

    <script src="src/game.js"></script>
    <script src="../../shared/site-copyright.js"></script>
    <script src="../../shared/page-qr.js"></script>
  </body>
</html>
