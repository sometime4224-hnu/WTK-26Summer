<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11과 직장 어휘 복습 퀴즈</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #17324d;
            background: #f5f7fb;
        }

        a {
            color: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #d9e5f2;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .topbar a,
        .topbar span {
            font-size: 13px;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        main {
            width: min(1080px, 100%);
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        .quiz-shell {
            display: grid;
            grid-template-columns: minmax(220px, 340px) minmax(0, 1fr);
            gap: 20px;
            align-items: stretch;
        }

        .visual-panel,
        .quiz-panel {
            min-width: 0;
            border: 1px solid #d9e5f2;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 12px 28px rgba(30, 64, 96, 0.08);
        }

        .visual-panel {
            padding: 16px;
        }

        .support-visual-img {
            display: block;
            width: 100%;
            min-height: 220px;
            object-fit: cover;
            border-radius: 8px;
            background: #dbeafe;
        }

        .visual-caption {
            margin: 14px 0 0;
            color: #486581;
            font-size: 14px;
            line-height: 1.6;
        }

        .quiz-panel {
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: #2563eb;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(24px, 4vw, 34px);
            line-height: 1.15;
            letter-spacing: 0;
        }

        .lead {
            margin: 0 0 18px;
            color: #52677a;
            font-size: 15px;
            line-height: 1.6;
        }

        .progress-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #edf6ff;
            color: #1f4f7a;
            font-size: 14px;
            font-weight: 800;
        }

        .question-card {
            display: grid;
            gap: 14px;
        }

        #question-text {
            margin: 0;
            font-size: 22px;
            font-weight: 900;
            line-height: 1.35;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .choice-btn,
        #btn-next {
            min-width: 0;
            border: 0;
            border-radius: 8px;
            font: inherit;
            font-weight: 900;
            cursor: pointer;
        }

        .choice-btn {
            padding: 14px 12px;
            border: 1px solid #cfe0ef;
            background: #f8fbff;
            color: #17324d;
            text-align: left;
        }

        .choice-btn.is-selected {
            border-color: #2563eb;
            background: #dbeafe;
            color: #123c69;
        }

        .choice-btn.is-correct {
            border-color: #16a34a;
            background: #dcfce7;
        }

        .choice-btn.is-wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }

        #feedback-text {
            min-height: 24px;
            margin: 0;
            color: #486581;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
        }

        #btn-next {
            justify-self: start;
            padding: 12px 18px;
            background: #2563eb;
            color: #fff;
        }

        #btn-next:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        #result-panel {
            display: none;
            gap: 14px;
            margin-top: 10px;
            padding: 18px;
            border-radius: 8px;
            background: #eefbf5;
            border: 1px solid #bbf7d0;
        }

        #result-panel.is-visible {
            display: grid;
        }

        #result-char-title {
            margin: 0;
            font-size: 22px;
            font-weight: 900;
        }

        #result-score-val {
            font-size: 30px;
            font-weight: 900;
            color: #15803d;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .nav-links a {
            padding: 9px 12px;
            border-radius: 8px;
            background: #e8eef7;
            color: #27435d;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        @media (max-width: 760px) {
            main {
                padding: 16px 12px 32px;
            }

            .quiz-shell {
                grid-template-columns: 1fr;
            }

            .support-visual-img {
                min-height: 160px;
                max-height: 260px;
            }

            .choices {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar" aria-label="상단 이동">
        <a href="../index.html">메인</a>
        <span>|</span>
        <a href="index.html">11과</a>
        <span>|</span>
        <a href="vocabulary.html">어휘</a>
    </nav>

    <main>
        <section class="quiz-shell">
            <aside class="visual-panel" aria-label="직장 어휘 그림">
                <img class="support-visual-img" src="../assets/c11/vocabulary/images/support-320/c11_01_TL.webp" alt="회사에서 직장 어휘를 사용하는 장면">
                <p class="visual-caption">직장 생활 장면을 보며 직급, 부서, 근무 조건, 복지 어휘를 빠르게 복습합니다.</p>
            </aside>

            <section class="quiz-panel" aria-live="polite">
                <p class="eyebrow">Vocabulary Support Quiz</p>
                <h1>직장 어휘 복습 퀴즈</h1>
                <p class="lead">11과 직장 생활 보조 활동에서 다룬 핵심 표현을 12문제로 확인합니다.</p>

                <div class="progress-row">
                    <span id="quiz-progress-text">문제 1 / 12</span>
                    <span id="score-text">맞힌 문제 0개</span>
                </div>

                <div id="question-card" class="question-card">
                    <p id="question-text"></p>
                    <div id="choices" class="choices"></div>
                    <p id="feedback-text"></p>
                    <button id="btn-next" type="button" disabled>다음</button>
                </div>

                <div id="result-panel">
                    <p id="result-char-title">복습 완료</p>
                    <div id="result-score-val">0 / 12</div>
                    <p id="result-message">틀린 표현은 보조 활동으로 돌아가 다시 확인해 보세요.</p>
                </div>

                <div class="nav-links">
                    <a href="vocab-support-job-posting-fill.html">빈칸 채우기</a>
                    <a href="vocab-support-org-chart.html">조직도</a>
                    <a href="vocab-support-welfare-balance.html">복지 밸런서</a>
                    <a href="vocab-support-work-scenario.html">상황 시뮬레이션</a>
                </div>
            </section>
        </section>
    </main>

    <script>
        const questions = [
            { prompt: "회사에서 새 직원을 뽑기 위해 올리는 글은?", answer: "구인 공고", choices: ["구인 공고", "복지 제도", "회의실", "사원증"] },
            { prompt: "회사 안에서 맡은 일을 나눈 조직 단위는?", answer: "부서", choices: ["부서", "월급", "휴가", "이력서"] },
            { prompt: "회사에서 맡은 위치나 등급을 나타내는 말은?", answer: "직급", choices: ["직급", "면접", "근무 시간", "출근길"] },
            { prompt: "일을 시작하러 회사에 가는 것은?", answer: "출근하다", choices: ["출근하다", "퇴근하다", "입사하다", "지원하다"] },
            { prompt: "일을 마치고 회사에서 나오는 것은?", answer: "퇴근하다", choices: ["퇴근하다", "근무하다", "회의하다", "작성하다"] },
            { prompt: "직원을 위해 회사가 제공하는 혜택은?", answer: "복지", choices: ["복지", "업무", "부장", "동료"] },
            { prompt: "정해진 시간보다 더 일하는 것은?", answer: "야근", choices: ["야근", "휴가", "면접", "채용"] },
            { prompt: "일을 쉬도록 허락받은 날은?", answer: "휴가", choices: ["휴가", "급여", "경력", "담당자"] },
            { prompt: "회사에 새로 들어가는 것은?", answer: "입사하다", choices: ["입사하다", "퇴사하다", "회의하다", "보고하다"] },
            { prompt: "회사에 들어가기 위해 서류를 내거나 신청하는 것은?", answer: "지원하다", choices: ["지원하다", "배치하다", "근무하다", "전달하다"] },
            { prompt: "함께 일하는 사람을 부르는 말은?", answer: "동료", choices: ["동료", "고객", "사장", "지원자"] },
            { prompt: "회사에서 받는 돈을 뜻하는 말은?", answer: "급여", choices: ["급여", "부서", "복장", "일정"] }
        ];

        let currentIndex = 0;
        let score = 0;
        let selectedChoice = null;

        const progressText = document.getElementById("quiz-progress-text");
        const scoreText = document.getElementById("score-text");
        const questionText = document.getElementById("question-text");
        const choicesEl = document.getElementById("choices");
        const feedbackText = document.getElementById("feedback-text");
        const nextButton = document.getElementById("btn-next");
        const questionCard = document.getElementById("question-card");
        const resultPanel = document.getElementById("result-panel");
        const resultScore = document.getElementById("result-score-val");
        const resultTitle = document.getElementById("result-char-title");
        const resultMessage = document.getElementById("result-message");

        function renderQuestion() {
            const question = questions[currentIndex];
            selectedChoice = null;
            progressText.textContent = `문제 ${currentIndex + 1} / ${questions.length}`;
            scoreText.textContent = `맞힌 문제 ${score}개`;
            questionText.textContent = question.prompt;
            feedbackText.textContent = "";
            nextButton.disabled = true;
            nextButton.textContent = currentIndex === questions.length - 1 ? "결과 보기" : "다음";
            choicesEl.innerHTML = "";

            question.choices.forEach((choice) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "choice-btn";
                button.textContent = choice;
                button.addEventListener("click", () => selectChoice(button, choice, question.answer));
                choicesEl.appendChild(button);
            });
        }

        function selectChoice(button, choice, answer) {
            if (selectedChoice) return;
            selectedChoice = choice;
            const isCorrect = choice === answer;
            if (isCorrect) score += 1;

            document.querySelectorAll(".choice-btn").forEach((item) => {
                item.classList.toggle("is-selected", item === button);
                if (item.textContent === answer) item.classList.add("is-correct");
            });

            if (!isCorrect) button.classList.add("is-wrong");
            feedbackText.textContent = isCorrect ? "좋아요. 정확한 표현입니다." : `정답은 ${answer}입니다.`;
            scoreText.textContent = `맞힌 문제 ${score}개`;
            nextButton.disabled = false;
        }

        function showResult() {
            questionCard.style.display = "none";
            resultScore.textContent = `${score} / ${questions.length}`;
            resultTitle.textContent = score >= 10 ? "직장 어휘 준비 완료" : "다시 보면 더 단단해져요";
            resultMessage.textContent = score >= 10
                ? "핵심 직장 어휘를 안정적으로 이해하고 있습니다."
                : "틀린 표현은 아래 보조 활동에서 장면과 함께 다시 복습해 보세요.";
            resultPanel.classList.add("is-visible");
        }

        nextButton.addEventListener("click", () => {
            if (currentIndex < questions.length - 1) {
                currentIndex += 1;
                renderQuestion();
                return;
            }
            showResult();
        });

        renderQuestion();
    </script>
</body>
</html>
