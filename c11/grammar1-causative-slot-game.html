<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11과 문법 1 보조 | 사동 문장 자리 맞추기</title>
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --ink: #172033;
            --muted: #64748b;
            --line: #d9e2ee;
            --bg: #f6f8fb;
            --panel: #ffffff;
            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --green: #0f766e;
            --green-soft: #ecfdf5;
            --orange: #ea580c;
            --orange-soft: #fff7ed;
            --rose: #be123c;
            --rose-soft: #fff1f2;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
            background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
        }

        button { font: inherit; }

        .global-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 54px;
            padding: 0 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
        }

        .global-nav a {
            color: #334155;
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
        }

        .nav-divider {
            color: #cbd5e1;
            font-weight: 900;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 16px 0 46px;
        }

        .top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(290px, 380px);
            gap: 12px;
            align-items: stretch;
            margin-bottom: 8px;
        }

        .intro,
        .task-card,
        .chooser,
        .sentence-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .intro {
            padding: 14px 16px;
        }

        .task-card {
            display: grid;
            gap: 10px;
            align-content: center;
            padding: 12px;
        }

        .eyebrow {
            margin: 0 0 7px;
            color: var(--orange);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.55rem, 2.7vw, 2.35rem);
            line-height: 1.08;
            letter-spacing: 0;
        }

        .lead {
            margin: 8px 0 0;
            max-width: 720px;
            color: #475569;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }

        .task-label {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 900;
        }

        .verb-pair {
            margin: 0;
            color: #0f172a;
            font-size: clamp(1.25rem, 2.3vw, 1.75rem);
            font-weight: 950;
            line-height: 1.2;
            word-break: keep-all;
        }

        .switch,
        .cases,
        .formula-row,
        .workspace,
        .slot-row,
        .nouns,
        .actions {
            display: grid;
            gap: 8px;
        }

        .switch {
            grid-template-columns: repeat(2, minmax(96px, 1fr));
        }

        .cases {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .chooser-line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .chooser {
            display: grid;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
        }

        .formula-row {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            margin-bottom: 8px;
        }

        .workspace {
            width: min(100%, 1120px);
            margin: 0 auto 8px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
            align-items: stretch;
        }

        .workspace > .sentence-panel {
            align-self: stretch;
        }

        .slot-row {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            padding: 14px;
        }

        .nouns {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .actions {
            grid-template-columns: minmax(92px, auto) 1fr 1fr;
            align-items: stretch;
            margin-top: 12px;
        }

        .tray-body > .actions {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .stage-btn,
        .case-btn,
        .slot,
        .noun,
        .tool,
        .list-btn,
        .modal-close,
        .modal-choice {
            border-radius: 8px;
            cursor: pointer;
        }

        .stage-btn,
        .case-btn,
        .tool,
        .noun,
        .list-btn {
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: #334155;
            font-weight: 900;
        }

        .stage-btn:focus-visible,
        .case-btn:focus-visible,
        .tool:focus-visible,
        .noun:focus-visible,
        .sentence-slot:focus-visible,
        .slot:focus-visible,
        .list-btn:focus-visible,
        .modal-choice:focus-visible,
        .modal-close:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.24);
            outline-offset: 2px;
        }

        .stage-btn[aria-pressed="true"] {
            border-color: var(--orange);
            background: var(--orange-soft);
            color: #9a3412;
        }

        .case-btn[aria-pressed="true"] {
            border-color: var(--green);
            background: var(--green-soft);
            color: #115e59;
        }

        .list-btn {
            border-color: #fed7aa;
            background: var(--orange-soft);
            color: #9a3412;
        }

        .status {
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 800;
            word-break: keep-all;
        }

        .tool.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .formula,
        .tray {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .formula {
            min-height: 58px;
            padding: 9px 12px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        }

        .formula.active {
            border-color: var(--orange);
            background: var(--orange-soft);
        }

        .formula small {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 0.77rem;
            font-weight: 900;
        }

        .formula strong {
            display: block;
            font-size: clamp(0.98rem, 1.7vw, 1.18rem);
            line-height: 1.45;
            word-break: keep-all;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            min-height: 48px;
            padding: 10px 14px;
            border-bottom: 1px solid #edf2f7;
        }

        .head h2 {
            margin: 0;
            font-size: 1.03rem;
        }

        .scene {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 800;
            word-break: keep-all;
        }

        .sentence-panel {
            display: grid;
            gap: 6px;
            margin-bottom: 8px;
            padding: 10px 14px;
            border-color: #bfdbfe;
            background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
        }

        .sentence-panel.good {
            border-color: #5eead4;
            background: linear-gradient(180deg, #ffffff 0%, var(--green-soft) 100%);
        }

        .sentence-panel.bad {
            border-color: #fecdd3;
            background: linear-gradient(180deg, #ffffff 0%, var(--rose-soft) 100%);
        }

        .sentence-panel.wait {
            border-color: #fed7aa;
            background: linear-gradient(180deg, #ffffff 0%, var(--orange-soft) 100%);
        }

        .sentence-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sentence-meta strong {
            color: #1e3a8a;
            font-size: 0.92rem;
            font-weight: 900;
        }

        .line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-height: 46px;
            padding-right: clamp(18px, 4vw, 44px);
            padding-left: 8px;
            font-size: clamp(1.28rem, 2.7vw, 1.86rem);
            font-weight: 950;
            line-height: 1.3;
            word-break: keep-all;
        }

        .line-token,
        .verb-token {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 4px 9px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
        }

        .sentence-slot {
            cursor: pointer;
            font: inherit;
            font-weight: 950;
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .sentence-slot.blank-token {
            min-width: min(210px, 100%);
            justify-content: space-between;
            border-width: 3px;
        }

        .sentence-slot.ready,
        .sentence-slot.drop-ready {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(37, 99, 235, 0.18);
        }

        .sentence-slot.correct {
            border-color: #0f766e;
        }

        .sentence-slot.error {
            border-color: var(--rose);
            background: var(--rose-soft);
        }

        .sentence-slot.wait {
            border-color: #fdba74;
            background: var(--orange-soft);
        }

        .blank-token {
            border-style: dashed;
            color: #334155;
        }

        .slot-label {
            color: inherit;
            font-size: 0.72em;
            font-weight: 950;
        }

        .particle {
            margin-left: 2px;
            color: #c2410c;
        }

        .verb-token {
            border-color: #cbd5e1;
            background: #f8fafc;
            color: #0f172a;
        }

        .tone-causer {
            border-color: #fed7aa;
            background: #fff7ed;
            color: #9a3412;
        }

        .tone-actor {
            border-color: #99f6e4;
            background: #ecfdf5;
            color: #115e59;
        }

        .tone-object {
            border-color: #bfdbfe;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .slot {
            display: grid;
            gap: 10px;
            min-height: 154px;
            width: 100%;
            padding: 14px;
            border: 2px solid var(--line);
            background: var(--panel);
            text-align: left;
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .slot.filled {
            border-color: var(--blue);
            background: var(--blue-soft);
        }

        .slot.correct {
            border-color: var(--green);
            background: var(--green-soft);
        }

        .slot.error {
            border-color: var(--rose);
            background: var(--rose-soft);
        }

        .slot.wait {
            border-color: #fdba74;
            background: var(--orange-soft);
        }

        .slot.ready,
        .slot.drop-ready {
            transform: translateY(-2px);
            border-style: dashed;
            box-shadow: 0 14px 26px rgba(37, 99, 235, 0.16);
        }

        .role {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 0.92rem;
            font-weight: 900;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 3px 7px;
            border-radius: 999px;
            background: var(--orange-soft);
            color: #9a3412;
            font-size: 0.7rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .question {
            min-height: 38px;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.45;
            word-break: keep-all;
        }

        .fill {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            min-height: 60px;
            margin-top: auto;
            padding: 10px;
            border: 2px dashed #b6c3d4;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1.16rem;
            font-weight: 950;
        }

        .slot-note {
            min-height: 22px;
            color: #475569;
            font-size: 0.78rem;
            font-weight: 900;
            line-height: 1.35;
        }

        .tray.needs-pick {
            border-color: #fdba74;
            box-shadow: 0 18px 36px rgba(234, 88, 12, 0.18);
        }

        .tray-body { padding: 10px 14px 14px; }

        .support-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 8px;
        }

        .noun {
            display: grid;
            gap: 2px;
            min-height: 56px;
            padding: 7px 9px;
            text-align: left;
            touch-action: manipulation;
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .noun-label {
            font-size: 0.74rem;
            font-weight: 950;
        }

        .noun-text {
            color: #0f172a;
            font-size: 1.04rem;
            font-weight: 950;
        }

        .noun.selected {
            border-color: var(--blue);
            background: var(--blue-soft);
            color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.16);
        }

        .noun.available {
            border-width: 2px;
            border-color: #93c5fd;
            background: #eff6ff;
            color: #1d4ed8;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .noun.available .noun-label::after {
            content: " · 선택 가능";
            color: #1d4ed8;
            font-weight: 950;
        }

        .noun.used {
            border-style: dashed;
            background: #f8fafc;
            color: #94a3b8;
            opacity: 0.58;
            cursor: default;
        }

        .noun.used .noun-text {
            color: #64748b;
        }

        .noun.used .noun-label::after {
            content: " · 사용됨";
            color: #64748b;
            font-weight: 950;
        }

        .tray.needs-pick .noun:not(.used) {
            border-color: #fdba74;
        }

        .progress-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            color: #334155;
            font-size: 0.82rem;
            font-weight: 950;
            white-space: nowrap;
        }

        .feedback {
            min-height: 58px;
            margin-top: 0;
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
            color: #475569;
            font-size: 0.86rem;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .feedback.good {
            border-color: #99f6e4;
            background: var(--green-soft);
            color: #115e59;
        }

        .feedback.bad {
            border-color: #fecdd3;
            background: var(--rose-soft);
            color: #9f1239;
        }

        .feedback.wait {
            border-color: #fed7aa;
            background: var(--orange-soft);
            color: #9a3412;
        }

        .takeaway {
            min-height: 58px;
            margin-top: 0;
            padding: 9px 12px;
            border-left: 4px solid var(--orange);
            background: #fffaf5;
            color: #334155;
            font-size: 0.86rem;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .modal-backdrop[hidden] { display: none; }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.44);
        }

        .modal {
            width: min(760px, 100%);
            max-height: min(760px, calc(100vh - 36px));
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.26);
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-head h2 {
            margin: 0;
            font-size: 1.05rem;
        }

        .modal-close {
            width: 42px;
            min-height: 38px;
            border: 1px solid var(--line);
            background: #f8fafc;
            color: #334155;
            font-weight: 900;
        }

        .modal-body {
            overflow: auto;
            padding: 14px 16px 16px;
        }

        .group {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .group h3 {
            margin: 0;
            color: #334155;
            font-size: 0.92rem;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }

        .modal-choice {
            min-height: 44px;
            padding: 9px 10px;
            border: 1px solid var(--line);
            background: #fff;
            color: #334155;
            font-weight: 900;
            text-align: center;
        }

        .modal-choice.active {
            border-color: var(--green);
            background: var(--green-soft);
            color: #115e59;
        }

        @media(max-width: 900px) {
            .top,
            .workspace { grid-template-columns: 1fr; }
            .switch { width: 100%; min-width: 0; }
        }

        @media(max-width: 720px) {
            .page {
                width: min(100% - 24px, 1120px);
                padding-top: 12px;
            }
            .intro,
            .task-card,
            .chooser,
            .sentence-panel { box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06); }
            .cases,
            .formula-row { grid-template-columns: 1fr; }
            .cases { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .support-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .nouns { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .actions { grid-template-columns: 1fr 1fr; }
            .progress-pill { grid-column: 1 / -1; }
            .modal-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media(max-width: 430px) {
            .nouns,
            .modal-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .head { align-items: flex-start; flex-direction: column; }
            .line { font-size: clamp(1.2rem, 8vw, 1.55rem); }
        }
    </style>
</head>

    <main class="page">
        <section class="top" aria-labelledby="pageTitle">
            <div class="intro">
                <p class="eyebrow">Causative Structure</p>
                <h1 id="pageTitle">사동 문장 자리 맞추기</h1>
                <p class="lead">명사 카드를 빈자리에 놓고, 사동사가 만들거나 바꾸는 문장 자리를 바로 확인하세요.</p>
            </div>
            <div class="task-card" aria-label="현재 동사와 단계 선택">
                <span class="task-label">현재 동사</span>
                <p class="verb-pair" id="activeVerbPair">자다 → 재우다</p>
                <div class="switch" role="group" aria-label="동사 단계">
                    <button class="stage-btn" type="button" data-stage="base" aria-pressed="true">기본 동사</button>
                    <button class="stage-btn" type="button" data-stage="causative" aria-pressed="false">사동사</button>
                </div>
            </div>
        </section>

        <section class="support-row" aria-label="활동 안내와 문장 조언">
            <div class="feedback" id="feedback" aria-live="polite"></div>
            <div class="takeaway" id="takeaway"></div>
        </section>

        <div class="workspace">
            <section class="sentence-panel" id="sentencePanel" aria-labelledby="sentenceLabel">
                <div class="sentence-meta">
                    <strong id="sentenceLabel">완성 문장</strong>
                    <span class="scene" id="sceneText"></span>
                </div>

                const aria = slot[1] + ", " + slot[2] + ", " + (filledId ? noun(filledId) + slot[3] : "빈자리");
                if (filled[slot[0]]) {
                    return '<button class="line-token sentence-slot ' + toneClass(slot[4]) + ' filled ' + stateClass + '" type="button" data-slot="' + esc(slot[0]) + '" aria-label="' + esc(aria) + '"><span>' + esc(noun(filledId)) + '</span><span class="particle">' + esc(slot[3]) + '</span></button>';
                }
                return '<button class="line-token sentence-slot blank-token ' + toneClass(slot[4]) + ' ' + stateClass + ' ' + readyClass + '" type="button" data-slot="' + esc(slot[0]) + '" aria-label="' + esc(aria) + '"><span class="slot-label">' + esc(slot[1]) + '</span><span class="particle">' + esc(slot[3]) + '</span></button>';
            }).join(" ") + ' <span class="verb-token">' + esc(data().verb) + '</span>';
        }

        function msg(text, tone = "") {
            feedbackText = text;
            feedbackTone = tone;
            syncFeedback();
        }

        function syncFeedback() {
            const feedback = $("feedback");
            const panel = $("sentencePanel");
            if (feedback) {
                feedback.textContent = feedbackText;
                feedback.className = "feedback" + (feedbackTone ? " " + feedbackTone : "");
            }
            if (panel) {
                panel.className = "sentence-panel" + (feedbackTone ? " " + feedbackTone : "");
            }
        }

        function startManualDrag(nounId, x, y) {
            manualDrag = { nounId, startX: x, startY: y, moved: false };
        }

        function moveManualDrag(x, y) {
            if (!manualDrag) return;
            const movedFar = Math.abs(x - manualDrag.startX) > 8 || Math.abs(y - manualDrag.startY) > 8;
            if (!movedFar && !manualDrag.moved) return;

            manualDrag.moved = true;
            dragged = manualDrag.nounId;
            selected = dragged;
            needsPick = false;

            document.querySelectorAll(".sentence-slot").forEach((slot) => {
                const box = slot.getBoundingClientRect();
                const inside = x >= box.left && x <= box.right && y >= box.top && y <= box.bottom;
                slot.classList.toggle("drop-ready", inside);
            });
            msg(noun(dragged) + " 카드를 드래그 중입니다. 빈자리에 놓으세요.", "wait");
        }

        function finishManualDrag(x, y) {
            if (!manualDrag) return false;
            const completedDrag = manualDrag;
            manualDrag = null;
            document.querySelectorAll(".sentence-slot.drop-ready").forEach((slot) => slot.classList.remove("drop-ready"));

            if (!completedDrag.moved) return false;

            suppressClick = true;
            selected = completedDrag.nounId;
            dragged = null;
            const dropTarget = document.elementFromPoint(x, y);
            const slot = dropTarget ? dropTarget.closest(".sentence-slot") : null;

            if (slot) {
                place(slot.dataset.slot);
            } else {
                msg("카드를 빈자리 위에 놓아 주세요.", "wait");
                render();
            }

            setTimeout(() => {
                suppressClick = false;
            }, 0);
            return true;
        }

        function renderCases() {
            $("caseRow").innerHTML = defaultCaseIds.map((id) => {
                const c = cases.find((x) => x.id === id);
                return '<button class="case-btn" type="button" data-id="' + esc(c.id) + '" aria-pressed="' + (c.id === caseId) + '">' + esc(c.label) + '</button>';
            }).join("");

            document.querySelectorAll(".case-btn").forEach((button) => {
                button.onclick = () => {
                    caseId = button.dataset.id;
                    resetSlots();
                    msg("대표 동사를 불러왔습니다. 기본 동사와 사동사의 슬롯 수를 비교해 보세요.");
                    render();
                };
            });
        }

        function renderModalList() {
            $("modalBody").innerHTML = suffixGroups.map((suffix) => {
                const list = cases.filter((c) => c.suffix === suffix);
                return '<section class="group"><h3>' + esc(suffix) + '</h3><div class="modal-grid">' + list.map((c) => {
                    return '<button class="modal-choice ' + (c.id === caseId ? 'active' : '') + '" type="button" data-id="' + esc(c.id) + '">' + esc(c.label) + '</button>';
                }).join("") + '</div></section>';
            }).join("");

            document.querySelectorAll(".modal-choice").forEach((button) => {
                button.onclick = () => {
                    caseId = button.dataset.id;
                    stage = "base";
                    resetSlots();
                    closeModal();
                    msg(item().label + "을/를 불러왔습니다. 기본 동사와 사동사 구조를 비교해 보세요.");
                    render();
                };
            });
        }

        function render() {
            const current = item();
            const currentData = data();
            renderCases();
            renderModalList();

            document.querySelectorAll(".stage-btn").forEach((button) => {
                button.setAttribute("aria-pressed", button.dataset.stage === stage);
            });

            $("baseFormulaText").textContent = current.baseFormula;
            $("causativeFormulaText").textContent = current.causativeFormula;
            $("baseFormula").classList.toggle("active", stage === "base");
            $("causativeFormula").classList.toggle("active", stage === "causative");
            $("activeVerbPair").textContent = current.label;
            $("sceneText").textContent = currentData.scene;
            $("sentenceLabel").textContent = currentData.name;
            $("sentenceLine").innerHTML = line();
            $("takeaway").textContent = currentData.takeaway;
            $("selectedText").textContent = selected ? noun(selected) + " 선택" : "선택 없음";
            $("fillProgress").textContent = Object.keys(filled).length + " / " + currentData.slots.length;
            $("tray").classList.toggle("needs-pick", needsPick);
            $("caseStatus").textContent = defaultCaseIds.includes(caseId)
                ? "대표 4종: " + current.label
                : "목록에서 선택: " + current.label;
            syncFeedback();

            document.querySelectorAll(".sentence-slot").forEach((button) => {
                button.onclick = () => place(button.dataset.slot);
                button.ondragover = (event) => {
                    if (!dragged) return;
                    event.preventDefault();
                    button.classList.add("drop-ready");
                };
                button.ondragleave = () => button.classList.remove("drop-ready");
                button.ondrop = (event) => {
                    event.preventDefault();
                    selected = dragged || event.dataTransfer.getData("text/plain");
                    dragged = null;
                    place(button.dataset.slot);
                };
            });

            const used = Object.values(filled);
            $("nounGrid").innerHTML = current.nouns.map((n) => {
                const isUsed = used.includes(n[0]);
                const selectedClass = selected === n[0] ? "selected" : "";
                const stateClass = isUsed ? "used" : "available";
                const disabled = isUsed ? 'aria-disabled="true"' : "";
                const draggable = isUsed ? 'draggable="false"' : 'draggable="true"';
                return '<button class="noun ' + selectedClass + ' ' + stateClass + '" type="button" data-noun="' + esc(n[0]) + '" aria-pressed="' + (selected === n[0]) + '" ' + disabled + ' ' + draggable + '><span class="noun-label">' + esc(roleLabel(n[0])) + '</span><span class="noun-text">' + esc(n[1]) + '</span></button>';
            }).join("");

            document.querySelectorAll(".noun").forEach((button) => {
                button.onclick = () => {
                    if (suppressClick) {
                        suppressClick = false;
                        return;
                    }
                    if (button.getAttribute("aria-disabled") === "true") return;
                    selected = button.dataset.noun;
                    needsPick = false;
                    msg(noun(selected) + " 카드를 선택했습니다. 넣을 빈자리를 누르세요.", "wait");
                    render();
                };
                button.onmousedown = (event) => {
                    if (button.getAttribute("aria-disabled") === "true" || event.button !== 0) return;
                    startManualDrag(button.dataset.noun, event.clientX, event.clientY);
                };
                button.ondragstart = (event) => {
                    if (button.getAttribute("aria-disabled") === "true") {
                        event.preventDefault();
                        return;
                    }
                    dragged = button.dataset.noun;
                    selected = dragged;
                    needsPick = false;
                    event.dataTransfer.setData("text/plain", dragged);
                    event.dataTransfer.effectAllowed = "move";
                    msg(noun(dragged) + " 카드를 드래그 중입니다. 빈자리에 놓으세요.", "wait");
                };
                button.ondragend = () => {
                    dragged = null;
                    document.querySelectorAll(".sentence-slot.drop-ready").forEach((slot) => slot.classList.remove("drop-ready"));
                };
            });
        }

        function place(slotId) {
            if (!selected) {
                if (filled[slotId]) {
                    delete filled[slotId];
                    delete status[slotId];
                    needsPick = false;
                    msg("자리를 비웠습니다. 새 카드를 고르세요.", "wait");
                    render();
                    return;
                }
                needsPick = true;
                msg("먼저 명사 카드를 고르거나 카드 그대로 빈자리로 드래그하세요.", "wait");
                render();
                return;
            }

            Object.keys(filled).forEach((key) => {
                if (filled[key] === selected) {
                    delete filled[key];
                    delete status[key];
                }
            });

            filled[slotId] = selected;
            const slot = data().slots.find((x) => x[0] === slotId);
            const name = noun(selected);
            delete status[slotId];
            selected = null;
            needsPick = false;
            msg(
                name + " 카드를 넣었습니다. 문장에서는 '" + name + slot[3] + "'로 보입니다.",
                "wait"
            );
            render();
        }

        function check() {
            const empty = data().slots.find((slot) => !filled[slot[0]]);
            if (empty) {
                status[empty[0]] = "wait";
                msg(empty[1] + " 자리가 비어 있습니다.", "wait");
                render();
                return;
            }

            data().slots.forEach((slot) => {
                status[slot[0]] = "correct";
            });
            msg("구조가 완성됐습니다. " + $("sentenceLine").textContent, "good");
            render();
        }

        function openModal() {
            $("listModal").hidden = false;
            renderModalList();
            $("closeListBtn").focus();
        }

        function closeModal() {
            $("listModal").hidden = true;
        }

        document.querySelectorAll(".stage-btn").forEach((button) => {
            button.onclick = () => {
                stage = button.dataset.stage;
                resetSlots();
                msg("기본 동사와 사동사의 슬롯 수를 비교해 보세요.");
                render();
            };
        });

        $("checkBtn").onclick = check;
        $("resetBtn").onclick = () => {
            resetSlots();
            msg("기본 동사와 사동사의 슬롯 수를 비교해 보세요.");
            render();
        };
        $("openListBtn").onclick = openModal;
        $("closeListBtn").onclick = closeModal;
        $("listModal").onclick = (event) => {
            if (event.target === $("listModal")) closeModal();
        };
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !$("listModal").hidden) closeModal();
        });
        document.addEventListener("mousemove", (event) => {
            moveManualDrag(event.clientX, event.clientY);
        });
        document.addEventListener("mouseup", (event) => {
            finishManualDrag(event.clientX, event.clientY);
        });

        msg("기본 동사와 사동사의 슬롯 수를 비교해 보세요.");
        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
