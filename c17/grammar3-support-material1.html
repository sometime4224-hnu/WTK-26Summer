            background: #ffffff;

            overflow: hidden;
            border-radius: 6px;
        }

            display: block;
            width: 100%;
            padding: 0;
            border: 0;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            touch-action: manipulation;
        }

        document.querySelectorAll(".image-reveal").forEach(function (button) {

                image.src = image.dataset.answerSrc;
