<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15과 문법 1 보조 게임 | -게 하다</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --line: #dbe2ea;
            --text: #0f172a;
            --muted: #64748b;
            --blue: #2563eb;
            --blue-soft: #dbeafe;
            --green: #047857;
            --green-soft: #d1fae5;
            --orange: #c2410c;
            --orange-soft: #ffedd5;
            --purple: #7c3aed;
            --shadow: 0 12px 28px rgba(15, 23, 42, 0.09);
        }

        * {
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        html,
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        button {
            font: inherit;
        }

        button,
        [tabindex] {
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible,
        a:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid #f59e0b;
            outline-offset: 3px;
        }

        .app {
            width: min(100%, 760px);
            margin: 0 auto;
            padding: 10px 10px calc(24px + env(safe-area-inset-bottom));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 5px 2px 10px;
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(248, 250, 252, 0.92));
            backdrop-filter: blur(8px);
        }

        .back-link {
            color: var(--blue);
            font-size: 14px;
            font-weight: 900;
            text-decoration: none;
        }

        .scoreboard {
            min-width: 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 900;
            text-align: right;
        }

        .scoreboard span {
            display: block;
        }

        #scoreText {
            margin-top: 2px;
            color: var(--blue);
        }

        .mission {
            padding: 6px 4px 10px;
        }

        #pageTitle {
            margin: 0;
            color: var(--blue);
            font-size: 16px;
            font-weight: 900;
            line-height: 1.3;
        }

        #missionText {
            margin: 4px 0 0;
            font-size: clamp(22px, 5.8vw, 32px);
            font-weight: 900;
            line-height: 1.3;
            letter-spacing: -0.025em;
            word-break: keep-all;
        }

        #statusText {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .other-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
            margin-bottom: 9px;
        }

        .other-tab {
            min-height: 43px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--panel);
            color: #334155;
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
        }

        .other-tab[aria-pressed="true"] {
            border-color: var(--purple);
            background: #ede9fe;
            color: #5b21b6;
            box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.12);
        }

        .stage-shell {
            position: relative;
        }

        .stage {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 48px minmax(0, 1fr);
            align-items: stretch;
            gap: 8px;
        }

        .zone {
            position: relative;
            display: flex;
            min-width: 0;
            min-height: 278px;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            overflow: hidden;
            padding: 10px 8px 12px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            box-shadow: var(--shadow);
            touch-action: manipulation;
            transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
        }

        .zone::after {
            content: "";
            position: absolute;
            inset: 5px;
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
            pointer-events: none;
        }

        .zone.is-hover {
            border-color: var(--blue);
            background: #eff6ff;
            transform: translateY(-3px);
        }

        .zone.is-pass::after {
            border-color: #60a5fa;
        }

        .zone.is-result {
            border-color: #34d399;
            background: #ecfdf5;
        }

        .zone.is-command {
            border-color: #a78bfa;
            background: #f5f3ff;
        }

        .zone.is-wrong {
            border-color: #fb923c;
            background: var(--orange-soft);
            animation: zoneShake 0.46s ease;
        }

        .zone:disabled {
            cursor: default;
            opacity: 1;
        }

        .zone__role {
            position: relative;
            z-index: 2;
            align-self: flex-start;
            min-height: 26px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
            line-height: 1.2;
        }

        .zone.is-result .zone__role {
            background: var(--green);
            color: #ffffff;
        }

        .zone.is-command .zone__role {
            background: var(--purple);
            color: #ffffff;
        }

        .zone__image-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 0;
            flex: 1 1 auto;
            align-items: center;
            justify-content: center;
        }

        .zone img {
            display: block;
            width: min(100%, 205px);
            height: auto;
            pointer-events: none;
        }

        .zone__copy {
            position: relative;
            z-index: 2;
            display: block;
            min-height: 48px;
            text-align: center;
        }

        .zone__name,
        .zone__line {
            display: block;
        }

        .zone__name {
            font-size: 19px;
            font-weight: 900;
        }

        .zone__line {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.25;
            word-break: keep-all;
        }

        .route-rail {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
        }

        .route-rail::before {
            content: "";
            position: absolute;
            left: 2px;
            right: 2px;
            top: 50%;
            height: 5px;
            border-radius: 999px;
            background: #dbe2ea;
            transform: translateY(-50%);
        }

        .route-arrow {
            position: relative;
            z-index: 2;
            display: inline-flex;
            width: 38px;
            height: 38px;
            align-items: center;
            justify-content: center;
            border: 2px solid #cbd5e1;
            border-radius: 999px;
            background: #ffffff;
            color: #64748b;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }

        .route-rail.is-forward::before,
        .route-rail.is-reverse::before {
            background: linear-gradient(90deg, #7c3aed, #10b981);
        }

        .route-rail.is-forward .route-arrow,
        .route-rail.is-reverse .route-arrow {
            border-color: #7c3aed;
            color: #6d28d9;
        }

        .result-popup {
            margin-top: 9px;
            padding: 13px 14px;
            border: 2px solid #86efac;
            border-radius: 16px;
            background: linear-gradient(180deg, #ecfdf5, #d1fae5);
            text-align: center;
            box-shadow: 0 10px 24px rgba(4, 120, 87, 0.1);
        }

        .result-popup.is-summary {
            border-color: #93c5fd;
            background: linear-gradient(180deg, #eff6ff, #dbeafe);
        }

        .result-popup__label {
            margin: 0 0 4px;
            color: var(--green);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        .result-popup.is-summary .result-popup__label {
            color: #1d4ed8;
        }

        .result-popup__sentence {
            margin: 0;
            color: #065f46;
            font-size: clamp(22px, 5vw, 30px);
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -0.02em;
            word-break: keep-all;
        }

        .result-popup.is-summary .result-popup__sentence {
            color: #1d4ed8;
        }

        .feedback {
            min-height: 62px;
            margin-top: 9px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            color: var(--muted);
            font-size: 15px;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback__label,
        .feedback__answer,
        .feedback__meta {
            display: block;
        }

        .feedback__label {
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        .feedback__answer {
            color: inherit;
            font-size: 17px;
            font-weight: 900;
            word-break: keep-all;
        }

        .feedback__meta {
            margin-top: 6px;
            font-size: 14px;
            word-break: keep-all;
        }

        .feedback.is-correct {
            border: 2px solid #86efac;
            background: var(--green-soft);
            color: #065f46;
        }

        .feedback.is-wrong {
            border: 2px solid #fdba74;
            background: var(--orange-soft);
            color: #9a3412;
        }

        .feedback.is-summary {
            border: 2px solid #93c5fd;
            background: var(--blue-soft);
            color: #1e40af;
        }

        .game-actions {
            display: flex;
            gap: 8px;
            margin-top: 9px;
        }

        .composer {
            margin-top: 10px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 -4px 18px rgba(15, 23, 42, 0.05);
        }

        .sentence-card {
            display: flex;
            min-height: 60px;
            align-items: center;
            justify-content: center;
            gap: 9px;
            margin-bottom: 9px;
            padding: 10px 12px;
            border: 2px solid #93c5fd;
            border-radius: 15px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .sentence-card.is-dragging {
            border-color: var(--blue);
            background: #dbeafe;
            cursor: grabbing;
        }

        .sentence-card[aria-disabled="true"] {
            cursor: default;
            opacity: 0.58;
        }

        .sentence-card__icon {
            flex: 0 0 auto;
            font-size: 24px;
            line-height: 1;
        }

        .sentence-card__icon.is-hidden {
            display: none;
        }

        .sentence-card__text {
            min-width: 0;
            line-height: 1.3;
            word-break: keep-all;
        }

        .token-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 1px 9px;
            scrollbar-color: #94a3b8 #e2e8f0;
            scrollbar-width: thin;
        }

        .token-row + .token-row {
            margin-top: 4px;
        }

        .token-row::-webkit-scrollbar {
            height: 7px;
        }

        .token-row::-webkit-scrollbar-track {
            border-radius: 999px;
            background: #e2e8f0;
        }

        .token-row::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: #94a3b8;
        }

        .token {
            flex: 0 0 auto;
            display: flex;
            min-width: 76px;
            min-height: 72px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 11px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #ffffff;
            color: #334155;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
        }

        .token.is-selected {
            border-color: #60a5fa;
            background: var(--blue-soft);
            color: #1d4ed8;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.12);
        }

        .token:disabled {
            cursor: default;
            opacity: 0.38;
        }

        .token__icon {
            font-size: 23px;
            line-height: 1;
        }

        .token__text {
            line-height: 1.15;
            white-space: nowrap;
        }

        .route-help {
            margin: 4px 2px 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.4;
            text-align: center;
        }

        .route-controls {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .control-btn {
            flex: 1 1 0;
            min-height: 45px;
            padding: 9px 10px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: #ffffff;
            color: #334155;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
        }

        .control-btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .control-btn.route {
            border-color: #a78bfa;
            background: #f5f3ff;
            color: #5b21b6;
        }

        .control-btn:disabled {
            cursor: default;
            opacity: 0.46;
        }

        .drag-ghost {
            position: fixed;
            z-index: 120;
            left: 0;
            top: 0;
            display: inline-flex;
            max-width: min(80vw, 440px);
            min-height: 54px;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 13px;
            border: 2px solid rgba(37, 99, 235, 0.5);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--blue);
            font-size: 17px;
            font-weight: 900;
            line-height: 1.25;
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.2);
            backdrop-filter: blur(8px);
            pointer-events: none;
            will-change: transform;
        }

        .command-beam {
            position: fixed;
            z-index: 110;
            left: 0;
            top: 0;
            height: 7px;
            border-radius: 999px;
            background: linear-gradient(90deg, #7c3aed, #10b981);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.35);
            opacity: 0;
            pointer-events: none;
            transform-origin: left center;
        }

        .command-beam.is-visible {
            opacity: 0.92;
        }

        .flying-icon {
            position: fixed;
            z-index: 130;
            left: 0;
            top: 0;
            display: inline-flex;
            width: 62px;
            height: 62px;
            align-items: center;
            justify-content: center;
            border: 2px solid #93c5fd;
            border-radius: 999px;
            background: #ffffff;
            font-size: 38px;
            line-height: 1;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.2);
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes zoneShake {
            0%,
            100% { transform: translateX(0); }
            25% { transform: translateX(-7px); }
            50% { transform: translateX(7px); }
            75% { transform: translateX(-4px); }
        }

        @media (min-width: 721px) {
            .composer {
                position: sticky;
                bottom: 8px;
                z-index: 25;
                backdrop-filter: blur(10px);
            }
        }

        @media (max-width: 720px) {
            .app {
                padding-inline: 8px;
            }

            .stage {
                grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
                gap: 5px;
            }

            .zone {
                min-height: 200px;
                padding: 7px 5px 9px;
                border-radius: 16px;
            }

            .zone::after {
                inset: 4px;
                border-radius: 12px;
            }

            .zone img {
                width: min(100%, 150px);
            }

            .zone__role {
                min-height: 23px;
                padding: 4px 7px;
                font-size: 10px;
            }

            .zone__copy {
                min-height: 42px;
            }

            .zone__name {
                font-size: 16px;
            }

            .zone__line {
                font-size: 10px;
            }

            .route-arrow {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }

            .composer {
                position: static;
                padding: 8px;
                backdrop-filter: none;
            }

            .sentence-card {
                min-height: 56px;
                font-size: 17px;
            }
        }

        @media (max-width: 420px) {
            .stage {
                grid-template-columns: minmax(0, 1fr) 28px minmax(0, 1fr);
                gap: 4px;
            }

            .zone {
                min-height: 178px;
            }

            .zone img {
                width: min(100%, 128px);
            }

            .route-arrow {
                width: 26px;
                height: 26px;
                font-size: 14px;
            }

            .token {
                min-width: 70px;
                min-height: 68px;
            }

            .route-controls {
                grid-template-columns: 1fr;
            }

            .scoreboard {
                font-size: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <main class="app">
        <header class="topbar">
            <a class="back-link" href="grammar1.html">문법 1로</a>
            <div class="scoreboard" aria-label="게임 진행">
                <span id="progressText">1단계 1 / 9</span>
                <span id="scoreText">첫 시도 0 / 18</span>
            </div>
        </header>

        <section class="mission" aria-labelledby="pageTitle">
            <h1 id="pageTitle">누가 하게 할까요?</h1>
            <p id="missionText">친구가 케이크를 먹게 하세요.</p>
            <p id="statusText" aria-live="polite">행동을 고른 뒤 카드를 인물 한 곳 또는 두 인물 순서로 옮겨 보세요.</p>
        </section>

        <div class="other-tabs" id="otherTabs" role="group" aria-label="타인 선택" hidden>
            <button class="other-tab" type="button" data-other="friend" aria-pressed="true">친구</button>
            <button class="other-tab" type="button" data-other="sibling" aria-pressed="false">동생</button>
            <button class="other-tab" type="button" data-other="staff" aria-pressed="false">부하직원</button>
        </div>

        <section class="stage-shell" aria-label="행동 경로 무대">
            <div class="stage" id="stageBoard">
                <button class="zone zone--self" type="button" id="selfZone" data-zone="self" aria-label="나의 직접 행동 제출">
                    <span class="zone__role" id="selfRole">직접 행동</span>
                    <span class="zone__image-wrap">
                        <img
                            id="selfImage"
                            src="../assets/c15/grammar/images/ge-hada-cast/self_main_01.webp"
                            alt="나 캐릭터"
                            width="1012"
                            height="1012"
                            loading="lazy"
                            decoding="async" />
                    </span>
                    <span class="zone__copy">
                        <span class="zone__name" id="selfName">나</span>
                        <span class="zone__line" id="selfLine">누르면 내가 직접 해요</span>
                    </span>
                </button>

                <div class="route-rail" id="routeRail" aria-hidden="true">
                    <span class="route-arrow" id="routeArrow">•</span>
                </div>

                <button class="zone zone--other" type="button" id="otherZone" data-zone="other" aria-label="친구의 직접 행동 제출">
                    <span class="zone__role" id="otherRole">직접 행동</span>
                    <span class="zone__image-wrap">
                        <img
                            id="otherImage"
                            src="../assets/c15/grammar/images/ge-hada-cast/friend_female_01.webp"
                            alt="친구 캐릭터"
                            width="1012"
                            height="1012"
                            loading="lazy"
                            decoding="async" />
                    </span>
                    <span class="zone__copy">
                        <span class="zone__name" id="otherName">친구</span>
                        <span class="zone__line" id="otherLine">누르면 친구가 직접 해요</span>
                    </span>
                </button>
            </div>

            <section class="result-popup" id="resultPopup" aria-live="polite" hidden>
                <p class="result-popup__label" id="resultLabel">완성 문장</p>
                <p class="result-popup__sentence" id="resultSentence"></p>
            </section>
        </section>

        <section class="feedback" id="feedbackBox" role="status" aria-live="polite">
            명사와 동사를 고른 뒤 행동 경로를 만들어 보세요.
        </section>

        <div class="game-actions">
            <button class="control-btn primary" type="button" id="nextBtn" hidden>다음 문제</button>
            <button class="control-btn primary" type="button" id="restartBtn" hidden>다시 하기</button>
        </div>

        <section class="composer" id="composer" aria-label="행동 선택">
            <div
                class="sentence-card"
                id="sentenceCard"
                role="button"
                tabindex="0"
                aria-label="드래그할 행동 카드"
                aria-describedby="routeHelp">
                <span class="sentence-card__icon" id="previewNounIcon" aria-hidden="true">🍰</span>
                <span class="sentence-card__text" id="actionPreviewText">케이크를 먹다</span>
                <span class="sentence-card__icon" id="previewVerbIcon" aria-hidden="true">🍽️</span>
            </div>

            <div class="token-row" id="nounRow" aria-label="명사 선택">
                <button class="token is-selected" type="button" data-kind="noun" data-value="케이크" data-particle="를" data-icon="🍰" aria-pressed="true"><span class="token__icon" aria-hidden="true">🍰</span><span class="token__text">케이크</span></button>
                <button class="token" type="button" data-kind="noun" data-value="빵" data-particle="을" data-icon="🥖" aria-pressed="false"><span class="token__icon" aria-hidden="true">🥖</span><span class="token__text">빵</span></button>
                <button class="token" type="button" data-kind="noun" data-value="밥" data-particle="을" data-icon="🍚" aria-pressed="false"><span class="token__icon" aria-hidden="true">🍚</span><span class="token__text">밥</span></button>
                <button class="token" type="button" data-kind="noun" data-value="물" data-particle="을" data-icon="💧" aria-pressed="false"><span class="token__icon" aria-hidden="true">💧</span><span class="token__text">물</span></button>
                <button class="token" type="button" data-kind="noun" data-value="책" data-particle="을" data-icon="📘" aria-pressed="false"><span class="token__icon" aria-hidden="true">📘</span><span class="token__text">책</span></button>
                <button class="token" type="button" data-kind="noun" data-value="신문" data-particle="을" data-icon="📰" aria-pressed="false"><span class="token__icon" aria-hidden="true">📰</span><span class="token__text">신문</span></button>
                <button class="token" type="button" data-kind="noun" data-value="영화" data-particle="를" data-icon="🎬" aria-pressed="false"><span class="token__icon" aria-hidden="true">🎬</span><span class="token__text">영화</span></button>
                <button class="token" type="button" data-kind="noun" data-value="드라마" data-particle="를" data-icon="📺" aria-pressed="false"><span class="token__icon" aria-hidden="true">📺</span><span class="token__text">드라마</span></button>
            </div>

            <div class="token-row" id="verbRow" aria-label="동사 선택">
                <button class="token is-selected" type="button" data-kind="verb" data-value="먹다" data-present="먹어요" data-ge="먹게" data-icon="🍽️" aria-pressed="true"><span class="token__icon" aria-hidden="true">🍽️</span><span class="token__text">먹다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="마시다" data-present="마셔요" data-ge="마시게" data-icon="🥤" aria-pressed="false"><span class="token__icon" aria-hidden="true">🥤</span><span class="token__text">마시다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="읽다" data-present="읽어요" data-ge="읽게" data-icon="📖" aria-pressed="false"><span class="token__icon" aria-hidden="true">📖</span><span class="token__text">읽다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="보다" data-present="봐요" data-ge="보게" data-icon="👀" aria-pressed="false"><span class="token__icon" aria-hidden="true">👀</span><span class="token__text">보다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="고르다" data-present="골라요" data-ge="고르게" data-icon="☝️" aria-pressed="false"><span class="token__icon" aria-hidden="true">☝️</span><span class="token__text">고르다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="사다" data-present="사요" data-ge="사게" data-icon="🛍️" aria-pressed="false"><span class="token__icon" aria-hidden="true">🛍️</span><span class="token__text">사다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="웃다" data-present="웃어요" data-ge="웃게" data-icon="😄" aria-pressed="false"><span class="token__icon" aria-hidden="true">😄</span><span class="token__text">웃다</span></button>
                <button class="token" type="button" data-kind="verb" data-value="울다" data-present="울어요" data-ge="울게" data-icon="😢" aria-pressed="false"><span class="token__icon" aria-hidden="true">😢</span><span class="token__text">울다</span></button>
            </div>

            <p class="route-help" id="routeHelp">
                인물 한 곳에 놓으면 직접 행동, 두 인물을 순서대로 지나 놓으면 원인자 → 행위자예요.
            </p>

            <div class="route-controls" role="group" aria-label="사동 경로 선택">
                <button class="control-btn route" type="button" data-route="self-to-other">나 → 타인</button>
                <button class="control-btn route" type="button" data-route="other-to-self">타인 → 나</button>
            </div>

            <div class="controls">
                <button class="control-btn" type="button" id="resetBtn">처음부터</button>
            </div>
        </section>
    </main>

    <div class="command-beam" id="commandBeam" aria-hidden="true"></div>

    <script src="grammar1-ge-hada-game.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
