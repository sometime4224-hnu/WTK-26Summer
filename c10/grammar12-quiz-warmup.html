        const state = {
            screen: "start",
            selectedSet: "all",
            questions: [],
            index: 0,
            answers: [],
            answered: false
        };

        function esc(value) {
            return String(value == null ? "" : value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function stripContextLabel(value) {
            return String(value || "")
                .replace(/^상황:\s*/i, "")
                .replace(/^Tình huống:\s*/i, "");
        }

        function langNote(lang, label, value) {
            if (!value) return "";
            const dir = lang === "ar" ? ' dir="rtl"' : "";
            return `<p data-lang="${lang}" lang="${lang}"${dir} class="lang-box safe-wrap"><b>${label}:</b> ${esc(value)}</p>`;
        }

        function viNote(label, value) {
            return langNote("vi", label, value);
        }

        function contextText(question, lang) {
            if (!question) return "";
            if (lang === "vi") return stripContextLabel(question.contextVi);
            return stripContextLabel(CONTEXT_TRANSLATIONS[question.id]?.[lang]);
        }

        function contextNotes(question, koreanClass = "text-xs text-slate-700") {
            const korean = stripContextLabel(question?.contextKo);
            const translated = LANG_ORDER.map((lang) => {
                const text = contextText(question, lang);
                if (!text) return "";
                return langNote(lang, CONTEXT_LABELS[lang] || lang, text);
            }).join("");
            return `
                <p class="${koreanClass} safe-wrap"><b>상황:</b> ${esc(korean)}</p>
                ${translated}
            `;
        }

        function syncMultilang() {
            const api = window.MultilangToggle;
            if (api?.setLang) api.setLang(api.getLang?.() || "none");
        }

        function shuffle(list) {
            const arr = [...list];
            for (let i = arr.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        function getPool(setName) {
            if (setName === "all") return QUESTION_BANK;
            return QUESTION_BANK.filter((q) => q.grammar === setName);
        }

        function currentQuestion() {
            return state.questions[state.index] || null;
        }

        function setSet(setName) {
            state.selectedSet = setName;
            render();
        }

        function startQuiz() {
            state.questions = shuffle(getPool(state.selectedSet));
            state.index = 0;
            state.answers = [];
            state.answered = false;
            state.screen = "quiz";
            render();
        }

        function backToStart() {
            state.screen = "start";
            render();
        }

        function answerOX(choiceIsO) {
            if (state.answered) return;
            const q = currentQuestion();
            if (!q) return;

            const userCorrect = choiceIsO === q.isCorrectUsage;
            state.answers.push({
                id: q.id,
                grammar: q.grammar,
                sentence: q.sentence,
                contextKo: q.contextKo,
                contextVi: q.contextVi,
                userChoice: choiceIsO ? "O" : "X",
                correctChoice: q.isCorrectUsage ? "O" : "X",
                userCorrect,
                reasonKo: q.reasonKo,
                reasonVi: q.reasonVi,
                correction: q.correction,
                morphologyFocus: q.morphologyFocus || null
            });
            state.answered = true;
            render();
        }

        function nextQuestion() {
            if (!state.answered) return;
            if (state.index < state.questions.length - 1) {
                state.index += 1;
                state.answered = false;
                render();
            } else {
                state.screen = "result";
                render();
            }
        }

        function restartQuiz() {
            startQuiz();
        }

        function morphologyBlock(answer) {
            if (!answer.morphologyFocus) return "";
            return `
                <div class="mt-3 rounded-lg border border-rose-200 bg-white p-3">
                    <p class="text-xs font-bold text-rose-700">형태 오류 강조</p>
                    <p class="text-xs text-rose-700 mt-1"><b>틀린 형태:</b> <span class="font-black underline decoration-2 decoration-rose-500">${esc(answer.morphologyFocus.wrongPart)}</span></p>
                    <p class="text-xs text-emerald-700 mt-1"><b>올바른 형태:</b> <span class="font-black underline decoration-2 decoration-emerald-500">${esc(answer.morphologyFocus.correctPart)}</span></p>
                    <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>포인트 (KO):</b> ${esc(answer.morphologyFocus.pointKo)}</p>
                    ${viNote("Điểm chính", answer.morphologyFocus.pointVi)}
                </div>
            `;
        }

        function feedbackBlock(answer) {
            const ok = answer.userCorrect;
            const truthIsO = answer.correctChoice === "O";

            const statusKo = ok ? "정답입니다." : "오답입니다.";
            const statusVi = ok ? "Bạn làm đúng." : "Bạn làm sai.";

            const summaryKo = truthIsO
                ? "이 문장은 문법 사용이 올바른 예문입니다."
                : "이 문장은 문법 사용이 잘못된 예문입니다.";

            const summaryVi = truthIsO
                ? "Câu này dùng ngữ pháp đúng."
                : "Câu này dùng ngữ pháp chưa đúng.";

            return `
                <div class="mt-4 rounded-xl border p-4 ${ok ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                    <p class="text-sm font-bold ${ok ? "text-emerald-700" : "text-rose-700"}">${statusKo}</p>
                    ${viNote("Trạng thái", statusVi)}
                    <p class="text-xs text-slate-700 mt-2"><b>정답:</b> ${answer.correctChoice} / <b>내 선택:</b> ${answer.userChoice}</p>
                    <p class="text-xs text-slate-700 mt-1">${summaryKo}</p>
                    ${viNote("Tóm tắt", summaryVi)}
                    <div class="mt-3 text-xs text-slate-700 safe-wrap">
                        <p><b>이유 (KO):</b> ${esc(answer.reasonKo)}</p>
                        ${viNote("Lý do", answer.reasonVi)}
                        ${answer.correction ? `<p class="mt-2"><b>교정 문장:</b> ${esc(answer.correction)}</p>` : ""}
                    </div>
                    ${!ok ? morphologyBlock(answer) : ""}
                </div>
            `;
        }
        function renderStart() {
            const totalAll = QUESTION_BANK.length;
            const totalD = QUESTION_BANK.filter((q) => q.grammar === "-던").length;
            const totalJ = QUESTION_BANK.filter((q) => q.grammar === "-잖아요").length;

            return `
                <section class="space-y-4">
                    <div class="bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-2xl p-5 shadow-sm">
                        <h1 class="text-xl font-black text-blue-700 safe-wrap">문법 1+2 사전 O/X 퀴즈</h1>
                        <p class="text-sm text-slate-700 mt-2">문장을 보고 '-던' / '-잖아요' 사용이 맞으면 O, 틀리면 X를 누르세요.</p>
                        <p class="text-xs text-slate-500 mt-1">문항별 상황은 선택한 언어로 확인할 수 있습니다.</p>

                        <div class="mt-4 grid grid-cols-3 gap-2 text-xs">
                            <div class="bg-white border border-blue-100 rounded-lg p-2 text-center"><p class="text-slate-500">전체</p><p class="font-bold">${totalAll}</p></div>
                            <div class="bg-white border border-blue-100 rounded-lg p-2 text-center"><p class="text-slate-500">-던</p><p class="font-bold">${totalD}</p></div>
                            <div class="bg-white border border-blue-100 rounded-lg p-2 text-center"><p class="text-slate-500">-잖아요</p><p class="font-bold">${totalJ}</p></div>
                        </div>

                        <div class="mt-4 grid grid-cols-3 gap-2">
                            <button onclick="setSet('all')" class="border rounded-lg py-2 text-xs font-bold ${state.selectedSet === "all" ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-700 border-slate-300"}">전체</button>
                            <button onclick="setSet('-던')" class="border rounded-lg py-2 text-xs font-bold ${state.selectedSet === "-던" ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-700 border-slate-300"}">-던</button>
                            <button onclick="setSet('-잖아요')" class="border rounded-lg py-2 text-xs font-bold ${state.selectedSet === "-잖아요" ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-700 border-slate-300"}">-잖아요</button>
                        </div>

                        <button onclick="startQuiz()" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700">연습 시작</button>
                    </div>
                </section>
            `;
        }

        function renderQuiz() {
            const q = currentQuestion();
            if (!q) return "";

            const idx = state.index + 1;
            const total = state.questions.length;
            const progress = Math.round((idx / total) * 100);
            const latest = state.answers[state.answers.length - 1];

            const oxButtons = `
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="answerOX(true)" ${state.answered ? "disabled" : ""} class="ox-btn border-2 rounded-xl font-black text-lg ${state.answered ? "border-slate-200 text-slate-300" : "border-emerald-400 text-emerald-700 bg-emerald-50"}">O</button>
                    <button onclick="answerOX(false)" ${state.answered ? "disabled" : ""} class="ox-btn border-2 rounded-xl font-black text-lg ${state.answered ? "border-slate-200 text-slate-300" : "border-rose-400 text-rose-700 bg-rose-50"}">X</button>
                </div>
            `;

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="flex items-center justify-between text-xs">
                            <span class="font-bold text-blue-600">${idx} / ${total}</span>
                            <span class="text-slate-500">${q.grammar}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-xs font-bold text-slate-500">문장</p>
                        <p class="text-base font-bold text-slate-800 mt-2 leading-relaxed safe-wrap">${esc(q.sentence)}</p>

                        <div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3">
                            ${contextNotes(q)}
                        </div>

                        ${oxButtons}

                        ${state.answered && latest ? feedbackBlock(latest) : ""}

                        ${state.answered ? `<button onclick="nextQuestion()" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">다음 문제</button>` : ""}
                    </div>
                </section>
            `;
        }

        function renderResult() {
            const total = state.answers.length;
            const correct = state.answers.filter((a) => a.userCorrect).length;
            const wrong = total - correct;
            const percent = total ? Math.round((correct / total) * 100) : 0;

            const wrongList = state.answers.filter((a) => !a.userCorrect).map((a, i) => `
                <article class="bg-rose-50 border border-rose-200 rounded-xl p-3">
                    <p class="text-xs font-bold text-rose-700">오답 ${i + 1}</p>
                    <p class="text-sm text-slate-800 mt-1 safe-wrap">${esc(a.sentence)}</p>
                    <p class="text-xs text-slate-700 mt-2"><b>정답:</b> ${a.correctChoice}</p>
                    <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>이유 (KO):</b> ${esc(a.reasonKo)}</p>
                    ${viNote("Lý do", a.reasonVi)}
                    ${a.correction ? `<p class="text-xs text-slate-700 mt-1 safe-wrap"><b>교정:</b> ${esc(a.correction)}</p>` : ""}
                    ${a.morphologyFocus ? `
                        <div class="mt-2 rounded-lg border border-rose-200 bg-white p-2">
                            <p class="text-xs text-rose-700"><b>틀린 형태:</b> <span class="font-black underline decoration-2 decoration-rose-500">${esc(a.morphologyFocus.wrongPart)}</span></p>
                            <p class="text-xs text-emerald-700 mt-1"><b>올바른 형태:</b> <span class="font-black underline decoration-2 decoration-emerald-500">${esc(a.morphologyFocus.correctPart)}</span></p>
                        </div>
                    ` : ""}
                </article>
            `).join("");

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                        <h1 class="text-2xl font-black text-slate-800">${correct} / ${total}</h1>
                        <p class="text-sm text-slate-600 mt-1">정답률 ${percent}% · 오답 ${wrong}개</p>
                        <div class="grid gap-2 mt-4">
                            <button onclick="restartQuiz()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm">다시 연습</button>
                            <a href="grammar12-quiz.html" class="w-full border border-slate-300 text-slate-700 py-2.5 rounded-xl font-bold text-sm text-center no-underline">통합 퀴즈로 이동</a>
                            <button onclick="backToStart()" class="w-full border border-slate-300 text-slate-700 py-2.5 rounded-xl font-bold text-sm">시작 화면</button>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm ${wrong ? "" : "hidden"}">
                        <h2 class="text-sm font-bold text-slate-800 mb-3">오답 복기</h2>
                        <div class="space-y-2">${wrongList}</div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById("app");
            if (state.screen === "start") app.innerHTML = renderStart();
            else if (state.screen === "quiz") app.innerHTML = renderQuiz();
            else app.innerHTML = renderResult();
            syncMultilang();
        }

        document.addEventListener("DOMContentLoaded", () => {
            render();
        });
    </script>
    <script src="../shared/c10-grammar-support-multilang.js"></script>
    <script src="../shared/multilang-toggle.js"></script>
    <script src="../shared/learning-enhancements.js"></script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
