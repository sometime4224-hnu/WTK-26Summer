<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>12과 쓰기 소나기</title>
    <link rel="stylesheet" href="../shared/site-theme.css">
    <link rel="stylesheet" href="../shared/multilang-toggle.css">
    <style>
      :root {
        --ink: #172033;
        --muted: #64748b;
        --line: #d7e0ea;
        --blue: #2563eb;
        --green: #047857;
        --orange: #c2410c;
        --purple: #6d28d9;
        --red: #dc2626;
        --paper: #ffffff;
        --soft: #f8fafc;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.12), transparent 34%),
          linear-gradient(225deg, rgba(4, 120, 87, 0.12), transparent 40%),
          linear-gradient(180deg, #f8fafc 0%, #eef6ff 52%, #f0fdfa 100%);
        color: var(--ink);
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", system-ui, sans-serif;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }

      button,
      textarea {
        font: inherit;
      }

      .page {
        width: min(100vw - 28px, 1240px);
        margin: 0 auto;
        padding: 14px 0 30px;
      }

      .topbar,
      .level-map,
      .mission,
      .basket,
      .report {
        border: 1px solid rgba(215, 224, 234, 0.94);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 54px;
        padding: 8px 10px;
        backdrop-filter: blur(12px);
      }

      .nav-link,
      .ghost-button,
      .primary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: #ffffff;
        color: #334155;
        font-weight: 950;
        text-decoration: none;
        cursor: pointer;
      }

      .primary-button {
        border-color: #172033;
        background: #172033;
        color: #ffffff;
      }

      .topbar-title {
        min-width: 0;
        text-align: center;
      }

      .topbar-title span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .topbar-title strong {
        display: block;
        overflow: hidden;
        font-size: clamp(20px, 3.6vw, 34px);
        font-weight: 950;
        line-height: 1.1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        border-radius: 999px;
        padding: 7px 11px;
        background: #ecfdf5;
        color: #047857;
        font-size: 12px;
        font-weight: 950;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 0.78fr) minmax(0, 1.22fr) minmax(300px, 0.82fr);
        gap: 12px;
        align-items: start;
        margin-top: 12px;
      }

      .level-map,
      .mission,
      .basket,
      .report {
        padding: 14px;
      }

      .level-map {
        position: sticky;
        top: 78px;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
      }

      .panel-title h2,
      .panel-title h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 28px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .small-note {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        line-height: 1.45;
      }

      .level-list {
        display: grid;
        gap: 10px;
      }

      .level-block {
        display: grid;
        gap: 8px;
      }

      .level-card {
        width: 100%;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
        text-align: left;
        cursor: pointer;
      }

      .level-card.is-active {
        border-color: var(--blue);
        background: #eff6ff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
      }

      .level-card strong {
        display: block;
        color: #0f172a;
        font-size: 17px;
        font-weight: 950;
      }

      .level-card span {
        display: block;
        margin-top: 3px;
        color: #475569;
        font-size: 12px;
        font-weight: 850;
        line-height: 1.45;
      }

      .stage-map {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .stage-chip {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
        width: 100%;
        min-height: 36px;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        background: #f8fafc;
        color: #334155;
        padding: 6px 8px;
        font-size: 12px;
        font-weight: 900;
        text-align: left;
        cursor: pointer;
      }

      .stage-chip.is-active {
        border-color: var(--green);
        background: #ecfdf5;
        color: #065f46;
      }

      .stage-chip__index {
        display: inline-grid;
        width: 22px;
        height: 22px;
        place-items: center;
        border-radius: 999px;
        background: #172033;
        color: #ffffff;
        font-size: 11px;
      }

      .stage-chip__count {
        color: #64748b;
        white-space: nowrap;
      }

      .mission {
        border: 4px solid #2563eb;
        box-shadow: 0 0 0 7px rgba(37, 99, 235, 0.14), var(--shadow);
      }

      .rain-strip {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 7px;
        margin: 10px 0 12px;
      }

      .drop-card {
        min-height: 54px;
        border: 1px solid #bfdbfe;
        border-radius: 999px 999px 12px 12px;
        background: #eff6ff;
        color: #1e3a8a;
        font-size: 12px;
        font-weight: 950;
        line-height: 1.2;
        padding: 8px 7px;
        text-align: center;
      }

      .drop-card.is-current {
        border-color: #2563eb;
        background: #dbeafe;
        color: #172033;
        transform: translateY(4px);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
      }

      .drop-card.is-done {
        border-color: #86efac;
        background: #dcfce7;
        color: #166534;
      }

      .mission-card {
        border: 1px solid #dbeafe;
        border-radius: 16px;
        background: #f8fbff;
        padding: 16px;
      }

      .mission-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 5px 10px;
        background: #dbeafe;
        color: #1e40af;
        font-size: 12px;
        font-weight: 950;
      }

      .pill.alt {
        background: #ecfdf5;
        color: #047857;
      }

      .cue {
        margin: 0;
        color: #0f172a;
        font-size: clamp(25px, 4.4vw, 44px);
        font-weight: 950;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .goal {
        margin: 10px 0 0;
        color: #475569;
        font-size: 15px;
        font-weight: 850;
        line-height: 1.55;
      }

      .helper-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        margin-top: 12px;
      }

      .helper-box {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
      }

      .helper-box strong {
        display: block;
        margin-bottom: 6px;
        color: #334155;
        font-size: 12px;
        font-weight: 950;
      }

      .token-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .token {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 5px 9px;
        background: #f1f5f9;
        color: #334155;
        font-size: 12px;
        font-weight: 850;
      }

      .answer-area {
        margin-top: 12px;
      }

      #answerInput {
        width: 100%;
        min-height: 148px;
        resize: vertical;
        border: 4px solid #172033;
        border-radius: 14px;
        background: #ffffff;
        color: var(--ink);
        font-size: clamp(19px, 3.2vw, 27px);
        font-weight: 850;
        line-height: 1.55;
        padding: 12px 14px;
        outline: none;
      }

      #answerInput:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.18);
      }

      .feedback {
        min-height: 40px;
        margin-top: 8px;
        border-radius: 12px;
        background: #f8fafc;
        color: var(--muted);
        font-size: 14px;
        font-weight: 950;
        line-height: 1.4;
        padding: 10px 12px;
      }

      .feedback.is-good {
        background: #dcfce7;
        color: #166534;
      }

      .feedback.is-warn {
        background: #fef3c7;
        color: #92400e;
      }

      .feedback.is-bad {
        background: #fee2e2;
        color: #991b1b;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
      }

      .shortcut {
        color: #64748b;
        font-size: 12px;
        font-weight: 900;
      }

      .basket {
        position: sticky;
        top: 78px;
      }

      .basket-list {
        display: grid;
        gap: 8px;
        max-height: 540px;
        overflow: auto;
        padding-right: 3px;
      }

      .basket-item {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
      }

      .basket-item b {
        display: block;
        color: #0f172a;
        font-size: 12px;
      }

      .basket-item p {
        margin: 5px 0 0;
        color: #334155;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.5;
      }

      .empty {
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        color: #64748b;
        font-size: 14px;
        font-weight: 850;
        line-height: 1.5;
        padding: 14px;
      }

      .report {
        grid-column: 1 / -1;
      }

      .report[hidden] {
        display: none;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat-card {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #ffffff;
        padding: 12px;
        text-align: center;
      }

      .stat-card span {
        display: block;
        color: #64748b;
        font-size: 12px;
        font-weight: 900;
      }

      .stat-card strong {
        display: block;
        margin-top: 4px;
        color: #172033;
        font-size: 26px;
        font-weight: 950;
      }

      .review-list {
        display: grid;
        gap: 8px;
        margin: 12px 0 0;
        padding-left: 22px;
        color: #334155;
        font-size: 16px;
        font-weight: 850;
      }

      .multilang-bar {
        margin: 8px 0 10px;
      }

      @media (max-width: 1040px) {
        .layout {
          grid-template-columns: minmax(250px, 0.8fr) minmax(0, 1.2fr);
        }

        .basket {
          grid-column: 1 / -1;
          position: relative;
          top: auto;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 18px, 1240px);
          padding-top: 8px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .nav-link,
        .status-chip {
          justify-self: center;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .level-map,
        .basket {
          position: relative;
          top: auto;
        }

        .helper-grid,
        .report-grid {
          grid-template-columns: 1fr;
        }

        .rain-strip {
          gap: 5px;
        }

        .drop-card {
          min-height: 46px;
          font-size: 11px;
          padding: 6px 4px;
        }

        .mission {
          padding: 10px;
        }

        .mission-card {
          padding: 12px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    <script>
      window.MULTILANG_CONFIG = {
        langs: ["vi", "mn", "ar", "kk", "th", "en", "ja", "zh"],
        defaultLang: "none",
        ignoreStoredLang: true
      };
    </script>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="nav-link" href="index.html">12과 홈</a>
        <div class="topbar-title">
          <span>Writing Shower</span>
          <strong>12과 쓰기 소나기</strong>
        </div>
        <span class="status-chip" id="savedStatus">자동 저장</span>
      </header>

      <div class="layout">
        <aside class="level-map" aria-label="쓰기 소나기 레벨과 스테이지">
          <div class="panel-title">
            <h2>소나기 지도</h2>
            <span class="small-note" id="stageTotal">18 스테이지</span>
          </div>
          <div data-multilang-bar></div>
          <div class="level-list" id="levelList"></div>
        </aside>

        <section class="mission" aria-label="현재 쓰기 소나기 미션">
          <div class="panel-title">
            <h1 id="missionTitle">초급 쓰기</h1>
            <span class="small-note" id="progressText">1 / 5</span>
          </div>
          <div class="rain-strip" id="rainStrip" aria-label="현재 스테이지 빗방울"></div>
          <article class="mission-card">
            <div class="mission-meta">
              <span class="pill" id="levelPill">초급</span>
              <span class="pill alt" id="stagePill">1단계</span>
              <span class="pill" id="lengthPill">8자 이상</span>
            </div>
            <p class="cue" id="cueText">운동을 해야 하는 이유를 한 가지 쓰세요.</p>
            <p class="goal" id="goalText">짧은 한 문장으로 생각을 시작합니다.</p>
            <div id="translationHost"></div>
            <div class="helper-grid">
              <div class="helper-box">
                <strong>시작 표현</strong>
                <div class="token-list" id="starterList"></div>
              </div>
              <div class="helper-box">
                <strong>표현 바구니</strong>
                <div class="token-list" id="wordBank"></div>
              </div>
            </div>
            <div class="answer-area">
              <textarea id="answerInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="한국어로 답을 쓰세요."></textarea>
              <div class="feedback" id="feedbackText" aria-live="polite">Ctrl+Enter로 문장을 바구니에 넣습니다.</div>
              <div class="actions">
                <span class="shortcut">Ctrl+Enter: 저장하고 다음 빗방울</span>
                <div>
                  <button class="ghost-button" id="resetButton" type="button">처음부터</button>
                  <button class="ghost-button" id="reportButton" type="button">리포트</button>
                  <button class="primary-button" id="submitButton" type="button">다음 빗방울</button>
                </div>
              </div>
            </div>
          </article>
        </section>

        <aside class="basket" aria-label="문장 바구니">
          <div class="panel-title">
            <h2>문장 바구니</h2>
            <span class="small-note" id="basketCount">0개</span>
          </div>
          <div class="basket-list" id="basketList"></div>
        </aside>

        <section class="report" id="reportPanel" hidden aria-label="쓰기 소나기 리포트">
          <div class="panel-title">
            <h2>소나기 노트</h2>
            <span class="small-note">완성 글이 아니라 문장 재료 모음입니다.</span>
          </div>
          <div class="report-grid">
            <div class="stat-card"><span>전체 답변</span><strong id="reportTotal">0</strong></div>
            <div class="stat-card"><span>초급</span><strong id="reportBasic">0</strong></div>
            <div class="stat-card"><span>중급</span><strong id="reportMiddle">0</strong></div>
            <div class="stat-card"><span>고급</span><strong id="reportAdvanced">0</strong></div>
          </div>
          <ol class="review-list" id="reviewList"></ol>
        </section>
      </div>
    </main>

    <script src="../shared/multilang-toggle.js"></script>
    <script>
      (function () {
        "use strict";

        const STORAGE_KEY = "c12_writing_shower_v1";
        const LANG_CODES = ["vi", "mn", "ar", "kk", "th", "en", "ja", "zh"];
        const BASE_WORDS = ["건강을 유지하다", "체력을 기르다", "스트레스를 해소하다", "비만을 예방하다", "계단을 이용하다", "걷기 운동을 하다", "스트레칭을 하다"];

        function tx(en) {
          return {
            vi: "Gợi ý: Hãy viết câu trả lời bằng tiếng Hàn. " + en,
            mn: "Зөвлөмж: Хариултаа солонгос хэлээр бичээрэй. " + en,
            ar: "اكتب إجابتك بالكورية. " + en,
            kk: "Кеңес: Жауапты корей тілінде жазыңыз. " + en,
            th: "คำแนะนำ: เขียนคำตอบเป็นภาษาเกาหลี " + en,
            en: en,
            ja: "ヒント: 韓国語で答えを書きましょう。 " + en,
            zh: "提示：请用韩语写回答。 " + en
          };
        }

        function p(cueKo, goal, starters, words, minLength, en) {
          return {
            cueKo,
            goal,
            starters,
            wordBank: words,
            minLength,
            translations: tx(en)
          };
        }

        const LEVEL_BLUEPRINTS = [
          {
            id: "basic",
            label: "초급",
            summary: "짧은 단어와 한 문장으로 운동 글쓰기 재료를 모읍니다.",
            stages: [
              {
                title: "운동 이유",
                prompts: [
                  p("운동을 해야 하는 이유를 한 가지 쓰세요.", "짧은 한 문장으로 생각을 시작합니다.", ["운동을 해야 합니다.", "저는 운동을 합니다."], ["건강", "체력", "스트레스"], 8, "Write one simple reason for exercising."),
                  p("건강을 유지하기 위해 무엇을 하면 좋을까요?", "생활 속 쉬운 행동을 하나 씁니다.", ["건강을 유지하기 위해", "저는"], ["걷기 운동을 하다", "계단을 이용하다"], 8, "Write one easy action for keeping healthy."),
                  p("운동을 하면 어떤 점이 좋습니까?", "좋은 점을 한 가지 말합니다.", ["운동을 하면", "좋은 점은"], ["몸이 가벼워지다", "기분이 좋아지다"], 8, "Write one good result of exercise."),
                  p("운동을 안 하면 무엇이 걱정됩니까?", "걱정되는 몸 상태를 씁니다.", ["운동을 안 하면", "저는"], ["살이 찌다", "체력이 약해지다"], 8, "Write one worry when people do not exercise."),
                  p("오늘부터 하고 싶은 운동을 쓰세요.", "내가 선택한 운동을 간단히 씁니다.", ["오늘부터", "저는"], ["걷기", "스트레칭", "계단"], 8, "Write one exercise you want to start today.")
                ]
              },
              {
                title: "생활 운동 방법",

                  p("상대의 문제를 두 가지로 정리하세요.", "바쁨과 건강 걱정을 함께 씁니다.", ["지금 문제는", "첫째"], ["시간 부족", "건강 걱정"], 32, "Summarize two problems in the situation."),
                  p("운동 시간이 부족한 상황을 한 문단으로 쓰세요.", "시간 문제를 구체화합니다.", ["매일 바쁘면", "따로"], ["운동할 시간", "만들기 어렵다"], 32, "Write a short paragraph about not having time to exercise."),
                  p("체중 걱정과 생활 습관을 연결해서 쓰세요.", "걱정의 원인을 생활과 연결합니다.", ["체중이 걱정되는 것은", "생활 속에서"], ["움직임이 적다", "습관"], 32, "Connect weight worries to daily habits."),
                  p("상대가 바로 바꿀 수 있는 작은 문제를 찾으세요.", "큰 문제를 작은 행동으로 바꿉니다.", ["먼저 바꿀 수 있는 것은", "아주 작은"], ["습관", "움직임"], 32, "Find a small problem the person can change."),
                  p("문제 정리 후 다음 문장으로 권유를 준비하세요.", "조언으로 넘어가는 연결 문장을 씁니다.", ["그래서 저는", "큰 운동보다"], ["생활 속 운동", "추천하다"], 28, "Write a transition from problem summary to advice.")
                ]
              },
              {
                title: "생활 운동 권유",
                prompts: [
                  p("엘리베이터 대신 계단 이용을 권유하는 문단을 쓰세요.", "구체적인 행동을 부드럽게 권합니다.", ["먼저", "엘리베이터 대신"], ["계단을 이용하다", "조금씩"], 34, "Recommend using stairs instead of the elevator."),
                  p("가까운 거리를 걸어 보라고 권유하세요.", "생활 속 이동을 운동으로 바꿉니다.", ["가까운 거리는", "걸어 보면"], ["걷기 운동", "맑은 공기"], 34, "Recommend walking for short distances."),
                  p("쉬는 시간 스트레칭을 권유하는 문단을 쓰세요.", "짧은 시간에 가능한 방법을 제안합니다.", ["쉬는 시간에는", "목이나 어깨를"], ["스트레칭", "고개를 돌리다"], 34, "Recommend stretching during breaks."),
                  p("처음 운동하는 사람에게 무리하지 말라고 권하세요.", "부담 없는 시작을 강조합니다.", ["처음부터", "무리하지 말고"], ["조금씩", "꾸준히"], 34, "Advise someone not to overdo exercise at first."),
                  p("세 가지 생활 운동을 한 문단으로 권유하세요.", "방법을 풍부하게 제시합니다.", ["예를 들면", "또"], ["계단", "걷기", "스트레칭"], 38, "Recommend three daily exercises in one short paragraph.")
                ]
              },
              {
                title: "근거 제시",
                prompts: [
                  p("왜 계단 이용이 좋은지 근거를 쓰세요.", "권유의 이유를 설명합니다.", ["계단을 이용하면", "왜냐하면"], ["체력", "운동량"], 34, "Explain why using stairs is helpful."),
                  p("걷기 운동이 건강에 좋은 이유를 쓰세요.", "건강 효과를 근거로 씁니다.", ["걷기 운동은", "특히"], ["건강을 유지하다", "스트레스를 해소하다"], 34, "Explain why walking is good for health."),
                  p("스트레칭이 필요한 이유를 근거와 함께 쓰세요.", "몸 상태와 연결합니다.", ["스트레칭은", "오래 앉아 있으면"], ["목", "어깨", "자세"], 34, "Explain why stretching is needed."),
                  p("생활 속 운동이 계속하기 쉬운 이유를 쓰세요.", "실천 가능성을 근거로 씁니다.", ["생활 속 운동은", "따로"], ["시간", "돈", "쉽다"], 34, "Explain why daily exercise is easy to continue."),
                  p("권유 문단에 넣을 근거 두 가지를 쓰세요.", "두 가지 이유를 나열합니다.", ["첫째", "둘째"], ["건강", "기분", "체력"], 36, "Write two reasons to include in an advice paragraph.")
                ]
              },
              {
                title: "예상 효과",
                prompts: [
                  p("생활 속 운동을 시작하면 예상되는 효과를 쓰세요.", "미래 변화를 예상합니다.", ["이렇게 하면", "아마"], ["몸이 가벼워지다", "건강해지다"], 34, "Write expected effects of starting daily exercise."),
                  p("꾸준히 걷기 운동을 하면 어떤 변화가 있을지 쓰세요.", "꾸준함의 효과를 씁니다.", ["꾸준히 걷기 운동을 하면", "점점"], ["체력", "기분"], 34, "Write expected changes from regular walking."),
                  p("스트레칭을 계속하면 목 건강이 어떻게 될지 쓰세요.", "신체 부위의 변화를 예상합니다.", ["스트레칭을 계속하면", "목이"], ["편해지다", "자세가 좋아지다"], 34, "Write expected effects of regular stretching."),
                  p("계단 이용을 습관으로 만들면 어떤 결과가 있을까요?", "습관과 결과를 연결합니다.", ["계단 이용이 습관이 되면", "운동량이"], ["늘다", "체력이 좋아지다"], 34, "Write expected results from making stairs a habit."),
                  p("상대가 느낄 긍정적인 변화를 상상해 쓰세요.", "감정과 몸 상태를 함께 씁니다.", ["조금씩 실천하면", "스스로"], ["뿌듯하다", "건강해지다"], 34, "Imagine positive changes the person may feel.")
                ]
              },
              {
                title: "답글형 미니 문단",
                prompts: [
                  p("고민 글에 답하는 첫 문단을 쓰세요.", "공감과 문제 정리를 함께 넣습니다.", ["글을 읽어 보니", "운동할 시간이"], ["공감", "걱정"], 42, "Write the first paragraph of a reply."),
                  p("생활 속 운동을 권유하는 중심 문단을 쓰세요.", "구체적인 방법 두 가지를 넣습니다.", ["저는", "예를 들면"], ["계단", "걷기", "스트레칭"], 42, "Write a body paragraph recommending daily exercise."),
                  p("운동의 장점을 설명하는 문단을 쓰세요.", "근거와 예상 효과를 함께 씁니다.", ["이런 운동은", "꾸준히 하면"], ["건강", "스트레스", "체력"], 42, "Write a paragraph explaining benefits of exercise."),
                  p("답글의 마지막 조언 문단을 쓰세요.", "부드러운 격려로 마무리합니다.", ["처음에는", "하지만"], ["조금씩", "꾸준히", "응원"], 42, "Write a closing advice paragraph."),
                  p("고급 단계 전체를 정리하는 미니 답글을 쓰세요.", "공감, 권유, 효과를 모두 넣습니다.", ["걱정이 많겠지만", "생활 속에서"], ["계단", "걷기", "건강"], 48, "Write a mini reply with empathy, advice, and effects.")
                ]
              }
            ]
          }
        ];

        const WRITING_SHOWER_LEVELS = LEVEL_BLUEPRINTS.map((level) => ({
          id: level.id,
          label: level.label,
          summary: level.summary,
          stages: level.stages.map((stage, stageIndex) => ({
            id: `${level.id}-stage-${stageIndex + 1}`,
            title: stage.title,
            prompts: stage.prompts.map((prompt, promptIndex) => Object.assign({}, prompt, {
              id: `${level.id}-${stageIndex + 1}-${promptIndex + 1}`,
              level: level.id,
              stage: stageIndex,
              order: promptIndex
            }))
          }))
        }));

        const els = {
          savedStatus: document.getElementById("savedStatus"),
          stageTotal: document.getElementById("stageTotal"),
          levelList: document.getElementById("levelList"),
          missionTitle: document.getElementById("missionTitle"),
          progressText: document.getElementById("progressText"),
          rainStrip: document.getElementById("rainStrip"),
          levelPill: document.getElementById("levelPill"),
          stagePill: document.getElementById("stagePill"),
          lengthPill: document.getElementById("lengthPill"),
          cueText: document.getElementById("cueText"),
          goalText: document.getElementById("goalText"),
          translationHost: document.getElementById("translationHost"),
          starterList: document.getElementById("starterList"),
          wordBank: document.getElementById("wordBank"),
          answerInput: document.getElementById("answerInput"),
          feedbackText: document.getElementById("feedbackText"),
          submitButton: document.getElementById("submitButton"),
          resetButton: document.getElementById("resetButton"),
          reportButton: document.getElementById("reportButton"),
          basketList: document.getElementById("basketList"),
          basketCount: document.getElementById("basketCount"),
          reportPanel: document.getElementById("reportPanel"),
          reportTotal: document.getElementById("reportTotal"),
          reportBasic: document.getElementById("reportBasic"),
          reportMiddle: document.getElementById("reportMiddle"),
          reportAdvanced: document.getElementById("reportAdvanced"),
          reviewList: document.getElementById("reviewList")
        };

        const state = loadState();

        function defaultState() {
          return {
            levelId: "basic",
            stageIndex: 0,
            promptIndex: 0,
            drafts: {},
            answers: {},
            showReport: false
          };
        }

        function loadState() {
          try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
            return Object.assign(defaultState(), saved || {});
          } catch {
            return defaultState();
          }
        }

        function saveState() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.assign({}, state, {
            savedAt: Date.now(),
            summary: buildSummary()
          })));
          els.savedStatus.textContent = "저장됨";
        }

        function getLevel(levelId) {
          return WRITING_SHOWER_LEVELS.find((level) => level.id === levelId) || WRITING_SHOWER_LEVELS[0];
        }

        function getCurrentLevel() {
          return getLevel(state.levelId);
        }

        function getCurrentStage() {
          return getCurrentLevel().stages[state.stageIndex] || getCurrentLevel().stages[0];
        }

        function getCurrentPrompt() {
          return getCurrentStage().prompts[state.promptIndex] || getCurrentStage().prompts[0];
        }

        function answerKey(prompt) {
          return prompt.id;
        }

        function normalize(value) {
          return String(value || "").replace(/\s+/g, " ").trim();
        }

        function charLength(value) {
          return Array.from(normalize(value).replace(/\s/g, "")).length;
        }

        function escapeHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function render() {
          const level = getCurrentLevel();
          const stage = getCurrentStage();
          const prompt = getCurrentPrompt();
          const key = answerKey(prompt);
          const stageCount = WRITING_SHOWER_LEVELS.reduce((sum, item) => sum + item.stages.length, 0);
          els.stageTotal.textContent = `${stageCount} 스테이지`;
          renderLevelMap();
          renderMission(level, stage, prompt);
          renderBasket();
          renderReport();
          els.answerInput.value = state.drafts[key] || "";
          window.requestAnimationFrame(() => els.answerInput.focus({ preventScroll: true }));
          if (window.MultilangToggle) window.MultilangToggle.refresh();
        }

        function renderLevelMap() {
          els.levelList.innerHTML = WRITING_SHOWER_LEVELS.map((level) => {
            const active = level.id === state.levelId;
            const stages = level.stages.map((stage, index) => {
              const done = stage.prompts.filter((prompt) => state.answers[prompt.id]).length;
              const classes = ["stage-chip"];
              if (active && index === state.stageIndex) classes.push("is-active");
              return `
                <button class="${classes.join(" ")}" type="button" data-stage-button="${level.id}:${index}">
                  <span class="stage-chip__index">${index + 1}</span>
                  <span>${escapeHtml(stage.title)}</span>
                  <span class="stage-chip__count">${done}/5</span>
                </button>
              `;
            }).join("");
            return `
              <div class="level-block" data-level-card="${level.id}">
                <button class="level-card ${active ? "is-active" : ""}" type="button" data-level-button="${level.id}">
                  <strong>${escapeHtml(level.label)}</strong>
                  <span>${escapeHtml(level.summary)}</span>
                </button>
                <div class="stage-map">${stages}</div>
              </div>
            `;
          }).join("");
        }

        function renderMission(level, stage, prompt) {
          const completedInStage = stage.prompts.filter((item) => state.answers[item.id]).length;
          els.missionTitle.textContent = `${level.label} 쓰기`;
          els.progressText.textContent = `${state.promptIndex + 1} / ${stage.prompts.length}`;
          els.levelPill.textContent = level.label;
          els.stagePill.textContent = `${state.stageIndex + 1}단계 · ${stage.title}`;
          els.lengthPill.textContent = `${prompt.minLength}자 이상`;
          els.cueText.textContent = prompt.cueKo;
          els.goalText.textContent = prompt.goal;
          els.rainStrip.innerHTML = stage.prompts.map((item, index) => {
            const classes = ["drop-card"];
            if (index === state.promptIndex) classes.push("is-current");
            if (state.answers[item.id]) classes.push("is-done");
            return `<button class="${classes.join(" ")}" type="button" data-prompt-button="${index}">${index + 1}<br>${state.answers[item.id] ? "저장" : index === state.promptIndex ? "현재" : "대기"}</button>`;
          }).join("");
          els.starterList.innerHTML = prompt.starters.map((item) => `<button class="token" type="button" data-insert="${escapeHtml(item)}">${escapeHtml(item)}</button>`).join("");
          els.wordBank.innerHTML = prompt.wordBank.map((item) => `<button class="token" type="button" data-insert="${escapeHtml(item)}">${escapeHtml(item)}</button>`).join("");
          els.translationHost.innerHTML = LANG_CODES.map((lang) => {
            const dir = lang === "ar" ? ' dir="rtl"' : "";
            return `<div class="lang-box" data-lang="${lang}" lang="${lang}"${dir}>${escapeHtml(prompt.translations[lang])}</div>`;
          }).join("");
          els.feedbackText.textContent = completedInStage === 5 ? "이 스테이지의 모든 빗방울을 저장했습니다." : "Ctrl+Enter로 문장을 바구니에 넣습니다.";
          els.feedbackText.className = "feedback";
        }

        function renderBasket() {
          const answers = getAnswers();
          els.basketCount.textContent = `${answers.length}개`;
          if (!answers.length) {
            els.basketList.innerHTML = '<div class="empty">아직 저장한 문장이 없습니다. 현재 빗방울에 답을 쓰면 여기에 쌓입니다.</div>';
            return;
          }
          els.basketList.innerHTML = answers.slice(-12).reverse().map((entry) => `
            <article class="basket-item">
              <b>${escapeHtml(entry.levelLabel)} · ${entry.stageTitle}</b>
              <p>${escapeHtml(entry.text)}</p>
            </article>
          `).join("");
        }

        function renderReport() {
          els.reportPanel.hidden = !state.showReport;
          if (!state.showReport) return;
          const summary = buildSummary();
          els.reportTotal.textContent = String(summary.total);
          els.reportBasic.textContent = String(summary.byLevel.basic);
          els.reportMiddle.textContent = String(summary.byLevel.middle);
          els.reportAdvanced.textContent = String(summary.byLevel.advanced);
          const weakest = WRITING_SHOWER_LEVELS.flatMap((level) => level.stages.map((stage, index) => {
            const done = stage.prompts.filter((prompt) => state.answers[prompt.id]).length;
            return { level, stage, index, done };
          })).sort((a, b) => a.done - b.done).slice(0, 4);
          els.reviewList.innerHTML = weakest.map((item) => `<li>${escapeHtml(item.level.label)} ${item.index + 1}단계 ${escapeHtml(item.stage.title)}: ${item.done}/5개 저장</li>`).join("");
        }

        function getAnswers() {
          return WRITING_SHOWER_LEVELS.flatMap((level) => level.stages.flatMap((stage) => stage.prompts.map((prompt) => {
            const answer = state.answers[prompt.id];
            if (!answer) return null;
            return {
              id: prompt.id,
              level: level.id,
              levelLabel: level.label,
              stageTitle: stage.title,
              cueKo: prompt.cueKo,
              text: answer.text,
              ts: answer.ts
            };
          }))).filter(Boolean).sort((a, b) => a.ts - b.ts);
        }

        function buildSummary() {
          const answers = getAnswers();
          return {
            total: answers.length,
            byLevel: {
              basic: answers.filter((item) => item.level === "basic").length,
              middle: answers.filter((item) => item.level === "middle").length,
              advanced: answers.filter((item) => item.level === "advanced").length
            }
          };
        }

        function setFeedback(message, kind) {
          els.feedbackText.textContent = message;
          els.feedbackText.className = "feedback" + (kind ? " is-" + kind : "");
        }

        function submitAnswer() {
          const prompt = getCurrentPrompt();
          const key = answerKey(prompt);
          const text = normalize(els.answerInput.value);
          if (charLength(text) < prompt.minLength) {
            setFeedback(`조금 더 써 보세요. 현재 ${charLength(text)}자, 목표 ${prompt.minLength}자 이상입니다.`, "warn");
            els.answerInput.focus();
            return;
          }
          state.answers[key] = {
            text,
            level: state.levelId,
            stage: state.stageIndex,
            prompt: state.promptIndex,
            cueKo: prompt.cueKo,
            ts: Date.now()
          };
          state.drafts[key] = text;
          setFeedback("문장 바구니에 저장했습니다. 다음 빗방울로 이동합니다.", "good");
          advancePrompt();
          saveState();
          render();
        }

        function advancePrompt() {
          const stage = getCurrentStage();
          const level = getCurrentLevel();
          if (state.promptIndex < stage.prompts.length - 1) {
            state.promptIndex += 1;
            return;
          }
          if (state.stageIndex < level.stages.length - 1) {
            state.stageIndex += 1;
            state.promptIndex = 0;
            return;
          }
          const nextLevelIndex = WRITING_SHOWER_LEVELS.findIndex((item) => item.id === state.levelId) + 1;
          if (nextLevelIndex < WRITING_SHOWER_LEVELS.length) {
            state.levelId = WRITING_SHOWER_LEVELS[nextLevelIndex].id;
            state.stageIndex = 0;
            state.promptIndex = 0;
            return;
          }
          state.showReport = true;
        }

        function insertText(value) {
          const input = els.answerInput;
          const start = input.selectionStart || 0;
          const end = input.selectionEnd || 0;
          const before = input.value.slice(0, start);
          const after = input.value.slice(end);
          const spacer = before && !/\s$/.test(before) ? " " : "";
          input.value = before + spacer + value + after;
          const next = (before + spacer + value).length;
          input.setSelectionRange(next, next);
          saveDraft();
          input.focus();
        }

        function saveDraft() {
          const prompt = getCurrentPrompt();
          state.drafts[answerKey(prompt)] = els.answerInput.value;
          saveState();
        }

        function resetAll() {
          localStorage.removeItem(STORAGE_KEY);
          Object.assign(state, defaultState());
          render();
        }

        function bindEvents() {
          document.addEventListener("click", (event) => {
            const levelButton = event.target.closest("[data-level-button]");
            if (levelButton) {
              state.levelId = levelButton.dataset.levelButton;
              state.stageIndex = 0;
              state.promptIndex = 0;
              state.showReport = false;
              saveState();
              render();
              return;
            }
            const stageButton = event.target.closest("[data-stage-button]");
            if (stageButton) {
              const [levelId, index] = stageButton.dataset.stageButton.split(":");
              state.levelId = levelId;
              state.stageIndex = Number(index) || 0;
              state.promptIndex = 0;
              state.showReport = false;
              saveState();
              render();
              return;
            }
            const promptButton = event.target.closest("[data-prompt-button]");
            if (promptButton) {
              state.promptIndex = Number(promptButton.dataset.promptButton) || 0;
              state.showReport = false;
              saveState();
              render();
              return;
            }
            const insertButton = event.target.closest("[data-insert]");
            if (insertButton) insertText(insertButton.dataset.insert);
          });

          els.answerInput.addEventListener("input", saveDraft);
          els.answerInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
              event.preventDefault();
              submitAnswer();
            }
          });
          els.submitButton.addEventListener("click", submitAnswer);
          els.resetButton.addEventListener("click", resetAll);
          els.reportButton.addEventListener("click", () => {
            state.showReport = true;
            saveState();
            render();
            els.reportPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }

        window.__C12_WRITING_SHOWER__ = {
          getState() {
            return JSON.parse(JSON.stringify(state));
          },
          getLevels() {
            return JSON.parse(JSON.stringify(WRITING_SHOWER_LEVELS));
          },
          getSummary: buildSummary
        };

        bindEvents();
        render();
      }());
    </script>
  </body>
</html>
