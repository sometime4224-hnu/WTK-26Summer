<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12과 신체 동작 만들기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="../shared/design-tokens.css" />
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --motion-shell: min(1180px, calc(100vw - 28px));
            --motion-line: #d9e2ec;
            --motion-soft: #f7f9fc;
            --motion-ink: #172033;
            --motion-muted: #64748b;
            --motion-blue: #2563eb;
            --motion-green: #16a34a;
            --motion-orange: #ea580c;
            --motion-violet: #7c3aed;
            --motion-pink: #db2777;
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
            background: #f6f8fb;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            color: var(--motion-ink);
            font-family: "Noto Sans KR", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        button { font: inherit; }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            padding: 0 14px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(217, 226, 236, 0.9);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(14px);
            scrollbar-width: none;
        }

        .top-nav::-webkit-scrollbar { display: none; }

        .top-nav a,
        .top-nav span {
            flex: 0 0 auto;
            color: #1d4ed8;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .top-nav .divider {
            color: #cbd5e1;
        }

        .top-nav .title {
            color: #475569;
        }

        .motion-shell {
            width: var(--motion-shell);
            margin: 14px auto 36px;
        }

        .expression-banner {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            min-height: 88px;
            padding: 14px;
            border: 1px solid var(--motion-line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.09);
        }

        .banner-kicker {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 0 0 4px;
            color: var(--motion-orange);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .expression-text {
            margin: 0;
            color: #0f172a;
            font-size: clamp(24px, 3.6vw, 46px);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: 0;
            word-break: keep-all;
        }

        .expression-feedback {
            margin: 7px 0 0;
            color: var(--motion-muted);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .banner-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .view-toggle {
            display: inline-grid;
            grid-template-columns: repeat(2, minmax(54px, 1fr));
            min-height: 40px;
            overflow: hidden;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            background: #fff;
        }

        .view-toggle button {
            min-width: 0;
            border: 0;
            border-right: 1px solid #dbeafe;
            background: transparent;
            color: #475569;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
        }

        .view-toggle button:last-child {
            border-right: 0;
        }

        .view-toggle button[aria-selected="true"] {
            background: #2563eb;
            color: #fff;
        }

        .icon-btn,
        .text-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            background: #fff;
            color: #1d4ed8;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .icon-btn {
            width: 42px;
            padding: 0;
        }

        .text-btn {
            min-width: 92px;
            padding: 0 13px;
            gap: 7px;
            font-size: 13px;
        }

        .icon-btn:hover,
        .text-btn:hover {
            border-color: #60a5fa;
            background: #eff6ff;
            transform: translateY(-1px);
        }

        .icon-btn:active,
        .text-btn:active {
            transform: translateY(0);
        }

        .lab-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
            gap: 12px;
            margin-top: 12px;
        }

        .stage-panel,
        .side-panel,
        .discover-panel {
            border: 1px solid var(--motion-line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
        }

        .stage-panel {
            min-height: 620px;
            overflow: hidden;
        }

        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 48px;
            padding: 9px 12px;
            border-bottom: 1px solid #edf2f7;
        }

        .stage-head h1 {
            margin: 0;
            color: #0f172a;
            font-size: 15px;
            font-weight: 900;
        }

        .stage-hint {
            margin: 0;
            color: #64748b;
            font-size: 12px;
            font-weight: 800;
        }

        .stage-wrap {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 570px;
            padding: 10px;
            background:
                linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.98)),
                repeating-linear-gradient(0deg, transparent 0 31px, rgba(148, 163, 184, 0.12) 32px),
                repeating-linear-gradient(90deg, transparent 0 31px, rgba(148, 163, 184, 0.12) 32px);
        }

        .pose-stage {
            width: min(100%, 500px);
            height: min(70dvh, 560px);
            min-height: 500px;
            max-height: 590px;
            touch-action: none;
            user-select: none;
        }

        .target-zone {
            fill: rgba(37, 99, 235, 0.08);
            stroke: rgba(37, 99, 235, 0.18);
            stroke-width: 1.5;
            opacity: 0;
            transition: opacity 0.18s ease, stroke 0.18s ease, fill 0.18s ease;
            pointer-events: none;
        }

        .target-zone.is-visible {
            opacity: 1;
        }

        .target-zone.is-active {
            fill: rgba(234, 88, 12, 0.13);
            stroke: rgba(234, 88, 12, 0.82);
            stroke-width: 2.5;
            opacity: 1;
        }

        .guide-line {
            fill: none;
            stroke: rgba(37, 99, 235, 0.34);
            stroke-width: 2;
            stroke-dasharray: 8 7;
            pointer-events: none;
        }

        .guide-line--ground {
            stroke: rgba(22, 163, 74, 0.34);
            stroke-dasharray: none;
        }

        .guide-label {
            fill: #475569;
            font-size: 12px;
            font-weight: 900;
            text-anchor: middle;
            pointer-events: none;
        }

        .limb-line {
            fill: none;
            stroke: #475569;
            stroke-width: 16;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .limb-line--arm {
            stroke: #64748b;
            stroke-width: 15;
        }

        .limb-line--leg {
            stroke: #334155;
            stroke-width: 17;
        }

        .limb-line.is-active-limb {
            stroke: #ea580c;
            filter: drop-shadow(0 4px 8px rgba(234, 88, 12, 0.24));
        }

        .body-shape {
            fill: #f8fafc;
            stroke: #334155;
            stroke-width: 8;
            stroke-linejoin: round;
        }

        .head-shape {
            fill: #fef3c7;
            stroke: #334155;
            stroke-width: 7;
        }

        .joint-dot {
            fill: #fff;
            stroke: rgba(51, 65, 85, 0.38);
            stroke-width: 3;
        }

        .joint-dot.is-active-joint {
            fill: #fef08a;
            stroke: #ea580c;
        }

        .foot-triangle {
            fill: rgba(22, 163, 74, 0.13);
            stroke: rgba(22, 163, 74, 0.74);
            stroke-width: 3;
            stroke-linejoin: round;
        }

        .foot-detail {
            fill: none;
            stroke: rgba(22, 163, 74, 0.72);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .foot-detail-dot {
            fill: #f0fdf4;
            stroke: rgba(22, 163, 74, 0.82);
            stroke-width: 2;
        }

        .side-spine {
            fill: none;
            stroke: #0f766e;
            stroke-width: 9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .side-sternum-line {
            fill: none;
            stroke: rgba(234, 88, 12, 0.68);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .side-posture-dot {
            fill: #fff;
            stroke: rgba(15, 118, 110, 0.78);
            stroke-width: 3;
        }

        .drag-handle {
            fill: #2563eb;
            stroke: #fff;
            stroke-width: 4;
            cursor: grab;
            filter: drop-shadow(0 5px 8px rgba(37, 99, 235, 0.24));
        }

        .drag-handle[data-part*="Hand"] {
            fill: var(--motion-orange);
        }

        .drag-handle[data-part*="Foot"] {
            fill: var(--motion-green);
        }

        .drag-handle[data-part*="Heel"],
        .drag-handle[data-part*="Knee"],
        .drag-handle[data-part*="Elbow"] {
            fill: #0f766e;
        }

        .drag-handle[data-part="head"] {
            fill: var(--motion-pink);
        }

        .drag-handle[data-part="chest"],
        .drag-handle[data-part="waist"] {
            fill: var(--motion-violet);
        }

        .drag-handle.is-dragging {
            cursor: grabbing;
            stroke: #fef08a;
            stroke-width: 5;
        }

        .pose-stage[data-view-mode="side"] #leftArmLine,
        .pose-stage[data-view-mode="side"] #leftLegLine {
            opacity: 0.42;
            stroke-dasharray: 8 9;
        }

        .pose-stage[data-view-mode="side"] #rightArmLine,
        .pose-stage[data-view-mode="side"] #rightLegLine {
            stroke-width: 18;
        }

        .handle-label {
            fill: #0f172a;
            font-size: 10px;
            font-weight: 900;
            text-anchor: middle;
            pointer-events: none;
        }

        .side-detail {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 10px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
            pointer-events: none;
        }

        .side-detail[hidden] {
            display: none;
        }

        .side-metric {
            min-width: 0;
            border: 1px solid rgba(191, 219, 254, 0.95);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            padding: 7px 8px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .side-metric span {
            display: block;
            color: #64748b;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .side-metric strong {
            display: block;
            margin-top: 2px;
            overflow: hidden;
            color: #0f172a;
            font-size: 13px;
            font-weight: 900;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .side-panel {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            min-height: 620px;
            overflow: hidden;
        }

        .mission-head {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
        }

        .mission-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mission-label {
            color: var(--motion-orange);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .mission-count {
            min-width: 64px;
            border-radius: 8px;
            background: #f1f5f9;
            padding: 5px 8px;
            color: #475569;
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .mission-title {
            margin: 0;
            color: #0f172a;
            font-size: 22px;
            font-weight: 900;
            line-height: 1.22;
            letter-spacing: 0;
            word-break: keep-all;
        }

        .mission-feedback {
            margin: 8px 0 0;
            min-height: 22px;
            color: #64748b;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.55;
        }

        .mission-feedback.is-done {
            color: #15803d;
        }

        .mission-head.is-complete {
            animation: mission-head-complete 1.05s ease both;
        }

        .mission-list {
            display: grid;
            align-content: start;
            gap: 8px;
            min-height: 0;
            overflow: auto;
            padding: 10px 12px;
        }

        .mission-chip {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 9px;
            align-items: center;
            width: 100%;
            min-height: 48px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            padding: 8px 10px;
            color: #334155;
            font-weight: 900;
            text-align: left;
            cursor: pointer;
        }

        .mission-chip:hover {
            border-color: #93c5fd;
            background: #f8fbff;
        }

        .mission-chip.is-active {
            border-color: #2563eb;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .mission-chip.is-done {
            border-color: #86efac;
            background: #f0fdf4;
            color: #166534;
        }

        .mission-chip__number {
            display: inline-grid;
            place-items: center;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            background: #f1f5f9;
            font-size: 12px;
        }

        .mission-chip.is-active .mission-chip__number {
            background: #dbeafe;
        }

        .mission-chip.is-done .mission-chip__number {
            background: #dcfce7;
        }

        .mission-chip.is-just-completed {
            animation: mission-chip-complete 0.7s ease both;
        }

        .mission-chip__label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }

        .mission-chip__source {
            color: #64748b;
            font-size: 11px;
            font-weight: 900;
        }

        .discover-panel {
            margin-top: 12px;
            padding: 12px;
        }

        .discover-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .discover-head h2 {
            margin: 0;
            color: #0f172a;
            font-size: 15px;
            font-weight: 900;
        }

        .discovery-count {
            color: #64748b;
            font-size: 12px;
            font-weight: 900;
        }

        .discovery-list {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            min-height: 36px;
        }

        .discovery-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 32px;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            background: #eef2ff;
            padding: 5px 9px;
            color: #3730a3;
            font-size: 12px;
            font-weight: 900;
        }

        .discovery-chip[data-source="core"] {
            border-color: #fed7aa;
            background: #fff7ed;
            color: #9a3412;
        }

        .empty-discovery {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 800;
            line-height: 32px;
        }

        .completion-reaction {
            position: absolute;
            left: 50%;
            top: 18px;
            z-index: 8;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            max-width: min(92%, 360px);
            border: 1px solid #86efac;
            border-radius: 8px;
            background: rgba(240, 253, 244, 0.96);
            box-shadow: 0 18px 36px rgba(21, 128, 61, 0.18);
            padding: 10px 14px;
            color: #166534;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
            pointer-events: none;
            transform: translate(-50%, -10px) scale(0.94);
            opacity: 0;
        }

        .completion-reaction[hidden] {
            display: none;
        }

        .completion-reaction.is-visible {
            animation: completion-reaction-pop 1.45s ease both;
        }

        .completion-reaction__icon {
            display: inline-grid;
            flex: 0 0 auto;
            place-items: center;
            width: 26px;
            height: 26px;
            border-radius: 999px;
            background: #16a34a;
            color: #fff;
            font-size: 15px;
            box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.12);
        }

        .completion-reaction__icon::before {
            content: "\2713";
        }

        .completion-reaction__text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .completion-reaction__spark {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #f97316;
            opacity: 0;
        }

        .completion-reaction__spark:nth-child(3) {
            left: 22px;
            top: -8px;
        }

        .completion-reaction__spark:nth-child(4) {
            right: 26px;
            top: -10px;
            background: #2563eb;
        }

        .completion-reaction.is-visible .completion-reaction__spark {
            animation: completion-spark 0.72s ease-out both;
        }

        .stage-wrap.is-complete::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(34, 197, 94, 0.32);
            border-radius: 8px;
            pointer-events: none;
            animation: stage-complete-ring 0.9s ease both;
        }

        @keyframes completion-reaction-pop {
            0% {
                opacity: 0;
                transform: translate(-50%, -10px) scale(0.94);
            }
            18% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1.03);
            }
            76% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -8px) scale(0.98);
            }
        }

        @keyframes completion-spark {
            0% {
                opacity: 0;
                transform: translate(0, 10px) scale(0.7);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(0, -18px) scale(1.35);
            }
        }

        @keyframes stage-complete-ring {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            22% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(1.025);
            }
        }

        @keyframes mission-head-complete {
            0% {
                background: #fff;
            }
            25% {
                background: #f0fdf4;
            }
            100% {
                background: #fff;
            }
        }

        @keyframes mission-chip-complete {
            0% {
                transform: scale(1);
            }
            35% {
                transform: scale(1.025);
                box-shadow: 0 10px 24px rgba(22, 163, 74, 0.18);
            }
            100% {
                transform: scale(1);
                box-shadow: none;
            }
        }

        @media (max-width: 900px) {
            .motion-shell {
                width: min(100vw - 18px, 760px);
                margin-top: 10px;
            }

            .expression-banner {
                grid-template-columns: 1fr;
                min-height: 0;
                padding: 12px;
            }

            .banner-actions {
                justify-content: flex-start;
            }

            .lab-grid {
                grid-template-columns: 1fr;
            }

            .stage-panel,
            .side-panel {
                min-height: 0;
            }

            .stage-wrap {
                min-height: 520px;
            }

            .pose-stage {
                height: min(63dvh, 530px);
                min-height: 470px;
            }

            .side-panel {
                grid-template-rows: auto auto;
            }

            .mission-list {
                max-height: 260px;
            }
        }

        @media (max-width: 520px) {
            .top-nav {
                gap: 8px;
                padding: 0 10px;
            }

            .top-nav a,
            .top-nav span {
                font-size: 12px;
            }

            .motion-shell {
                width: min(100vw - 12px, 520px);
            }

            .expression-text {
                font-size: clamp(24px, 8vw, 34px);
            }

            .expression-feedback {
                font-size: 12px;
            }

            .stage-head {
                align-items: flex-start;
                flex-direction: column;
                gap: 3px;
            }

            .stage-wrap {
                min-height: 455px;
                padding: 4px;
            }

            .pose-stage {
                height: 452px;
                min-height: 440px;
            }

            .mission-title {
                font-size: 19px;
            }

            .mission-list {
                max-height: 232px;
            }
        }

        @media (min-width: 901px) and (max-height: 760px) {
            .stage-panel,
            .side-panel {
                min-height: 540px;
            }

            .stage-wrap {
                min-height: 492px;
            }

            .pose-stage {
                height: min(66dvh, 500px);
                min-height: 470px;
            }

            .mission-list {
                max-height: 360px;
            }
        }

        body.pc-mode .motion-shell {
            width: min(1320px, calc(100vw - 38px));
        }

        body.pc-mode .lab-grid {
            grid-template-columns: minmax(0, 1.18fr) minmax(340px, 0.82fr);
        }

            buildTargetZones();
            buildHandles();
            buildMissionList();
            bindEvents();
            render();
            exposeApi();
