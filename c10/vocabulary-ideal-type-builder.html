<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10과 어휘 | 이상형 조건 만들기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f1f5f9;
            --ink: #162033;
            --muted: #667085;
            --line: #dbe4f0;
            --line-strong: #b9c7d9;
            --orange: #e4582e;
            --orange-dark: #9a3412;
            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --teal: #0f766e;
            --teal-soft: #ecfdf5;
            --rose: #be123c;
            --rose-soft: #fff1f2;
            --amber: #b45309;
            --amber-soft: #fffbeb;
            --shadow: 0 16px 38px rgba(15, 23, 42, 0.1);
            --shadow-sm: 0 8px 20px rgba(15, 23, 42, 0.07);
        }

        * { box-sizing: border-box; }
        [hidden] { display: none !important; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(180deg, #f8fafc 0%, #eef6ff 52%, #fff7ed 100%);
            color: var(--ink);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            padding: 0 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
        }

        .topbar a {
            color: var(--orange-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .topbar__divider {
            color: #cbd5e1;
            font-weight: 900;
        }

        .shell {
            width: min(1360px, calc(100vw - 28px));
            margin: 16px auto 42px;
        }

        .activity-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(330px, 0.36fr);
            gap: 12px;
            align-items: stretch;
            margin-bottom: 12px;
        }

        .title-panel,
        .metric-panel,
        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-sm);
        }

        .title-panel {
            display: grid;
            align-content: center;
            min-height: 94px;
            padding: 17px 19px;
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--orange);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            line-height: 1.16;
        }

        .subtitle {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
        }

        .metric-panel {
            display: grid;
            grid-template-columns: repeat(3, minmax(86px, 1fr));
            gap: 8px;
            padding: 10px;
        }

        .metric {
            display: grid;
            align-content: center;
            min-height: 72px;
            padding: 10px;
            border: 1px solid #e8eef6;
            border-radius: 8px;
            background: #f8fafc;
        }

        .metric strong {
            font-size: 21px;
            font-weight: 900;
            line-height: 1.1;
        }

        .metric span {
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(320px, 0.92fr) minmax(430px, 1.08fr);
            gap: 12px;
            align-items: start;
        }

        .main-layout.is-generated {
            grid-template-columns: minmax(430px, 0.96fr) minmax(430px, 1.04fr);
        }

        .main-layout.is-generated .bank-panel {
            display: none;
        }

        .output-panel {
            display: none;
        }

        .main-layout.is-generated .output-panel {
            display: block;
        }

        .panel {
            min-width: 0;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 52px;
            padding: 11px 12px;
            border-bottom: 1px solid var(--line);
            background: rgba(248, 250, 252, 0.72);
        }

        .panel-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            font-size: 14px;
            font-weight: 900;
        }

        .panel-title i {
            color: var(--orange);
        }

        .panel-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 7px;
            flex-wrap: wrap;
        }

        .panel-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 28px;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            background: #fff7ed;
            color: var(--orange-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .bank-tools {
            display: grid;
            gap: 9px;
            padding: 12px;
            border-bottom: 1px solid var(--line);
        }

        .search {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 11px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .search i {
            color: #94a3b8;
        }

        .search input {
            width: 100%;
            min-width: 0;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--ink);
            font-size: 13px;
            font-weight: 800;
        }

        .category-row,
        .mode-row,
        .sample-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .seg-btn,
        .sample-btn,
        .icon-btn,
        .main-btn,
        .text-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
            transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
        }

        .seg-btn {
            padding: 0 10px;
        }

        .seg-btn:hover,
        .sample-btn:hover,
        .icon-btn:hover,
        .text-btn:hover {
            transform: translateY(-1px);
            border-color: #93c5fd;
            color: var(--blue);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.09);
        }

        .seg-btn.is-active {
            border-color: rgba(228, 88, 46, 0.45);
            background: #fff7ed;
            color: var(--orange-dark);
            box-shadow: inset 0 0 0 1px rgba(228, 88, 46, 0.08);
        }

        .sample-btn {
            flex: 1 1 120px;
            padding: 0 10px;
            background: var(--blue-soft);
            border-color: #bfdbfe;
            color: #1d4ed8;
        }

        .icon-btn {
            width: 38px;
            padding: 0;
        }

        .icon-btn:disabled,
        .text-btn:disabled,
        .main-btn:disabled {
            cursor: not-allowed;
            opacity: 0.42;
            transform: none;
            box-shadow: none;
        }

        .main-btn {
            width: 100%;
            min-height: 46px;
            padding: 0 15px;
            border-color: #ea580c;
            background: #ea580c;
            color: #ffffff;
            font-size: 14px;
            box-shadow: 0 12px 24px rgba(234, 88, 12, 0.18);
        }

        .main-btn:hover {
            transform: translateY(-1px);
            background: #c2410c;
            border-color: #c2410c;
        }

        .text-btn {
            padding: 0 12px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
            gap: 9px;
            max-height: calc(100vh - 268px);
            min-height: 310px;
            overflow: auto;
            padding: 12px;
        }

        .vocab-card {
            position: relative;
            display: grid;
            grid-template-rows: 94px auto;
            gap: 8px;
            min-width: 0;
            min-height: 188px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: inherit;
            text-align: left;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.055);
        }

        .vocab-card:hover,
        .vocab-card:focus-visible {
            border-color: #fdba74;
            outline: none;
            box-shadow: 0 12px 24px rgba(234, 88, 12, 0.13);
        }

        .vocab-card.is-selected {
            border-color: #14b8a6;
            background: linear-gradient(180deg, #ffffff 0%, #ecfdf5 100%);
        }

        .vocab-card.is-not-important {
            border-color: #fda4af;
            background: linear-gradient(180deg, #ffffff 0%, #fff1f2 100%);
        }

        .vocab-card__image {
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .vocab-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vocab-card__image--emoji,
        .selected-thumb--emoji {
            display: grid;
            place-items: center;
            background:
                linear-gradient(135deg, #fff7ed 0%, #eff6ff 55%, #ecfdf5 100%);
        }

        .emoji-visual {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 8px 12px rgba(15, 23, 42, 0.12));
        }

        .selected-mark {
            position: absolute;
            top: 6px;
            right: 6px;
            display: inline-grid;
            place-items: center;
            width: 26px;
            height: 26px;
            border: 1px solid rgba(15, 118, 110, 0.32);
            border-radius: 8px;
            background: rgba(236, 253, 245, 0.94);
            color: var(--teal);
            opacity: 0;
            transform: scale(0.88);
            transition: opacity 0.14s ease, transform 0.14s ease;
        }

        .vocab-card.is-selected .selected-mark {
            opacity: 1;
            transform: scale(1);
        }

        .vocab-card__body {
            display: grid;
            gap: 5px;
            min-width: 0;
        }

        .term-row {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 7px;
        }

        .term {
            min-width: 0;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
            word-break: keep-all;
        }

        .tag {
            flex: 0 0 auto;
            max-width: 58px;
            padding: 3px 5px;
            border: 1px solid #e2e8f0;
            border-radius: 7px;
            background: #f8fafc;
            color: #64748b;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.15;
            text-align: center;
        }

        .condition {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .builder-body {
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .control-block {
            display: grid;
            gap: 9px;
            padding: 12px;
            border: 1px solid #e8eef6;
            border-radius: 8px;
            background: #f8fafc;
        }

        .field-label {
            color: #475569;
            font-size: 12px;
            font-weight: 900;
        }

        .topic-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .topic-input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0 12px;
            background: #ffffff;
            color: var(--ink);
            font-size: 14px;
            font-weight: 900;
            outline: none;
        }

        .topic-input:focus {
            border-color: #fb923c;
            box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.15);
        }

        .selection-zone {
            min-height: 182px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            transition: border-color 0.16s ease, background 0.16s ease;
        }

        .selection-zone.is-over {
            border-color: #14b8a6;
            background: #ecfdf5;
        }

        .selection-zone--not-important.is-over {
            border-color: #fb7185;
            background: #fff1f2;
        }

        .selection-board {
            display: grid;
            gap: 10px;
        }

        .zone-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 42px;
            padding: 8px 10px;
            border-bottom: 1px solid #e8eef6;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
        }

        .zone-head strong {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .zone-head i {
            color: var(--teal);
        }

        .selection-zone--not-important .zone-head i {
            color: var(--rose);
        }

        .zone-count {
            display: inline-grid;
            place-items: center;
            min-width: 30px;
            height: 26px;
            border: 1px solid #dbeafe;
            border-radius: 8px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .selection-zone--not-important .zone-count {
            border-color: #fecdd3;
            background: #fff1f2;
            color: var(--rose);
        }

        .selected-list {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .empty-state {
            display: grid;
            place-items: center;
            min-height: 118px;
            padding: 18px;
            color: #64748b;
            text-align: center;
        }

        .empty-state strong {
            display: block;
            margin-bottom: 5px;
            color: #334155;
            font-size: 15px;
            font-weight: 900;
        }

        .empty-state span {
            display: block;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.55;
        }

        .selected-item {
            display: grid;
            grid-template-columns: 68px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            min-height: 82px;
            padding: 8px;
            border: 1px solid #dbeafe;
            border-radius: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.055);
        }

        .selected-thumb {
            width: 68px;
            height: 64px;
            overflow: hidden;
            border: 1px solid #dbeafe;
            border-radius: 8px;
            background: #eff6ff;
        }

        .selected-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .selected-thumb .emoji-visual {
            font-size: 30px;
        }

        .selected-main {
            min-width: 0;
        }

        .selected-main strong {
            display: block;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
            word-break: keep-all;
        }

        .selected-main span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .selected-actions {
            display: grid;
            grid-template-columns: repeat(5, 34px);
            gap: 5px;
        }

        .selected-actions .icon-btn {
            width: 34px;
            height: 34px;
            min-height: 34px;
        }

        .build-actions {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
        }

        .output-body {
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .result-block {
            display: grid;
            gap: 9px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            padding: 12px;
        }

        .result-block h2,
        .frame-block h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            color: #334155;
            font-size: 14px;
            font-weight: 900;
        }

        .result-block h2 i,
        .frame-block h2 i {
            color: var(--blue);
        }

        .sentence-list {
            display: grid;
            gap: 7px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .sentence-list li,
        .paragraph-text {
            border: 1px solid #e8eef6;
            border-radius: 8px;
            background: #f8fafc;
            color: var(--ink);
            font-size: 15px;
            font-weight: 800;
            line-height: 1.78;
        }

        .sentence-list li {
            padding: 9px 10px;
        }

        .paragraph-text {
            min-height: 142px;
            padding: 12px;
            white-space: pre-wrap;
        }

        .frame-block {
            display: grid;
            gap: 8px;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            background: #fff7ed;
            padding: 12px;
        }

        .frame-list {
            display: grid;
            gap: 7px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .frame-list li {
            padding: 8px 10px;
            border: 1px solid #ffedd5;
            border-radius: 8px;
            background: #ffffff;
            color: #7c2d12;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.55;
        }

        .copy-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .status-text {
            min-height: 28px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            line-height: 1.5;
        }

        .status-text.is-good {
            color: var(--teal);
        }

        .status-text.is-warn {
            color: var(--rose);
        }

        .no-results {
            display: grid;
            place-items: center;
            min-height: 470px;
            padding: 20px;
            color: #64748b;
            text-align: center;
        }

        .no-results strong {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-size: 16px;
            font-weight: 900;
        }

        .no-results span {
            display: block;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.55;
        }

        @media (max-width: 1180px) {
            .activity-header {
                grid-template-columns: 1fr;
            }

            .main-layout,
            .main-layout.is-generated {
                grid-template-columns: minmax(300px, 0.9fr) minmax(360px, 1.1fr);
            }

            .card-grid {
                max-height: 560px;
            }
        }

        @media (max-width: 780px) {
            .shell {
                width: min(100vw - 18px, 760px);
                margin: 12px auto 30px;
            }

            h1 {
                font-size: 25px;
            }

            .subtitle {
                font-size: 13px;
            }

            .metric-panel {
                grid-template-columns: 1fr;
            }

            .main-layout,
            .main-layout.is-generated {
                grid-template-columns: 1fr;
            }

            .card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                max-height: none;
            }

            .topic-row,
            .build-actions,
            .copy-row {
                grid-template-columns: 1fr;
            }

            .selected-item {
                grid-template-columns: 58px minmax(0, 1fr);
            }

            .selected-thumb {
                width: 58px;
                height: 58px;
            }

            .selected-actions {
                grid-column: 1 / -1;
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }

            .selected-actions .icon-btn {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar" aria-label="페이지 이동">
        <a href="../index.html"><i class="fa-solid fa-house" aria-hidden="true"></i> 전체 목차</a>
        <span class="topbar__divider">/</span>
        <a href="index.html">10과</a>
        <span class="topbar__divider">/</span>
        <a href="vocabulary.html">어휘</a>
    </nav>

    <main class="shell">
        <header class="activity-header">
            <section class="title-panel" aria-labelledby="page-title">
                <p class="eyebrow">Chapter 10 Vocabulary Builder</p>
                <h1 id="page-title">이상형 조건 만들기</h1>
                <p class="subtitle">10과 어휘를 조건 표현으로 바꾸어 초급 문장과 중급 문단을 만듭니다.</p>
            </section>
            <section class="metric-panel" aria-label="활동 상태">

        const SAMPLES = {

        const cardById = new Map(CARDS.map((card) => [card.id, card]));

        const state = {
            importantIds: [],
            notImportantIds: [],

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function cardVisual(card, className, extraMarkup = "") {
            const alt = card.imageAlt || `${card.term} 그림 카드`;
            if (card.emoji) {
                return `
                    <span class="${className} ${className}--emoji" role="img" aria-label="${escapeHtml(alt)}">
                        <span class="emoji-visual">${escapeHtml(card.emoji)}</span>
                        ${extraMarkup}
                    </span>
                `;
            }

            return `
                <span class="${className}">
                    <img src="${escapeHtml(card.image)}" alt="${escapeHtml(alt)}" loading="lazy" decoding="async" />
                    ${extraMarkup}
                </span>
            `;
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    importantIds: state.importantIds,
                    notImportantIds: state.notImportantIds,
                    category: state.category,
                    query: state.query,
                    level: state.level,
                    topic: state.topic,
                    generated: state.generated
                }));
            } catch (error) {
                return false;
            }
            return true;
        }

        function loadState() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
                if (Array.isArray(saved.importantIds) || Array.isArray(saved.notImportantIds)) {
                    state.importantIds = uniqueValidIds(saved.importantIds || []);
                    state.notImportantIds = uniqueValidIds(saved.notImportantIds || []).filter((id) => !state.importantIds.includes(id));
                } else if (Array.isArray(saved.selectedIds)) {
                    state.importantIds = uniqueValidIds(saved.selectedIds);
                }
                if (CATEGORIES.some((category) => category.id === saved.category)) state.category = saved.category;
                if (typeof saved.query === "string") state.query = saved.query;
                if (saved.level === "beginner" || saved.level === "intermediate") state.level = saved.level;
                if (typeof saved.topic === "string" && saved.topic.trim()) state.topic = saved.topic.trim();
                state.generated = Boolean(saved.generated && totalSelectedCount());
            } catch (error) {
                state.importantIds = [];
                state.notImportantIds = [];
            }
        }

        function hasBatchim(text) {
            const trimmed = text.trim();
            if (!trimmed) return false;
            const char = trimmed[trimmed.length - 1];
            const code = char.charCodeAt(0);
            if (code < 0xac00 || code > 0xd7a3) return false;
            return (code - 0xac00) % 28 !== 0;
        }

        function topicWithParticle() {
            const topic = state.topic.trim() || "제 이상형은";
            if (/[은는]$/.test(topic)) return topic;
            return `${topic}${hasBatchim(topic) ? "은" : "는"}`;
        }

        function subjectParticle(text) {
            return hasBatchim(text) ? "은" : "는";
        }

        function objectParticle(text) {
            return hasBatchim(text) ? "을" : "를";
        }

        function uniqueValidIds(ids) {
            const seen = new Set();
            return (Array.isArray(ids) ? ids : []).filter((id) => {
                if (!cardById.has(id) || seen.has(id)) return false;
                seen.add(id);
                return true;
            });
        }

        function bucketIds(bucket) {
            return bucket === "notImportant" ? state.notImportantIds : state.importantIds;
        }

        function setBucketIds(bucket, ids) {
            if (bucket === "notImportant") {
                state.notImportantIds = uniqueValidIds(ids);
            } else {
                state.importantIds = uniqueValidIds(ids);
            }
        }

        function cardBucket(id) {
            if (state.importantIds.includes(id)) return "important";
            if (state.notImportantIds.includes(id)) return "notImportant";
            return "";
        }

        function totalSelectedCount() {
            return state.importantIds.length + state.notImportantIds.length;
        }

        function cardsFromIds(ids) {
            return ids.map((id) => cardById.get(id)).filter(Boolean);
        }

        function importantCards() {
            return cardsFromIds(state.importantIds);
        }

        function notImportantCards() {
            return cardsFromIds(state.notImportantIds);
        }

        function selectedCards() {
            return [...importantCards(), ...notImportantCards()];
        }

        function conditionNoun(card) {
            return card.nominal || `${card.descriptor} 것`;
        }

        function buildIntro(cards) {
            const topic = topicWithParticle();
            if (!cards.length) return `${topic} 아직 정하지 않았습니다.`;
            if (cards.length === 1) return `${topic} ${cards[0].descriptor} 사람입니다.`;

            const visible = cards.slice(0, 4);
            const chains = visible.slice(0, -1).map((card) => card.chain);
            const last = visible[visible.length - 1].descriptor;
            const extra = cards.length > visible.length ? " 등 여러 조건을 가진" : "";
            return `${topic} ${chains.join(" ")} ${last}${extra} 사람입니다.`;
        }

        function buildImportanceSentence(card, isImportant) {
            const noun = conditionNoun(card);
            if (state.level === "beginner") {
                return isImportant
                    ? `저는 ${noun}${objectParticle(noun)} 중요하게 생각합니다.`
                    : `저는 ${noun}${objectParticle(noun)} 중요하게 생각하지 않습니다.`;
            }

            return isImportant
                ? `${noun}${subjectParticle(noun)} 제 이상형에서 중요한 조건입니다.`
                : `${noun}${subjectParticle(noun)} 있으면 좋지만 꼭 중요하지는 않습니다.`;
        }

        function buildNotImportantIntro(cards) {
            if (!cards.length) return "";
            if (cards.length === 1) {
                const noun = conditionNoun(cards[0]);
                return state.level === "beginner"
                    ? `하지만 ${noun}${subjectParticle(noun)} 안 중요합니다.`
                    : `반대로 ${noun}${subjectParticle(noun)} 크게 중요하게 보지 않습니다.`;
            }

            const nouns = cards.slice(0, 4).map(conditionNoun);
            const last = nouns.pop();
            const list = nouns.length ? `${nouns.join(", ")} 그리고 ${last}` : last;
            const extra = cards.length > 4 ? " 같은 조건" : "";
            return state.level === "beginner"
                ? `하지만 ${list}${extra}${subjectParticle(`${list}${extra}`)} 안 중요합니다.`
                : `반대로 ${list}${extra}${subjectParticle(`${list}${extra}`)} 크게 중요하게 보지 않습니다.`;
        }

        function buildSentences() {
            const important = importantCards();
            const notImportant = notImportantCards();
            const sentences = [];

            if (important.length) {
                sentences.push(buildIntro(important));
                sentences.push(...important.map((card) => buildImportanceSentence(card, true)));
            } else {
                sentences.push(`${topicWithParticle()} 꼭 정해진 조건이 많은 사람은 아닙니다.`);
            }

            if (notImportant.length) {
                sentences.push(buildNotImportantIntro(notImportant));
                sentences.push(...notImportant.map((card) => buildImportanceSentence(card, false)));
            }

            const closing = state.level === "beginner"
                ? "중요한 조건은 보고, 중요하지 않은 조건은 너무 많이 따지지 않습니다."
                : "중요한 조건은 분명히 보되, 중요하지 않은 조건은 너무 따지지 않고 서로를 존중하는 관계를 만들고 싶습니다.";
            return [...sentences, closing];
        }

        function buildParagraph() {
            const sentences = buildSentences();
            if (state.level === "beginner") return sentences.join(" ");
            const [intro, ...rest] = sentences;
            const linked = rest.map((sentence, index) => {
                if (sentence.startsWith("반대로")) return sentence;
                if (index === 0) return `특히 ${sentence}`;
                if (sentence.includes("중요하지는 않습니다.")) return `한편 ${sentence}`;
                if (index === rest.length - 1) return sentence;
                return `그리고 ${sentence}`;
            });
            return [intro, ...linked].join(" ");
        }

        function renderCategories() {
            els.categoryRow.innerHTML = CATEGORIES.map((category) => `
                <button class="seg-btn${state.category === category.id ? " is-active" : ""}" type="button" data-category="${category.id}" role="tab" aria-selected="${state.category === category.id}">
                    ${escapeHtml(category.label)}
                </button>
            `).join("");
        }

        function filteredCards() {
            const query = state.query.trim().toLowerCase();
            return CARDS.filter((card) => {
                const categoryMatch = state.category === "all" || card.category === state.category;
                const queryMatch = !query || `${card.term} ${card.descriptor}`.toLowerCase().includes(query);
                return categoryMatch && queryMatch;
            });
        }

        function categoryLabel(id) {
            return CATEGORIES.find((category) => category.id === id)?.label || id;
        }

        function renderBank() {
            const visible = filteredCards();
            els.visibleCardCount.textContent = String(visible.length);
            els.cardGrid.innerHTML = visible.map((card) => {
                const bucket = cardBucket(card.id);
                const selected = Boolean(bucket);
                const bucketClass = bucket === "notImportant" ? " is-not-important" : "";
                return `
                    <button class="vocab-card${selected ? " is-selected" : ""}${bucketClass}" type="button" data-id="${card.id}" draggable="true" aria-pressed="${selected}" aria-label="${escapeHtml(card.term)} 조건 ${selected ? "제거" : "중요해요에 추가"}">
                        ${cardVisual(card, "vocab-card__image", `<span class="selected-mark" aria-hidden="true"><i class="fa-solid fa-check"></i></span>`)}
                        <span class="vocab-card__body">
                            <span class="term-row">
                                <span class="term">${escapeHtml(card.term)}</span>
                                <span class="tag">${escapeHtml(categoryLabel(card.category))}</span>
                            </span>
                            <span class="condition">${escapeHtml(card.descriptor)} 사람</span>
                        </span>
                    </button>
                `;
            }).join("");

            if (!visible.length) {
                els.cardGrid.innerHTML = `
                    <div class="empty-state">
                        <div>
                            <strong>검색 결과 없음</strong>
                            <span>다른 어휘나 범주로 다시 확인할 수 있습니다.</span>
                        </div>
                    </div>
                `;
            }
        }

        function renderSelection() {
            const important = importantCards();
            const notImportant = notImportantCards();
            const total = important.length + notImportant.length;
            els.selectedCount.textContent = String(total);
            els.selectedMetric.textContent = String(total);
            els.importantCount.textContent = String(important.length);
            els.notImportantCount.textContent = String(notImportant.length);
            els.generateBtn.disabled = total === 0;
            els.clearBtn.disabled = total === 0;
            els.shuffleBtn.disabled = total < 2;
            els.generateBtn.innerHTML = state.generated
                ? `<i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i> 다시 만들기`
                : `<i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i> 문장 만들기`;

            renderBucketList("important", important, els.importantList);
            renderBucketList("notImportant", notImportant, els.notImportantList);
        }

        function renderBucketList(bucket, cards, target) {
            const emptyTitle = bucket === "important" ? "중요한 조건 없음" : "안 중요한 조건 없음";
            const emptyText = bucket === "important"
                ? "이상형에서 꼭 보고 싶은 조건을 넣으세요."
                : "크게 따지지 않을 조건을 넣으세요.";
            const moveLabel = bucket === "important" ? "안 중요해요로 이동" : "중요해요로 이동";
            const moveIcon = bucket === "important" ? "fa-circle-minus" : "fa-circle-check";

            if (!cards.length) {
                target.innerHTML = `
                    <div class="empty-state">
                        <div>
                            <strong>${emptyTitle}</strong>
                            <span>${emptyText}</span>
                        </div>
                    </div>
                `;
                return;
            }

            target.innerHTML = cards.map((card, index) => `
                <article class="selected-item" data-id="${card.id}" data-bucket="${bucket}">
                    ${cardVisual(card, "selected-thumb")}
                    <span class="selected-main">
                        <strong>${index + 1}. ${escapeHtml(card.term)}</strong>
                        <span>${escapeHtml(card.descriptor)} 사람</span>
                    </span>
                    <span class="selected-actions">
                        <button class="icon-btn" type="button" data-action="up" title="위로" aria-label="${escapeHtml(card.term)} 위로 이동" ${index === 0 ? "disabled" : ""}><i class="fa-solid fa-arrow-up" aria-hidden="true"></i></button>
                        <button class="icon-btn" type="button" data-action="down" title="아래로" aria-label="${escapeHtml(card.term)} 아래로 이동" ${index === cards.length - 1 ? "disabled" : ""}><i class="fa-solid fa-arrow-down" aria-hidden="true"></i></button>
                        <button class="icon-btn" type="button" data-action="move-bucket" title="${moveLabel}" aria-label="${escapeHtml(card.term)} ${moveLabel}"><i class="fa-solid ${moveIcon}" aria-hidden="true"></i></button>
                        <button class="icon-btn" type="button" data-action="remove" title="삭제" aria-label="${escapeHtml(card.term)} 삭제"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
                        <button class="icon-btn" type="button" data-action="focus" title="강조" aria-label="${escapeHtml(card.term)} 카드 보기"><i class="fa-solid fa-eye" aria-hidden="true"></i></button>
                    </span>
                </article>
            `).join("");
        }

        function renderModes() {
            els.levelMetric.textContent = state.level === "beginner" ? "초급" : "중급";
            els.levelRow.querySelectorAll("[data-level]").forEach((button) => {
                const active = button.dataset.level === state.level;
                button.classList.toggle("is-active", active);
                button.setAttribute("aria-selected", String(active));
            });
            els.topicPresetRow.querySelectorAll("[data-topic]").forEach((button) => {
                button.classList.toggle("is-active", button.dataset.topic === state.topic);
            });
        }

        function renderOutput() {
            const cards = selectedCards();
            const important = importantCards();
            const notImportant = notImportantCards();
            els.copyBtn.disabled = !state.generated || !cards.length;

            if (!state.generated || !cards.length) {
                els.outputBody.innerHTML = `
                    <div class="no-results">
                        <div>
                            <strong>문장 결과 대기</strong>
                            <span>선택한 조건으로 초급 문장과 중급 문단을 정리합니다.</span>
                        </div>
                    </div>
                `;
                return;
            }

            const sentences = buildSentences();
            const paragraph = buildParagraph();
            const frames = state.level === "beginner"
                ? [
                    `${topicWithParticle()} ... 사람입니다.`,
                    `저는 ...을/를 중요하게 생각합니다.`,
                    `저는 ...을/를 중요하게 생각하지 않습니다.`
                ]
                : [
                    `${topicWithParticle()} ... 사람입니다.`,
                    `...은/는 제 이상형에서 중요한 조건입니다.`,
                    `...은/는 있으면 좋지만 꼭 중요하지는 않습니다.`
                ];

            els.outputBody.innerHTML = `
                <section class="result-block" aria-label="짧은 문장">
                    <h2><i class="fa-solid fa-list-ul" aria-hidden="true"></i> ${state.level === "beginner" ? "초급 문장" : "중급 문장"}</h2>
                    <ol class="sentence-list">
                        ${sentences.map((sentence) => `<li>${escapeHtml(sentence)}</li>`).join("")}
                    </ol>
                </section>
                <section class="result-block" aria-label="문단">
                    <h2><i class="fa-solid fa-align-left" aria-hidden="true"></i> ${state.level === "beginner" ? "초급 문단" : "중급 문단"}</h2>
                    <div class="paragraph-text" id="paragraphText">${escapeHtml(paragraph)}</div>
                </section>
                <section class="frame-block" aria-label="문장 틀">
                    <h2><i class="fa-solid fa-shapes" aria-hidden="true"></i> 문장 틀</h2>
                    <ul class="frame-list">
                        ${frames.map((frame) => `<li>${escapeHtml(frame)}</li>`).join("")}
                    </ul>
                </section>
                <div class="copy-row">
                    <span class="status-text" id="statusText" aria-live="polite">중요 ${important.length}개, 안 중요 ${notImportant.length}개 조건으로 결과를 만들었습니다.</span>
                    <button class="text-btn" type="button" id="copyTextBtn"><i class="fa-solid fa-copy" aria-hidden="true"></i> 결과 복사</button>
                </div>
            `;
        }

        function renderAll() {
            els.cardMetric.textContent = String(CARDS.length);
            els.topicInput.value = state.topic;
            els.mainLayout.classList.toggle("is-generated", state.generated && totalSelectedCount() > 0);
            renderCategories();
            renderModes();
            renderBank();
            renderSelection();
            renderOutput();
            saveState();
        }

        function addCard(id, bucket = "important") {
            if (!cardById.has(id)) return;
            removeCard(id, false);
            bucketIds(bucket).push(id);
            state.generated = false;
            renderAll();
        }

        function removeCard(id, shouldRender = true) {
            state.importantIds = state.importantIds.filter((selectedId) => selectedId !== id);
            state.notImportantIds = state.notImportantIds.filter((selectedId) => selectedId !== id);
            if (!totalSelectedCount()) state.generated = false;
            if (shouldRender) renderAll();
        }

        function toggleCard(id) {
            if (cardBucket(id)) {
                removeCard(id);
            } else {
                addCard(id, "important");
            }
        }

        function moveCard(id, bucket, direction) {
            const ids = bucketIds(bucket);
            const index = ids.indexOf(id);
            const nextIndex = index + direction;
            if (index < 0 || nextIndex < 0 || nextIndex >= ids.length) return;
            const next = ids[index];
            ids[index] = ids[nextIndex];
            ids[nextIndex] = next;
            state.generated = false;
            renderAll();
        }

        function moveToOtherBucket(id) {
            const bucket = cardBucket(id);
            if (!bucket) return;
            const target = bucket === "important" ? "notImportant" : "important";
            addCard(id, target);
        }

        function shuffleSelected() {
            for (const bucket of ["important", "notImportant"]) {
                const ids = bucketIds(bucket);
                for (let index = ids.length - 1; index > 0; index -= 1) {
                    const randomIndex = Math.floor(Math.random() * (index + 1));
                    [ids[index], ids[randomIndex]] = [ids[randomIndex], ids[index]];
                }
            }
            state.generated = false;
            renderAll();
        }

        function setSample(sampleId) {
            if (!SAMPLES[sampleId]) return;
            const sample = SAMPLES[sampleId];
            if (Array.isArray(sample)) {
                state.importantIds = uniqueValidIds(sample);
                state.notImportantIds = [];
            } else {
                state.importantIds = uniqueValidIds(sample.important || []);
                state.notImportantIds = uniqueValidIds(sample.notImportant || []).filter((id) => !state.importantIds.includes(id));
            }
            state.generated = false;
            renderAll();
        }

        function dragCardId(event) {
            return event.dataTransfer?.getData("text/plain") || "";
        }

        function currentResultText() {
            const cards = selectedCards();
            if (!cards.length || !state.generated) return "";
            const sentences = buildSentences().map((sentence, index) => `${index + 1}. ${sentence}`).join("\n");
            return `[문장]\n${sentences}\n\n[문단]\n${buildParagraph()}`;
        }

        function setStatus(message, type) {
            const status = document.getElementById("statusText");
            if (!status) return;
            status.textContent = message;
            status.classList.toggle("is-good", type === "good");
            status.classList.toggle("is-warn", type === "warn");
        }

        async function copyResult() {
            const text = currentResultText();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                setStatus("결과를 복사했습니다.", "good");
            } catch (error) {
                setStatus("복사 권한을 확인해 주세요.", "warn");
            }
        }

        els.categoryRow.addEventListener("click", (event) => {
            const button = event.target.closest("[data-category]");
            if (!button) return;
            state.category = button.dataset.category;
            renderAll();
        });

        els.cardGrid.addEventListener("click", (event) => {
            const card = event.target.closest(".vocab-card");
            if (!card) return;
            toggleCard(card.dataset.id);
        });

        els.cardGrid.addEventListener("dragstart", (event) => {
            const card = event.target.closest(".vocab-card");
            if (!card) return;
            event.dataTransfer.setData("text/plain", card.dataset.id);
            event.dataTransfer.effectAllowed = "copy";
        });

        els.searchInput.addEventListener("input", () => {
            state.query = els.searchInput.value;
            renderBank();
            saveState();
        });

        document.querySelector(".sample-row").addEventListener("click", (event) => {
            const button = event.target.closest("[data-sample]");
            if (!button) return;
            setSample(button.dataset.sample);
        });

        els.topicInput.addEventListener("input", () => {
            state.topic = els.topicInput.value.trim();
            if (state.generated) renderOutput();
            renderModes();
            saveState();
        });

        els.topicResetBtn.addEventListener("click", () => {
            state.topic = "제 이상형은";
            renderAll();
        });

        els.topicPresetRow.addEventListener("click", (event) => {
            const button = event.target.closest("[data-topic]");
            if (!button) return;
            state.topic = button.dataset.topic;
            renderAll();
        });

        els.levelRow.addEventListener("click", (event) => {
            const button = event.target.closest("[data-level]");
            if (!button) return;
            state.level = button.dataset.level;
            renderAll();
        });

        els.selectionBoard.addEventListener("dragover", (event) => {
            const zone = event.target.closest(".selection-zone");
            if (!zone) return;
            event.preventDefault();
            zone.classList.add("is-over");
        });

        els.selectionBoard.addEventListener("dragleave", (event) => {
            const zone = event.target.closest(".selection-zone");
            if (zone) zone.classList.remove("is-over");
        });

        els.selectionBoard.addEventListener("drop", (event) => {
            const zone = event.target.closest(".selection-zone");
            if (!zone) return;
            event.preventDefault();
            zone.classList.remove("is-over");
            addCard(dragCardId(event), zone.dataset.bucket || "important");
        });

        els.selectionBoard.addEventListener("click", (event) => {
            const button = event.target.closest("[data-action]");
            if (!button) return;
            const item = event.target.closest(".selected-item");
            if (!item) return;
            const id = item.dataset.id;
            const bucket = item.dataset.bucket || cardBucket(id) || "important";
            const action = button.dataset.action;
            if (action === "remove") removeCard(id);
            if (action === "up") moveCard(id, bucket, -1);
            if (action === "down") moveCard(id, bucket, 1);
            if (action === "move-bucket") moveToOtherBucket(id);
            if (action === "focus") {
                state.query = cardById.get(id)?.term || "";
                els.searchInput.value = state.query;
                state.category = "all";
                renderAll();
            }
        });

        els.generateBtn.addEventListener("click", () => {
            if (!totalSelectedCount()) return;
            state.generated = true;
            renderAll();
        });

        els.clearBtn.addEventListener("click", () => {
            state.importantIds = [];
            state.notImportantIds = [];
            state.generated = false;
            renderAll();
        });

        els.shuffleBtn.addEventListener("click", shuffleSelected);

        els.editCardsBtn.addEventListener("click", () => {
            state.generated = false;
            renderAll();
        });

        els.copyBtn.addEventListener("click", copyResult);

        els.outputBody.addEventListener("click", (event) => {
            if (!event.target.closest("#copyTextBtn")) return;
            copyResult();
        });

        loadState();
        els.searchInput.value = state.query;
        renderAll();
    }());
    </script>
</body>
</html>
