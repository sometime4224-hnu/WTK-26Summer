<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12과 쓰기 주제 표현 학습</title>
    <link rel="stylesheet" href="../shared/multilang-toggle.css">
    <style>
      :root {
        --ink: #172033;
        --muted: #64748b;
        --line: #d7e0ea;
        --soft: #f6f8fb;
        --paper: #ffffff;
        --blue: #2563eb;
        --green: #059669;
        --orange: #ea580c;
        --red: #dc2626;
        --yellow: #facc15;
        --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(37, 99, 235, 0.08), transparent 34%),
          var(--soft);
        color: var(--ink);
        font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1120px, calc(100% - 28px));
        margin: 0 auto;
        padding: 18px 0 32px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .topbar strong {
        display: block;
        font-size: clamp(20px, 3vw, 32px);
        font-weight: 950;
      }

      .topbar span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      .home-link {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        background: var(--paper);
        color: var(--ink);
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
      }

      .progress {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .progress button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 12px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 950;
        cursor: pointer;
      }

      .progress button.is-current {
        border-color: var(--blue);
        background: #eff6ff;
        color: #1d4ed8;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .progress button.is-done {
        border-color: #86efac;
        background: #ecfdf5;
        color: #047857;
      }

      .learning-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 14px;
        align-items: start;
      }

      .mission {
        position: relative;
        min-width: 0;
        border: 2px solid #93c5fd;
        border-radius: 8px;
        padding: clamp(18px, 3.5vw, 34px);
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .mission.is-current-task::before {
        content: "";
        position: absolute;
        inset: -8px;
        z-index: -1;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(5, 150, 105, 0.18));
      }

      .stage-meta {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border-radius: 999px;
        padding: 0 12px;
        background: #172033;
        color: #fff;
        font-size: 12px;
        font-weight: 950;
      }

      h1 {
        margin: 12px 0 6px;
        font-size: clamp(32px, 7vw, 66px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .mission-prompt {
        margin: 0 0 18px;
        color: #334155;
        font-size: clamp(16px, 2.4vw, 22px);
        font-weight: 850;
        line-height: 1.5;
      }

      .category-row,
      .language-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0;
      }

      .category-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 11px;
        background: #f8fafc;
        color: #334155;
        font-size: 12px;
        font-weight: 950;
      }

      .item-meta {
        margin: 14px 0 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .cue-box {
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        padding: 14px;
        background: #f0fdf4;
      }

      .cue-box strong {
        display: block;
        color: #166534;
        font-size: 16px;
        font-weight: 950;
      }

      .cue-box p {
        margin: 6px 0 0;
        color: #14532d;
        font-size: 14px;
        font-weight: 750;
        line-height: 1.6;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .choice-btn {
        min-height: 76px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
        color: var(--ink);
        font-weight: 950;
        line-height: 1.45;
        cursor: pointer;
      }

      .choice-btn:hover,
      .choice-btn:focus-visible {
        border-color: var(--blue);
        outline: none;
      }

      .choice-btn.is-correct {
        border-color: var(--green);
        background: #ecfdf5;
      }

      .choice-btn.is-wrong {
        border-color: var(--red);
        background: #fef2f2;
      }

      .target {
        margin-top: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: clamp(16px, 3vw, 24px);
        background: #f8fafc;
        color: var(--ink);
        font-size: clamp(30px, 7vw, 58px);
        font-weight: 950;
        line-height: 1.22;
        overflow-wrap: anywhere;
      }

      .target-char {
        display: inline-block;
        min-width: 0.56em;
        border-radius: 6px;
        padding: 0 0.02em;
      }

      .target-char.is-correct {
        color: #166534;
      }

      .target-char.is-next {
        background: rgba(250, 204, 21, 0.45);
        box-shadow: inset 0 -0.18em 0 rgba(234, 179, 8, 0.55);
      }

      .target-char.is-wrong {
        background: rgba(220, 38, 38, 0.13);
        color: #b91c1c;
        box-shadow: inset 0 -0.2em 0 rgba(220, 38, 38, 0.65);
      }

      .typing-input {
        width: 100%;
        min-height: 76px;
        margin-top: 14px;
        border: 3px solid #172033;
        border-radius: 8px;
        padding: 0 18px;
        background: #fff;
        color: var(--ink);
        font-size: clamp(24px, 5vw, 40px);
        font-weight: 900;
        outline: none;
      }

      .typing-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.18);
      }

      .feedback {
        min-height: 34px;
        margin-top: 10px;
        border-radius: 8px;
        padding: 9px 12px;
        background: #eef2ff;
        color: #3730a3;
        font-size: 14px;
        font-weight: 900;
      }

      .feedback.is-warn {
        background: #fff7ed;
        color: #c2410c;
      }

      .feedback.is-error {
        background: #fef2f2;
        color: #b91c1c;
      }

      .feedback.is-good {
        background: #ecfdf5;
        color: #047857;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .actions button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
        font-weight: 950;
        cursor: pointer;
      }

      .actions button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }

      .side-panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.92);
      }

      .side-panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fff;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 24px;
        font-weight: 950;
      }

      .review-list {
        margin: 12px 0 0;
        padding-left: 18px;
        color: #334155;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.7;
      }

      .report-panel[hidden],
      .choice-grid[hidden],
      .target[hidden],
      .cue-box[hidden],
      .typing-input[hidden],
      .actions button[hidden] {
        display: none;
      }

      @media (max-width: 820px) {
        .learning-layout {
          grid-template-columns: 1fr;
        }

        .side-panel {
          order: 2;
        }

        .choice-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .app {
          width: min(100% - 16px, 1120px);
          padding-top: 10px;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .home-link {
          align-self: flex-start;
        }

        .mission {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <script>
      window.MULTILANG_CONFIG = {
        langs: ["vi", "mn", "ar", "kk", "th", "en", "ja", "zh"],
        defaultLang: "none",
        ignoreStoredLang: true
      };
    </script>

    <main class="app">
      <header class="topbar">
        <div>
          <strong>12과 쓰기 주제 표현 학습</strong>
          <span>생활 속 운동 답글 쓰기를 위한 표현을 보고, 고르고, 정확히 입력합니다.</span>
        </div>
        <a class="home-link" href="index.html">12과 목록</a>
      </header>

      <nav class="progress" id="progressDots" aria-label="표현 학습 진행 단계"></nav>

      <div class="learning-layout">
        <section class="mission is-current-task" aria-labelledby="stageTitle">
          <span class="stage-meta" id="stageMeta">1단계</span>
          <h1 id="stageTitle">한/영 확인</h1>
          <p class="mission-prompt" id="missionPrompt">한글 입력 상태를 확인합니다.</p>

          <div class="category-row" id="categoryRow"></div>
          <div class="language-row" data-multilang-bar></div>

          <p class="item-meta" id="itemMeta">준비</p>
          <section class="cue-box" id="cueBox" hidden>
            <strong id="cueText"></strong>
            <p id="usageText"></p>
            <p id="exampleText"></p>
            <div id="translationBox"></div>
          </section>

          <div class="choice-grid" id="choiceGrid" hidden></div>
          <div class="target" id="targetText" hidden></div>
          <input class="typing-input" id="typingInput" type="text" autocomplete="off" spellcheck="false" placeholder="운동">
          <div class="feedback" id="feedbackText" aria-live="polite">정확히 입력하면 다음 단계로 이동합니다.</div>

          <div class="actions">
            <button id="prevButton" type="button">이전</button>
            <button id="hintButton" type="button" hidden>힌트</button>
            <button id="checkButton" type="button">확인</button>
            <button id="reportButton" class="primary" type="button">리포트</button>
            <button id="resetButton" type="button">초기화</button>
          </div>
        </section>

        <aside class="side-panel">
          <h2>학습 리포트</h2>
          <div class="stat-grid">
            <div class="stat"><span>연습 표현</span><strong id="statPracticed">0</strong></div>
            <div class="stat"><span>정확 입력</span><strong id="statCorrect">0</strong></div>
            <div class="stat"><span>선택 정답</span><strong id="statChoice">0</strong></div>
            <div class="stat"><span>힌트 사용</span><strong id="statHints">0</strong></div>
          </div>
          <section class="report-panel" id="reportPanel" hidden>
            <h2>재연습 추천</h2>
            <ol class="review-list" id="reviewList"></ol>
          </section>
        </aside>
      </div>
    </main>

    <script src="writing-expression-data.js"></script>
    <script src="../shared/multilang-toggle.js"></script>
    <script>
      (function () {
        "use strict";

        const STORAGE_KEY = "c12_writing_expression_learning_v1";
        const WARMUP_TARGET = "운동";
        const DATA = window.C12_WRITING_TOPIC_DATA;
        const LANGS = DATA.langs;
        const CATEGORIES = DATA.categories.filter((category) => category.id !== "all").map((category) => category.label);
        const WRITING_TOPIC_EXPRESSIONS = DATA.expressions;

        const RECALL_ITEMS = [
          "health-water",
          "method-light",
          "effect-stress",
          "empathy-worry",
          "advice-five",
          "link-result"
        ].map((id) => WRITING_TOPIC_EXPRESSIONS.find((item) => item.id === id));

        const STAGES = [
          { id: "warmup", label: "한/영", title: "한/영 확인", meta: "1단계", prompt: "한글 입력 상태를 확인합니다." },
          { id: "choose", label: "고르기", title: "상황 보고 표현 고르기", meta: "2단계", prompt: "상황 설명에 맞는 표현을 고릅니다." },
          { id: "type", label: "타이핑", title: "정확히 타이핑", meta: "3단계", prompt: "고른 표현을 글자와 띄어쓰기까지 정확히 입력합니다." },
          { id: "recall1", label: "초성", title: "초성 회상", meta: "4단계", prompt: "초성 단서를 보고 표현을 떠올립니다." },
          { id: "recall2", label: "가림", title: "부분 가림 회상", meta: "5단계", prompt: "일부 글자만 보고 표현을 다시 입력합니다." },
          { id: "report", label: "리포트", title: "학습 리포트", meta: "6단계", prompt: "오늘 익힌 쓰기 주제 표현을 확인합니다." }
        ];

        const state = loadState();
        const els = {
          progressDots: document.getElementById("progressDots"),
          stageMeta: document.getElementById("stageMeta"),
          stageTitle: document.getElementById("stageTitle"),
          missionPrompt: document.getElementById("missionPrompt"),
          categoryRow: document.getElementById("categoryRow"),
          itemMeta: document.getElementById("itemMeta"),
          cueBox: document.getElementById("cueBox"),
          cueText: document.getElementById("cueText"),
          usageText: document.getElementById("usageText"),
          exampleText: document.getElementById("exampleText"),
          translationBox: document.getElementById("translationBox"),
          choiceGrid: document.getElementById("choiceGrid"),
          targetText: document.getElementById("targetText"),
          typingInput: document.getElementById("typingInput"),
          feedbackText: document.getElementById("feedbackText"),
          prevButton: document.getElementById("prevButton"),
          hintButton: document.getElementById("hintButton"),
          checkButton: document.getElementById("checkButton"),
          reportButton: document.getElementById("reportButton"),
          resetButton: document.getElementById("resetButton"),
          statPracticed: document.getElementById("statPracticed"),
          statCorrect: document.getElementById("statCorrect"),
          statChoice: document.getElementById("statChoice"),
          statHints: document.getElementById("statHints"),
          reportPanel: document.getElementById("reportPanel"),
          reviewList: document.getElementById("reviewList")
        };

        function defaultState() {
          return {
            stageIndex: 0,
            itemIndex: 0,
            recallIndex: 0,
            input: "",
            selectedChoice: "",
            stats: {
              practiced: {},
              correct: {},
              choices: {},
              wrong: {},
              hints: {}
            },
            composing: false
          };
        }

        function loadState() {
          try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
            if (!saved || typeof saved !== "object") return defaultState();
            return Object.assign(defaultState(), saved, {
              stats: Object.assign(defaultState().stats, saved.stats || {})
            });
          } catch {
            return defaultState();
          }
        }

        function saveState() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function normalize(value) {
          return String(value || "").trim().replace(/\s+/g, " ");
        }

        function hasLatin(value) {
          return /[A-Za-z]/.test(value || "");
        }

        function currentStage() {
          return STAGES[state.stageIndex] || STAGES[0];
        }

        function currentItem() {
          if (currentStage().id === "recall1" || currentStage().id === "recall2") {
            return RECALL_ITEMS[state.recallIndex] || RECALL_ITEMS[0];
          }
          return WRITING_TOPIC_EXPRESSIONS[state.itemIndex] || WRITING_TOPIC_EXPRESSIONS[0];
        }

        function setFeedback(message, type) {
          els.feedbackText.className = "feedback" + (type ? " is-" + type : "");
          els.feedbackText.textContent = message;
        }

        function increment(bucket, id) {
          state.stats[bucket][id] = (state.stats[bucket][id] || 0) + 1;
        }

        function getInitialConsonants(text) {
          const choseong = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
          return Array.from(text).map((char) => {
            const code = char.charCodeAt(0) - 44032;
            if (code < 0 || code > 11171) return char;
            return choseong[Math.floor(code / 588)];
          }).join("");
        }

        function maskByLength(text) {
          const chars = Array.from(text);
          return chars.map((char, index) => {
            if (char === " ") return " ";
            if (index === 0 || index === chars.length - 1 || (chars.length > 8 && index === 1)) return char;
            return "?";
          }).join("");
        }

        function diffIndexes(input, target) {
          const inputChars = Array.from(normalize(input));
          const targetChars = Array.from(target);
          const wrong = new Set();
          targetChars.forEach((char, index) => {
            if (inputChars[index] && inputChars[index] !== char) wrong.add(index);
          });
          if (inputChars.length > targetChars.length) wrong.add(targetChars.length - 1);
          return wrong;
        }

        function renderTarget(display, target, hidden) {
          const input = els.typingInput.value;
          const wrong = diffIndexes(input, target);
          const inputChars = Array.from(normalize(input));
          const chars = Array.from(display);
          const nextIndex = inputChars.length;
          els.targetText.innerHTML = chars.map((char, index) => {
            const classes = ["target-char"];
            if (wrong.has(index)) classes.push("is-wrong");
            else if (inputChars[index] && inputChars[index] === Array.from(target)[index]) classes.push("is-correct");
            else if (index === nextIndex) classes.push("is-next");
            const shown = hidden && wrong.has(index) ? char : char;
            return `<span class="${classes.join(" ")}">${escapeHtml(shown)}</span>`;
          }).join("");
        }

        function renderTranslations(item) {
          els.translationBox.innerHTML = LANGS.map((lang) => {
            const dir = lang === "ar" ? ' dir="rtl"' : "";
            return `<div class="lang-box" data-lang="${lang}" lang="${lang}"${dir}>${escapeHtml(item.translations[lang] || item.translations.en || "")}</div>`;
          }).join("");
          if (window.MultilangToggle) window.MultilangToggle.refresh();
        }

        function renderChoices(item) {
          const sameCategory = WRITING_TOPIC_EXPRESSIONS.filter((entry) => entry.category === item.category && entry.id !== item.id);
          const other = WRITING_TOPIC_EXPRESSIONS.filter((entry) => entry.category !== item.category);
          const choices = [item, sameCategory[0] || other[0], other[(state.itemIndex + 3) % other.length]].filter(Boolean);
          choices.sort((a, b) => (a.id > b.id ? 1 : -1));
          els.choiceGrid.innerHTML = choices.map((choice, index) => {
            const classes = ["choice-btn"];
            if (state.selectedChoice === choice.id && choice.id === item.id) classes.push("is-correct");
            if (state.selectedChoice === choice.id && choice.id !== item.id) classes.push("is-wrong");
            return `<button class="${classes.join(" ")}" type="button" data-choice-id="${choice.id}">${index + 1}. ${escapeHtml(choice.target)}</button>`;
          }).join("");
        }

        function escapeHtml(value) {
          return String(value || "").replace(/[&<>"']/g, (char) => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[char]));
        }

        function goToStage(index) {
          state.stageIndex = Math.max(0, Math.min(index, STAGES.length - 1));
          state.input = "";
          els.typingInput.value = "";
          saveState();
          render();
        }

        function nextAfterTyping() {
          increment("practiced", currentItem().id);
          increment("correct", currentItem().id);
          if (state.itemIndex < WRITING_TOPIC_EXPRESSIONS.length - 1) {
            state.itemIndex += 1;
            state.selectedChoice = "";
            state.stageIndex = STAGES.findIndex((stage) => stage.id === "choose");
          } else {
            state.recallIndex = 0;
            state.stageIndex = STAGES.findIndex((stage) => stage.id === "recall1");
          }
          els.typingInput.value = "";
          setFeedback("좋아요. 다음 표현으로 이동합니다.", "good");
          saveState();
          window.setTimeout(render, 320);
        }

        function nextRecall() {
          const stageId = currentStage().id;
          if (state.recallIndex < RECALL_ITEMS.length - 1) {
            state.recallIndex += 1;
          } else if (stageId === "recall1") {
            state.recallIndex = 0;
            state.stageIndex = STAGES.findIndex((stage) => stage.id === "recall2");
          } else {
            state.stageIndex = STAGES.findIndex((stage) => stage.id === "report");
          }
          els.typingInput.value = "";
          saveState();
          window.setTimeout(render, 520);
        }

        function checkCurrent() {
          const stage = currentStage();
          const item = currentItem();
          const value = normalize(els.typingInput.value);
          if (hasLatin(value)) {
            setFeedback("한/영 키를 확인하세요. 한국어로 입력해야 합니다.", "warn");
            return;
          }
          if (stage.id === "warmup") {
            if (value === WARMUP_TARGET) {
              setFeedback("좋아요. 표현을 골라 봅니다.", "good");
              window.setTimeout(() => goToStage(1), 300);
            } else {
              setFeedback("운동을 정확히 입력하세요.", "error");
            }
            return;
          }
          if (stage.id === "type") {
            if (value === item.target) {
              renderTarget(item.target, item.target, false);
              nextAfterTyping();
            } else {
              increment("wrong", item.id);
              renderTarget(item.target, item.target, false);
              setFeedback("표시된 위치를 다시 확인하세요.", "error");
            }
            return;
          }
          if (stage.id === "recall1" || stage.id === "recall2") {
            if (value === item.target) {
              increment("practiced", item.id);
              increment("correct", item.id);
              renderTarget(item.target, item.target, false);
              setFeedback("정답입니다. 잠깐 보고 다음으로 이동합니다.", "good");
              nextRecall();
            } else {
              increment("wrong", item.id);
              renderTarget(stage.id === "recall1" ? getInitialConsonants(item.target) : maskByLength(item.target), item.target, true);
              setFeedback("다시 입력하세요. 틀린 위치만 표시했습니다.", "error");
            }
          }
        }

        function renderStats() {
          const practiced = Object.keys(state.stats.practiced).length;
          const correct = Object.values(state.stats.correct).reduce((sum, value) => sum + value, 0);
          const choices = Object.values(state.stats.choices).reduce((sum, value) => sum + value, 0);
          const hints = Object.values(state.stats.hints).reduce((sum, value) => sum + value, 0);
          els.statPracticed.textContent = String(practiced);
          els.statCorrect.textContent = String(correct);
          els.statChoice.textContent = String(choices);
          els.statHints.textContent = String(hints);
          const weakest = WRITING_TOPIC_EXPRESSIONS.slice()
            .sort((a, b) => (state.stats.wrong[b.id] || 0) - (state.stats.wrong[a.id] || 0))
            .slice(0, 3);
          els.reviewList.innerHTML = weakest.map((item) => `<li>${escapeHtml(item.target)}</li>`).join("");
        }

        function render() {
          const stage = currentStage();
          const item = currentItem();
          els.stageMeta.textContent = stage.meta;
          els.stageTitle.textContent = stage.title;
          els.missionPrompt.textContent = stage.prompt;
          els.progressDots.innerHTML = STAGES.map((entry, index) => {
            const classes = [];
            if (index === state.stageIndex) classes.push("is-current");
            if (index < state.stageIndex) classes.push("is-done");
            return `<button class="${classes.join(" ")}" type="button" data-stage-index="${index}">${index + 1}. ${entry.label}</button>`;
          }).join("");
          els.categoryRow.innerHTML = CATEGORIES.map((category) => `<span class="category-pill">${category}</span>`).join("");
          els.cueBox.hidden = stage.id === "warmup" || stage.id === "report";
          els.choiceGrid.hidden = stage.id !== "choose";
          els.targetText.hidden = !["warmup", "type", "recall1", "recall2"].includes(stage.id);
          els.typingInput.hidden = stage.id === "choose" || stage.id === "report";
          els.checkButton.hidden = stage.id === "choose" || stage.id === "report";
          els.hintButton.hidden = !(stage.id === "recall1" || stage.id === "recall2");
          els.reportPanel.hidden = stage.id !== "report";
          els.prevButton.disabled = state.stageIndex === 0;

          if (stage.id === "warmup") {
            els.itemMeta.textContent = "한글 입력 확인";
            renderTarget(WARMUP_TARGET, WARMUP_TARGET, false);
            els.typingInput.placeholder = "운동";
            setFeedback("운동을 입력하세요.", "");
          } else if (stage.id === "choose") {
            els.itemMeta.textContent = `${item.category} ${state.itemIndex + 1} / ${WRITING_TOPIC_EXPRESSIONS.length}`;
            els.cueText.textContent = item.meaningKo;
            els.usageText.textContent = item.usageKo;
            els.exampleText.textContent = item.exampleKo;
            renderTranslations(item);
            renderChoices(item);
            setFeedback("상황에 맞는 표현을 고르세요.", "");
          } else if (stage.id === "type") {
            els.itemMeta.textContent = `${item.category} ${state.itemIndex + 1} / ${WRITING_TOPIC_EXPRESSIONS.length}`;
            els.cueText.textContent = item.meaningKo;
            els.usageText.textContent = item.usageKo;
            els.exampleText.textContent = item.exampleKo;
            renderTranslations(item);
            renderTarget(item.target, item.target, false);
            els.typingInput.placeholder = "목표 표현 입력";
            setFeedback("띄어쓰기까지 정확히 입력하세요.", "");
          } else if (stage.id === "recall1" || stage.id === "recall2") {
            els.itemMeta.textContent = `${stage.title} ${state.recallIndex + 1} / ${RECALL_ITEMS.length}`;
            els.cueText.textContent = item.meaningKo;
            els.usageText.textContent = item.usageKo;
            els.exampleText.textContent = "정답 표현을 떠올려 입력합니다.";
            renderTranslations(item);
            renderTarget(stage.id === "recall1" ? getInitialConsonants(item.target) : maskByLength(item.target), item.target, true);
            els.typingInput.placeholder = "기억나는 표현 입력";
            setFeedback("정답을 입력하고 확인합니다.", "");
          } else {
            els.itemMeta.textContent = "완료";
            els.targetText.hidden = true;
            setFeedback("학습 리포트를 확인하세요.", "good");
          }
          renderStats();
          saveState();
          if (!els.typingInput.hidden) window.setTimeout(() => els.typingInput.focus(), 0);
        }

        els.typingInput.addEventListener("compositionstart", () => { state.composing = true; });
        els.typingInput.addEventListener("compositionend", () => {
          state.composing = false;
          if (currentStage().id === "type") checkCurrent();
        });
        els.typingInput.addEventListener("input", () => {
          if (state.composing) return;
          const stage = currentStage();
          if (hasLatin(els.typingInput.value)) {
            setFeedback("한/영 키를 확인하세요. 영어 입력이 감지되었습니다.", "warn");
            return;
          }
          if (stage.id === "type") renderTarget(currentItem().target, currentItem().target, false);
          if (stage.id === "warmup" && normalize(els.typingInput.value) === WARMUP_TARGET) checkCurrent();
          if (stage.id === "type" && normalize(els.typingInput.value) === currentItem().target) checkCurrent();
          if (stage.id === "recall1" || stage.id === "recall2") {
            renderTarget(stage.id === "recall1" ? getInitialConsonants(currentItem().target) : maskByLength(currentItem().target), currentItem().target, true);
          }
        });
        els.typingInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            checkCurrent();
          }
        });
        els.choiceGrid.addEventListener("click", (event) => {
          const button = event.target.closest("[data-choice-id]");
          if (!button) return;
          const item = currentItem();
          state.selectedChoice = button.dataset.choiceId;
          renderChoices(item);
          if (state.selectedChoice === item.id) {
            increment("choices", item.id);
            setFeedback("맞았습니다. 이제 직접 입력합니다.", "good");
            window.setTimeout(() => goToStage(2), 360);
          } else {
            increment("wrong", item.id);
            setFeedback("상황 설명을 다시 보고 고르세요.", "error");
            saveState();
          }
        });
        els.checkButton.addEventListener("click", checkCurrent);
        els.hintButton.addEventListener("click", () => {
          const item = currentItem();
          increment("hints", item.id);
          setFeedback(`${item.category}: ${item.usageKo}`, "warn");
          renderStats();
          saveState();
        });
        els.prevButton.addEventListener("click", () => goToStage(state.stageIndex - 1));
        els.reportButton.addEventListener("click", () => goToStage(STAGES.length - 1));
        els.resetButton.addEventListener("click", () => {
          localStorage.removeItem(STORAGE_KEY);
          Object.assign(state, defaultState());
          els.typingInput.value = "";
          render();
        });
        els.progressDots.addEventListener("click", (event) => {
          const button = event.target.closest("[data-stage-index]");
          if (button) goToStage(Number(button.dataset.stageIndex));
        });

        window.__C12_WRITING_EXPRESSION_LEARNING__ = {
          get state() { return JSON.parse(JSON.stringify(state)); },
          expressions: WRITING_TOPIC_EXPRESSIONS,
          stages: STAGES
        };

        render();
      })();
    </script>
  </body>
</html>
