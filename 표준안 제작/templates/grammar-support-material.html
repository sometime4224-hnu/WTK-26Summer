    <style>
        body { background:var(--bg); }
        .shell { width:var(--shell-width); margin:var(--shell-margin); display:grid; gap:14px; }

        .topbar { position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;

        .lead { color:var(--muted);font-size:14px;font-weight:700;margin:0 0 14px; }

        /* 카드 그리드 */
        .card-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
        .mat-card { border:1px solid var(--line);border-radius:var(--radius-lg);
            background:var(--surface);box-shadow:var(--shadow-sm);padding:18px 20px; }
        .mat-card h2 { margin:0 0 8px;font-size:17px;line-height:1.35; }
        .mat-card p { margin:8px 0 0;color:#475569;font-size:14px;font-weight:700;line-height:1.7; }

        /* 예시 컷 (그림+설명) */
        .cut-list { display:grid;gap:16px; }
        .cut-item { border:1px solid var(--line);border-radius:var(--radius);
            background:var(--surface);overflow:hidden; }
        .cut-item figure { margin:0; }
        .cut-item figure img { width:100%;height:auto;display:block; }
        .cut-item figcaption { padding:12px 14px; }
        .cut-item figcaption .caption-ko { font-size:15px;font-weight:900;color:var(--ink);margin:0 0 4px; }
        .cut-item figcaption .caption-grammar { font-size:13px;font-weight:700;color:var(--accent-dark);margin:0 0 6px; }

        /* 표 */
        .mat-table { width:100%;border-collapse:collapse;font-size:14px;margin-top:10px; }
        .mat-table th { background:var(--accent-soft);color:var(--accent-dark);font-weight:900;
            padding:8px 12px;border:1px solid var(--accent-line);text-align:left; }
        .mat-table td { padding:8px 12px;border:1px solid var(--line);font-weight:700; }
        .mat-table tr:nth-child(even) td { background:#f8fafc; }

        code { border-radius:6px;padding:1px 6px;background:var(--accent-soft);
            color:var(--accent-dark);font-family:inherit;font-weight:900; }

        /* footer-nav */
        .footer-nav { display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between; }
        .btn { display:inline-flex;align-items:center;gap:6px;min-height:40px;
            border:1px solid var(--accent-line);border-radius:var(--radius-pill);
            padding:0 15px;background:#fff;color:var(--accent-dark);
            font-size:13px;font-weight:900;text-decoration:none; }
        .btn.primary { border-color:var(--accent-dark);background:var(--accent);color:#fff; }
