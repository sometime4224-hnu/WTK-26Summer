    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f5f8f7;
            --panel: #ffffff;
            --ink: #172033;
            --muted: #64748b;
            --line: #d7e0ea;
            --green: #15803d;
            --green-dark: #166534;
            --green-soft: #dcfce7;
            --blue: #1d4ed8;
            --blue-soft: #eff6ff;
            --amber: #b45309;
            --amber-soft: #fffbeb;
            --rose: #be123c;
            --rose-soft: #fff1f2;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                linear-gradient(180deg, #f5f8f7 0%, #f8fbff 58%, #fffaf0 100%);
            color: var(--ink);
            font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        }

        img {
            display: block;
            max-width: 100%;
        }

        button,
        a {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 48px;
            padding: 8px max(12px, calc((100vw - 1120px) / 2 + 12px));
            border-bottom: 1px solid rgba(215, 224, 234, 0.9);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
        }

        .topbar__links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .topbar a {
            color: var(--green-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar span {
            color: #cbd5e1;
            font-weight: 900;
        }

        .topbar strong {
            min-width: 0;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1120px, calc(100% - 20px));
            margin: 10px auto 36px;
        }

        .activity-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 10px;
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: 950;
            letter-spacing: 0;
        }

        h1,
        h2,
        h3,
        p {
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        h1,
        h2,
        h3 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            color: #0f172a;
            font-size: 26px;
            line-height: 1.18;
        }

        .head-meta {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 10px;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            background: #f0fdf4;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: 950;
            white-space: nowrap;
        }

        .game-panel,
        .result-panel {
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .game-panel {
            display: grid;
            grid-template-columns: minmax(300px, 0.72fr) minmax(0, 1fr);
            gap: 12px;
            padding: 12px;
        }

        .round-info {
            min-width: 0;
            padding: 14px;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            background: linear-gradient(180deg, #f0fdf4, #ffffff);
        }

        .round-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .round-info h2 {
            color: #0f172a;
            font-size: 22px;
            line-height: 1.28;
        }

        .round-count {
            flex: 0 0 auto;
            min-width: 54px;
            padding: 6px 8px;
            border-radius: 8px;
            background: var(--amber-soft);
            color: var(--amber);
            font-size: 12px;
            font-weight: 950;
            text-align: center;
        }

        .notice {
            margin: 12px 0 0;
            color: #334155;
            font-size: 16px;
            font-weight: 850;
            line-height: 1.65;
        }

        .prompt {
            margin: 10px 0 0;
            padding: 10px 12px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            background: var(--blue-soft);
            color: #1e3a8a;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.5;
        }

        .grammar-hit {
            display: inline;
            border-radius: 6px;
            padding: 1px 4px;
            background: #fef3c7;
            color: #92400e;
            font-weight: 950;
        }

        .model-sentence {
            margin: 12px 0 0;
            padding: 11px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 850;
            line-height: 1.62;
        }

        .model-sentence strong {
            color: var(--green-dark);
        }

        .round-note {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 780;
            line-height: 1.55;
        }

        .work-area {
            min-width: 0;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .choice-card {
            position: relative;
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            border: 2px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: #172033;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
        }

        .choice-card:hover:not(:disabled) {
            border-color: #86efac;
            background: #f0fdf4;
            transform: translateY(-1px);
        }

        .choice-card:focus-visible,
        .action-btn:focus-visible,
        .link-btn:focus-visible {
            outline: 3px solid rgba(34, 197, 94, 0.32);
            outline-offset: 2px;
        }

        .choice-card[aria-pressed="true"] {
            border-color: #16a34a;
            background: #f0fdf4;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
        }

        .choice-card.is-correct {
            border-color: #16a34a;
            background: var(--green-soft);
        }

        .choice-card.is-missing {
            border-color: var(--amber);
            background: var(--amber-soft);
        }

        .choice-card.is-wrong {
            border-color: #fb7185;
            background: var(--rose-soft);
        }

        .choice-card.is-dimmed {
            color: #94a3b8;
            background: #f8fafc;
            opacity: 0.76;
        }

        .choice-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f8fafc;
        }

        .choice-label {
            display: block;
            min-height: 44px;
            padding: 9px 10px;
            color: inherit;
            font-size: 14px;
            font-weight: 950;
            line-height: 1.35;
        }

        .choice-mark {
            position: absolute;
            top: 8px;
            right: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.62);
            color: #ffffff;
            font-size: 18px;
            font-weight: 950;
            opacity: 0;
        }

        .choice-card[aria-pressed="true"] .choice-mark,
        .choice-card.is-correct .choice-mark,
        .choice-card.is-missing .choice-mark,
        .choice-card.is-wrong .choice-mark {
            opacity: 1;
        }

        .choice-card.is-missing .choice-mark {
            background: var(--amber);
        }

        .choice-card.is-wrong .choice-mark {
            background: var(--rose);
        }

        .feedback {
            margin-top: 10px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.6;
        }

        .feedback.is-correct {
            border-color: #86efac;
            background: #f0fdf4;
            color: #166534;
        }

        .feedback.is-wrong {
            border-color: #fda4af;
            background: #fff1f2;
            color: #9f1239;
        }

        .feedback strong {
            display: block;
            margin-bottom: 5px;
            color: inherit;
            font-size: 14px;
            font-weight: 950;
        }

        .feedback-list {
            display: grid;
            gap: 3px;
            margin: 6px 0 0;
            padding: 0;
            list-style: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .action-btn,
        .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
            padding: 0 14px;
            border: 1px solid var(--green);
            border-radius: 8px;
            background: #ffffff;
            color: var(--green-dark);
            cursor: pointer;
            font-size: 14px;
            font-weight: 950;
            text-decoration: none;
        }

        .action-btn.primary {
            background: var(--green);
            color: #ffffff;
        }

        .action-btn.secondary {
            border-color: #cbd5e1;
            color: #475569;
        }

        .action-btn:disabled {
            cursor: default;
            opacity: 0.48;
        }

        .result-panel {
            padding: 18px;
        }

        .result-panel h2 {
            color: #0f172a;
            font-size: 25px;
            line-height: 1.24;
        }

        .result-panel p {
            margin: 8px 0 0;
            color: #475569;
            font-size: 14px;
            font-weight: 760;
            line-height: 1.6;
        }

        .result-list {
            display: grid;
            gap: 8px;
            margin: 14px 0 0;
            padding: 0;
            list-style: none;
        }

        .result-list li {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #334155;
            font-size: 14px;
            font-weight: 850;
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 820px) {
            .shell {
                width: min(100% - 14px, 1120px);
                margin-top: 7px;
            }

            .activity-head {
                grid-template-columns: 1fr;
                gap: 7px;
                margin-bottom: 7px;
            }

            h1 {
                font-size: 21px;
            }

            .head-meta {
                justify-self: start;
                min-height: 28px;
                font-size: 11px;
            }

            .game-panel {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 8px;
            }

            .round-info {
                padding: 11px;
            }

            .round-info h2 {
                font-size: 18px;
            }

            .notice {
                margin-top: 7px;
                font-size: 14px;
                line-height: 1.5;
            }

            .prompt,
            .model-sentence,
            .round-note {
                margin-top: 7px;
            }

            .model-sentence {
                padding: 9px 10px;
                font-size: 13px;
                line-height: 1.5;
            }

            .choice-grid {
                gap: 7px;
            }

            .choice-label {
                min-height: 42px;
                padding: 8px 8px;
                font-size: 12px;
                line-height: 1.32;
            }

            .choice-mark {
                width: 26px;
                height: 26px;
                top: 6px;
                right: 6px;
                font-size: 15px;
            }

            .actions {
                position: sticky;
                bottom: 0;
                z-index: 10;
                justify-content: stretch;
                margin: 10px -8px -8px;
                padding: 8px;
                border-top: 1px solid rgba(215, 224, 234, 0.88);
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
            }

            .action-btn,
            .link-btn {
                flex: 1 1 auto;
                min-height: 42px;
                padding: 0 10px;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
                gap: 4px;
                padding-top: 7px;
                padding-bottom: 7px;
            }

            .topbar strong {
                white-space: normal;
            }

            .round-title-row {
                align-items: flex-start;
            }

            .round-count {
                min-width: 46px;
                padding-inline: 6px;
            }
        }
    </style>
</head>

    <main class="shell">
        <header class="activity-head">

                <h1>필수 조건 고르기</h1>

        <section id="gamePanel" class="game-panel" aria-live="polite">
            <article class="round-info" aria-labelledby="roundTitle">
                <div class="round-title-row">
                    <div>
                        <p id="roundCategory" class="eyebrow">생활 안내문</p>

            </article>

                    <button id="retryBtn" class="action-btn secondary" type="button" hidden>다시 고르기</button>
                    <button id="checkBtn" class="action-btn primary" type="button">확인</button>
                    <button id="nextBtn" class="action-btn" type="button" disabled>다음 상황</button>

        <section id="resultPanel" class="result-panel" hidden></section>

                    modelSentence: "병원 진료 접수를 하려면 신분증이 있어야 하고 증상을 설명하고 진료비 결제를 준비해야 해요.",
                    feedback: "신분증, 증상 설명, 진료비 결제 준비는 필수 요소입니다. 잡지는 선택 사항이에요.",
                    choices: [
                        { id: "hospital-id-card", label: "신분증", src: "c12g4cg_15_01_hospital-id-card.webp", alt: "병원 접수대에서 신분증을 보여 주는 그림", required: true },
                        { id: "symptom-explanation", label: "증상 설명", src: "c12g4cg_15_02_symptom-explanation.webp", alt: "환자가 증상을 설명하는 그림", required: true },
                        { id: "magazine", label: "잡지", src: "c12g4cg_15_04_magazine.webp", alt: "대기실 잡지를 나타내는 그림", required: false },
                        { id: "clinic-payment", label: "진료비 결제 준비", src: "c12g4cg_15_03_clinic-payment.webp", alt: "진료비 결제를 준비하는 그림", required: true }

    <script>
        (function () {
            "use strict";

            const config = window.C12_GRAMMAR4_CONDITION_GAME;
            const state = {
                roundIndex: 0,
                selectedByRound: config.rounds.map(() => []),
                checkedByRound: config.rounds.map(() => false),
                correctByRound: config.rounds.map(() => null)
            };

            const refs = {
                scoreBadge: document.getElementById("scoreBadge"),
                gamePanel: document.getElementById("gamePanel"),
                resultPanel: document.getElementById("resultPanel"),
                roundCategory: document.getElementById("roundCategory"),
                roundTitle: document.getElementById("roundTitle"),
                roundCount: document.getElementById("roundCount"),
                roundNotice: document.getElementById("roundNotice"),
                roundPrompt: document.getElementById("roundPrompt"),
                modelSentence: document.getElementById("modelSentence"),
                choiceGrid: document.getElementById("choiceGrid"),
                feedbackBox: document.getElementById("feedbackBox"),
                retryBtn: document.getElementById("retryBtn"),
                checkBtn: document.getElementById("checkBtn"),
                nextBtn: document.getElementById("nextBtn")
            };

            window.C12_GRAMMAR4_CONDITION_GAME_APP = {
                state,
                getCurrentRound,
                resetGame
            };

            function esc(value) {
                return String(value == null ? "" : value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function renderGrammarText(value) {
                return esc(value).replace(/(-아야\/어야|보여 줘야|있어야|없어야|받아야|내야|해야|[가-힣]+(?:아야|어야|워야|해야))/g, '<mark class="grammar-hit">$1</mark>');
            }

            function getCurrentRound() {
                return config.rounds[state.roundIndex];
            }

            function getSelectedSet() {
                return new Set(state.selectedByRound[state.roundIndex]);
            }

            function getScore() {
                return state.correctByRound.filter(Boolean).length;
            }

            function isExact(round, selectedSet) {
                return round.choices.every((choice) => selectedSet.has(choice.id) === choice.required);
            }

            function getMistakes(round, selectedSet) {
                return {
                    missing: round.choices.filter((choice) => choice.required && !selectedSet.has(choice.id)),
                    wrong: round.choices.filter((choice) => !choice.required && selectedSet.has(choice.id))
                };
            }

            function renderScore() {
                refs.scoreBadge.textContent = `정확히 맞힌 라운드 ${getScore()} / ${config.rounds.length}`;
            }

            function choiceStateClass(choice, selectedSet, checked) {
                if (!checked) {
                    return "";
                }
                if (choice.required && selectedSet.has(choice.id)) {
                    return " is-correct";
                }
                if (choice.required && !selectedSet.has(choice.id)) {
                    return " is-missing";
                }
                if (!choice.required && selectedSet.has(choice.id)) {
                    return " is-wrong";
                }
                return " is-dimmed";
            }

            function choiceMark(choice, selectedSet, checked) {
                if (checked && choice.required && !selectedSet.has(choice.id)) {
                    return "!";
                }
                if (checked && !choice.required && selectedSet.has(choice.id)) {
                    return "×";
                }
                return "✓";
            }

            function renderChoices(round) {
                const selectedSet = getSelectedSet();
                const checked = state.checkedByRound[state.roundIndex];
                refs.choiceGrid.innerHTML = round.choices.map((choice) => {
                    const selected = selectedSet.has(choice.id);
                    const src = config.assetBase + choice.src;
                    return `
                        <button class="choice-card${choiceStateClass(choice, selectedSet, checked)}" type="button" data-choice-id="${esc(choice.id)}" aria-pressed="${selected ? "true" : "false"}" ${checked ? "disabled" : ""}>
                            <img class="choice-image" src="${esc(src)}" alt="${esc(choice.alt)}" width="384" height="384" loading="eager" decoding="async" />
                            <span class="choice-label">${esc(choice.label)}</span>
                            <span class="choice-mark" aria-hidden="true">${choiceMark(choice, selectedSet, checked)}</span>
                        </button>
                    `;
                }).join("");
            }

            function renderFeedback(round) {
                const checked = state.checkedByRound[state.roundIndex];
                const selectedSet = getSelectedSet();
                refs.feedbackBox.hidden = !checked;
                refs.modelSentence.hidden = !checked;

                if (!checked) {
                    refs.feedbackBox.className = "feedback";
                    refs.feedbackBox.innerHTML = "";
                    refs.modelSentence.innerHTML = "";
                    return;
                }

                const correct = Boolean(state.correctByRound[state.roundIndex]);
                const mistakes = getMistakes(round, selectedSet);
                refs.modelSentence.innerHTML = `<strong>-아야/어야 문장</strong><br>${esc(round.modelSentence)}`;
                refs.feedbackBox.className = `feedback ${correct ? "is-correct" : "is-wrong"}`;

                if (correct) {
                    refs.feedbackBox.innerHTML = `<strong>정답입니다.</strong>${esc(round.feedback)}`;
                    return;
                }

                const missingText = mistakes.missing.length
                    ? `<li>빠뜨린 조건: ${mistakes.missing.map((choice) => esc(choice.label)).join(", ")}</li>`
                    : "";
                const wrongText = mistakes.wrong.length
                    ? `<li>잘못 고른 선택: ${mistakes.wrong.map((choice) => esc(choice.label)).join(", ")}</li>`
                    : "";

                refs.feedbackBox.innerHTML = `
                    <strong>조건을 다시 확인해 보세요.</strong>
                    ${esc(round.feedback)}
                    <ul class="feedback-list">${missingText}${wrongText}</ul>
                `;
            }

            function renderRound() {
                const round = getCurrentRound();
                const checked = state.checkedByRound[state.roundIndex];
                refs.gamePanel.hidden = false;
                refs.resultPanel.hidden = true;
                refs.roundCategory.textContent = round.category;
                refs.roundTitle.textContent = round.title;
                refs.roundCount.textContent = `${state.roundIndex + 1} / ${config.rounds.length}`;
                refs.roundNotice.innerHTML = renderGrammarText(round.notice);
                refs.roundPrompt.innerHTML = renderGrammarText(round.prompt);
                refs.checkBtn.disabled = checked;
                refs.retryBtn.hidden = !checked;
                refs.nextBtn.disabled = !checked;
                refs.nextBtn.textContent = state.roundIndex === config.rounds.length - 1 ? "결과 보기" : "다음 상황";
                renderScore();
                renderChoices(round);
                renderFeedback(round);
            }

            function toggleChoice(choiceId) {
                if (state.checkedByRound[state.roundIndex]) return;
                const selected = state.selectedByRound[state.roundIndex].slice();
                const existingIndex = selected.indexOf(choiceId);
                if (existingIndex >= 0) {
                    selected.splice(existingIndex, 1);
                } else {
                    selected.push(choiceId);
                }
                state.selectedByRound[state.roundIndex] = selected;
                renderRound();
            }

            function checkCurrent() {
                const round = getCurrentRound();
                const selectedSet = getSelectedSet();
                state.checkedByRound[state.roundIndex] = true;
                state.correctByRound[state.roundIndex] = isExact(round, selectedSet);
                renderRound();
            }

            function retryCurrent() {
                state.selectedByRound[state.roundIndex] = [];
                state.checkedByRound[state.roundIndex] = false;
                state.correctByRound[state.roundIndex] = null;
                renderRound();
            }

            function goNext() {
                if (!state.checkedByRound[state.roundIndex]) return;
                if (state.roundIndex === config.rounds.length - 1) {
                    renderResult();
                    return;
                }
                state.roundIndex += 1;
                renderRound();
            }

            function renderResult() {
                const score = getScore();
                refs.gamePanel.hidden = true;
                refs.resultPanel.hidden = false;
                renderScore();
                const list = config.rounds.map((round, index) => {
                    const correct = state.correctByRound[index] === true;
                    return `<li>${esc(round.title)}: ${correct ? "정확히 골랐어요" : "다시 연습하면 좋아요"}</li>`;
                }).join("");
                refs.resultPanel.innerHTML = `
                    <p class="eyebrow">Game Result</p>
                    <h2>정확히 맞힌 라운드 ${score} / ${config.rounds.length}</h2>
                    <p>-아야/어야는 어떤 결과를 위해 꼭 필요한 조건을 말할 때 씁니다. 틀린 상황은 다시 하면서 조건과 선택 활동을 함께 확인하세요.</p>
                    <ul class="result-list">${list}</ul>
                    <div class="actions">
                        <button id="restartGameBtn" class="action-btn primary" type="button">다시 하기</button>
                        <a class="link-btn" href="grammar4.html">문법 4로 돌아가기</a>
                    </div>
                `;
                document.getElementById("restartGameBtn").addEventListener("click", resetGame);
            }

            function resetGame() {
                state.roundIndex = 0;
                state.selectedByRound = config.rounds.map(() => []);
                state.checkedByRound = config.rounds.map(() => false);
                state.correctByRound = config.rounds.map(() => null);
                renderRound();
            }

            refs.choiceGrid.addEventListener("click", (event) => {
                const button = event.target.closest(".choice-card");
                if (!button) return;
                toggleChoice(button.dataset.choiceId);
            });
            refs.checkBtn.addEventListener("click", checkCurrent);
            refs.retryBtn.addEventListener("click", retryCurrent);
            refs.nextBtn.addEventListener("click", goNext);

            renderRound();
        })();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
