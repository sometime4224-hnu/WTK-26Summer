<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>발음 관문 러너 시각 샘플</title>
    <link rel="stylesheet" href="visual-samples.css">
  </head>
  <body>
    <main class="sample-shell">
      <header class="sample-topbar">
        <a href="index.html">발음 관문 러너</a>
        <strong>시각 샘플</strong>
      </header>

      <section class="sample-grid" aria-label="시각 샘플 비교">
        <article class="sample-panel">
          <div class="sample-heading">
            <span>02</span>
            <h1>Canvas + 이미지 에셋</h1>
          </div>
          <div class="stage-frame">
            <canvas id="assetCanvas" width="720" height="480"></canvas>
            <div class="sample-chip">사과</div>
          </div>
        </article>

        <article class="sample-panel sample-panel--phaser">
          <div class="sample-heading">
            <span>03</span>
            <h1>Phaser 엔진</h1>
          </div>
          <div class="stage-frame">
            <div id="phaserDemo" aria-label="Phaser 시각 샘플"></div>
            <div class="sample-chip">파도</div>
          </div>
        </article>
      </section>
    </main>

    <script src="../korean-survivor-loopr/vendor/phaser.min.js"></script>
    <script src="src/visual-samples.js"></script>
  </body>
</html>
