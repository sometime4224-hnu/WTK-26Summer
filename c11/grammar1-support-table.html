<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11과 문법 1 보조자료 | 사동사 전체 표</title>
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f7f9fc;
            --surface: #ffffff;
            --ink: #172033;
            --muted: #64748b;
            --line: #d9e2ef;
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --accent-strong: #1d4ed8;
            --good: #0f766e;
            --good-soft: #ecfdf5;
            --shadow: 0 12px 26px rgba(15, 23, 42, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, var(--bg) 58%, #eef7f4 100%);
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .page {
            width: min(1180px, calc(100% - 28px));
            margin: 0 auto;
            padding: 14px 0 42px;
        }

        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 12px;
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.45rem, 3vw, 2.25rem);
            line-height: 1.16;
            letter-spacing: 0;
        }

        .header-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .link-pill,
        .filter-btn,
        .mode-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            font-weight: 900;
            text-decoration: none;
            transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
        }

        .link-pill {
            padding: 0 12px;
            font-size: 0.86rem;
        }

        .link-pill:hover,
        .filter-btn:hover,
        .mode-btn:hover {
            border-color: #94a3b8;
            transform: translateY(-1px);
        }

        .toolbar,
        .table-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 0.7fr) minmax(0, 1.3fr) auto;
            gap: 10px;
            align-items: center;
            padding: 12px;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .search-input:focus {
            border-color: var(--accent);
            outline: 3px solid rgba(37, 99, 235, 0.16);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .filter-btn {
            min-width: 58px;
            padding: 0 10px;
            color: #475569;
            font-size: 0.88rem;
        }

        .filter-btn.is-active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent-strong);
        }

        .mode-btn {
            padding: 0 12px;
            color: var(--good);
            white-space: nowrap;
        }

        .mode-btn.is-on {
            border-color: #99f6e4;
            background: var(--good-soft);
        }

        .table-panel {
            overflow: hidden;
        }

        .table-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 11px 12px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 900;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 840px;
            border-collapse: separate;
            border-spacing: 0;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 9px 10px;
            vertical-align: middle;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #f8fafc;
            color: #334155;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        tbody tr {
            background: #ffffff;
        }

        tbody tr:nth-child(even) {
            background: #fbfdff;
        }

        tbody tr:hover {
            background: #eff6ff;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .number-cell {
            width: 48px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 900;
            text-align: center;
        }

        .suffix-cell {
            width: 76px;
        }

        .suffix-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            min-height: 32px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-weight: 900;
        }

        .word-cell {
            width: 132px;
            color: var(--ink);
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0;
            word-break: keep-all;
        }

        .causative-word {
            color: var(--accent-strong);
        }

        .image-cell {
            width: 128px;
        }

        .thumb-box {
            display: grid;
            place-items: center;
            width: 106px;
            min-height: 106px;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            background: #ffffff;
            overflow: hidden;
        }

        .thumb-box img {
            width: 96px;
            max-height: 126px;
            object-fit: contain;
        }

        .change-cell {
            min-width: 190px;
            color: #334155;
            font-size: 1rem;
            font-weight: 900;
            word-break: keep-all;
        }

        .change-cell mark {
            padding: 2px 6px;
            border-radius: 999px;
            background: #dbeafe;
            color: var(--accent-strong);
        }

        .masked .hide-target {
            color: transparent;
            text-shadow: 0 0 10px rgba(37, 99, 235, 0.34);
            user-select: none;
        }

        .masked .hide-target img {
            visibility: hidden;
        }

        .masked .hide-target .thumb-box {
            position: relative;
            border-color: #bfdbfe;
            background: #eff6ff;
        }

        .masked .hide-target .thumb-box::after {
            content: "?";
            position: absolute;
            inset: 8px;
            display: grid;
            place-items: center;
            border: 2px dashed #93c5fd;
            border-radius: 8px;
            color: var(--accent);
            font-size: 2rem;
            font-weight: 900;
        }

        .empty {
            padding: 22px;
            color: var(--muted);
            font-weight: 900;
            text-align: center;
        }

        @media (max-width: 920px) {
            .header,
            .toolbar {
                grid-template-columns: 1fr;
            }

            .header-links {
                justify-content: flex-start;
            }

            .mode-btn {
                justify-self: start;
            }
        }

        @media (max-width: 520px) {
            .page {
                width: min(100% - 16px, 1180px);
                padding-top: 8px;
            }

            .toolbar {
                gap: 9px;
                padding: 10px;
            }

            .table-status {
                align-items: flex-start;
                flex-direction: column;
            }

            table {
                min-width: 760px;
            }

            th,
            td {
                padding: 8px;
            }

            .thumb-box {
                width: 92px;
                min-height: 92px;
            }

            .thumb-box img {
                width: 82px;
                max-height: 116px;
            }
        }
    </style>
</head>

    <main class="page">
        <header class="header">
            <div>
                <p class="eyebrow">Causative Verb Table</p>
                <h1>사동사 전체 표</h1>
            </div>
            <div class="header-links">
                <a class="link-pill" href="grammar1-support-material1.html">그림 짝 학습</a>
                <a class="link-pill" href="grammar1-causative-diagram.html">의미 구조</a>
            </div>
        </header>

        <section class="toolbar" aria-label="표 도구">
            <input class="search-input" id="searchInput" type="search" placeholder="검색: 먹다, 먹이다, -이" autocomplete="off" />
            <div class="filters" id="filters" aria-label="접미사 필터"></div>
            <button class="mode-btn" id="maskBtn" type="button">사동형 가리기</button>
        </section>

        <section class="table-panel" aria-labelledby="tableTitle">
            <div class="table-status">
                <strong id="tableTitle">전체 짝</strong>
                <span id="rowStatus">29쌍</span>
            </div>
            <div class="table-wrap">
                <table id="pairTable">
                    <thead>
                        <tr>
                            <th scope="col">번호</th>
                            <th scope="col">접미사</th>
                            <th scope="col">기본형</th>
                            <th scope="col">기본 그림</th>
                            <th scope="col">사동형</th>
                            <th scope="col">사동 그림</th>
                            <th scope="col">변화</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ASSET_BASE = "../assets/c11/grammar/images/grammar1-support-material1/cards-ultra/";
        const suffixes = ["전체", "-이", "-히", "-리", "-기", "-우", "-구", "-추"];
        const pairs = [
            ["숨다", "숨기다", "-기", "cut01-hide.webp", "cut02-hide-causative.webp", 224, 224],
            ["씻다", "씻기다", "-기", "cut03-wash.webp", "cut04-wash-causative.webp", 224, 224],
            ["타다", "태우다", "-우", "cut05-ride.webp", "cut06-ride-causative.webp", 224, 224],
            ["달다", "달구다", "-구", "cut07-heat-up.webp", "cut08-heat-up-causative.webp", 224, 224],
            ["늦다", "늦추다", "-추", "cut09-be-late.webp", "cut10-delay.webp", 448, 448],
            ["솟다", "솟구다", "-구", "cut11-rise.webp", "cut12-rise-causative.webp", 224, 224],
            ["낮다", "낮추다", "-추", "cut13-low.webp", "cut14-lower.webp", 224, 224],
            ["서다", "세우다", "-우", "cut15-stand.webp", "cut16-stand-causative.webp", 224, 224],
            ["쓰다", "씌우다", "-우", "cut17-wear-hat.webp", "cut18-put-hat-on.webp", 224, 224],
            ["자다", "재우다", "-우", "cut19-sleep.webp", "cut20-put-to-sleep.webp", 224, 224],
            ["깨다", "깨우다", "-우", "cut21-wake-up.webp", "cut22-wake-causative.webp", 224, 224],
            ["눕다", "눕히다", "-히", "cut23-lie-down.webp", "cut24-lay-down.webp", 224, 224],
            ["익다", "익히다", "-히", "cut25-be-cooked.webp", "cut26-cook.webp", 224, 224],
            ["울다", "울리다", "-리", "cut27-cry.webp", "cut28-make-cry.webp", 224, 224],
            ["알다", "알리다", "-리", "cut29-know.webp", "cut30-inform.webp", 224, 224],
            ["살다", "살리다", "-리", "cut31-live.webp", "cut32-save.webp", 224, 224],
            ["날다", "날리다", "-리", "cut33-fly.webp", "cut34-make-fly.webp", 224, 224],
            ["돌다", "돌리다", "-리", "cut35-spin.webp", "cut36-turn.webp", 224, 224],
            ["웃다", "웃기다", "-기", "cut37-laugh.webp", "cut38-make-laugh.webp", 224, 224],
            ["벗다", "벗기다", "-기", "cut39-take-off.webp", "cut40-take-off-causative.webp", 224, 224],
            ["신다", "신기다", "-기", "cut41-wear-shoes.webp", "cut42-put-shoes-on.webp", 224, 224],
            ["먹다", "먹이다", "-이", "cut43-eat.webp", "cut44-feed.webp", 224, 224],
            ["끓다", "끓이다", "-이", "cut45-boil.webp", "cut46-boil-causative.webp", 224, 224],
            ["줄다", "줄이다", "-이", "cut47-decrease.webp", "cut48-reduce.webp", 224, 224],
            ["붙다", "붙이다", "-이", "cut49-stick.webp", "cut50-attach.webp", 224, 224],
            ["높다", "높이다", "-이", "cut51-high.webp", "cut52-raise.webp", 224, 224],
            ["앉다", "앉히다", "-히", "cut53-sit.webp", "cut54-seat.webp", 224, 224],
            ["입다", "입히다", "-히", "cut55-wear-clothes.webp", "cut56-dress.webp", 224, 224],
            ["읽다", "읽히다", "-히", "cut57-read.webp", "cut58-make-read.webp", 224, 224]
        ].map(function (item, index) {
            return {
                number: index + 1,
                base: item[0],
                causative: item[1],
                suffix: item[2],
                baseImage: item[3],
                causativeImage: item[4],
                baseHeight: item[5],
                causativeHeight: item[6]
            };
        });

        const refs = {
            filters: document.getElementById("filters"),
            searchInput: document.getElementById("searchInput"),
            maskBtn: document.getElementById("maskBtn"),
            table: document.getElementById("pairTable"),
            tableBody: document.getElementById("tableBody"),
            rowStatus: document.getElementById("rowStatus")
        };

        const state = {
            suffix: "전체",
            query: "",
            masked: false
        };

        function imagePath(file) {
            return ASSET_BASE + file;
        }

        function countBySuffix(suffix) {
            if (suffix === "전체") {
                return pairs.length;
            }
            return pairs.filter(function (pair) {
                return pair.suffix === suffix;
            }).length;
        }

        function renderFilters() {
            refs.filters.innerHTML = "";
            suffixes.forEach(function (suffix) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "filter-btn" + (state.suffix === suffix ? " is-active" : "");
                button.textContent = suffix + " " + countBySuffix(suffix);
                button.addEventListener("click", function () {
                    state.suffix = suffix;
                    renderAll();
                });
                refs.filters.appendChild(button);
            });
        }

        function visiblePairs() {
            const query = state.query.trim().toLowerCase();
            return pairs.filter(function (pair) {
                const suffixOk = state.suffix === "전체" || pair.suffix === state.suffix;
                const queryOk = !query || [pair.base, pair.causative, pair.suffix].join(" ").toLowerCase().includes(query);
                return suffixOk && queryOk;
            });
        }

        function renderTable() {
            const rows = visiblePairs();
            refs.table.classList.toggle("masked", state.masked);
            refs.maskBtn.classList.toggle("is-on", state.masked);
            refs.maskBtn.textContent = state.masked ? "사동형 보기" : "사동형 가리기";
            refs.rowStatus.textContent = rows.length + " / " + pairs.length + "쌍";

            if (!rows.length) {
                refs.tableBody.innerHTML = "<tr><td class=\"empty\" colspan=\"7\">검색 결과가 없습니다.</td></tr>";
                return;
            }

            refs.tableBody.innerHTML = rows.map(function (pair) {
                return ""
                    + "<tr>"
                    + "<td class=\"number-cell\">" + pair.number + "</td>"
                    + "<td class=\"suffix-cell\"><span class=\"suffix-badge\">" + pair.suffix + "</span></td>"
                    + "<td class=\"word-cell\">" + pair.base + "</td>"
                    + "<td class=\"image-cell\"><div class=\"thumb-box\"><img src=\"" + imagePath(pair.baseImage) + "\" alt=\"" + pair.base + " 그림\" width=\"224\" height=\"" + pair.baseHeight + "\" loading=\"lazy\" decoding=\"async\" /></div></td>"
                    + "<td class=\"word-cell causative-word hide-target\">" + pair.causative + "</td>"
                    + "<td class=\"image-cell hide-target\"><div class=\"thumb-box\"><img src=\"" + imagePath(pair.causativeImage) + "\" alt=\"" + pair.causative + " 그림\" width=\"224\" height=\"" + pair.causativeHeight + "\" loading=\"lazy\" decoding=\"async\" /></div></td>"
                    + "<td class=\"change-cell\">" + pair.base + " + <mark>" + pair.suffix + "</mark> → <span class=\"hide-target\">" + pair.causative + "</span></td>"
                    + "</tr>";
            }).join("");
        }

        function renderAll() {
            renderFilters();
            renderTable();
        }

        refs.searchInput.addEventListener("input", function () {
            state.query = refs.searchInput.value;
            renderTable();
        });

        refs.maskBtn.addEventListener("click", function () {
            state.masked = !state.masked;
            renderTable();
        });

        renderAll();
    </script>

</body>
