    <style>
        body { background:var(--bg); }
        .shell { width:var(--shell-width); margin:var(--shell-margin); display:grid; gap:14px; }

        .topbar { position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;
            min-height:48px;padding:0 14px;background:rgba(255,255,255,.94);
            border-bottom:1px solid var(--line);backdrop-filter:blur(12px); }
        .topbar a { color:var(--accent-dark);font-size:13px;font-weight:900;text-decoration:none; }
        .topbar span { color:#cbd5e1; }

        .hero { border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--surface);
            box-shadow:var(--shadow);padding:20px 22px; }
        .eyebrow { color:var(--vocab);font-size:11px;font-weight:900;
            letter-spacing:.08em;text-transform:uppercase;margin:0 0 6px; }
        .hero h1 { margin:0 0 8px;font-size:clamp(20px,3.5vw,28px); }
        .lead { color:var(--muted);font-size:14px;font-weight:700;margin:0 0 14px; }

        .panel { border:1px solid var(--line);border-radius:var(--radius-lg);
            background:var(--surface);box-shadow:var(--shadow-sm);padding:20px 22px; }

        /* A. 흐름 도식 */
        .flow-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;align-items:center; }
        .flow-node { border:2px solid var(--vocab);border-radius:var(--radius);padding:14px;
            background:#fff7ed;text-align:center; }
        .flow-node .word { font-size:17px;font-weight:900;color:var(--ink); }
        .flow-node .desc { font-size:12px;color:var(--muted);margin-top:4px; }
        .flow-arrow { text-align:center;color:var(--muted);font-size:18px; }

        /* B. 게이지 */
        .gauge-list { display:grid;gap:14px; }
        .gauge-item { display:grid;gap:6px; }
        .gauge-label { font-size:14px;font-weight:900; }
        .gauge-bar { height:14px;background:#e2e8f0;border-radius:var(--radius-pill);overflow:hidden; }
        .gauge-fill { height:100%;background:linear-gradient(90deg,var(--vocab),#fbbf24);
            border-radius:inherit;transition:width .4s ease; }
        .gauge-desc { font-size:12px;color:var(--muted);font-weight:700; }

        /* C. 순서 배열 */
        .seq-list { display:grid;gap:8px; }
        .seq-item { display:flex;align-items:center;gap:12px;border:1px solid var(--line);
            border-radius:var(--radius);padding:12px 14px;background:#fff;cursor:grab; }
        .seq-num { width:28px;height:28px;border-radius:50%;background:var(--vocab);
            color:#fff;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto; }
        .seq-text { font-size:14px;font-weight:700; }

        /* D. 그림 퀴즈 */
        .pic-quiz { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px; }
        .pic-card { border:2px solid var(--line);border-radius:var(--radius);overflow:hidden;
            background:#fff;cursor:pointer;transition:border-color .14s; }
        .pic-card img { width:100%;aspect-ratio:1/1;object-fit:cover;display:block; }
        .pic-card .pic-label { padding:8px;text-align:center;font-size:13px;font-weight:900; }
        .pic-card.selected { border-color:var(--vocab); }
        .pic-card.correct  { border-color:var(--ok); background:var(--ok-bg); }
        .pic-card.wrong    { border-color:var(--bad); background:var(--bad-bg); }

        /* E. 장면 재현 */
        .scene-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
        .scene-img { border-radius:var(--radius);overflow:hidden; }
        .scene-img img { width:100%;height:auto;display:block; }
        .scene-words { display:flex;flex-wrap:wrap;gap:8px;align-content:start; }
        .scene-word { border:1px solid var(--vocab);border-radius:var(--radius-pill);
            padding:6px 14px;background:#fff7ed;color:var(--vocab);font-size:14px;font-weight:900; }

        code { border-radius:6px;padding:1px 6px;background:var(--accent-soft);color:var(--accent-dark);font-family:inherit;font-weight:900; }

        .footer-nav { display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between; }
        .btn { display:inline-flex;align-items:center;gap:6px;min-height:40px;
            border:1px solid var(--accent-line);border-radius:var(--radius-pill);
            padding:0 15px;background:#fff;color:var(--accent-dark);font-size:13px;font-weight:900;text-decoration:none; }
        .btn.primary { border-color:var(--accent-dark);background:var(--accent);color:#fff; }

        @media(max-width:600px){ .scene-grid { grid-template-columns:1fr; } }
    </style>
</head>
