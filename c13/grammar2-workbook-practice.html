<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>13과 문법 2 WB 연습 | V-고 있다</title>
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --page-bg: #f6f8fb;
            --panel: #ffffff;
            --ink: #172033;
            --muted: #5d6b82;
            --line: #d7e0ea;
            --teal: #0f766e;
            --teal-soft: #e8fbf7;
            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --orange: #ea580c;
            --orange-soft: #fff4e8;
            --rose: #dc2626;
            --rose-soft: #fff1f2;
            --green: #15803d;
            --green-soft: #ecfdf3;
            --shadow: 0 14px 28px rgba(15, 23, 42, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-padding-top: 58px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--ink);
            background: linear-gradient(180deg, #f8fafc 0%, var(--page-bg) 46%, #f1f5f9 100%);
            font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        }

        button,
        textarea {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 46px;
            border-bottom: 1px solid rgba(215, 224, 234, 0.92);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
        }

        .topbar a,
        .topbar span {
            color: var(--teal);
            font-size: 12px;
            font-weight: 900;
            line-height: 1.1;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar span {
            color: var(--muted);
        }

        .shell {
            width: min(1120px, calc(100% - 28px));
            margin: 14px auto 38px;
            display: grid;
            gap: 12px;
        }

        .intro {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px 16px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--orange);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.55rem, 3vw, 2.35rem);
            line-height: 1.15;
            letter-spacing: 0;
        }

        .intro__actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .link-button,
        .ghost-button,
        .primary-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border-radius: 8px;
            padding: 0 13px;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
        }

        .link-button {
            border: 1px solid #bfdbfe;
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .ghost-button {
            border: 1px solid var(--line);
            background: #fff;
            color: #344256;
        }

        .primary-button {
            border: 1px solid var(--teal);
            background: var(--teal);
            color: #fff;
        }

        .primary-button:disabled,
        .ghost-button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .stage-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .stage-tab {
            display: grid;
            grid-template-columns: 30px minmax(0, 1fr);
            gap: 9px;
            align-items: center;
            min-height: 54px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            background: #fff;
            color: #334155;
            text-align: left;
            cursor: pointer;
        }

        .stage-tab[aria-selected="true"] {
            border-color: rgba(15, 118, 110, 0.46);
            background: var(--teal-soft);
            color: #0f766e;
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.08);
        }

        .stage-tab__number {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #334155;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .stage-tab[aria-selected="true"] .stage-tab__number {
            background: var(--teal);
            color: #fff;
        }

        .stage-tab__title {
            display: block;
            min-width: 0;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.25;
        }

        .stage-tab__sub {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.25;
        }

        .workbook-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 260px;
            gap: 12px;
            align-items: start;
        }

        .work-panel,
        .progress-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .work-panel {
            min-width: 0;
            padding: 16px;
        }

        .progress-panel {
            position: sticky;
            top: 58px;
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .progress-title {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .progress-meters {
            display: grid;
            gap: 8px;
        }

        .meter {
            display: grid;
            gap: 5px;
        }

        .meter__row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .meter__track {
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #e2e8f0;
        }

        .meter__bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--teal), var(--blue));
            transition: width 0.2s ease;
        }

        .mini-rule {
            border: 1px solid #fed7aa;
            border-radius: 8px;
            padding: 12px;
            background: var(--orange-soft);
        }

        .mini-rule strong {
            display: block;
            margin-bottom: 6px;
            color: #9a3412;
            font-size: 13px;
            font-weight: 900;
        }

        .mini-rule p {
            margin: 0;
            color: #475569;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.55;
        }

        .flow-control {
            display: grid;
            gap: 7px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 11px;
            background: var(--blue-soft);
        }

        .flow-toggle {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 5px;
        }

        .flow-toggle button {
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            background: #fff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }

        .flow-toggle button[aria-pressed="true"] {
            border-color: var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .flow-hint {
            margin: 0;
            color: #1e3a8a;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
        }

        .stage-head {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stage-title {
            margin: 0;
            font-size: clamp(1.28rem, 2.4vw, 1.85rem);
            line-height: 1.22;
        }

        .stage-note {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.55;
        }

        .guide-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin: 0 0 12px;
        }

        .guide-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 30px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0 9px;
            background: #fff;
            color: #64748b;
            font-size: 12px;
            font-weight: 900;
            transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .guide-chip b {
            display: inline-grid;
            place-items: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #475569;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }

        .guide-chip.is-active {
            border-color: rgba(15, 118, 110, 0.46);
            background: var(--teal-soft);
            color: #0f766e;
            transform: translateY(-1px);
        }

        .guide-chip.is-active b {
            background: var(--teal);
            color: #fff;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            border: 1px solid #c7d2fe;
            border-radius: 999px;
            padding: 0 10px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .match-grid {
            display: grid;
            grid-template-columns: minmax(220px, 0.72fr) minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .focus-object {
            display: grid;
            gap: 10px;
        }

        .guide-focus {
            position: relative;
            z-index: 2;
            outline: 3px solid rgba(245, 158, 11, 0.75);
            outline-offset: 4px;
            box-shadow: 0 0 0 7px rgba(245, 158, 11, 0.13), 0 16px 28px rgba(15, 23, 42, 0.12);
            animation: guidePulse 1.05s ease-in-out 2;
            scroll-margin-top: 70px;
        }

        .guide-focus[data-guide-label]::after {
            content: attr(data-guide-label);
            position: absolute;
            top: -16px;
            right: 10px;
            z-index: 3;
            border-radius: 999px;
            padding: 4px 8px;
            background: #0f766e;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
        }

        @keyframes guidePulse {
            0%, 100% {
                outline-color: rgba(245, 158, 11, 0.62);
                box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.1), 0 12px 22px rgba(15, 23, 42, 0.08);
            }
            50% {
                outline-color: rgba(15, 118, 110, 0.84);
                box-shadow: 0 0 0 9px rgba(15, 118, 110, 0.12), 0 16px 28px rgba(15, 23, 42, 0.13);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .guide-focus {
                animation: none;
            }
        }

        .image-frame {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 250px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .image-frame img {
            display: block;
            width: min(100%, 310px);
            height: auto;
        }

        .image-frame__badge {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 1;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 5px 8px;
            background: rgba(239, 246, 255, 0.94);
            color: #1d4ed8;
            font-size: 11px;
            font-weight: 950;
            line-height: 1;
        }

        .object-name {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
        }

        .object-name strong {
            font-size: 22px;
            font-weight: 900;
        }

        .object-name span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .option-grid {
            display: grid;
            gap: 8px;
        }

        .option-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 52px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px 14px;
            background: #fff;
            color: #172033;
            font-size: 16px;
            font-weight: 900;
            text-align: left;
            cursor: pointer;
        }

        .option-button:hover:not(:disabled),
        .person-button:hover,
        .token-button:hover {
            border-color: rgba(15, 118, 110, 0.46);
            background: #f8fffd;
        }

        .option-button.is-selected {
            border-color: var(--teal);
            background: var(--teal-soft);
            color: #0f766e;
        }

        .option-button.is-correct {
            border-color: #86efac;
            background: var(--green-soft);
            color: var(--green);
        }

        .option-button.is-wrong {
            border-color: #fecdd3;
            background: var(--rose-soft);
            color: var(--rose);
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .feedback {
            min-height: 0;
            margin-top: 12px;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid transparent;
            color: #334155;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.6;
        }

        .feedback:empty {
            display: none;
        }

        .feedback.is-correct {
            border-color: #86efac;
            background: var(--green-soft);
            color: #166534;
        }

        .feedback.is-wrong {
            border-color: #fecdd3;
            background: var(--rose-soft);
            color: #9f1239;
        }

        .feedback.is-hint {
            border-color: #bfdbfe;
            background: var(--blue-soft);
            color: #1e3a8a;
        }

        .advance-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            border: 1px solid #99f6e4;
            border-radius: 8px;
            padding: 10px;
            background: #f0fdfa;
        }

        .advance-copy {
            display: grid;
            gap: 5px;
            min-width: 0;
        }

        .advance-copy strong {
            color: #0f766e;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.3;
        }

        .advance-copy span {
            color: #115e59;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
        }

        .advance-track {
            height: 7px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.14);
        }

        .advance-track span {
            display: block;
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--teal), var(--blue));
            transition: width 0.12s linear;
        }

        .advance-panel.is-paused {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .advance-panel.is-paused .advance-copy strong,
        .advance-panel.is-paused .advance-copy span {
            color: #475569;
        }

        .advance-panel.is-paused .advance-track span {
            background: #94a3b8;
        }

        .advance-panel.is-manual [data-advance-pause] {
            display: none;
        }

        .person-roster {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .person-button {
            display: grid;
            grid-template-columns: 50px minmax(0, 1fr);
            gap: 9px;
            align-items: center;
            min-height: 72px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            background: #fff;
            color: #172033;
            text-align: left;
            cursor: pointer;
        }

        .person-button[aria-pressed="true"] {
            border-color: var(--blue);
            background: var(--blue-soft);
        }

        .person-button img {
            width: 50px;
            height: 50px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            object-fit: contain;
            background: #fff;
        }

        .person-button strong,
        .person-button span {
            display: block;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .person-button strong {
            font-size: 14px;
            font-weight: 900;
        }

        .person-button span {
            margin-top: 3px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .compose-area {
            display: grid;
            grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
            gap: 14px;
            align-items: start;
        }

        .cue-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: #f8fafc;
        }

        .cue-panel img {
            display: block;
            width: min(180px, 100%);
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            margin-inline: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }

        .cue-panel h3 {
            margin: 10px 0 6px;
            font-size: 19px;
            line-height: 1.25;
        }

        .cue-list {
            display: grid;
            gap: 6px;
            margin: 10px 0 0;
            padding: 0;
            list-style: none;
        }

        .cue-list li {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 10px;
            background: #fff;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
        }

        .token-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 10px;
        }

        .token-button {
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 10px;
            background: var(--blue-soft);
            color: #1d4ed8;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
        }

        .sentence-input {
            width: 100%;
            min-height: 124px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            color: var(--ink);
            background: #fff;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.7;
            outline: none;
        }

        .sentence-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .dialogue-box {
            display: grid;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #f8fafc;
        }

        .dialogue-line {
            margin: 0;
            color: #334155;
            font-size: 17px;
            font-weight: 900;
            line-height: 1.72;
        }

        .blank {
            display: inline-grid;
            place-items: center;
            min-width: min(210px, 50vw);
            min-height: 32px;
            border-radius: 999px;
            background: #fff;
            color: var(--teal);
            box-shadow: inset 0 -2px 0 #99f6e4;
        }

        .dialogue-options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .summary-panel {
            display: grid;
            gap: 12px;
            text-align: center;
        }

        .summary-score {
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 18px;
            background: var(--green-soft);
        }

        .summary-score strong {
            display: block;
            color: var(--green);
            font-size: clamp(2rem, 6vw, 3.6rem);
            line-height: 1;
        }

        .summary-score span {
            display: block;
            margin-top: 7px;
            color: #166534;
            font-size: 14px;
            font-weight: 900;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 920px) {
            .workbook-layout {
                grid-template-columns: 1fr;
            }

            .progress-panel {
                position: static;
                order: -1;
                grid-template-columns: minmax(0, 1fr) minmax(220px, 0.8fr);
            }

            .match-grid,
            .compose-area {
                grid-template-columns: 1fr;
            }

            .focus-object {
                order: 2;
            }
        }

        @media (max-width: 680px) {
            .shell {
                width: min(100% - 18px, 1120px);
                margin-top: 8px;
                gap: 9px;
            }

            .intro {
                grid-template-columns: 1fr;
                align-items: start;
                padding: 11px 12px;
            }

            .intro__actions {
                justify-content: start;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stage-tabs {
                display: flex;
                overflow-x: auto;
                gap: 7px;
                padding: 7px;
                scrollbar-width: none;
            }

            .stage-tabs::-webkit-scrollbar {
                display: none;
            }

            .stage-tab {
                flex: 0 0 184px;
                min-height: 50px;
                padding: 7px 8px;
            }

            .stage-tab__title {
                font-size: 13px;
            }

            .work-panel {
                padding: 12px;
            }

            .progress-panel {
                grid-template-columns: 1fr;
                padding: 11px;
            }

            const isCorrect = state.matchAnswered && selectedMatchText() === task.answer;
            const nextLabel = state.matchIndex === DATA.match.length - 1 ? "묘사 단계로" : "다음";

            const imageBadge = state.matchAnswered && task.answerImage ? "원본 확인" : task.clueMode || "단서 그림";

                    <span class="status-pill">${progress}</span>

                ${guideStrip(["대상", "표현", "확인", "다음"])}
                <div class="match-grid">

                        <div class="object-name">

                            <span>${esc(task.cue)}</span>

                                if (state.matchAnswered && state.matchSelected === index && option !== task.answer) classes.push("is-wrong");

        }

        function checkMatch() {
            if (state.matchSelected === null || state.matchAnswered) return;
            const task = DATA.match[state.matchIndex];
            state.matchAnswered = true;
            if (selectedMatchText() === task.answer) state.matchCorrect += 1;
            renderMatch();
        }

        function nextMatch() {
            if (!state.matchAnswered) return;
            clearAutoAdvance();
            if (state.matchIndex === DATA.match.length - 1) {
                state.stage = "describe";
            } else {
                state.matchIndex += 1;
            }
            state.matchSelected = null;
            state.matchAnswered = false;
            render();
        }

        function renderDescribe() {
            const task = DATA.describe[state.describeIndex];
            const completed = state.describeDone.filter(Boolean).length;
            const nextLabel = describeNextLabel();
            app.innerHTML = `
                <div class="stage-head">
                    <div>
                        <h2 class="stage-title">단서를 보고 사람을 설명하세요.</h2>
                        <p class="stage-note">한 사람을 고른 뒤 섞인 토큰 중 필요한 것만 골라 <b>옷/소품 + V-고 있는 + 사람</b> 문장을 만듭니다.</p>
                    </div>
                    <span class="status-pill">${completed} / ${DATA.describe.length} 완료</span>
                </div>
                ${guideStrip(["단서", "조합", "입력", "확인", "다음"])}
                <div class="person-roster" aria-label="묘사할 사람 선택">
                    ${DATA.describe.map((item, index) => `
                        <button type="button" class="person-button" data-person="${index}" aria-pressed="${index === state.describeIndex}">
                            <img src="${esc(item.image)}" alt="${esc(item.alt)}" width="90" height="90" decoding="async" />
                            <span>
                                <strong>${esc(item.person)}</strong>
                                <span>${esc(item.cue)}</span>
                            </span>
                        </button>
                    `).join("")}
                </div>
                <div class="compose-area">
                    <aside class="cue-panel" data-guide-target="describe-cue">
                        <img src="${esc(task.image)}" alt="${esc(task.alt)}" width="900" height="900" decoding="async" />
                        <h3>${esc(task.person)}</h3>
                        <ul class="cue-list">
                            <li>${esc(task.cue)}</li>
                            <li>문장 끝: ${esc(task.person)}이에요 / 예요</li>
                        </ul>
                    </aside>
                    <div>
                        <div class="token-bank" aria-label="문장 조합 토큰" data-guide-target="describe-tokens">
                            ${task.tokens.map((token) => `<button type="button" class="token-button" data-token="${esc(token)}">${esc(token)}</button>`).join("")}
                        </div>
                        <textarea id="describeInput" class="sentence-input" data-guide-target="describe-input" placeholder="예: 감색 양복을 입고 은색 넥타이를 매고 있는 사람이 신랑이에요." spellcheck="false"></textarea>
                        <div class="action-row">
                            <button type="button" id="checkDescribeBtn" class="primary-button" data-guide-target="describe-check">예시 확인</button>
                            <button type="button" id="modelDescribeBtn" class="ghost-button">예시 문장</button>
                            <button type="button" id="clearDescribeBtn" class="ghost-button">지우기</button>
                            <button type="button" id="nextDescribeBtn" class="ghost-button" data-guide-target="describe-next">${nextLabel}</button>
                        </div>
                        <div id="describeFeedback" class="feedback is-hint" data-guide-target="describe-feedback">문장을 쓴 뒤 예시 답안과 비교하세요. 다른 표현도 가능합니다.</div>
                        <div id="describeAdvance" class="advance-panel hidden" aria-live="polite"></div>
                    </div>
                </div>
            `;

            document.querySelectorAll("[data-person]").forEach((button) => {
                button.addEventListener("click", () => {
                    clearAutoAdvance();
                    state.describeIndex = Number(button.dataset.person);
                    renderDescribe();
                });
            });
            document.querySelectorAll("[data-token]").forEach((button) => {
                button.addEventListener("click", () => appendToken(button.dataset.token));
            });
            document.getElementById("checkDescribeBtn").addEventListener("click", checkDescribe);
            document.getElementById("modelDescribeBtn").addEventListener("click", showDescribeModel);
            document.getElementById("clearDescribeBtn").addEventListener("click", () => {
                clearAutoAdvance();
                document.getElementById("describeInput").value = "";
                setFeedback("describeFeedback", "is-hint", "문장을 쓴 뒤 예시 답안과 비교하세요. 다른 표현도 가능합니다.");
                scheduleDescribeGuide();
            });
            document.getElementById("nextDescribeBtn").addEventListener("click", nextDescribe);
            document.getElementById("describeInput").addEventListener("input", () => {
                clearAutoAdvance();
                syncDescribeGuide();
            });
            scheduleDescribeGuide();
        }

        function appendToken(token) {
            const input = document.getElementById("describeInput");
            const spacer = input.value.trim() ? " " : "";
            input.value = `${input.value.trim()}${spacer}${token}`;
            input.focus();
            syncDescribeGuide();
        }

        function checkDescribe() {
            const task = DATA.describe[state.describeIndex];
            const input = document.getElementById("describeInput");
            if (!input.value.trim()) {
                clearAutoAdvance();
                setFeedback("describeFeedback", "is-hint", "먼저 문장을 한 번 만들어 보거나 예시 문장을 확인하세요.");
                focusGuide('[data-guide-target="describe-input"]', "3 입력", 2);
                return;
            }
            completeDescribeWithExample(task);
        }

        function showDescribeModel() {
            clearAutoAdvance();
            const task = DATA.describe[state.describeIndex];
            document.getElementById("describeInput").value = task.model;
            completeDescribeWithExample(task);
        }

        function completeDescribeWithExample(task) {
            state.describeDone[state.describeIndex] = true;
            const nextLabel = describeNextLabel();
            const nextDestination = describeNextDestination();
            setFeedback("describeFeedback", "is-hint", `<b>예시 답안:</b> ${esc(task.model)}<br><span>쓴 답이 예시와 달라도 단서와 상황이 맞으면 사용할 수 있어요.</span>`);
            prepareNowButton("nextDescribeBtn", `지금 ${nextLabel}`);
            updateMeters();
            startAutoAdvance({
                key: `describe-${state.describeIndex}`,
                panelId: "describeAdvance",
                nextButtonId: "nextDescribeBtn",
                destination: nextDestination,
                nowText: `지금 ${nextLabel}`,
                onNext: nextDescribe
            });
            runGuideSequence([
                { selector: '[data-guide-target="describe-feedback"]', label: "예시", index: 3, delay: 40 },
                { selector: '[data-guide-target="describe-next"]', label: "5 다음", index: 4, delay: 850 }
            ]);
        }

        function nextDescribe() {
            clearAutoAdvance();
            if (state.describeIndex === DATA.describe.length - 1) {
                state.stage = "dialogue";
            } else {
                state.describeIndex += 1;
            }
            render();
        }

        function describeNextLabel() {
            return state.describeIndex === DATA.describe.length - 1 ? "대화 단계로" : "다음 사람";
        }

        function describeNextDestination() {
            return state.describeIndex === DATA.describe.length - 1 ? "대화 단계" : "다음 사람";
        }

        function renderDialogue() {
            const task = DATA.dialogue[state.dialogueIndex];
            const progress = `${state.dialogueIndex + 1} / ${DATA.dialogue.length}`;
            const isCorrect = state.dialogueAnswered && selectedDialogueText() === task.answer;
            const nextLabel = state.dialogueIndex === DATA.dialogue.length - 1 ? "결과 보기" : "다음";
            const nextDestination = state.dialogueIndex === DATA.dialogue.length - 1 ? "결과 화면" : "다음 대화";
            app.innerHTML = `
                <div class="stage-head">
                    <div>
                        <h2 class="stage-title">대화 빈칸을 완성하세요.</h2>
                        <p class="stage-note">말하는 상황에 맞는 착용 표현을 골라 대화를 자연스럽게 만듭니다.</p>
                    </div>
                    <span class="status-pill">${progress}</span>
                </div>
                ${guideStrip(["빈칸", "표현", "확인", "다음"])}
                <div class="dialogue-box" data-guide-target="dialogue-blank">
                    <p class="dialogue-line"><b>A</b>: ${esc(task.a)}</p>
                    <p class="dialogue-line"><b>B</b>: ${renderDialoguePrompt(task.prompt)}</p>
                </div>
                <div class="dialogue-options" data-guide-target="dialogue-options">
                    ${task.options.map((option, index) => {
                        const classes = ["option-button"];
                        if (state.dialogueSelected === index) classes.push("is-selected");
                        if (state.dialogueAnswered && option === task.answer) classes.push("is-correct");
                        if (state.dialogueAnswered && state.dialogueSelected === index && option !== task.answer) classes.push("is-wrong");
                        return `<button type="button" class="${classes.join(" ")}" data-dialogue-option="${index}" ${state.dialogueAnswered ? "disabled" : ""}><span>${esc(option)}</span><span aria-hidden="true">›</span></button>`;
                    }).join("")}
                </div>
                <div class="action-row">
                    <button type="button" id="checkDialogueBtn" class="primary-button" data-guide-target="dialogue-check" ${state.dialogueAnswered || state.dialogueSelected === null ? "disabled" : ""}>확인</button>
                    <button type="button" id="nextDialogueBtn" class="${isCorrect ? "primary-button" : "ghost-button"}" data-guide-target="dialogue-next" ${state.dialogueAnswered ? "" : "disabled"}>${isCorrect ? `지금 ${nextLabel}` : nextLabel}</button>
                </div>
                <div id="dialogueFeedback" class="feedback ${state.dialogueAnswered ? feedbackClass(selectedDialogueText() === task.answer) : ""}" data-guide-target="dialogue-feedback">${state.dialogueAnswered ? dialogueFeedback(task) : ""}</div>
                <div id="dialogueAdvance" class="advance-panel hidden" aria-live="polite"></div>
            `;

            document.querySelectorAll("[data-dialogue-option]").forEach((button) => {
                button.addEventListener("click", () => {
                    if (state.dialogueAnswered) return;
                    state.dialogueSelected = Number(button.dataset.dialogueOption);
                    renderDialogue();
                });
            });
            document.getElementById("checkDialogueBtn").addEventListener("click", checkDialogue);
            document.getElementById("nextDialogueBtn").addEventListener("click", nextDialogue);
            if (isCorrect) {
                startAutoAdvance({
                    key: `dialogue-${state.dialogueIndex}`,
                    panelId: "dialogueAdvance",
                    nextButtonId: "nextDialogueBtn",
                    destination: nextDestination,
                    nowText: `지금 ${nextLabel}`,
                    onNext: nextDialogue
                });
            } else {
                clearAutoAdvance();
            }
            scheduleDialogueGuide();
        }

        function renderDialoguePrompt(prompt) {
            return esc(prompt).replace("____", '<span class="blank">____</span>');
        }

        function selectedDialogueText() {
            const task = DATA.dialogue[state.dialogueIndex];
            return task.options[state.dialogueSelected] || "";
        }

        function dialogueFeedback(task) {
            const correct = selectedDialogueText() === task.answer;
            return correct
                ? `<b>맞아요.</b> ${esc(task.explain)}`
                : `<b>확인해요.</b> 정답은 <b>${esc(task.answer)}</b>입니다. ${esc(task.explain)}`;
        }

        function checkDialogue() {
            if (state.dialogueSelected === null || state.dialogueAnswered) return;
            const task = DATA.dialogue[state.dialogueIndex];
            state.dialogueAnswered = true;
            if (selectedDialogueText() === task.answer) state.dialogueCorrect += 1;
            renderDialogue();
        }

        function nextDialogue() {
            if (!state.dialogueAnswered) return;
            clearAutoAdvance();
            if (state.dialogueIndex === DATA.dialogue.length - 1) {
                renderSummary();
                return;
            }
            state.dialogueIndex += 1;
            state.dialogueSelected = null;
            state.dialogueAnswered = false;
            render();
        }

        function renderSummary() {
            clearAutoAdvance();
            state.stage = "dialogue";
            const describeCount = state.describeDone.filter(Boolean).length;
            const total = DATA.match.length + DATA.dialogue.length;
            const score = state.matchCorrect + state.dialogueCorrect;
            app.innerHTML = `
                <div class="summary-panel">
                    <div class="summary-score">
                        <strong>${score} / ${total}</strong>
                        <span>표현 ${state.matchCorrect}/${DATA.match.length} · 묘사 예시 ${describeCount}/${DATA.describe.length} · 대화 ${state.dialogueCorrect}/${DATA.dialogue.length}</span>
                    </div>
                    <div class="action-row" style="justify-content:center">
                        <button type="button" id="restartWorkbookBtn" class="primary-button">처음부터 다시</button>
                        <a class="link-button" href="grammar2.html">문법 2로 돌아가기</a>
                    </div>
                </div>
            `;
            document.getElementById("restartWorkbookBtn").addEventListener("click", restartAll);
            updateMeters();
        }

        function restartAll() {
            clearAutoAdvance();
            state.stage = "match";
            state.matchIndex = 0;
            state.matchSelected = null;
            state.matchAnswered = false;
            state.matchCorrect = 0;
            state.describeIndex = 0;
            state.describeDone = Array(DATA.describe.length).fill(false);
            state.dialogueIndex = 0;
            state.dialogueSelected = null;
            state.dialogueAnswered = false;
            state.dialogueCorrect = 0;
            render();
        }

        function updateMeters() {
            const describeCount = state.describeDone.filter(Boolean).length;
            setMeter("match", state.matchCorrect, DATA.match.length);
            setMeter("describe", describeCount, DATA.describe.length);
            setMeter("dialogue", state.dialogueCorrect, DATA.dialogue.length);
        }

        function setMeter(kind, value, total) {
            const text = document.getElementById(`${kind}MeterText`);
            const bar = document.getElementById(`${kind}MeterBar`);
            if (!text || !bar) return;
            text.textContent = `${value} / ${total}`;
            bar.style.width = `${Math.round((value / total) * 100)}%`;
        }

        function bindFlowControls() {
            document.querySelectorAll("[data-flow-mode]").forEach((button) => {
                button.addEventListener("click", () => setFlowMode(button.dataset.flowMode));
            });
            refreshFlowControls();
        }

        function setFlowMode(mode) {
            if (!FLOW_MODES[mode]) return;
            const context = activeAdvance && !activeAdvance.paused
                ? {
                    key: activeAdvance.key,
                    panelId: activeAdvance.panelId,
                    nextButtonId: activeAdvance.nextButtonId,
                    destination: activeAdvance.destination,
                    nowText: activeAdvance.nowText,
                    onNext: activeAdvance.onNext
                }
                : null;
            state.flowMode = mode;
            saveFlowMode(mode);
            refreshFlowControls();
            if (context) startAutoAdvance(context);
        }

        function refreshFlowControls() {
            document.querySelectorAll("[data-flow-mode]").forEach((button) => {
                button.setAttribute("aria-pressed", String(button.dataset.flowMode === state.flowMode));
            });
            const hint = document.getElementById("flowModeHint");
            if (hint) hint.textContent = FLOW_MODES[state.flowMode].hint;
        }

        function getSavedFlowMode() {
            try {
                const saved = window.localStorage.getItem(FLOW_STORAGE_KEY);
                return FLOW_MODES[saved] ? saved : "slow";
            } catch (error) {
                return "slow";
            }
        }

        function saveFlowMode(mode) {
            try {
                window.localStorage.setItem(FLOW_STORAGE_KEY, mode);
            } catch (error) {
                return;
            }
        }

        function prepareNowButton(buttonId, text) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            button.classList.remove("ghost-button");
            button.classList.add("primary-button");
            button.textContent = text;
        }

        function startAutoAdvance(context) {
            clearAutoAdvance();
            const panel = document.getElementById(context.panelId);
            if (!panel) return;
            prepareNowButton(context.nextButtonId, context.nowText);
            panel.className = "advance-panel";
            panel.innerHTML = `
                <div class="advance-copy">
                    <strong data-advance-status></strong>
                    <span data-advance-detail></span>
                    <div class="advance-track" aria-hidden="true"><span data-advance-bar></span></div>
                </div>
                <button type="button" class="ghost-button" data-advance-pause>멈춤</button>
            `;
            activeAdvance = {
                ...context,
                panelId: context.panelId,
                interval: null,
                timeout: null,
                paused: false,
                lastSecond: null
            };

            const pauseButton = panel.querySelector("[data-advance-pause]");
            pauseButton.addEventListener("click", pauseAutoAdvance);

            if (state.flowMode === "manual") {
                panel.classList.add("is-manual");
                setAdvanceStatus("수동 진행", `준비되면 ${context.nowText}을 누르세요.`, 0);
                return;
            }

            const delay = FLOW_MODES[state.flowMode].delay;
            activeAdvance.startedAt = Date.now();
            activeAdvance.dueAt = activeAdvance.startedAt + delay;
            updateAdvanceCountdown();
            activeAdvance.interval = setInterval(updateAdvanceCountdown, 100);
            activeAdvance.timeout = setTimeout(() => {
                const stillActive = activeAdvance && activeAdvance.key === context.key && !activeAdvance.paused;
                if (stillActive) context.onNext();
            }, delay);
        }

        function pauseAutoAdvance() {
            if (!activeAdvance) return;
            clearTimeout(activeAdvance.timeout);
            clearInterval(activeAdvance.interval);
            activeAdvance.paused = true;
            const panel = document.getElementById(activeAdvance.panelId);
            if (panel) panel.classList.add("is-paused");
            const pauseButton = panel ? panel.querySelector("[data-advance-pause]") : null;
            if (pauseButton) {
                pauseButton.textContent = "멈춤 완료";
                pauseButton.disabled = true;
            }
            setAdvanceStatus("잠시 멈췄어요", `준비되면 ${activeAdvance.nowText}을 누르세요.`, currentAdvancePercent());
        }

        function clearAutoAdvance() {
            if (!activeAdvance) return;
            clearTimeout(activeAdvance.timeout);
            clearInterval(activeAdvance.interval);
            const panel = document.getElementById(activeAdvance.panelId);
            if (panel) {
                panel.className = "advance-panel hidden";
                panel.innerHTML = "";
            }
            activeAdvance = null;
        }

        function updateAdvanceCountdown() {
            if (!activeAdvance) return;
            const remaining = Math.max(0, activeAdvance.dueAt - Date.now());
            const percent = currentAdvancePercent();
            const second = Math.ceil(remaining / 1000);
            const status = `${activeAdvance.destination}로 이동 준비`;
            if (activeAdvance.lastSecond !== second) {
                activeAdvance.lastSecond = second;
                setAdvanceStatus(status, `${second}초 후 자동으로 이동합니다.`, percent);
                return;
            }
            setAdvanceBar(percent);
        }

        function currentAdvancePercent() {
            if (!activeAdvance || !activeAdvance.startedAt || !activeAdvance.dueAt) return 0;
            const elapsed = Date.now() - activeAdvance.startedAt;
            const total = Math.max(1, activeAdvance.dueAt - activeAdvance.startedAt);
            return Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
        }

        function setAdvanceStatus(status, detail, percent) {
            if (!activeAdvance) return;
            const panel = document.getElementById(activeAdvance.panelId);
            if (!panel) return;
            const statusNode = panel.querySelector("[data-advance-status]");
            const detailNode = panel.querySelector("[data-advance-detail]");
            if (statusNode) statusNode.textContent = status;
            if (detailNode) detailNode.textContent = detail;
            setAdvanceBar(percent);
        }

        function setAdvanceBar(percent) {
            if (!activeAdvance) return;
            const panel = document.getElementById(activeAdvance.panelId);
            const bar = panel ? panel.querySelector("[data-advance-bar]") : null;
            if (bar) bar.style.width = `${percent}%`;
        }

        function guideStrip(labels) {
            return `
                <div class="guide-strip" aria-label="순차 가이드">
                    ${labels.map((label, index) => `
                        <span class="guide-chip" data-guide-chip="${index}">
                            <b>${index + 1}</b>${esc(label)}
                        </span>
                    `).join("")}
                </div>
            `;
        }

        function updateGuideStrip(index) {
            document.querySelectorAll("[data-guide-chip]").forEach((chip) => {
                chip.classList.toggle("is-active", Number(chip.dataset.guideChip) === index);
            });
        }

        function clearGuideTimers() {
            while (guideTimers.length) {
                clearTimeout(guideTimers.pop());
            }
        }

        function clearGuideFocus() {
            document.querySelectorAll(".guide-focus").forEach((node) => {
                node.classList.remove("guide-focus");
                node.removeAttribute("data-guide-label");
            });
        }

        function focusGuide(selector, label, index, scroll = true) {
            clearGuideTimers();
            activateGuide(selector, label, index, scroll);
        }

        function activateGuide(selector, label, index, scroll = true) {
            clearGuideFocus();
            updateGuideStrip(index);
            const target = document.querySelector(selector);
            if (!target) return;
            target.classList.add("guide-focus");
            target.setAttribute("data-guide-label", label);
            if (scroll) {
                requestAnimationFrame(() => {
                    target.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
                });
            }
        }

        function runGuideSequence(steps) {
            clearGuideTimers();
            clearGuideFocus();
            steps.forEach((step) => {
                const timer = setTimeout(() => {
                    activateGuide(step.selector, step.label, step.index, step.scroll !== false);
                }, step.delay || 0);
                guideTimers.push(timer);
            });
        }

        function scheduleMatchGuide() {
            if (!state.matchAnswered && state.matchSelected === null) {
                runGuideSequence([
                    { selector: '[data-guide-target="match-object"]', label: "1 대상", index: 0, delay: 80 },
                    { selector: '[data-guide-target="match-options"]', label: "2 표현", index: 1, delay: 900 }
                ]);
                return;
            }
            if (!state.matchAnswered) {
                focusGuide('[data-guide-target="match-check"]', "3 확인", 2);
                return;
            }
            runGuideSequence([
                { selector: '[data-guide-target="match-feedback"]', label: "피드백", index: 2, delay: 40 },
                { selector: '[data-guide-target="match-next"]', label: "4 다음", index: 3, delay: 850 }
            ]);
        }

        function scheduleDescribeGuide() {
            runGuideSequence([
                { selector: '[data-guide-target="describe-cue"]', label: "1 단서", index: 0, delay: 80 },
                { selector: '[data-guide-target="describe-tokens"]', label: "2 조합", index: 1, delay: 900 },
                { selector: '[data-guide-target="describe-input"]', label: "3 입력", index: 2, delay: 1700 }
            ]);
        }

        function syncDescribeGuide() {
            const input = document.getElementById("describeInput");
            if (input && input.value.trim()) {
                focusGuide('[data-guide-target="describe-check"]', "4 확인", 3, false);
            }
        }

        function scheduleDialogueGuide() {
            if (!state.dialogueAnswered && state.dialogueSelected === null) {
                runGuideSequence([
                    { selector: '[data-guide-target="dialogue-blank"]', label: "1 빈칸", index: 0, delay: 80 },
                    { selector: '[data-guide-target="dialogue-options"]', label: "2 표현", index: 1, delay: 900 }
                ]);
                return;
            }
            if (!state.dialogueAnswered) {
                focusGuide('[data-guide-target="dialogue-check"]', "3 확인", 2);
                return;
            }
            runGuideSequence([
                { selector: '[data-guide-target="dialogue-feedback"]', label: "피드백", index: 2, delay: 40 },
                { selector: '[data-guide-target="dialogue-next"]', label: "4 다음", index: 3, delay: 850 }
            ]);
        }

        function setFeedback(id, className, html) {
            const node = document.getElementById(id);
            node.className = `feedback ${className}`;
            node.innerHTML = html;
        }

        function feedbackClass(correct) {
            return correct ? "is-correct" : "is-wrong";
        }

        function normalize(value) {
            return String(value)
                .replace(/\s+/g, "")
                .replace(/[.?!。！？]/g, "")
                .toLowerCase();
        }

        function esc(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
    })();
    </script>
