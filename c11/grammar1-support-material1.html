            --accent-soft: #eff6ff;
            --accent-strong: #1d4ed8;

        .hero {

        .eyebrow {

            font-weight: 900;
            text-decoration: none;

        .nav-pill {

            font-size: 1.8rem;
            font-weight: 900;

            justify-content: center;
            min-width: 48px;
            min-height: 32px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 0.95rem;
            font-weight: 900;
        }

        .stage-meta {
            display: grid;
            align-content: start;
            gap: 10px;
        }

        .formula-box,
        .quick-note {
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .formula-box > span {
            display: block;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.06em;
        }

        .formula-box strong {
            display: block;
            margin-top: 6px;
            color: var(--ink);
            font-size: 1.1rem;
            line-height: 1.45;
            word-break: keep-all;
        }

        .quick-note {
            color: #475569;
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.55;
            word-break: keep-all;
        }

            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .control-row.wide {
            grid-template-columns: 1fr;
        }

        .control-btn {
            min-height: 44px;
            padding: 0 12px;
        }

        .control-btn.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
        }

        .control-btn.good {
            border-color: #99f6e4;
            background: var(--good-soft);
            color: var(--good);
        }

            visibility: hidden;

            position: relative;
        }

            content: "?";
            position: absolute;
            inset: 16px;
            display: grid;
            place-items: center;
            border: 2px dashed #93c5fd;
            border-radius: 8px;
            background: #eff6ff;
            color: var(--accent);

            object-fit: contain;
            border-radius: 6px;
            background: #ffffff;

            font-size: 1.25rem;
            font-weight: 900;
        }

            margin: 5px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 800;
            word-break: keep-all;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .choice-btn {
            justify-content: flex-start;
            min-height: 46px;
            padding: 8px 10px;
            text-align: left;
            word-break: keep-all;
        }

        .choice-btn.is-correct {
            border-color: #5eead4;
            background: var(--good-soft);
            color: var(--good);
        }

        .choice-btn.is-wrong {
            border-color: #fecaca;
            background: #fff1f2;
            color: #be123c;
        }

        .feedback {
            min-height: 42px;
            margin-top: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            background: #f8fafc;
            color: #475569;
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback.good {
            border: 1px solid #5eead4;
            background: var(--good-soft);
            color: var(--good);
        }

        .feedback.bad {
            border: 1px solid #fecaca;
            background: #fff1f2;
            color: #be123c;
        }

        .rule-grid {
            display: grid;
            gap: 8px;
        }

        .rule-row {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .rule-row strong {
            color: var(--accent);
            font-size: 1rem;
            line-height: 1.3;
        }

        .rule-row span {
            color: #334155;
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
        }

        .pair-section {
            margin-top: 12px;
            padding: 14px;
        }

        .pair-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
            gap: 10px;
        }

        .pair-tile {
            display: grid;
            gap: 7px;
            width: 100%;
            min-height: 210px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: inherit;
            text-align: left;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .pair-tile.is-active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .tile-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            align-items: center;
        }

        .tile-images img {
            width: 100%;
            max-height: 88px;
            object-fit: contain;
            border-radius: 6px;
            background: var(--surface-soft);
        }

        .tile-text {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            font-size: 0.95rem;
            font-weight: 900;
            line-height: 1.35;
            word-break: keep-all;
        }

        .tile-text mark {
            padding: 2px 6px;
            border-radius: 999px;
            background: #dbeafe;
            color: var(--accent-strong);
            font-weight: 900;
        }

        .empty {
            padding: 20px;
            color: var(--muted);
            font-weight: 800;
            text-align: center;
        }

        @media (max-width: 960px) {
            .hero,
            .study-layout,
            .stage {
                grid-template-columns: 1fr;
            }

            .hero-actions {
                justify-content: flex-start;
            }

            .stage-meta {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 620px) {
            .page {
                width: min(100% - 16px, 1180px);
                padding-top: 8px;
            }

            .stage {
                padding: 10px;
            }

            .pair-view {
                grid-template-columns: 1fr;
            }

            .arrow {
                min-height: 30px;
                font-size: 1.35rem;
                transform: rotate(90deg);
            }

            .word-card {
                min-height: 280px;
            }

            .image-box {
                min-height: 184px;
            }

            .stage-meta {
                grid-template-columns: 1fr;
            }

            .choices {
                grid-template-columns: 1fr;
            }

            .quiz-card {
                grid-template-columns: 92px minmax(0, 1fr);
            }

            .quiz-card img {
                width: 84px;
            }
        }
    </style>

            ["붙다", "붙이다", "-이", "cut49-stick.webp", "cut50-attach.webp", 224, 224],
            ["높다", "높이다", "-이", "cut51-high.webp", "cut52-raise.webp", 224, 224],
            ["앉다", "앉히다", "-히", "cut53-sit.webp", "cut54-seat.webp", 224, 224],
            ["입다", "입히다", "-히", "cut55-wear-clothes.webp", "cut56-dress.webp", 224, 224],
            ["읽다", "읽히다", "-히", "cut57-read.webp", "cut58-make-read.webp", 224, 224]
        ].map(function (item, index) {
            return {
                id: "pair" + String(index + 1).padStart(2, "0"),
                base: item[0],
                causative: item[1],
                suffix: item[2],
                baseImage: item[3],
                causativeImage: item[4],
                baseHeight: item[5],
                causativeHeight: item[6]
            };
        });

        const refs = {
            suffixBar: document.getElementById("suffixBar"),
            stage: document.getElementById("stage"),
            pairView: document.getElementById("pairView"),
            baseImage: document.getElementById("baseImage"),
            causativeImage: document.getElementById("causativeImage"),
            baseWord: document.getElementById("baseWord"),
            causativeWord: document.getElementById("causativeWord"),
            baseSuffix: document.getElementById("baseSuffix"),
            causativeSuffix: document.getElementById("causativeSuffix"),
            formulaBase: document.getElementById("formulaBase"),
            formulaSuffix: document.getElementById("formulaSuffix"),
            formulaCausative: document.getElementById("formulaCausative"),
            pairNote: document.getElementById("pairNote"),
            prevBtn: document.getElementById("prevBtn"),
            nextBtn: document.getElementById("nextBtn"),
            maskBtn: document.getElementById("maskBtn"),
            ruleGrid: document.getElementById("ruleGrid"),
            pairGrid: document.getElementById("pairGrid"),
            pairCount: document.getElementById("pairCount"),
            quizImage: document.getElementById("quizImage"),
            quizWord: document.getElementById("quizWord"),
            choices: document.getElementById("choices"),
            feedback: document.getElementById("feedback"),
            newQuizBtn: document.getElementById("newQuizBtn"),
            quizScore: document.getElementById("quizScore")
        };

        const state = {
            suffix: "전체",
            index: 0,
            masked: false,
            quizPair: null,
            quizAnswered: false,
            quizTotal: 0,
            quizCorrect: 0
        };

        function bySuffix() {
            if (state.suffix === "전체") {
                return pairs;
            }
            return pairs.filter(function (pair) {
                return pair.suffix === state.suffix;
            });
        }

        function countBySuffix(suffix) {
            if (suffix === "전체") {
                return pairs.length;
            }
            return pairs.filter(function (pair) {
                return pair.suffix === suffix;
            }).length;
        }

        function currentPair() {
            const list = bySuffix();
            if (!list.length) {
                return null;
            }
            state.index = Math.max(0, Math.min(state.index, list.length - 1));
            return list[state.index];
        }

        function imagePath(file) {
            return ASSET_BASE + file;
        }

        function renderSuffixBar() {
            refs.suffixBar.innerHTML = "";
            suffixOrder.forEach(function (suffix) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "suffix-btn" + (suffix === state.suffix ? " is-active" : "");
                button.textContent = suffix + " " + countBySuffix(suffix);
                button.addEventListener("click", function () {
                    state.suffix = suffix;
                    state.index = 0;
                    state.masked = false;
                    renderAll();
                });
                refs.suffixBar.appendChild(button);
            });
        }

        function renderStage() {
            const pair = currentPair();
            if (!pair) {
                return;
            }

            refs.pairView.classList.toggle("mask-on", state.masked);
            refs.baseImage.src = imagePath(pair.baseImage);
            refs.baseImage.alt = pair.base + " 그림";
            refs.baseImage.height = pair.baseHeight;
            refs.causativeImage.src = imagePath(pair.causativeImage);
            refs.causativeImage.alt = pair.causative + " 그림";
            refs.causativeImage.height = pair.causativeHeight;
            refs.baseWord.textContent = pair.base;
            refs.causativeWord.textContent = pair.causative;
            refs.baseSuffix.textContent = pair.suffix;
            refs.causativeSuffix.textContent = pair.suffix;
            refs.formulaBase.textContent = pair.base;
            refs.formulaSuffix.textContent = pair.suffix;
            refs.formulaCausative.textContent = pair.causative;
            refs.pairNote.textContent = pair.base + "에서 " + pair.causative + "로 바뀌면, 다른 사람이나 대상에게 그 행동이 일어나게 하는 뜻이 됩니다.";
            refs.maskBtn.textContent = state.masked ? "사동형 보기" : "사동형 가리기";
        }

        function renderRules() {
            refs.ruleGrid.innerHTML = "";
            suffixOrder.slice(1).forEach(function (suffix) {
                const examples = pairs
                    .filter(function (pair) { return pair.suffix === suffix; })
                    .slice(0, 3)
                    .map(function (pair) { return pair.base + "→" + pair.causative; })
                    .join(", ");
                const row = document.createElement("div");
                row.className = "rule-row";
                row.innerHTML = "<strong>" + suffix + "</strong><span>" + examples + "</span>";
                refs.ruleGrid.appendChild(row);
            });
        }

        function renderPairGrid() {
            const list = bySuffix();
            refs.pairCount.textContent = list.length + "쌍";
            refs.pairGrid.innerHTML = "";

            if (!list.length) {
                refs.pairGrid.innerHTML = "<div class=\"empty\">선택한 접미사의 짝이 없습니다.</div>";
                return;
            }

            const selected = currentPair();
            list.forEach(function (pair, index) {
                const tile = document.createElement("button");
                tile.type = "button";
                tile.className = "pair-tile" + (selected && pair.id === selected.id ? " is-active" : "");
                tile.innerHTML = ""
                    + "<div class=\"tile-images\">"
                    + "<img src=\"" + imagePath(pair.baseImage) + "\" alt=\"" + pair.base + " 그림\" width=\"224\" height=\"" + pair.baseHeight + "\" loading=\"lazy\" decoding=\"async\" />"
                    + "<img src=\"" + imagePath(pair.causativeImage) + "\" alt=\"" + pair.causative + " 그림\" width=\"224\" height=\"" + pair.causativeHeight + "\" loading=\"lazy\" decoding=\"async\" />"
                    + "</div>"
                    + "<div class=\"tile-text\"><span>" + pair.base + "</span><span aria-hidden=\"true\">→</span><span>" + pair.causative + "</span><mark>" + pair.suffix + "</mark></div>";
                tile.addEventListener("click", function () {
                    state.index = index;
                    state.masked = false;
                    renderStage();
                    renderPairGrid();
                    refs.stage.scrollIntoView({ behavior: "smooth", block: "nearest" });
                });
                refs.pairGrid.appendChild(tile);
            });
        }

        function shuffled(items) {
            const copy = items.slice();
            for (let i = copy.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = copy[i];
                copy[i] = copy[j];
                copy[j] = temp;
            }
            return copy;
        }

        function newQuiz() {
            const pool = bySuffix();
            state.quizPair = pool[Math.floor(Math.random() * pool.length)] || pairs[0];
            state.quizAnswered = false;
            refs.feedback.textContent = "";
            refs.feedback.className = "feedback";
            renderQuiz();
        }

        function renderQuiz() {
            const pair = state.quizPair || pairs[0];
            refs.quizImage.src = imagePath(pair.baseImage);
            refs.quizImage.alt = pair.base + " 그림";
            refs.quizImage.height = pair.baseHeight;
            refs.quizWord.textContent = pair.base;
            refs.quizScore.textContent = state.quizCorrect + " / " + state.quizTotal;
            refs.choices.innerHTML = "";

            const distractors = shuffled(pairs.filter(function (item) {
                return item.causative !== pair.causative;
            })).slice(0, 3).map(function (item) {
                return item.causative;
            });
            shuffled([pair.causative].concat(distractors)).forEach(function (choice) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "choice-btn";
                button.textContent = choice;
                button.addEventListener("click", function () {
                    chooseAnswer(button, choice);
                });
                refs.choices.appendChild(button);
            });
        }

        function chooseAnswer(button, choice) {
            if (state.quizAnswered || !state.quizPair) {
                return;
            }

            const correct = choice === state.quizPair.causative;
            state.quizAnswered = true;
            state.quizTotal += 1;
            if (correct) {
                state.quizCorrect += 1;
            }

            Array.from(refs.choices.children).forEach(function (child) {
                child.disabled = true;
                if (child.textContent === state.quizPair.causative) {
                    child.classList.add("is-correct");
                } else if (child === button) {
                    child.classList.add("is-wrong");
                }
            });

            refs.feedback.className = "feedback " + (correct ? "good" : "bad");
            refs.feedback.textContent = correct
                ? "맞아요. " + state.quizPair.base + "의 사동형은 " + state.quizPair.causative + "입니다."
                : "정답은 " + state.quizPair.causative + "입니다. 그림 짝을 다시 확인해 보세요.";
            refs.quizScore.textContent = state.quizCorrect + " / " + state.quizTotal;
        }

        function renderAll() {
            renderSuffixBar();
            renderStage();
            renderRules();
            renderPairGrid();
            newQuiz();
        }

        refs.prevBtn.addEventListener("click", function () {
            const list = bySuffix();
            state.index = (state.index - 1 + list.length) % list.length;
            state.masked = false;
            renderStage();
            renderPairGrid();
        });

        refs.nextBtn.addEventListener("click", function () {
            const list = bySuffix();
            state.index = (state.index + 1) % list.length;
            state.masked = false;
            renderStage();
            renderPairGrid();
        });

        refs.maskBtn.addEventListener("click", function () {
            state.masked = !state.masked;
            renderStage();
        });

        refs.newQuizBtn.addEventListener("click", newQuiz);

        renderAll();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
