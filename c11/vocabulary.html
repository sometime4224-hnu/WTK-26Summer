<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/design-tokens.css" />
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <link rel="stylesheet" href="../shared/multilang-toggle.css" />
    <style>
        :root {
            --vocab-shell-width: min(1180px, calc(100vw - 32px));
            --vocab-shell-margin: 18px auto 42px;
            --vocab-surface: rgba(255, 255, 255, 0.94);
        }

        * { box-sizing: border-box; }
        [hidden] { display: none !important; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f8fbfd 0%, #eef6ff 48%, #fff7ed 100%);
            color: var(--ink, #172033);
            font-family: 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        button, input { font: inherit; }
        button { -webkit-appearance: none; appearance: none; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            padding: 0 14px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid var(--line, #dbe4f0);
            backdrop-filter: blur(12px);
        }
        .topbar a {
            color: var(--accent-dark, #1d4ed8);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }
        .topbar__divider { color: #cbd5e1; font-weight: 900; }

        .shell { width: var(--vocab-shell-width); margin: var(--vocab-shell-margin); }
        .hero {
            border: 1px solid var(--line-soft, #edf2f7);
            border-radius: var(--radius-lg, 16px);
            background: var(--vocab-surface);
            box-shadow: var(--shadow, 0 18px 48px rgba(30, 41, 59, 0.11));
            padding: 20px 22px;
            margin-bottom: 14px;
        }
        .eyebrow {
            margin: 0 0 6px;
            color: var(--vocab, #e4582e);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        .hero h1 {
            margin: 0 0 6px;
            font-size: clamp(22px, 4vw, 32px);
            line-height: 1.15;
        }
        .hero__subtitle { margin: 0; color: var(--muted, #64748b); font-size: 14px; font-weight: 700; }
        .hero__row {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .hero__stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-pill, 999px);
            padding: 0 11px;
            background: #fff;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
        }
        [data-multilang-bar] { margin-top: 12px; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .segmented {
            display: flex;
            gap: 4px;
            border-radius: var(--radius, 8px);
            padding: 3px;
            background: #eaf0f7;
        }
        .segmented button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            padding: 0 14px;
            background: transparent;
            color: var(--muted, #64748b);
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
        }
        .segmented button.active {
            background: #fff;
            color: var(--ink, #172033);
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
        }
        .search {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: min(280px, 100%);
            flex: 1;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-pill, 999px);
            padding: 0 13px;
            min-height: 44px;
            background: #fff;
        }
        .search i { color: var(--muted, #64748b); }
        .search input {
            width: 100%;
            min-width: 0;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--ink, #172033);
            font-size: 13px;
            font-weight: 700;
        }
        .control-btn,
        .front-headword-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-pill, 999px);
            padding: 0 12px;
            background: #fff;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: background 0.14s, border-color 0.14s, color 0.14s, box-shadow 0.14s;
        }
        .control-btn:hover,
        .front-headword-toggle:hover { border-color: #bfdbfe; color: var(--accent-dark, #1d4ed8); }
        .front-headword-toggle[aria-checked="true"] {
            border-color: var(--vocab, #e4582e);
            background: #fff4ed;
            color: var(--vocab, #e4582e);
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
        }
        .front-headword-toggle__switch {
            position: relative;
            width: 34px;
            height: 20px;
            border-radius: var(--radius-pill, 999px);
            background: #cbd5e1;
            transition: background 0.14s;
        }
        .front-headword-toggle__switch::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(15, 23, 42, 0.22);
            transition: transform 0.14s;
        }
        .front-headword-toggle[aria-checked="true"] .front-headword-toggle__switch { background: var(--vocab, #e4582e); }
        .front-headword-toggle[aria-checked="true"] .front-headword-toggle__switch::after { transform: translateX(14px); }
        .front-headword-size {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-pill, 999px);
            padding: 0 8px;
            background: #fff;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
            transition: opacity 0.14s, border-color 0.14s, color 0.14s, box-shadow 0.14s;
        }
        .front-headword-size:not([aria-disabled="true"]) {
            border-color: #fed7aa;
            color: var(--vocab, #e4582e);
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
        }
        .front-headword-size[aria-disabled="true"] {
            opacity: 0.48;
        }
        .front-headword-size__icon { width: 14px; text-align: center; }
        .front-headword-size__label {
            min-width: 44px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .front-headword-size__btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 50%;
            background: #f8fafc;
            color: inherit;
            cursor: pointer;
        }
        .front-headword-size__btn:hover:not(:disabled) {
            border-color: var(--vocab, #e4582e);
            background: #fff7ed;
        }
        .front-headword-size__btn:disabled {
            cursor: not-allowed;
            opacity: 0.38;
        }

        .category-filter { display: flex; flex-wrap: wrap; gap: 6px; }
        .category-btn {
            min-height: 40px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-pill, 999px);
            padding: 0 12px;
            background: #fff;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }
        .category-btn.active { border-color: var(--vocab, #e4582e); background: #fff4ed; color: var(--vocab, #e4582e); }

        .view { display: none; }
        .view.active { display: block; }
        .empty-state {
            padding: 42px 16px;
            text-align: center;
            color: var(--muted, #64748b);
            font-weight: 800;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }
        .word-card {
            min-width: 0;
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            text-align: initial;
            cursor: pointer;
            perspective: 1000px;
        }
        .word-card:focus-visible { outline: none; }
        .word-card:focus-visible .word-card__face {
            outline: 3px solid #bfdbfe;
            outline-offset: 3px;
        }
        .word-card__inner {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 1;
            min-height: 190px;
            transform-style: preserve-3d;
            transition: transform 0.42s ease;
        }
        .word-card.is-flipped .word-card__inner { transform: rotateY(180deg); }
        .word-card__face {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
            backface-visibility: hidden;
            transition: border-color 0.16s, box-shadow 0.16s;
        }
        .word-card:hover .word-card__face { border-color: var(--card-line); box-shadow: var(--shadow, 0 18px 48px rgba(30, 41, 59, 0.11)); }
        .word-card__front { padding: 10px; background: linear-gradient(135deg, var(--card-bg), #fff 78%); }
        .word-card__image,
        .word-card__placeholder {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: #fff;
        }
        .word-card__image { object-fit: contain; }
        .word-card__placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            color: var(--card-ink);
            font-size: 26px;
            font-weight: 900;
            line-height: 1.25;
            text-align: center;
            word-break: keep-all;
        }
        .word-card__front-headword {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 2;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 8px;
            padding: 7px 9px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--ink, #172033);
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.13);
            font-size: var(--front-headword-font-size, 13px);
            font-weight: 900;
            line-height: 1.25;
            text-align: center;
            overflow-wrap: anywhere;
            backdrop-filter: blur(8px);
        }
        .card-action {
            position: absolute;
            z-index: 3;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.74);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            color: #475569;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.14);
            cursor: pointer;
        }
        .card-action:hover { color: var(--accent-dark, #1d4ed8); }
        .card-action--speak { top: 10px; right: 10px; }
        .card-action--flip { right: 10px; bottom: 10px; }
        .word-card__back {
            transform: rotateY(180deg);
            gap: 10px;
            padding: 16px;
            text-align: center;
            background: linear-gradient(160deg, #fff, var(--card-bg));
        }
        .word-card__back::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--card-ink);
        }
        .word-card__back-main {
            color: var(--ink, #172033);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 900;
            line-height: 1.2;
            word-break: keep-all;
        }
        .word-card__translation {
            display: grid;
            gap: 4px;
            width: min(100%, 260px);
            border: 1px solid var(--card-line);
            border-radius: 8px;
            padding: 9px 10px;
            background: rgba(255, 255, 255, 0.8);
        }
        .word-card__lang {
            color: var(--card-ink);
            font-size: 11px;
            font-weight: 900;
        }
        .word-card__translation-text {
            color: var(--ink, #172033);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
        .word-card__note,
        .list-item__note {
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
        .word-card__category {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            border-radius: var(--radius-pill, 999px);
            padding: 0 10px;
            background: var(--card-bg);
            color: var(--card-ink);
            font-size: 11px;
            font-weight: 900;
        }

        .list-panel { display: flex; flex-direction: column; gap: 10px; }
        .list-item {
            display: grid;
            grid-template-columns: 88px minmax(160px, 1fr) minmax(260px, 1.7fr);
            gap: 14px;
            align-items: center;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
        }
        .list-item__thumb {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            object-fit: contain;
            border: 1px solid var(--line, #dbe4f0);
            background: #fff;
        }
        .list-item__thumb-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            background: #f8fafc;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
        }
        .list-item__ko {
            display: grid;
            gap: 8px;
            font-size: 17px;
            font-weight: 900;
            word-break: keep-all;
        }
        .meta-pill {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            min-height: 24px;
            border-radius: var(--radius-pill, 999px);
            padding: 0 8px;
            background: #f1f5f9;
            color: var(--muted, #64748b);
            font-size: 10px;
            font-weight: 900;
        }
        .list-item__info {
            display: grid;
            gap: 9px;
            color: var(--ink, #172033);
            font-size: 13px;
            line-height: 1.55;
        }
        .translation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 6px;
        }
        .translation-cell {
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            padding: 8px;
            background: #f8fafc;
            color: var(--ink, #172033);
            font-size: 12px;
            font-weight: 800;
        }
        .translation-cell strong {
            display: block;
            margin-bottom: 4px;
            color: var(--muted, #64748b);
            font-size: 10px;
            font-weight: 900;
        }


        .quiz-link-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .quiz-link-card {
            display: grid;
            grid-template-columns: 42px 1fr;
            align-items: center;
            gap: 10px;
            min-height: 74px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            color: var(--ink, #172033);
            text-decoration: none;
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
            transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
        }
        .quiz-link-card:hover {
            border-color: #bfdbfe;
            box-shadow: var(--shadow, 0 18px 48px rgba(30, 41, 59, 0.11));
            transform: translateY(-1px);
        }
        .quiz-link-card__icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--accent-soft, #eff6ff);
            color: var(--accent-dark, #1d4ed8);
            font-size: 18px;
        }
        .quiz-link-card__title {
            display: block;
            margin-bottom: 3px;
            font-size: 14px;
            font-weight: 900;
        }
        .quiz-link-card__desc {
            display: block;
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
            word-break: keep-all;
        }
        .text-panel {
            display: grid;
            gap: 12px;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: var(--radius-lg, 16px);
            padding: 16px;
            background: #fff;
            box-shadow: var(--shadow-sm, 0 8px 22px rgba(30, 41, 59, 0.08));
        }
        .text-panel__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .text-panel__title {
            margin: 0;
            color: var(--ink, #172033);
            font-size: 18px;
            font-weight: 900;
        }
        .text-panel__meta {
            color: var(--muted, #64748b);
            font-size: 12px;
            font-weight: 900;
        }
        .vocab-textbox {
            width: 100%;
            min-height: 430px;
            resize: vertical;
            border: 1px solid var(--line, #dbe4f0);
            border-radius: 8px;
            padding: 14px;
            background: #f8fafc;
            color: var(--ink, #172033);
            font-size: 15px;
            font-weight: 700;
            line-height: 1.7;
            outline: none;
            white-space: pre;
        }
        .vocab-textbox:focus {
            border-color: #bfdbfe;
            box-shadow: 0 0 0 3px rgba(191, 219, 254, 0.38);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 44px;
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-pill, 999px);
            padding: 0 15px;
            background: #fff;
            color: var(--accent-dark, #1d4ed8);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
        }
        .btn.primary { border-color: var(--accent-dark, #1d4ed8); background: var(--accent, #2563eb); color: #fff; }
        .btn:disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }
        .footer-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            margin-top: 22px;
        }

        @media (max-width: 760px) {
            :root { --vocab-shell-width: min(100vw - 18px, 1180px); }
            .shell { margin-top: 10px; }
            .hero { padding: 16px; }
            .hero__row { align-items: stretch; }
            .toolbar { gap: 8px; }
            .segmented { width: 100%; }
            .segmented button { flex: 1; padding: 0 8px; }
            .control-btn,
            .front-headword-toggle,
            .front-headword-size { flex: 1 1 auto; }
            .word-grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }
            .word-card__inner { min-height: 160px; }
            .word-card__front { padding: 8px; }
            .word-card__front-headword { top: 8px; left: 8px; right: 8px; padding: 6px 8px; font-size: var(--front-headword-font-size, 13px); }
            .card-action { width: 32px; height: 32px; }
            .card-action--speak { top: 8px; right: 8px; }
            .card-action--flip { right: 8px; bottom: 8px; }
            .word-card__back { padding: 12px; }
            .word-card__back-main { font-size: 18px; }
            .word-card__translation-text { font-size: 12px; }
            .list-item { grid-template-columns: 58px 1fr; gap: 10px; }
            .list-item__thumb,
            .list-item__thumb-placeholder { width: 54px; height: 54px; }
            .list-item__info { grid-column: 1 / -1; }
            .translation-grid { grid-template-columns: 1fr; }
            .text-panel { padding: 12px; }
            .vocab-textbox { min-height: 360px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <script src="vocabulary-data.js"></script>

    <script src="../shared/vocabulary-multilang-data.js"></script>

    <script>
    (function () {
        "use strict";

        const cfg = window.VOCABULARY_CONFIG;
        if (!cfg) return;

        const LANGS = {
            none: { label: "한국어 뜻", answerLabel: "한국어 뜻", speech: "ko-KR" },
            en: { label: "영어", answerLabel: "English", speech: "en-US" },
            vi: { label: "베트남어", answerLabel: "Tiếng Việt", speech: "vi-VN" },
            mn: { label: "몽골어", answerLabel: "Монгол", speech: "mn-MN" },
            ar: { label: "아랍어", answerLabel: "العربية", speech: "ar", dir: "rtl" },
            kk: { label: "카자흐어", answerLabel: "Қазақша", speech: "kk-KZ" },
            th: { label: "태국어", answerLabel: "ไทย", speech: "th-TH" }
        };
        const PALETTES = [
            { bg: "#fff7ed", ink: "#c2410c", line: "#fed7aa" },
            { bg: "#eff6ff", ink: "#1d4ed8", line: "#bfdbfe" },
            { bg: "#f0fdf4", ink: "#15803d", line: "#bbf7d0" },
            { bg: "#fdf2f8", ink: "#be185d", line: "#fbcfe8" },
            { bg: "#f5f3ff", ink: "#6d28d9", line: "#ddd6fe" }
        ];

        const storagePrefix = cfg.storageKey || `vocabulary-${cfg.chapter || "standard"}`;
        const categories = normalizeCategories(cfg.categories || []);
        const words = normalizeWords(cfg.words || []);
        const imageCount = words.filter((word) => Boolean(word.image)).length;
        const FRONT_HEADWORD_SIZES = [13, 16, 19, 22];
        const DEFAULT_FRONT_HEADWORD_SIZE_INDEX = 0;

        let currentView = "cards";
        let activeLang = readStored("preferred-lang", cfg.defaultLang || "none");
        if (!LANGS[activeLang] || (activeLang !== "none" && !cfg.languages?.includes(activeLang))) activeLang = "none";
        const standardLangs = ["en", "vi", "mn", "ar", "kk", "th"];
        const translationLangs = (Array.isArray(cfg.languages) && cfg.languages.length ? cfg.languages : standardLangs)
            .filter((lang) => LANGS[lang]);
        let currentCategory = "all";
        let searchQuery = "";
        let showFrontHeadword = readStored(`${storagePrefix}-front-headword`, "true") === "true";
        let frontHeadwordSizeIndex = Number(readStored(`${storagePrefix}-front-headword-size`, String(DEFAULT_FRONT_HEADWORD_SIZE_INDEX)));
        if (!Number.isInteger(frontHeadwordSizeIndex) || frontHeadwordSizeIndex < 0 || frontHeadwordSizeIndex >= FRONT_HEADWORD_SIZES.length) {
            frontHeadwordSizeIndex = DEFAULT_FRONT_HEADWORD_SIZE_INDEX;
        }
        let cardOrder = words.map((_, index) => index);

        const els = {
            vocabCount: document.getElementById("vocab-count"),
            imageCount: document.getElementById("image-count"),
            viewButtons: document.querySelectorAll("[data-view]"),
            categoryFilter: document.getElementById("category-filter"),
            searchInput: document.getElementById("search-input"),
            frontToggle: document.getElementById("front-headword-toggle"),
            frontSizeControl: document.getElementById("front-headword-size-control"),
            frontSizeDown: document.getElementById("front-headword-size-down"),
            frontSizeUp: document.getElementById("front-headword-size-up"),
            frontSizeLabel: document.getElementById("front-headword-size-label"),
            shuffleBtn: document.getElementById("shuffle-btn"),
            wordGrid: document.getElementById("word-grid"),
            cardsEmpty: document.getElementById("cards-empty"),
            listPanel: document.getElementById("list-panel"),
            listEmpty: document.getElementById("list-empty"),
            textBox: document.getElementById("vocab-textbox"),
            textCount: document.getElementById("text-count"),
            textEmpty: document.getElementById("text-empty"),
            copyTextBtn: document.getElementById("copy-text-btn"),
        };

        function readStored(key, fallback) {
            try { return localStorage.getItem(key) || fallback; }
            catch (error) { return fallback; }
        }

        function writeStored(key, value) {
            try { localStorage.setItem(key, value); }
            catch (error) { /* ignore */ }
        }

        function normalizeCategories(source) {
            const list = source.length ? source.slice() : [{ id: "all", label: "전체" }];
            if (!list.some((category) => category.id === "all")) {
                list.unshift({ id: "all", label: "전체" });
            }
            return list;
        }

        function normalizeWords(source) {
            return source.map((word, index) => ({
                ...word,
                id: word.id || `word-${index + 1}`,
                ko: word.ko || word.term || word.korean || "",
                meaning: word.meaning || word.definition || word.foreign || "",
                category: word.category || "all",
                image: word.image || null,
                imageAlt: word.imageAlt || word.alt || "",
                quizImage: word.quizImage || word.maskedImage || null,
                quizImageAlt: word.quizImageAlt || word.imageAlt || word.alt || ""
            })).filter((word) => word.ko);
        }


        function categoryFor(id) {
            return categories.find((category) => category.id === id) || categories[0];
        }

        function paletteFor(id) {
            const categoryIds = categories.filter((category) => category.id !== "all").map((category) => category.id);
            const index = Math.max(0, categoryIds.indexOf(id));
            return PALETTES[index % PALETTES.length];
        }

        function answerFor(word, lang = activeLang) {
            if (lang === "none") return word.meaning || word.example || word.ko;
            return word[lang] || word.meaning || word.example || word.ko;
        }

        function answerLabel() {
            return LANGS[activeLang]?.answerLabel || "한국어 뜻";
        }

        function langDir(lang) {
            return LANGS[lang]?.dir || "ltr";
        }


        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            })[char]);
        }

        function speak(text, langCode = "ko-KR") {
            if (!window.speechSynthesis || !text) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function searchableText(word) {
            return [
                word.ko,
                word.meaning,
                word.example,
                ...translationLangs.map((lang) => word[lang]),
                categoryFor(word.category).label
            ].join(" ").toLowerCase();
        }

        function filteredWords() {
            const query = searchQuery.toLowerCase();
            return cardOrder
                .map((index) => words[index])
                .filter((word) => {
                    const categoryMatch = currentCategory === "all" || word.category === currentCategory;
                    const searchMatch = !query || searchableText(word).includes(query);
                    return categoryMatch && searchMatch;
                });
        }

        function imageMarkup(word, className, fallbackText) {
            if (word.image) {
                return `<img class="${className}" src="${escapeHtml(word.image)}" alt="${escapeHtml(word.imageAlt || `${word.ko} 그림 카드`)}" loading="lazy" decoding="async" />`;
            }
            return `<span class="${className === "word-card__image" ? "word-card__placeholder" : "quiz-visual__fallback"}">${escapeHtml(fallbackText || word.ko)}</span>`;
        }


        function buildCategoryFilter() {
            els.categoryFilter.innerHTML = "";
            categories.forEach((category) => {
                const button = document.createElement("button");
                button.className = "category-btn" + (category.id === currentCategory ? " active" : "");
                button.type = "button";
                button.textContent = category.label;
                button.dataset.categoryId = category.id;
                button.addEventListener("click", () => {
                    currentCategory = category.id;
                    document.querySelectorAll(".category-btn").forEach((btn) => btn.classList.remove("active"));
                    button.classList.add("active");
                    render();
                });
                els.categoryFilter.appendChild(button);
            });
        }


        function updateFrontHeadwordToggle() {
            els.frontToggle.setAttribute("aria-checked", String(showFrontHeadword));
            const size = FRONT_HEADWORD_SIZES[frontHeadwordSizeIndex] || FRONT_HEADWORD_SIZES[DEFAULT_FRONT_HEADWORD_SIZE_INDEX];
            document.documentElement.style.setProperty("--front-headword-font-size", `${size}px`);
            els.frontSizeLabel.textContent = `${size}px`;
            els.frontSizeControl.setAttribute("aria-disabled", String(!showFrontHeadword));
            els.frontSizeDown.disabled = !showFrontHeadword || frontHeadwordSizeIndex <= 0;
            els.frontSizeUp.disabled = !showFrontHeadword || frontHeadwordSizeIndex >= FRONT_HEADWORD_SIZES.length - 1;
        }

        function setFrontHeadwordSize(index) {
            const nextIndex = Math.max(0, Math.min(FRONT_HEADWORD_SIZES.length - 1, index));
            if (nextIndex === frontHeadwordSizeIndex) return;
            frontHeadwordSizeIndex = nextIndex;
            writeStored(`${storagePrefix}-front-headword-size`, String(frontHeadwordSizeIndex));
            updateFrontHeadwordToggle();
        }


        function renderCards() {
            const list = filteredWords();
            els.wordGrid.innerHTML = "";
            els.cardsEmpty.hidden = list.length > 0;
            list.forEach((word) => {
                const category = categoryFor(word.category);
                const palette = paletteFor(word.category);
                const card = document.createElement("article");
                card.className = "word-card";
                card.tabIndex = 0;
                card.setAttribute("role", "button");
                card.setAttribute("aria-pressed", "false");
                card.setAttribute("aria-label", `${word.ko} 카드 뒤집기`);
                card.style.setProperty("--card-bg", palette.bg);
                card.style.setProperty("--card-ink", palette.ink);
                card.style.setProperty("--card-line", palette.line);
                card.innerHTML = `
                    <span class="word-card__inner">
                        <span class="word-card__face word-card__front">
                            ${showFrontHeadword ? `<span class="word-card__front-headword">${escapeHtml(word.ko)}</span>` : ""}
                            ${imageMarkup(word, "word-card__image", word.ko)}
                            <span class="card-action card-action--flip" aria-hidden="true"><i class="fa-solid fa-rotate"></i></span>
                        </span>
                        <span class="word-card__face word-card__back">
                            <button class="card-action card-action--speak" type="button" data-speak="${escapeHtml(word.ko)}" data-lang-code="ko-KR" aria-label="${escapeHtml(word.ko)} 듣기"><i class="fa-solid fa-volume-high"></i></button>
                            <span class="word-card__back-main">${escapeHtml(word.ko)}</span>
                            <span class="word-card__translation" dir="${escapeHtml(langDir(activeLang))}">
                                <span class="word-card__lang">${escapeHtml(answerLabel())}</span>
                                <span class="word-card__translation-text">${escapeHtml(answerFor(word))}</span>
                                ${word.note ? `<span class="word-card__note">${escapeHtml(word.note)}</span>` : ""}
                            </span>
                            <span class="word-card__category">${escapeHtml(category.label)}</span>
                        </span>
                    </span>
                `;
                card.addEventListener("click", (event) => {
                    const speaker = event.target.closest("[data-speak]");
                    if (speaker) {
                        event.stopPropagation();
                        speak(speaker.dataset.speak, speaker.dataset.langCode);
                        return;
                    }
                    const flipped = !card.classList.contains("is-flipped");
                    card.classList.toggle("is-flipped", flipped);
                    card.setAttribute("aria-pressed", String(flipped));
                    if (navigator.vibrate) navigator.vibrate(10);
                });
                card.addEventListener("keydown", (event) => {
                    if (event.key !== "Enter" && event.key !== " ") return;
                    event.preventDefault();
                    const flipped = !card.classList.contains("is-flipped");
                    card.classList.toggle("is-flipped", flipped);
                    card.setAttribute("aria-pressed", String(flipped));
                });
                els.wordGrid.appendChild(card);
            });
        }

        function renderList() {
            const list = filteredWords();
            els.listPanel.innerHTML = "";
            els.listEmpty.hidden = list.length > 0;
            list.forEach((word, index) => {
                const category = categoryFor(word.category);
                const item = document.createElement("article");
                item.className = "list-item";
                const thumb = word.image
                    ? `<img class="list-item__thumb" src="${escapeHtml(word.image)}" alt="${escapeHtml(word.imageAlt || `${word.ko} 그림`)}" loading="lazy" decoding="async" />`
                    : '<span class="list-item__thumb-placeholder"><i class="fa-solid fa-image"></i></span>';
                item.innerHTML = `
                    ${thumb}
                    <div class="list-item__ko">
                        <span>${index + 1}. ${escapeHtml(word.ko)}</span>
                        <span class="meta-pill">${escapeHtml(category.label)}${word.pos ? ` · ${escapeHtml(word.pos)}` : ""}</span>
                    </div>
                    <div class="list-item__info">
                        <div><strong>뜻</strong> ${escapeHtml(word.meaning || word.example || "")}</div>
                        ${word.note ? `<div class="list-item__note">${escapeHtml(word.note)}</div>` : ""}
                        ${word.example ? `<div><strong>예문</strong> ${escapeHtml(word.example)}</div>` : ""}
                        <div class="translation-grid">
                            ${translationLangs.filter((lang) => word[lang]).map((lang) => `
                                <div class="translation-cell" dir="${escapeHtml(langDir(lang))}"><strong>${escapeHtml(LANGS[lang].label)}</strong>${escapeHtml(word[lang])}</div>
                            `).join("")}
                        </div>
                    </div>
                `;
                els.listPanel.appendChild(item);
            });
        }

        function vocabTextFor(list) {
            return list.map((word, index) => {
                const category = categoryFor(word.category);
                const meta = [category.label, word.pos].filter(Boolean).join(" · ");
                const meaning = word.meaning || word.example || "";
                return `${index + 1}. ${word.ko}${meta ? ` (${meta})` : ""}${meaning ? ` - ${meaning}` : ""}`;
            }).join("\n");
        }

        function renderTextList() {
            const list = filteredWords();
            els.textBox.value = vocabTextFor(list);
            els.textCount.textContent = `${list.length}개`;
            els.textEmpty.hidden = list.length > 0;
            els.textBox.hidden = list.length === 0;
            els.copyTextBtn.disabled = list.length === 0;
        }

        function copyTextList() {
            const text = els.textBox.value;
            if (!text) return;
            const showCopyState = (ok) => {
                els.copyTextBtn.innerHTML = ok
                    ? '<i class="fa-solid fa-check"></i> 복사됨'
                    : '<i class="fa-solid fa-triangle-exclamation"></i> 실패';
                setTimeout(() => {
                    els.copyTextBtn.innerHTML = '<i class="fa-solid fa-copy"></i> 복사';
                }, 1200);
            };
            const fallbackCopy = () => {
                els.textBox.hidden = false;
                els.textBox.focus();
                els.textBox.select();
                els.textBox.setSelectionRange(0, text.length);
                try {
                    return document.execCommand("copy");
                } catch (error) {
                    return false;
                }
            };
            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => showCopyState(true))
                    .catch(() => showCopyState(fallbackCopy()));
                return;
            }
            showCopyState(fallbackCopy());
        }

        function shuffleCards() {
            for (let i = cardOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
            }
            const icon = els.shuffleBtn.querySelector("i");
            icon.classList.add("fa-spin");
            setTimeout(() => icon.classList.remove("fa-spin"), 450);
            render();
        }


        function switchView(view) {
            currentView = view;
            els.viewButtons.forEach((button) => button.classList.toggle("active", button.dataset.view === view));
            document.querySelectorAll(".view").forEach((panel) => panel.classList.remove("active"));
            document.getElementById(`${view}-view`).classList.add("active");
            els.shuffleBtn.hidden = view !== "cards";
            els.frontToggle.hidden = view !== "cards";
            els.frontSizeControl.hidden = view !== "cards";
            render();
        }

        function render() {
            activeLang = window.MultilangToggle?.getLang?.() || readStored("preferred-lang", cfg.defaultLang || "none");
            if (!LANGS[activeLang] || (activeLang !== "none" && !cfg.languages?.includes(activeLang))) activeLang = "none";
            updateFrontHeadwordToggle();
            if (currentView === "cards") renderCards();
            else if (currentView === "list") renderList();
            else if (currentView === "text") renderTextList();
        }

        els.vocabCount.textContent = `어휘 ${words.length}개`;
        els.imageCount.textContent = `이미지 ${imageCount}개`;
        els.viewButtons.forEach((button) => button.addEventListener("click", () => switchView(button.dataset.view)));
        els.searchInput.addEventListener("input", (event) => {
            searchQuery = event.target.value.trim();
            render();
        });
        els.frontToggle.addEventListener("click", () => {
            showFrontHeadword = !showFrontHeadword;
            writeStored(`${storagePrefix}-front-headword`, String(showFrontHeadword));
            renderCards();
            updateFrontHeadwordToggle();
        });
        els.frontSizeDown.addEventListener("click", () => setFrontHeadwordSize(frontHeadwordSizeIndex - 1));
        els.frontSizeUp.addEventListener("click", () => setFrontHeadwordSize(frontHeadwordSizeIndex + 1));
        els.shuffleBtn.addEventListener("click", shuffleCards);
        els.copyTextBtn.addEventListener("click", copyTextList);
        document.addEventListener("click", (event) => {
            if (!event.target.closest("[data-multilang-btn]")) return;
            setTimeout(render, 50);
        });

        buildCategoryFilter();
        switchView("cards");
    })();
    </script>
    <script src="../shared/multilang-toggle.js"></script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
