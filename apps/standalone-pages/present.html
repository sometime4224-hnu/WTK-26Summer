<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3B-7 발표 기록</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --blue: #2563eb;
      --green: #0f766e;
      --red: #c2410c;
      --yellow: #f5c542;
      --shadow: 0 18px 46px rgba(20, 31, 53, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(245, 197, 66, 0.18), transparent 34%),
        linear-gradient(225deg, rgba(37, 99, 235, 0.12), transparent 38%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .app {
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.4rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(90px, 1fr));
      gap: 8px;
      min-width: min(100%, 360px);
    }

    .metric {
      min-height: 76px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 3px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric strong {
      font-size: clamp(1.45rem, 4vw, 2.05rem);
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .panel {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 28px rgba(20, 31, 53, 0.07);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .filters,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-btn,
    .action-btn {
      min-height: 42px;
      border-radius: 8px;
      font-weight: 900;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease;
    }

    .filter-btn {
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }

    .filter-btn[aria-pressed="true"] {
      border-color: #1f2937;
      background: #1f2937;
      color: #fff;
    }

    .action-btn {
      padding: 0 13px;
      color: #fff;
      background: var(--blue);
    }

    .action-btn.secondary {
      color: var(--ink);
      background: #eef2f7;
    }

    .action-btn.danger {
      color: #fff;
      background: #b45309;
    }

    .filter-btn:active,
    .action-btn:active {
      transform: translateY(1px);
    }

    .save-state {
      min-height: 26px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .progress {
      height: 10px;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5eaf1;
    }

    .progress span {
      display: block;
      width: 100%;
      height: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, var(--green), var(--yellow), var(--blue));
      transition: transform 180ms ease;
    }

    .roster {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 430px), 1fr));
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .student {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 122px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      transition: border 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .student.is-done {
      border-color: rgba(15, 118, 110, 0.34);
      background: #f1fbf8;
    }

    .student.is-hidden {
      display: none;
    }

    .num {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #eef2f7;
      color: var(--muted);
      font-weight: 900;
    }

    .student.is-done .num {
      color: #fff;
      background: var(--green);
    }

    .info {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .name-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      min-width: 0;
    }

    .name {
      min-width: 0;
      font-size: clamp(1rem, 3vw, 1.16rem);
      font-weight: 950;
      line-height: 1.35;
      word-break: keep-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(194, 65, 12, 0.11);
      color: var(--red);
      font-size: 0.76rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .student.is-done .badge {
      background: rgba(15, 118, 110, 0.12);
      color: var(--green);
    }

    .fields {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 8px;
    }

    .date-input,
    .note-input {
      min-width: 0;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .date-input {
      padding: 0 8px;
    }

    .note-input {
      padding: 0 11px;
    }

    .toggle {
      position: relative;
      display: inline-flex;
      width: 82px;
      height: 48px;
      align-items: center;
      justify-content: center;
    }

    .toggle input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      opacity: 0;
      cursor: pointer;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #e6ebf2;
      transition: background 160ms ease;
    }

    .knob {
      position: absolute;
      left: 5px;
      top: 5px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.18);
      transition: transform 160ms ease;
    }

    .toggle input:checked ~ .track {
      background: var(--green);
    }

    .toggle input:checked ~ .knob {
      transform: translateX(34px);
    }

    .toggle input:focus-visible ~ .track {
      outline: 3px solid rgba(37, 99, 235, 0.38);
      outline-offset: 3px;
    }

    .empty {
      display: none;
      padding: 38px 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .empty.is-visible {
      display: block;
    }

    @media (max-width: 840px) {
      .topbar,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .actions {
        justify-content: stretch;
      }

      .action-btn {
        flex: 1 1 142px;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 16px, 1180px);
        padding-top: 8px;
      }

      .topbar,
      .panel {
        padding: 12px;
      }

      .summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        min-height: 68px;
      }

      .student {
        grid-template-columns: 40px minmax(0, 1fr);
        min-height: 0;
      }

      .num {
        width: 38px;
        height: 38px;
      }

      .toggle {
        grid-column: 2;
        justify-self: end;
        width: 82px;
        height: 48px;
      }

      .fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="app" aria-labelledby="app-title">
      <header class="topbar">
        <div>
          <h1 id="app-title">3B-7 발표 기록</h1>
          <p class="subtitle">학생별 발표 여부를 체크하면 이 브라우저에 자동 저장됩니다.</p>
        </div>
        <div class="summary" aria-label="발표 기록 요약">
          <div class="metric"><strong id="done-count">0</strong><span>발표함</span></div>
          <div class="metric"><strong id="pending-count">25</strong><span>아직</span></div>
          <div class="metric"><strong id="total-count">25</strong><span>전체</span></div>
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <div class="filters" aria-label="학생 필터">
            <button type="button" class="filter-btn" data-filter="all" aria-pressed="true">전체</button>
            <button type="button" class="filter-btn" data-filter="pending" aria-pressed="false">아직</button>
            <button type="button" class="filter-btn" data-filter="done" aria-pressed="false">발표함</button>
          </div>
          <div class="actions">
            <button type="button" class="action-btn" data-action="copy-pending">미발표 복사</button>
            <button type="button" class="action-btn secondary" data-action="copy-all">전체 기록 복사</button>
            <button type="button" class="action-btn danger" data-action="reset">초기화</button>
          </div>
        </div>
        <div class="save-state" id="save-state" aria-live="polite">자동 저장 준비됨</div>
        <div class="progress" aria-hidden="true"><span id="progress-fill"></span></div>
      </section>

      <section class="panel">
        <ol class="roster" id="roster"></ol>
        <div class="empty" id="empty-message">이 필터에 해당하는 학생이 없습니다.</div>
      </section>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const students = [
        '짠 하 로안 안',
        '즈엉 반 바오',
        '부 딩 프엉',
        '짠 티 김 응옥',
        '응웬 하 미',
        '응웬 반 람',
        '부 티 민 프엉',
        '짠 투안 아잉',
        '반 티 하이 옌',
        '딘 녓 주이',
        '부이 바오 옌',
        '응웬 반 퐁',
        '르엉 득 뚜',
        '팜 득 러이',
        '라님 알 하마드',
        '간바트 운졸',
        '호앙 후이 리에우',
        '레티느',
        '부 후옌 린',
        '응웬 티 김 풍',
        '응오 티 번 니',
        '황 티 탄 쭉',
        '보 후인 안',
        '도득흥',
        '원 티 응옥 린'
      ];

      const storageKey = 'korean3b:3b7-presentation-record:v1';
      const rosterKey = students.join('|');
      const roster = document.getElementById('roster');
      const emptyMessage = document.getElementById('empty-message');
      const doneCount = document.getElementById('done-count');
      const pendingCount = document.getElementById('pending-count');
      const totalCount = document.getElementById('total-count');
      const progressFill = document.getElementById('progress-fill');
      const saveStateText = document.getElementById('save-state');
      const filterButtons = Array.from(document.querySelectorAll('[data-filter]'));
      const copyPendingButton = document.querySelector('[data-action="copy-pending"]');
      const copyAllButton = document.querySelector('[data-action="copy-all"]');
      const resetButton = document.querySelector('[data-action="reset"]');
      let activeFilter = 'all';
      let copyResetTimer = null;
      let state = loadState();

      function createEmptyRecord() {
        return {
          presented: false,
          date: '',
          note: ''
        };
      }

      function loadState() {
        try {
          const rawState = localStorage.getItem(storageKey);
          const parsedState = rawState ? JSON.parse(rawState) : {};
          const savedRecords = parsedState && typeof parsedState.records === 'object' ? parsedState.records : {};
          const records = {};

          students.forEach((student) => {
            const saved = savedRecords[student] || {};
            records[student] = {
              presented: Boolean(saved.presented),
              date: typeof saved.date === 'string' ? saved.date : '',
              note: typeof saved.note === 'string' ? saved.note : ''
            };
          });

          return {
            rosterKey,
            records,
            updatedAt: typeof parsedState.updatedAt === 'string' ? parsedState.updatedAt : ''
          };
        } catch {
          return {
            rosterKey,
            records: Object.fromEntries(students.map((student) => [student, createEmptyRecord()])),
            updatedAt: ''
          };
        }
      }

      function persistState() {
        state.updatedAt = new Date().toISOString();

        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
          saveStateText.textContent = '저장됨 ' + formatSavedTime(state.updatedAt);
        } catch {
          saveStateText.textContent = '저장할 수 없음';
        }
      }

      function formatSavedTime(isoValue) {
        if (!isoValue) return '자동 저장 준비됨';

        const savedDate = new Date(isoValue);
        if (Number.isNaN(savedDate.getTime())) return '자동 저장 준비됨';

        return savedDate.toLocaleString('ko-KR', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }

      function getTodayValue() {
        const now = new Date();
        const year = String(now.getFullYear());
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (character) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[character]));
      }

      function renderRoster() {
        roster.innerHTML = students.map((student, index) => {
          const record = state.records[student] || createEmptyRecord();
          const checked = record.presented ? ' checked' : '';
          const statusText = record.presented ? '발표함' : '아직';

          return `
            <li class="student${record.presented ? ' is-done' : ''}" data-student-card data-name="${escapeHtml(student)}">
              <span class="num">${index + 1}</span>
              <div class="info">
                <div class="name-line">
                  <span class="name">${escapeHtml(student)}</span>
                  <span class="badge" data-status-badge>${statusText}</span>
                </div>
                <div class="fields">
                  <input type="date" class="date-input" data-field="date" aria-label="${escapeHtml(student)} 발표 날짜" value="${escapeHtml(record.date)}">
                  <input type="text" class="note-input" data-field="note" aria-label="${escapeHtml(student)} 메모" placeholder="메모" value="${escapeHtml(record.note)}">
                </div>
              </div>
              <label class="toggle" aria-label="${escapeHtml(student)} 발표 여부">
                <input type="checkbox" data-field="presented"${checked}>
                <span class="track"></span>
                <span class="knob"></span>
              </label>
            </li>
          `;
        }).join('');
      }

      function updateSummary() {
        const done = students.filter((student) => state.records[student]?.presented).length;
        const pending = students.length - done;

        doneCount.textContent = String(done);
        pendingCount.textContent = String(pending);
        totalCount.textContent = String(students.length);
        progressFill.style.transform = 'scaleX(' + (students.length ? done / students.length : 0) + ')';
      }

      function applyFilter() {
        let visibleCount = 0;

        Array.from(roster.querySelectorAll('[data-student-card]')).forEach((card) => {
          const student = card.dataset.name;
          const isDone = Boolean(state.records[student]?.presented);
          const shouldShow = activeFilter === 'all'
            || (activeFilter === 'done' && isDone)
            || (activeFilter === 'pending' && !isDone);

          card.classList.toggle('is-hidden', !shouldShow);
          if (shouldShow) visibleCount += 1;
        });

        emptyMessage.classList.toggle('is-visible', visibleCount === 0);
      }

      function setFilter(nextFilter) {
        activeFilter = nextFilter;
        filterButtons.forEach((button) => {
          button.setAttribute('aria-pressed', String(button.dataset.filter === nextFilter));
        });
        applyFilter();
      }

      function syncCard(card) {
        const student = card.dataset.name;
        const record = state.records[student] || createEmptyRecord();
        const badge = card.querySelector('[data-status-badge]');
        const checkbox = card.querySelector('[data-field="presented"]');
        const dateInput = card.querySelector('[data-field="date"]');
        const noteInput = card.querySelector('[data-field="note"]');

        checkbox.checked = record.presented;
        dateInput.value = record.date;
        noteInput.value = record.note;
        badge.textContent = record.presented ? '발표함' : '아직';
        card.classList.toggle('is-done', record.presented);
      }

      function updateRecord(card, field, value) {
        const student = card.dataset.name;
        const record = state.records[student] || createEmptyRecord();

        if (field === 'presented') {
          record.presented = value;
          record.date = value && !record.date ? getTodayValue() : record.date;
          record.date = value ? record.date : '';
        }

        if (field === 'date') {
          record.date = value;
          record.presented = Boolean(value) || record.presented;
        }

        if (field === 'note') {
          record.note = value;
        }

        state.records[student] = record;
        syncCard(card);
        updateSummary();
        applyFilter();
        persistState();
      }

      function getRecordLines(onlyPending) {
        return students
          .filter((student) => !onlyPending || !state.records[student]?.presented)
          .map((student, index) => {
            const record = state.records[student] || createEmptyRecord();
            const prefix = onlyPending ? String(index + 1) + '. ' : String(students.indexOf(student) + 1) + '. ';
            const status = record.presented ? '발표함' : '아직';
            const date = record.date ? ' / ' + record.date : '';
            const note = record.note ? ' / ' + record.note : '';
            return prefix + student + ' - ' + status + date + note;
          });
      }

      function copyText(text, button, doneText) {
        const originalText = button.textContent;
        const finish = (message) => {
          button.textContent = message;
          if (copyResetTimer !== null) window.clearTimeout(copyResetTimer);
          copyResetTimer = window.setTimeout(() => {
            button.textContent = originalText;
          }, 1300);
        };

        if (!text) {
          finish('복사할 내용 없음');
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(() => finish(doneText))
            .catch(() => finish('복사 실패'));
          return;
        }

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-999px';
        document.body.appendChild(textarea);
        textarea.select();

        try {
          document.execCommand('copy');
          finish(doneText);
        } catch {
          finish('복사 실패');
        } finally {
          textarea.remove();
        }
      }

      function resetRecords() {
        if (!window.confirm('3B-7 발표 기록을 모두 초기화할까요?')) return;

        state = {
          rosterKey,
          records: Object.fromEntries(students.map((student) => [student, createEmptyRecord()])),
          updatedAt: ''
        };
        renderRoster();
        updateSummary();
        applyFilter();
        persistState();
      }

      renderRoster();
      updateSummary();
      applyFilter();
      saveStateText.textContent = state.updatedAt ? '저장됨 ' + formatSavedTime(state.updatedAt) : '자동 저장 준비됨';

      roster.addEventListener('change', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;

        const card = target.closest('[data-student-card]');
        if (!card) return;

        if (target.dataset.field === 'presented') {
          updateRecord(card, 'presented', target.checked);
        }

        if (target.dataset.field === 'date') {
          updateRecord(card, 'date', target.value);
        }
      });

      roster.addEventListener('input', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement) || target.dataset.field !== 'note') return;

        const card = target.closest('[data-student-card]');
        if (!card) return;

        updateRecord(card, 'note', target.value);
      });

      filterButtons.forEach((button) => {
        button.addEventListener('click', () => setFilter(button.dataset.filter));
      });

      copyPendingButton.addEventListener('click', () => {
        copyText(getRecordLines(true).join('\n'), copyPendingButton, '복사 완료');
      });

      copyAllButton.addEventListener('click', () => {
        copyText(getRecordLines(false).join('\n'), copyAllButton, '복사 완료');
      });

      resetButton.addEventListener('click', resetRecords);
    })();
  </script>
</body>
</html>
