            border-color: #facc15;
            background: #fffbeb;

        .map-feedback {
            margin: 0;
            padding: 10px 12px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;

            font-size: 13px;
            font-weight: 820;
            line-height: 1.58;
        }

        .choice-panel,
        .lens-panel {
            display: grid;
            gap: 10px;
            padding: 12px;

        .section-title {
            margin: 0;
            color: #0f172a;
            font-size: 15px;
            font-weight: 950;
            line-height: 1.35;

        .evidence-grid {
            display: grid;

        .choice-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));

            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .lens-button,
        .evidence-button,

            gap: 6px;

            padding: 10px;

            color: var(--muted);

            background: #eff6ff;

        .choice-card[aria-pressed="true"],

            background: var(--blue-soft);

        .result-score {

            background: #eff6ff;

            .choice-grid,
            .lens-grid,
            .evidence-grid,
            .meaning-grid,
            .guide-evidence-grid {

            .status-row {

            .sentence-box,

                selectedEvidence: "",

                checked: false,
                logs: []

            const refs = {
                scenarioCard: document.getElementById("scenarioCard"),
                resultPanel: document.getElementById("resultPanel")
            };

            window.C13_GRAMMAR4_DOROK_LAB_APP = {
                state,
                getCurrentRound,
                resetLab
            };

            function esc(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function getCurrentRound() {
                return config.rounds[state.roundIndex];
            }

            function getScore() {
                return state.logs.filter((log) => log.correct).length;
            }

            function renderSentence(sentence) {
                return esc(sentence).replace(/도록/g, '<span class="grammar-hit">도록</span>');
            }

            function isGuideRound() {
                return state.roundIndex < 3;
            }

            function selectedMeaning() {
                return config.meanings.find((meaning) => meaning.id === state.selectedMeaning);
            }

            function meaningForType(type) {
                return config.meanings.find((meaning) => meaning.id === type);
            }

            function evidenceLabel(id) {
                const evidence = config.evidences.find((item) => item.id === id);
                return evidence ? evidence.label : "";
            }

            function correctChoice(round) {
                return round.choices.find((choice) => choice.id === round.correctChoiceId) || round.choices[0];
            }

            function selectedMeter(round) {
                return state.checked ? correctChoice(round).meter : 0;
            }

            function typeStat(type) {
                const logs = state.logs.filter((log) => log.type === type);
                return {
                    total: logs.length,
                    correct: logs.filter((log) => log.correct).length
                };
            }

            function currentCorrect() {
                const round = getCurrentRound();
                const meaningOk = state.selectedMeaning === round.type;
                const evidenceOk = !isGuideRound() || state.selectedEvidence === round.evidence;
                return meaningOk && evidenceOk;
            }

            function canCheck() {
                if (state.checked) return false;
                if (!state.selectedMeaning) return false;
                if (isGuideRound() && state.guideStep === "evidence") {
                    return Boolean(state.selectedEvidence);
                }
                return true;
            }

            function renderBridge(round) {
                return `
                    <div class="bridge" style="--meter: ${selectedMeter(round)}%">
                        <div class="bridge-node">
                            <small>${esc(round.bridge.leftLabel)}</small>
                            <strong>${esc(round.bridge.left)}</strong>
                        </div>
                        <div class="bridge-center">
                            <small>연결</small>
                            <strong>도록</strong>
                        </div>
                        <div class="bridge-node">
                            <small>${esc(round.bridge.rightLabel)}</small>
                            <strong>${esc(round.bridge.right)}</strong>
                        </div>
                    </div>
                    <div class="degree-meter" aria-label="선택한 행동의 도달 정도">
                        <div class="degree-meter__fill"></div>
                    </div>
                    <p class="map-feedback">${esc(round.bridge.feedback)}</p>
                `;
            }

            function renderFeedback(round) {
                if (!state.checked) {
                    return '<div id="feedbackBox" class="feedback" hidden></div>';
                }

                const correct = currentCorrect();
                const pickedMeaning = selectedMeaning();
                const answerMeaning = meaningForType(round.type);
                const evidenceText = evidenceLabel(round.evidence);
                const pickedMeaningText = pickedMeaning ? `${pickedMeaning.label} · ${pickedMeaning.question}` : "";
                const evidenceLine = isGuideRound()
                    ? `<br><b>근거:</b> ${esc(evidenceText)}`
                    : "";

                if (correct) {
                    return `
                        <div id="feedbackBox" class="feedback is-correct">
                            <strong>맞아요.</strong>
                            ${esc(round.feedback)}<br>
                            <b>바꿔 말하기:</b> ${esc(round.paraphrase)}
                            ${evidenceLine}
                            <section class="meaning-map feedback-map" aria-label="정답 상황 지도">
                                <p class="map-label">정답 흐름</p>
                                ${renderBridge(round)}
                            </section>
                        </div>
                    `;
                }

                return `
                    <div id="feedbackBox" class="feedback is-wrong">
                        <strong>다시 구별해 보세요.</strong>
                        선택: <b>${esc(pickedMeaningText)}</b><br>
                        정답: <b>${esc(answerMeaning.label)} · ${esc(answerMeaning.question)}</b><br>
                        <b>바꿔 말하기:</b> ${esc(round.paraphrase)}
                        ${evidenceLine}
                        <section class="meaning-map feedback-map" aria-label="정답 상황 지도">
                            <p class="map-label">정답 흐름</p>
                            ${renderBridge(round)}
                        </section>
                    </div>
                `;
            }

            function meaningButtonClass(round, meaning) {
                const classes = ["meaning-button"];
                if (state.checked) {
                    if (meaning.id === round.type) classes.push("is-correct");
                    if (meaning.id === state.selectedMeaning && meaning.id !== round.type) classes.push("is-wrong");
                }
                return classes.join(" ");
            }

            function guideEvidenceClass(round, evidence) {
                const classes = ["guide-evidence-button"];
                if (state.checked) {
                    if (evidence.id === round.evidence) classes.push("is-correct");
                    if (evidence.id === state.selectedEvidence && evidence.id !== round.evidence) classes.push("is-wrong");
                }
                return classes.join(" ");
            }

            function renderMeaningButtons(round) {
                return `
                    <div class="meaning-grid" aria-label="의미 선택">
                        ${config.meanings.map((meaning) => `
                            <button class="${meaningButtonClass(round, meaning)}" type="button" data-meaning="${esc(meaning.id)}" aria-pressed="${state.selectedMeaning === meaning.id ? "true" : "false"}" ${state.checked ? "disabled" : ""}>
                                <strong>${esc(meaning.label)}</strong>
                                <span>${esc(meaning.question)}</span>
                            </button>
                        `).join("")}
                    </div>
                `;
            }

            function renderGuidePanel(round) {
                if (!isGuideRound() || state.guideStep !== "evidence" || state.checked) {
                    return "";
                }

                return `
                    <section class="guide-panel" aria-label="근거 선택">
                        <div class="mode-row">
                            <p class="section-title">근거도 하나 고르세요</p>
                            <span class="mode-pill">가이드 문항</span>
                        </div>
                        <div class="guide-evidence-grid">
                            ${config.evidences.map((evidence) => `
                                <button class="${guideEvidenceClass(round, evidence)}" type="button" data-evidence="${esc(evidence.id)}" aria-pressed="${state.selectedEvidence === evidence.id ? "true" : "false"}">

                                    <span>${evidence.id === "goal" ? "목적" : evidence.id === "result" ? "정도" : "지시"}</span>
                                </button>
                            `).join("")}
                        </div>
                    </section>
                `;
            }

            function checkButtonLabel() {
                if (state.checked) return "확인 완료";
                if (isGuideRound() && state.guideStep === "meaning") return "근거 고르기";
                return "확인";
            }

            function renderRound() {
                const round = getCurrentRound();
                const total = config.rounds.length;
                refs.resultPanel.hidden = true;
                refs.scenarioCard.hidden = false;

                refs.scenarioCard.innerHTML = `

                        <div class="scenario-title">

                        </div>

                    <div class="sentence-box">
                        <p class="context-text">${isGuideRound() ? "문장을 보고 먼저 의미를 고르세요. 앞 3문항은 근거까지 같이 연습합니다." : "문장을 보고 도록의 의미를 하나 고르세요."}</p>
                        <p class="target-sentence">${renderSentence(round.sentence)}</p>
                    </div>

                    <section class="quick-task" aria-label="의미 판별">
                        <div class="mode-row">
                            <p class="section-title">도록의 의미를 고르세요</p>
                            <span class="mode-pill">${isGuideRound() ? "가이드" : "시험"}</span>
                        </div>
                        ${renderMeaningButtons(round)}
                    </section>

                    ${renderGuidePanel(round)}

                    ${renderFeedback(round)}

                    <div class="action-row">
                        <button id="retryBtn" class="action-button" type="button" ${state.checked ? "" : "hidden"}>다시 고르기</button>
                        <button id="checkBtn" class="action-button primary" type="button" ${canCheck() ? "" : "disabled"}>${checkButtonLabel()}</button>
                        <button id="nextScenarioBtn" class="action-button dark" type="button" ${state.checked ? "" : "hidden disabled"}>
                            ${state.roundIndex === total - 1 ? "결과 보기" : "다음 상황"}
                        </button>
                    </div>
                `;

                bindRoundEvents();
            }

            function bindRoundEvents() {
                refs.scenarioCard.querySelectorAll("[data-meaning]").forEach((button) => {
                    button.addEventListener("click", () => {
                        if (state.checked) return;
                        state.selectedMeaning = button.dataset.meaning;
                        renderRound();
                    });
                });

                refs.scenarioCard.querySelectorAll("[data-evidence]").forEach((button) => {
                    button.addEventListener("click", () => {
                        if (state.checked) return;
                        state.selectedEvidence = button.dataset.evidence;
                        renderRound();
                    });
                });

                document.getElementById("checkBtn").addEventListener("click", checkRound);
                document.getElementById("nextScenarioBtn").addEventListener("click", nextRound);
                document.getElementById("retryBtn").addEventListener("click", retryRound);
            }

            function checkRound() {
                if (!canCheck()) return;
                const round = getCurrentRound();
                if (isGuideRound() && state.guideStep === "meaning") {
                    state.guideStep = "evidence";
                    state.selectedEvidence = "";
                    renderRound();
                    return;
                }
                const correct = currentCorrect();
                state.checked = true;
                state.logs = state.logs.filter((log) => log.id !== round.id);
                state.logs.push({
                    id: round.id,
                    type: round.type,
                    label: round.typeLabel,
                    sentence: round.sentence,
                    selectedMeaning: state.selectedMeaning,
                    selectedEvidence: state.selectedEvidence,
                    correct
                });
                renderRound();
            }

            function retryRound() {
                state.selectedMeaning = "";
                state.selectedEvidence = "";
                state.guideStep = "meaning";
                state.checked = false;
                renderRound();
            }

            function nextRound() {
                if (!state.checked) return;
                if (state.roundIndex >= config.rounds.length - 1) {
                    renderResult();
                    return;
                }
                state.roundIndex += 1;
                state.selectedMeaning = "";
                state.selectedEvidence = "";
                state.guideStep = "meaning";
                state.checked = false;
                renderRound();
            }

            function renderResult() {
                const total = config.rounds.length;
                const score = getScore();
                const purpose = typeStat("purpose");
                const degree = typeStat("degree");
                const instruction = typeStat("instruction");
                refs.scenarioCard.hidden = true;
                refs.resultPanel.hidden = false;
                refs.resultPanel.innerHTML = `
                    <div class="result-score">
                        <p class="eyebrow">Lab Result</p>
                        <h2>${score} / ${total}</h2>
                        <p>목적·정도·지시를 렌즈와 근거로 구별했습니다.</p>
                    </div>
                    <div class="stat-grid" aria-label="의미별 정답률">
                        <div class="stat-card"><strong>${purpose.correct} / 3</strong><span>목적</span></div>
                        <div class="stat-card"><strong>${degree.correct} / 3</strong><span>정도</span></div>
                        <div class="stat-card"><strong>${instruction.correct} / 3</strong><span>지시</span></div>
                    </div>
                    <details class="result-details">
                        <summary>문항별 복습 보기</summary>
                        <ul class="result-list">
                            ${config.rounds.map((round) => {
                                const log = state.logs.find((item) => item.id === round.id);
                                const ok = log && log.correct;
                                return `<li>${ok ? "맞힘" : "복습"} · ${esc(round.typeLabel)} · ${esc(round.sentence)}</li>`;
                            }).join("")}
                        </ul>
                    </details>
                    <div class="action-row">
                        <button id="restartBtn" class="action-button primary" type="button">다시 하기</button>
                        <a class="footer-link" href="grammar4-wb-practice.html">WB 보조활동으로</a>
                    </div>
                `;
                document.getElementById("restartBtn").addEventListener("click", resetLab);
            }

            function resetLab() {
                state.roundIndex = 0;
                state.selectedMeaning = "";
                state.selectedEvidence = "";
                state.guideStep = "meaning";
                state.checked = false;
                state.logs = [];
                renderRound();
            }

            renderRound();
        })();
    </script>
</body>
</html>
