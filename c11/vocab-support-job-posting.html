    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css">
    <link rel="stylesheet" href="../shared/multilang-toggle.css">
    <style>
        :root {
            --ink: #1e293b;
            --muted: #64748b;
            --paper: #ffffff;
            --page: #f8fafc;
            --line: #e2e8f0;
            --brand: #0f766e;
            --brand-light: #ccfbf1;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --topbar-height: 48px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, #f0fdfa 0%, #f8fafc 40%, #eff6ff 100%);
            font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
            line-height: 1.5;
            padding-bottom: 40px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            min-height: var(--topbar-height);
            display: grid;
            grid-template-columns: minmax(0, auto) minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }

        .topbar__links {
            display: flex;
            gap: 6px;
            align-items: center;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .topbar__links::-webkit-scrollbar {
            display: none;
        }

        .topbar a {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.04);
            color: var(--ink);
            padding: 0 10px;
            font-size: 0.8rem;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar a.active {
            border-color: var(--brand);
            background: var(--brand-light);
            color: var(--brand);
        }

        .topbar__title {
            text-align: right;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .shell {
            width: min(1200px, 100% - 24px);
            margin: 14px auto 0;
        }

        header.hero {
            text-align: center;
            margin-bottom: 18px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--brand);
            margin-bottom: 4px;
        }

        header.hero h1 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 900;
            color: #0f172a;
        }

        .instructions {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 700;
            margin-top: 4px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
            gap: 16px;
        }

        .jobs-section, .candidates-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 900;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 4px;
            border-bottom: 2px solid var(--line);
        }

        .job-card {
            background: var(--paper);
            border: 2px dashed var(--line);
            border-radius: 14px;
            padding: 16px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        /* Drag affordance classes */
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(37, 99, 235, 0.4); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.2); }
            50% { border-color: rgba(37, 99, 235, 0.8); box-shadow: 0 0 0 8px rgba(37, 99, 235, 0); }
        }

        .job-card.pulse-target {
            animation: pulse-border 1.5s infinite;
            border-color: var(--accent);
        }

        .job-card.drag-over {
            border-color: var(--accent) !important;
            background: var(--accent-light) !important;
            transform: scale(1.01);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .job-card.shake-error {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #ef4444;
        }

        .job-card.active-target {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .job-card.matched {
            border-style: solid;
            border-color: var(--success);
            background: var(--success-light);
            transform: scale(1.02);
        }

        .job-card-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .job-company-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #fff;
        }

        .job-badge {
            display: inline-flex;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            background: #f1f5f9;
            color: #475569;
            margin-bottom: 4px;
        }

        .job-card.matched .job-badge {
            background: var(--success);
            color: #fff;
        }

        .job-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #0f172a;
        }

        .candidate-strengths {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .label-note {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--muted);
            margin-left: 2px;
        }

        .strength-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 800;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            padding: 3px 6px;
            border-radius: 6px;
        }

        .strength-icon {
            width: 16px;
            height: 16px;
            object-fit: cover;
            border-radius: 3px;
        }

        .job-details {
            font-size: 0.85rem;
            color: #475569;
            display: grid;
            gap: 4px;
        }

        .job-details div {
            display: flex;
            gap: 6px;
        }

        .job-details strong {
            color: #1e293b;
            min-width: 65px;
        }

        .job-keywords {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .keyword-tag {
            font-size: 0.75rem;
            font-weight: 700;
            background: #f1f5f9;
            color: #64748b;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--line);
        }

        .candidate-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .candidate-card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            box-shadow: var(--shadow);
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            width: 100%;
            text-align: left;
        }

        .candidate-card * {
            pointer-events: none;
        }

        .candidate-card:active {
            cursor: grabbing;
        }

        .candidate-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            border-color: var(--accent);
        }

        .candidate-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(0,0,0,0.08);
            border-color: var(--brand);
        }

        .candidate-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            transform: scale(1.02);
        }

        .candidate-card.placed {
            opacity: 0.4;
            pointer-events: none;
            border-style: dotted;
            cursor: default;
        }

        .candidate-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .candidate-name {
            font-size: 1.05rem;
            font-weight: 900;
            color: #0f172a;
        }

        .candidate-meta {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
        }

        .candidate-desc {
            font-size: 0.82rem;
            color: #475569;
            line-height: 1.45;
        }

        .match-slot {
            margin-top: 12px;
            border: 2px dashed rgba(37, 99, 235, 0.4);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--accent);
            background: rgba(37, 99, 235, 0.02);
            transition: all 0.2s ease;
        }

        .job-card.matched .match-slot {
            border-style: solid;
            border-color: var(--success);
            background: var(--success-light);
            color: var(--success);
            font-weight: 900;
        }

        .matched-applicant {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1px solid var(--success);
            border-radius: 6px;
            padding: 6px 10px;
            margin-top: 8px;
        }

        .matched-applicant span {
            font-weight: 900;
            color: var(--success);
        }

        .matched-applicant button {
            background: transparent;
            border: 0;
            color: #ef4444;
            font-weight: 900;
            cursor: pointer;
            padding: 2px 6px;
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-card {
            background: #fff;
            border-radius: 20px;
            width: min(460px, 100%);
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .success-overlay.show .success-card {
            transform: scale(1);
        }

        .success-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--success-light);
            color: var(--success);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            animation: bounce 1s infinite;
        }

        .success-card h2 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .success-card p {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn-restart {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 10px;
            background: var(--brand);
            color: #fff;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-restart:hover {
            background: #115e59;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @media (max-width: 760px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .candidates-section {
                order: -1;
            }

            .candidate-list {
                display: flex;
                flex-direction: row;
                gap: 10px;
                overflow-x: auto;
                padding: 4px 0 12px;
                scrollbar-width: none;
            }

            .candidate-list::-webkit-scrollbar {
                display: none;
            }

            .candidate-card {
                flex: 0 0 260px;
                min-height: 120px;
                width: auto;
            }

            .topbar__title {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .job-card {
                padding: 12px;
            }
            .job-card-header {
                gap: 8px;
                margin-bottom: 8px;
            }
            .job-company-img {
                width: 40px;
                height: 40px;
            }
            .job-title {
                font-size: 1rem;
            }
            .job-details {
                font-size: 0.8rem;
            }
            .candidate-card {
                flex: 0 0 240px;
                padding: 10px;
            }
            .candidate-name {
                font-size: 0.95rem;
            }
            .candidate-desc {
                font-size: 0.78rem;
            }
        }
    </style>

                    successDesc: "لقد أرسلت جميع المتقدمين إلى الشركة المناسبة.<br>أحسنت في دراسة مفردات حياة العمل!",
                    btnRestart: "ابدأ من جديد",
                    labelTaskNote: "المهام الموكلة",
                    labelPrefNote: "المؤهلات المفضلة",
                    slotEmpty: "انقر هنا أو أسقط المتقدم للتعيين",
                    placed: "تم التعيين",
                    available: "متاح للتقديم"
                },
                kk: {
                    instruct: "Өтінімшілерді сәйкес жұмыс картасына сүйреп апарыңыз немесе таңдап орналастырыңыз.",
                    successTitle: "Жаттығу аяқталды!",
                    successDesc: "Барлық өтінімшілерді сәйкес компанияға жібердіңіз.<br>Жұмыс өміріне қатысты сөздікті жақсы үйрендіңіз!",
                    btnRestart: "Қайта бастау",
                    labelTaskNote: "тапсырылған міндеттер",
                    labelPrefNote: "қалаулы талаптар",
                    slotEmpty: "Мұнда басыңыз немесе өтінімшіні орналастырыңыз",
                    placed: "Орналастырылды",
                    available: "Өтінім беруге болады"
                },
                th: {
                    instruct: "ลากผู้สมัครไปวางที่การ์ดประกาศรับสมัครงานที่เหมาะสม หรือคลิกเลือกแล้ววาง",
                    successTitle: "ฝึกเสร็จสมบูรณ์!",
                    successDesc: "คุณส่งผู้สมัครทุกคนไปยังบริษัทที่เหมาะสมแล้ว<br>เรียนคำศัพท์เกี่ยวกับชีวิตการทำงานได้ดีมาก!",
                    btnRestart: "เริ่มใหม่",
                    labelTaskNote: "งานที่รับผิดชอบ",
                    labelPrefNote: "คุณสมบัติที่ต้องการ",
                    slotEmpty: "คลิกหรือวางผู้สมัครที่นี่",
                    placed: "จัดวางแล้ว",
                    available: "สามารถสมัครได้"
                }
            };

            function initMultilang() {
                if (window.MULTILANG_CONFIG && window.MultilangToggle) {
                    activeLang = window.MultilangToggle.getLang() || "none";
                }
                render();
            }

            function render() {
                // Update static text based on language
                const pageInstructEl = document.getElementById("page-instruct");
                const jobsTitleEl = document.getElementById("jobs-title");
                const candidatesTitleEl = document.getElementById("candidates-title");
                const successTitleEl = document.getElementById("success-title");
                const successDescEl = document.getElementById("success-desc");
                const btnRestartEl = document.getElementById("btn-restart");

                // 섹션 타이틀은 항상 한국어(기존 이중언어) 유지
                jobsTitleEl.innerHTML = '<i class="fa-solid fa-briefcase"></i> 구인 공고 (Job Postings)';
                candidatesTitleEl.innerHTML = '<i class="fa-solid fa-users"></i> 지원자 목록 (Applicants)';

                if (activeLang !== "none" && uiTranslations[activeLang]) {
                    const t = uiTranslations[activeLang];
                    pageInstructEl.textContent = t.instruct;
                    successTitleEl.textContent = t.successTitle;
                    successDescEl.innerHTML = t.successDesc;
                    btnRestartEl.textContent = t.btnRestart;
                } else {
                    pageInstructEl.textContent = "지원자를 드래그하여 알맞은 구인 공고 카드에 놓거나, 클릭해서 선택한 후에 놓아 보세요.";
                    successTitleEl.textContent = "연습 완료!";
                    successDescEl.innerHTML = "모든 지원자를 알맞은 회사에 보냈습니다.<br>회사 생활 관련 어휘를 잘 공부했습니다!";
                    btnRestartEl.textContent = "다시 시작하기";
                }

                // Render Candidates
                els.candidateList.innerHTML = "";
                candidates.forEach(cand => {
                    const isPlaced = Object.values(matches).includes(cand.id);
                    const isSelected = selectedCandidateId === cand.id;
                    const card = document.createElement("div");
                    card.className = `candidate-card ${isSelected ? 'selected' : ''} ${isPlaced ? 'placed' : ''}`;
                    card.dataset.id = cand.id;
                    card.setAttribute("role", "button");
                    if (!isPlaced) {
                        card.setAttribute("tabindex", "0");
                        card.setAttribute("draggable", "true");
                    }

                    // 이름·소개문·강점 배지는 항상 한국어 (어휘 학습 대상)
                    const name = cand.name;
                    const desc = cand.desc;

                    const strengthsHtml = cand.strengths ? `
                        <div class="candidate-strengths">
                            ${cand.strengths.map(s => {
                                return `<span class="strength-badge">${window.C11VocabSupport.imageTag(s.img, s.ko, { size: 160, className: "strength-icon" })}<span>${s.ko}</span></span>`;
                            }).join('')}
                        </div>
                    ` : '';

                    let statusText = isPlaced ? '배치됨' : '지원 가능';
                    if (activeLang !== "none" && uiTranslations[activeLang]) {
                        statusText = isPlaced ? uiTranslations[activeLang].placed : uiTranslations[activeLang].available;
                    }

                    card.innerHTML = `
                        <div class="candidate-header">
                            <span class="candidate-name">${name}</span>
                            <span class="candidate-meta">${statusText}</span>
                        </div>
                        <p class="candidate-desc">${desc}</p>
                        ${strengthsHtml}
                    `;

                    // Drag Event Handlers
                    card.addEventListener("dragstart", (e) => {
                        console.log("JOB_POSTING PAGE LOG: dragstart, cand:", cand.id);
                        selectedCandidateId = cand.id;
                        card.classList.add("dragging");
                        e.dataTransfer.setData("text/plain", cand.id);
                        
                        // Add pulse targets to unmatched jobs
                        document.querySelectorAll(".job-card").forEach(jc => {
                            if (!matches[jc.dataset.id]) {
                                jc.classList.add("pulse-target");
                            }
                        });
                    });

                    card.addEventListener("dragend", () => {
                        console.log("JOB_POSTING PAGE LOG: dragend, cand:", cand.id);
                        card.classList.remove("dragging");
                        document.querySelectorAll(".job-card").forEach(jc => {
                            jc.classList.remove("pulse-target", "drag-over");
                        });
                    });

                    // Click handler (Fallback / Mobile)
                    card.addEventListener("click", () => {
                        console.log("JOB_POSTING PAGE LOG: click cand:", cand.id, "selectedCandidateId:", selectedCandidateId, "isPlaced:", isPlaced);
                        if (isPlaced) return;
                        if (selectedCandidateId === cand.id) {
                            selectedCandidateId = null;
                        } else {
                            selectedCandidateId = cand.id;
                        }
                        render();
                    });

                    els.candidateList.appendChild(card);
                });

                // Render Jobs
                els.jobList.innerHTML = "";
                jobs.forEach((job, jobIndex) => {
                    const matchedCandId = matches[job.id];
                    const isMatched = !!matchedCandId;
                    const card = document.createElement("div");
                    card.className = `job-card ${isMatched ? 'matched' : ''} ${selectedCandidateId && !isMatched ? 'active-target' : ''}`;
                    card.dataset.id = job.id;

                    // 잡 내용은 항상 한국어 (어휘 학습 대상)
                    const badge = job.badge;
                    const title = job.title;
                    const hours = job.hours;
                    const salary = job.salary;
                    const task = job.task;
                    const pref = job.pref;

                    // 레이블은 한국어 고정, 어려운 레이블에만 보조 주석 추가
                    const _t = (activeLang !== "none") ? uiTranslations[activeLang] : null;
                    const taskNote = _t?.labelTaskNote ? ` <small class="label-note">(${_t.labelTaskNote})</small>` : '';
                    const prefNote = _t?.labelPrefNote ? ` <small class="label-note">(${_t.labelPrefNote})</small>` : '';
                    const emptySlotText = _t?.slotEmpty || "이곳을 클릭하거나 지원자를 놓아 배치";

                    let slotContent = "";
                    if (isMatched) {
                        const cand = candidates.find(c => c.id === matchedCandId);
                        const candName = cand.name;
                        slotContent = `
                            <div class="matched-applicant">
                                <span><i class="fa-solid fa-circle-check"></i> ${candName}</span>
                                <button type="button" class="btn-remove-match" data-job-id="${job.id}"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        `;
                    } else {
                        slotContent = `<div class="match-slot">${emptySlotText}</div>`;
                    }

                    card.innerHTML = `
                        <div class="job-card-header">
                            ${window.C11VocabSupport.imageTag(job.image, badge, { size: 320, className: "job-company-img", loading: jobIndex === 0 ? "eager" : "lazy", priority: jobIndex === 0 })}
                            <div>
                                <span class="job-badge">${badge}</span>
                                <h3 class="job-title">${title}</h3>
                            </div>
                        </div>
                        <div class="job-details">
                            <div><strong>근무 시간:</strong> <span>${hours}</span></div>
                            <div><strong>급여 조건:</strong> <span>${salary}</span></div>
                            <div><strong>담당 업무:${taskNote}</strong> <span>${task}</span></div>
                            <div><strong>우대 사항:${prefNote}</strong> <span>${pref}</span></div>
                        </div>
                        <div class="job-keywords">
                            ${job.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('')}
                        </div>
                        ${slotContent}
                    `;

                    // Drag Over Handlers
                    card.addEventListener("dragover", (e) => {
                        if (isMatched) return;
                        e.preventDefault();
                    });

                    card.addEventListener("dragenter", (e) => {
                        if (isMatched) return;
                        card.classList.add("drag-over");
                    });

                    card.addEventListener("dragleave", () => {
                        card.classList.remove("drag-over");
                    });

                    card.addEventListener("drop", (e) => {
                        console.log("JOB_POSTING PAGE LOG: drop, job:", job.id);
                        if (isMatched) return;
                        e.preventDefault();
                        card.classList.remove("drag-over");
                        
                        const rawData = e.dataTransfer.getData("text/plain");
                        const candId = (rawData && rawData.startsWith("cand-")) ? rawData : selectedCandidateId;
                        console.log("JOB_POSTING PAGE LOG: drop candId resolved:", candId, "rawData:", rawData, "selectedCandidateId:", selectedCandidateId);
                        if (candId) {
                            attemptMatch(job, candId, card);
                        }
                    });

                    // Click Match Handle (Fallback)
                    card.addEventListener("click", (e) => {
                        console.log("JOB_POSTING PAGE LOG: click job:", job.id, "selectedCandidateId:", selectedCandidateId);
                        if (e.target.closest(".btn-remove-match")) {
                            const jobId = e.target.closest(".btn-remove-match").dataset.jobId;
                            delete matches[jobId];
                            render();
                            return;
                        }

                        if (isMatched) return;

                        if (selectedCandidateId) {
                            attemptMatch(job, selectedCandidateId, card);
                        }
                    });

                    els.jobList.appendChild(card);
                });
            }

            function attemptMatch(job, candId, cardElement) {
                if (job.correctCandidate === candId) {
                    matches[job.id] = candId;
                    selectedCandidateId = null;
                    render();
                    checkCompletion();
                } else {
                    // Mismatch Visual Feedback: Shake and flash red
                    cardElement.classList.add("shake-error");
                    setTimeout(() => {
                        cardElement.classList.remove("shake-error");
                    }, 500);
                }
            }

            function checkCompletion() {
                if (Object.keys(matches).length === jobs.length) {
                    setTimeout(() => {
                        els.successOverlay.classList.add("show");
                    }, 500);
                }
            }

            els.btnRestart.addEventListener("click", () => {
                matches = {};
                selectedCandidateId = null;
                els.successOverlay.classList.remove("show");
                render();
            });

            // Listen for multilingual toggle changes
            document.addEventListener("click", (e) => {
                if (e.target.closest("[data-multilang-btn]")) {
                    setTimeout(() => {
                        if (window.MultilangToggle) {
                            activeLang = window.MultilangToggle.getLang();
                        }
                        render();
                    }, 50);
                }
            });

            setTimeout(initMultilang, 100);
        })();
    </script>
    <script>window.MULTILANG_CONFIG = { langs: ["vi", "mn", "ar", "kk", "th", "en"] };</script>
    <script src="../shared/multilang-toggle.js"></script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
