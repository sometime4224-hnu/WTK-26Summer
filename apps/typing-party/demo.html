<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>타이핑 파티 데모</title>
    <link rel="stylesheet" href="demo.css">
  </head>
  <body>
    <main class="demo-shell">
      <header class="demo-topbar">
        <a class="demo-nav" href="index.html?mock=1">타이핑 파티</a>
        <div>
          <span>LOCAL FLOW TEST</span>
          <strong>타이핑 파티 데모</strong>
        </div>
        <button id="resetDemoButton" type="button">데모 초기화</button>
      </header>

      <section class="demo-hero">
        <div>
          <span class="demo-pill">방 코드 DEMO25</span>
          <h1>교사 화면과 학생 화면을 한 번에 보기</h1>
          <p>Firebase 없이 브라우저 저장소만 사용합니다. 실제 수업 방과 분리된 흐름 확인용 화면입니다.</p>
        </div>
        <div class="demo-links" id="demoLinks"></div>
      </section>

      <section class="demo-grid" aria-label="데모 프리뷰">
        <article class="demo-frame-card demo-frame-card--host">
          <div class="demo-frame-head">
            <strong>교사 화면</strong>
            <span>진행 컨트롤</span>
          </div>
          <iframe id="hostFrame" title="교사 데모 화면"></iframe>
        </article>

        <article class="demo-frame-card">
          <div class="demo-frame-head">
            <strong>학생 1</strong>
            <span>출제자/참가자 확인</span>
          </div>
          <iframe id="studentFrameA" title="학생 1 데모 화면"></iframe>
        </article>

        <article class="demo-frame-card">
          <div class="demo-frame-head">
            <strong>학생 2</strong>
            <span>추측/그림 확인</span>
          </div>
          <iframe id="studentFrameB" title="학생 2 데모 화면"></iframe>
        </article>

        <article class="demo-frame-card">
          <div class="demo-frame-head">
            <strong>학생 3</strong>
            <span>다른 그룹 확인</span>
          </div>
          <iframe id="studentFrameC" title="학생 3 데모 화면"></iframe>
        </article>
      </section>
    </main>

    <script type="module" src="src/demo.js"></script>
  </body>
</html>
