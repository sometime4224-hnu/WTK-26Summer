<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>12과 표현 타이핑 연습</title>
    <link rel="stylesheet" href="../shared/multilang-toggle.css">
    <style>
      :root {
        --bg: #f7fafc;
        --surface: #ffffff;
        --ink: #101827;
        --muted: #64748b;
        --line: #d7e0ea;
        --focus: #0f172a;
        --blue: #2563eb;
        --blue-soft: #dbeafe;
        --green: #047857;
        --green-soft: #ecfdf5;
        --amber: #b45309;
        --amber-soft: #fffbeb;
        --rose: #be123c;
        --rose-soft: #fff1f2;
        --shadow: 0 24px 56px rgba(15, 23, 42, 0.12);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fafc 0%, #eff6ff 58%, #ecfdf5 100%);
        color: var(--ink);
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", system-ui, sans-serif;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      [hidden] {
        display: none !important;
      }

      .focus-shell {
        width: min(980px, calc(100% - 24px));
        margin: 10px auto 42px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 46px;
        padding: 7px 8px;
        border: 1px solid rgba(215, 224, 234, 0.94);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(12px);
      }

      .topbar-title {
        display: grid;
        justify-items: center;
        gap: 1px;
        min-width: 0;
        text-align: center;
      }

      .topbar-title span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
      }

      .topbar-title strong {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 15px;
        font-weight: 950;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-link,
      .reset-button,
      .ghost-button,
      .primary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: #334155;
        font-size: 12px;
        font-weight: 900;
        text-decoration: none;
      }

      .progress-dots {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
        margin: 12px 0;
      }

      .progress-dot {
        min-width: 0;
        min-height: 38px;
        padding: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #64748b;
        font-size: 11px;
        font-weight: 950;
        line-height: 1.15;
      }

      .progress-dot.is-current {
        border-color: #0f172a;
        background: #0f172a;
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.22);
      }

      .progress-dot.is-done {
        border-color: #86efac;
        background: var(--green-soft);
        color: var(--green);
      }

      .mission-panel {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        display: grid;
        gap: 14px;
        padding: clamp(16px, 3.2vw, 30px);
        border: 4px solid #0f172a;
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(239, 246, 255, 0.98)),
          #ffffff;
        box-shadow: var(--shadow);
      }

      .mission-panel.is-current-task::before {
        content: "";
        position: absolute;
        inset: 8px;
        z-index: 0;
        border: 2px solid rgba(37, 99, 235, 0.24);
        border-radius: 8px;
        background: linear-gradient(90deg, rgba(219, 234, 254, 0.38), rgba(236, 253, 245, 0.24));
        pointer-events: none;
      }

      .mission-panel > * {
        position: relative;
        z-index: 1;
      }

      .mission-head {
        display: grid;
        gap: 6px;
      }

      .stage-kicker {
        display: inline-flex;
        width: max-content;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0f172a;
        color: #ffffff;
        font-size: 12px;
        font-weight: 950;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(34px, 5.6vw, 68px);
        letter-spacing: 0;
        line-height: 1.08;
      }

      .mission-prompt {
        max-width: 800px;
        color: #334155;
        font-size: clamp(17px, 2.2vw, 23px);
        font-weight: 850;
        line-height: 1.52;
      }

      .typing-target {
        display: grid;
        gap: 8px;
        min-height: 190px;
        align-content: center;
        justify-items: center;
        padding: 16px;
        border: 2px solid rgba(37, 99, 235, 0.42);
        border-radius: 10px;
        background: rgba(219, 234, 254, 0.62);
        text-align: center;
      }

      .typing-target span {
        color: var(--blue);
        font-size: 13px;
        font-weight: 950;
      }

      .typing-target strong {
        color: #0f172a;
        font-size: clamp(34px, 6.8vw, 70px);
        font-weight: 950;
        line-height: 1.08;
      }

      .typing-target strong.is-hidden-target {
        color: #334155;
        font-size: clamp(30px, 5.8vw, 56px);
      }

      .cue {
        color: #334155;
        font-size: clamp(16px, 2.2vw, 22px);
        font-weight: 850;
        line-height: 1.45;
      }

      .note {
        color: #64748b;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.5;
      }

      .translation-panel {
        width: min(100%, 760px);
      }

      .translation-panel .lang-box {
        margin: 0;
        text-align: start;
      }

      .language-row {
        padding: 0;
      }

      .hint-panel {
        display: grid;
        gap: 4px;
        width: min(100%, 760px);
        padding: 10px 12px;
        border: 2px solid #fcd34d;
        border-radius: 8px;
        background: #fffbeb;
        color: #92400e;
        font-weight: 900;
      }

      .spotlight-input {
        position: relative;
        display: grid;
        gap: 8px;
      }

      .spotlight-input::before {
        content: "";
        position: absolute;
        inset: -9px;
        z-index: -1;
        border-radius: 14px;
        background: rgba(37, 99, 235, 0.18);
        box-shadow:
          0 0 0 6px rgba(37, 99, 235, 0.08),
          0 18px 42px rgba(37, 99, 235, 0.18);
      }

      input {
        width: 100%;
        min-width: 0;
        min-height: 76px;
        padding: 12px 16px;
        border: 4px solid #0f172a;
        border-radius: 12px;
        background: #ffffff;
        color: var(--ink);
        font-size: clamp(26px, 5vw, 54px);
        font-weight: 950;
        line-height: 1.14;
        text-align: center;
        outline: none;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow:
          0 0 0 6px rgba(37, 99, 235, 0.22),
          0 18px 44px rgba(37, 99, 235, 0.22);
      }

      .status-line {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 48px;
        padding: 10px 12px;
        border: 1px solid #dbeafe;
        border-radius: 8px;
        background: #f8fafc;
        color: #334155;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.45;
      }

      .status-line.is-good {
        border-color: #86efac;
        background: var(--green-soft);
        color: var(--green);
      }

      .status-line.is-bad {
        border-color: #fda4af;
        background: var(--rose-soft);
        color: var(--rose);
      }

      .status-line.is-warn {
        border-color: #fde68a;
        background: var(--amber-soft);
        color: var(--amber);
      }

      .status-line kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 3px 7px;
        border: 1px solid rgba(15, 23, 42, 0.18);
        border-radius: 6px;
        background: #ffffff;
        color: #0f172a;
        font: 900 12px/1.1 "Segoe UI", system-ui, sans-serif;
        white-space: nowrap;
      }

      .assist-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        opacity: 0.76;
      }

      .assist-actions:hover,
      .assist-actions:focus-within {
        opacity: 1;
      }

      .ghost-button,
      .primary-button {
        min-height: 38px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .primary-button {
        border-color: #0f172a;
        background: #0f172a;
        color: #ffffff;
      }

      .report-panel {
        display: grid;
        gap: 14px;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .report-card {
        min-width: 0;
        padding: 14px;
        border: 1px solid #d7e0ea;
        border-radius: 10px;
        background: #ffffff;
      }

      .report-card span {
        display: block;
        color: #64748b;
        font-size: 12px;
        font-weight: 900;
      }

      .report-card strong {
        display: block;
        margin-top: 4px;
        color: #0f172a;
        font-size: clamp(28px, 5vw, 48px);
        font-weight: 950;
      }

      .review-list {
        display: grid;
        gap: 8px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .review-list li {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #334155;
        font-weight: 900;
      }

      @media (max-width: 680px) {
        .focus-shell {
          width: min(100% - 12px, 980px);
          margin-top: 6px;
        }

        .topbar {
          grid-template-columns: auto minmax(0, 1fr) auto;
          gap: 6px;
          padding: 6px;
        }

        .nav-link,
        .reset-button {
          min-height: 30px;
          padding: 5px 8px;
          font-size: 11px;
        }

        .topbar-title strong {
          font-size: 13px;
        }

        .topbar-title span {
          font-size: 10px;
        }

        .progress-dots {
          gap: 4px;
        }

        .progress-dot {
          min-height: 32px;
          padding: 4px 2px;
          font-size: 9px;
        }

        .mission-panel {
          padding: 14px;
          border-width: 3px;
        }

        .typing-target {
          min-height: 172px;
        }

        input {
          min-height: 66px;
          font-size: 28px;
        }

        .report-grid {
          grid-template-columns: 1fr;
        }

        .assist-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .ghost-button,
        .primary-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="focus-shell">
      <header class="topbar">
        <a class="nav-link" href="index.html">12과</a>
        <div class="topbar-title" aria-label="12과 표현 타이핑 연습">
          <span>타이핑 집중 모드</span>
          <strong>12과 표현 타이핑 연습</strong>
        </div>
        <button class="reset-button" id="resetTrainer" type="button">처음부터</button>
      </header>

      <div class="progress-dots" id="progressDots" aria-label="표현 타이핑 진행 단계"></div>

      <section class="mission-panel is-current-task" id="missionPanel" aria-labelledby="stageTitle">
        <div class="mission-head">
          <span class="stage-kicker" id="stageMeta">1단계</span>
          <h1 id="stageTitle">한/영 확인</h1>
          <p class="mission-prompt" id="missionPrompt">한글 입력 모드로 짧게 시작합니다. 아래 칸에 운동을 입력하세요.</p>
        </div>

        <div class="language-row" data-multilang-bar></div>

        <div class="typing-target" id="targetCard">
          <span id="itemMeta">시작 확인</span>
          <strong id="targetText">운동</strong>
          <p class="cue" id="cueKo">한글 입력 모드인지 확인합니다.</p>
          <p class="note" id="noteText">정확히 입력하면 다음 단계로 이동합니다.</p>
          <div class="translation-panel" id="translationPanel" aria-label="선택 언어 보조 설명"></div>
          <div class="hint-panel" id="hintPanel" hidden>
            <span>힌트</span>
            <strong id="hintText"></strong>
          </div>
        </div>

        <div class="spotlight-input" id="inputWrap">
          <input id="typingInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="운동">
        </div>

        <section class="report-panel" id="reportPanel" aria-label="학습 리포트" hidden>
          <div class="report-grid">
            <div class="report-card">
              <span>총 연습 항목</span>
              <strong id="totalMetric">0</strong>
            </div>
            <div class="report-card">
              <span>정확 입력</span>
              <strong id="correctMetric">0</strong>
            </div>
            <div class="report-card">
              <span>힌트 사용</span>
              <strong id="hintMetric">0</strong>
            </div>
          </div>
          <div>
            <h2>재연습 추천 표현</h2>
            <ul class="review-list" id="reviewList"></ul>
          </div>
        </section>

        <div class="status-line" id="statusLine" aria-live="polite">
          <span id="feedbackText">한글 입력 모드에서 "운동"을 입력하세요.</span>
          <span id="shortcutText"><kbd>자동</kbd> 정확히 입력하면 이동</span>
        </div>

        <div class="assist-actions">
          <button class="ghost-button" id="prevButton" type="button">이전</button>
          <button class="ghost-button" id="hintButton" type="button">힌트</button>
          <button class="primary-button" id="checkButton" type="button">확인</button>
          <button class="primary-button" id="retryButton" type="button" hidden>재연습</button>
        </div>
      </section>
    </main>

    <script>
      window.MULTILANG_CONFIG = {
        langs: ["vi", "mn", "ar", "kk", "th", "en", "ja", "zh"],
        defaultLang: "none"
      };
    </script>

          { id: "exp-waist", section: "expansion", target: "두 손을 허리에 대다", cueKo: "손 두 개를 허리 위에 놓다", translations: tr("Đặt hai tay lên eo", "Хоёр гараа бэлхүүс дээр тавих", "وضع اليدين على الخصر", "Екі қолды белге қою", "วางมือทั้งสองข้างที่เอว", "Put both hands on your waist", "両手を腰に当てる", "双手放在腰上"), note: "동작 순서를 설명할 때 유용합니다.", mode: "copy" },
          { id: "exp-bend-back", section: "expansion", target: "몸을 뒤로 젖히다", cueKo: "몸을 뒤쪽으로 기울이다", translations: tr("Ngả người ra sau", "Биеэ арагш гэдийлгэх", "إمالة الجسم إلى الخلف", "Денені артқа шалқайту", "เอนตัวไปด้านหลัง", "Lean your body backward", "体を後ろに反らす", "身体向后仰"), note: "스트레칭 동작을 구체적으로 말합니다.", mode: "copy" },
          { id: "exp-heel", section: "expansion", target: "발뒤꿈치를 들다", cueKo: "뒤꿈치를 바닥에서 올리다", translations: tr("Nhấc gót chân", "Өсгийгөө өргөх", "رفع الكعبين", "Өкшені көтеру", "ยกส้นเท้า", "Lift your heels", "かかとを上げる", "抬起脚后跟"), note: "짧은 운동 동작으로 확장할 수 있습니다.", mode: "copy" },
          { id: "exp-arm", section: "expansion", target: "팔을 쭉 뻗다", cueKo: "팔을 길게 펴다", translations: tr("Duỗi thẳng tay", "Гараа шулуун сунгах", "مدّ الذراعين جيدًا", "Қолды созу", "เหยียดแขนให้ตรง", "Stretch your arm out", "腕をまっすぐ伸ばす", "伸直手臂"), note: "운동 뒤 몸의 반응과 연결하기 좋습니다.", mode: "copy" },
          { id: "grammar-light", section: "grammar", target: "운동을 했더니 몸이 가벼워졌어요.", cueKo: "V-았/었더니: 직접 운동한 뒤의 결과", translations: tr("Sau khi tập thể dục, cơ thể nhẹ hơn.", "Дасгал хийсний дараа бие хөнгөрсөн.", "بعد ممارسة الرياضة أصبح الجسم أخف.", "Жаттығу жасағаннан кейін дене жеңілдеді.", "หลังออกกำลังกาย รู้สึกตัวเบาขึ้น", "After exercising, my body felt lighter.", "運動したら体が軽くなりました。", "运动之后，身体变轻松了。"), note: "경험 뒤 결과를 말합니다.", mode: "copy" },
          { id: "grammar-refreshed", section: "grammar", target: "목을 천천히 돌렸더니 기분이 상쾌해졌어요.", cueKo: "V-았/었더니: 목 스트레칭 뒤 변화", translations: tr("Sau khi xoay cổ, cảm giác sảng khoái hơn.", "Хүзүүгээ аажуухан эргүүлсний дараа сэргэг болсон.", "بعد إدارة الرقبة ببطء شعرت بالانتعاش.", "Мойынды жай айналдырғаннан кейін көңіл сергіді.", "หลังหมุนคอช้า ๆ รู้สึกสดชื่นขึ้น", "After slowly turning my neck, I felt refreshed.", "首をゆっくり回したら気分がすっきりしました。", "慢慢转动脖子后，感觉清爽了。"), note: "동작과 결과를 연결합니다.", mode: "copy" },
          { id: "grammar-sweat", section: "grammar", target: "운동을 하면 땀이 얼마나 많이 나는지 몰라요.", cueKo: "얼마나 -는지 모르다: 정도 강조", translations: tr("Không biết ra mồ hôi nhiều đến mức nào.", "Дасгал хийхэд хөлс маш их гардаг.", "لا تتخيل كم يخرج العرق عند ممارسة الرياضة.", "Жаттығу жасағанда тер өте көп шығады.", "เวลาออกกำลังกาย เหงื่อออกมากจริง ๆ", "When I exercise, I sweat so much.", "運動すると汗がどれほど出るかわかりません。", "一运动就会出很多汗。"), note: "동사는 -는지 형태를 씁니다.", mode: "copy" },
          { id: "grammar-body", section: "grammar", target: "요즘 몸이 얼마나 좋아졌는지 몰라요.", cueKo: "얼마나 -았/었는지 모르다: 변화 강조", translations: tr("Dạo này cơ thể tốt lên rất nhiều.", "Сүүлийн үед бие маш их сайжирсан.", "تحسنت صحتي كثيرًا هذه الأيام.", "Соңғы кезде денем қатты жақсарды.", "ช่วงนี้ร่างกายดีขึ้นมากจริง ๆ", "My body has improved so much lately.", "最近、体の調子がとても良くなりました。", "最近身体状态好了很多。"), note: "좋아진 정도를 강조합니다.", mode: "copy" },
          { id: "grammar-guess", section: "grammar", target: "친구가 계속 하품해요. 어젯밤에 잠을 못 잔 모양이에요.", cueKo: "-(으)ㄴ 모양이다: 근거를 보고 추측", translations: tr("Bạn cứ ngáp, chắc tối qua ngủ không ngon.", "Найз минь эвшээгээд байна. Өчигдөр сайн унтаагүй бололтой.", "الصديق يتثاءب باستمرار. يبدو أنه لم ينم جيدًا البارحة.", "Досым қайта-қайта есінейді. Кеше түнде ұйықтамаған сияқты.", "เพื่อนหาวตลอด ดูเหมือนเมื่อคืนจะนอนไม่พอ", "My friend keeps yawning. It seems they did not sleep well last night.", "友達がずっとあくびをしています。昨夜よく眠れなかったようです。", "朋友一直打哈欠，好像昨晚没睡好。"), note: "보이는 단서로 추측합니다.", mode: "copy" },
          { id: "grammar-condition", section: "grammar", target: "꾸준히 운동해야 건강을 지킬 수 있어요.", cueKo: "-아야/어야: 결과를 위한 조건", translations: tr("Phải tập đều đặn mới giữ được sức khỏe.", "Тогтмол дасгал хийж байж эрүүл байж чадна.", "يجب ممارسة الرياضة بانتظام للحفاظ على الصحة.", "Денсаулықты сақтау үшін тұрақты жаттығу керек.", "ต้องออกกำลังกายสม่ำเสมอจึงจะรักษาสุขภาพได้", "You need to exercise regularly to stay healthy.", "健康を守るには、こつこつ運動しなければなりません。", "要坚持运动才能保持健康。"), note: "건강을 지키기 위한 조건을 말합니다.", mode: "copy" }
        ];
        const RECALL_SOURCE_IDS = [
          "core-health-maintain",
          "core-stairs-use",
          "exp-stairs-climb",
          "exp-neck",
          "grammar-light",
          "grammar-condition"
        ];
        const RECALL_ITEMS = RECALL_SOURCE_IDS.map((id) => {
          const item = TRAINING_SECTIONS.find((entry) => entry.id === id);
          return Object.assign({}, item, { id: "recall-" + id, section: "recall", mode: "recall" });
        });
        const STAGES = [
          { id: "warmup", label: "한/영", title: "한/영 확인", meta: "1단계", prompt: "한글 입력 모드로 짧게 시작합니다. 아래 칸에 운동을 입력하세요." },
          { id: "core", label: "핵심", title: "핵심 어휘", meta: "2단계", prompt: "12과 생활 속 운동 쓰기에 필요한 핵심 어휘를 정확히 따라 칩니다." },
          { id: "expansion", label: "확장", title: "확장 표현", meta: "3단계", prompt: "계단, 걷기, 스트레칭 동작을 더 구체적인 표현으로 연습합니다." },
          { id: "grammar", label: "문법", title: "문법 문장", meta: "4단계", prompt: "12과 목표 문법이 들어간 문장을 문장부호까지 정확히 입력합니다." },
          { id: "recall", label: "회상", title: "가림 회상", meta: "5단계", prompt: "목표 표현을 가리고 뜻과 설명만 보고 다시 입력합니다." },
          { id: "report", label: "리포트", title: "학습 리포트", meta: "6단계", prompt: "오늘 타이핑으로 익힌 표현과 재연습할 표현을 확인합니다." }
        ];

        const state = {
          stageIndex: 0,
          itemIndexByStage: { core: 0, expansion: 0, grammar: 0, recall: 0 },
          results: {},
          hintVisible: false,
          activeInputId: "typingInput",
          composing: false
        };

        let advanceTimer = 0;
        let lastRenderKey = "";

        const els = {
          resetTrainer: document.getElementById("resetTrainer"),
          progressDots: document.getElementById("progressDots"),
          stageMeta: document.getElementById("stageMeta"),
          stageTitle: document.getElementById("stageTitle"),
          missionPrompt: document.getElementById("missionPrompt"),
          targetCard: document.getElementById("targetCard"),
          itemMeta: document.getElementById("itemMeta"),
          targetText: document.getElementById("targetText"),
          cueKo: document.getElementById("cueKo"),
          noteText: document.getElementById("noteText"),
          translationPanel: document.getElementById("translationPanel"),
          hintPanel: document.getElementById("hintPanel"),
          hintText: document.getElementById("hintText"),
          inputWrap: document.getElementById("inputWrap"),
          typingInput: document.getElementById("typingInput"),
          reportPanel: document.getElementById("reportPanel"),
          totalMetric: document.getElementById("totalMetric"),
          correctMetric: document.getElementById("correctMetric"),
          hintMetric: document.getElementById("hintMetric"),
          reviewList: document.getElementById("reviewList"),
          statusLine: document.getElementById("statusLine"),
          feedbackText: document.getElementById("feedbackText"),
          shortcutText: document.getElementById("shortcutText"),
          prevButton: document.getElementById("prevButton"),
          hintButton: document.getElementById("hintButton"),
          checkButton: document.getElementById("checkButton"),
          retryButton: document.getElementById("retryButton")
        };

        function normalize(value) {
          return String(value || "").replace(/\s+/g, " ").trim();
        }

        function hasEnglish(value) {
          return /[A-Za-z]/.test(value);
        }

        function escapeHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function syncMultilangBlocks() {
          if (!window.MultilangToggle || typeof window.MultilangToggle.refresh !== "function") return;
          window.MultilangToggle.refresh();
        }

        function renderTranslations(translations) {
          const data = translations || {};
          els.translationPanel.innerHTML = LANGS.map((lang) => {
            const text = data[lang] || "";
            const dir = lang === "ar" ? ' dir="rtl"' : "";
            return '<p class="lang-box" data-lang="' + lang + '" lang="' + lang + '"' + dir + ">" + escapeHtml(text) + "</p>";
          }).join("");
          syncMultilangBlocks();
        }

        function clearTimers() {
          window.clearTimeout(advanceTimer);
          advanceTimer = 0;
        }

        function practiceItems() {
          return TRAINING_SECTIONS.concat(RECALL_ITEMS);
        }

        function stageItems(stageId) {
          if (stageId === "recall") return RECALL_ITEMS;
          return TRAINING_SECTIONS.filter((item) => item.section === stageId);
        }

        function currentStage() {
          return STAGES[state.stageIndex];
        }

        function currentItem() {
          const stage = currentStage();
          const items = stageItems(stage.id);
          return items[state.itemIndexByStage[stage.id] || 0] || null;
        }

        function currentItemIndex() {
          const stage = currentStage();
          return state.itemIndexByStage[stage.id] || 0;
        }

        function stageDone(stageId) {
          if (stageId === "warmup") return state.stageIndex > 0;
          if (stageId === "report") return state.stageIndex === STAGES.length - 1;
          const items = stageItems(stageId);
          return items.length > 0 && items.every((item) => state.results[item.id] && state.results[item.id].correct);
        }

        function setFeedback(message, kind, shortcut) {
          els.feedbackText.textContent = message;
          els.shortcutText.innerHTML = shortcut || "";
          els.statusLine.classList.toggle("is-good", kind === "good");
          els.statusLine.classList.toggle("is-bad", kind === "bad");
          els.statusLine.classList.toggle("is-warn", kind === "warn");
        }

        function saveState() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
          try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            Object.assign(state, saved);
            state.itemIndexByStage = Object.assign({ core: 0, expansion: 0, grammar: 0, recall: 0 }, saved.itemIndexByStage || {});
            state.results = saved.results && typeof saved.results === "object" ? saved.results : {};
            state.stageIndex = Math.max(0, Math.min(Number(state.stageIndex) || 0, STAGES.length - 1));
            ["core", "expansion", "grammar", "recall"].forEach((stageId) => {
              const max = Math.max(stageItems(stageId).length - 1, 0);
              state.itemIndexByStage[stageId] = Math.max(0, Math.min(Number(state.itemIndexByStage[stageId]) || 0, max));
            });
            state.hintVisible = false;
            state.composing = false;
            state.activeInputId = "typingInput";
          } catch (error) {
            localStorage.removeItem(STORAGE_KEY);
          }
        }

        function focusInput(selectText) {
          if (state.composing || currentStage().id === "report") return;
          window.requestAnimationFrame(() => {
            els.typingInput.focus({ preventScroll: true });
            if (selectText) els.typingInput.select();
          });
        }

        function recordAttempt(item, correct) {
          const previous = state.results[item.id] || {
            id: item.id,
            target: item.target,
            section: item.section,
            attempts: 0,
            hint: false,
            correct: false
          };
          state.results[item.id] = {
            id: item.id,
            target: item.target,
            section: item.section,
            attempts: previous.attempts + 1,
            hint: previous.hint || state.hintVisible,
            correct: previous.correct || correct
          };
        }

        function markHintUsed() {
          const item = currentItem();
          if (!item || currentStage().id !== "recall") return;
          const previous = state.results[item.id] || {
            id: item.id,
            target: item.target,
            section: item.section,
            attempts: 0,
            hint: false,
            correct: false
          };
          state.results[item.id] = Object.assign({}, previous, { hint: true });
        }

        function goToStage(index, options) {
          clearTimers();
          state.stageIndex = Math.max(0, Math.min(index, STAGES.length - 1));
          state.hintVisible = false;
          render(options);
        }

        function advanceItem() {
          const stage = currentStage();
          const items = stageItems(stage.id);
          const nextIndex = currentItemIndex() + 1;
          state.hintVisible = false;
          if (nextIndex < items.length) {
            state.itemIndexByStage[stage.id] = nextIndex;
            render({ selectText: true });
            setFeedback("좋아요. 다음 표현을 입력하세요.", "good", stage.id === "recall" ? "<kbd>Enter</kbd> 확인" : "<kbd>자동</kbd> 정확히 치면 이동");
            return;
          }
          goToStage(state.stageIndex + 1, { selectText: true });
          if (currentStage().id !== "report") {
            setFeedback("다음 단계로 넘어갑니다.", "good", "<kbd>자동</kbd>");
          }
        }

        function completeWarmup() {
          setFeedback("좋아요. 핵심 어휘로 넘어갑니다.", "good", "<kbd>자동 이동</kbd>");
          advanceTimer = window.setTimeout(() => goToStage(1, { selectText: true }), 300);
        }

        function completeCopyItem(item) {
          recordAttempt(item, true);
          setFeedback("정확해요. 다음 표현으로 넘어갑니다.", "good", "<kbd>자동 이동</kbd>");
          saveState();
          advanceTimer = window.setTimeout(advanceItem, 300);
        }

        function submitRecallItem() {
          const item = currentItem();
          if (!item) return;
          const value = normalize(els.typingInput.value);
          if (hasEnglish(value)) {
            setFeedback("한/영 키 확인: 지금은 한글 입력 모드가 필요합니다.", "bad", "<kbd>한/영</kbd>");
            focusInput(true);
            return;
          }
          if (value === item.target) {
            recordAttempt(item, true);
            setFeedback("정확해요. 기억으로 입력했습니다.", "good", "<kbd>Enter</kbd> 다음 확인");
            saveState();
            advanceTimer = window.setTimeout(advanceItem, 300);
            return;
          }
          recordAttempt(item, false);
          setFeedback("다시 입력하세요.", "bad", "<kbd>Ctrl+H</kbd> 힌트");
          saveState();
          focusInput(true);
        }

        function handleTypingInput() {
          if (state.composing) return;
          const stage = currentStage();
          const value = normalize(els.typingInput.value);
          clearTimers();
          if (hasEnglish(value)) {
            setFeedback("한/영 키 확인: 지금은 한글 입력 모드가 필요합니다.", "bad", "<kbd>한/영</kbd>");
            return;
          }
          if (stage.id === "warmup") {
            if (value === WARMUP_TARGET) completeWarmup();
            else setFeedback('"운동"을 입력하세요.', "warn", "<kbd>자동</kbd> 정확히 입력하면 이동");
            return;
          }
          if (stage.id === "recall") {
            setFeedback("뜻을 보고 기억나는 표현을 입력한 뒤 Enter를 누르세요.", "", "<kbd>Enter</kbd> 확인 <kbd>Ctrl+H</kbd> 힌트");
            return;
          }
          const item = currentItem();
          if (item && value === item.target) {
            completeCopyItem(item);
            return;
          }
          if (item) {
            setFeedback("목표 표현을 그대로 입력하세요.", "", "<kbd>자동</kbd> 정확히 치면 이동");
          }
        }

        function showHint() {
          const item = currentItem();
          if (!item || currentStage().id !== "recall") return;
          state.hintVisible = true;
          markHintUsed();
          setFeedback("힌트를 보고 다시 입력하세요.", "warn", "<kbd>Enter</kbd> 확인");
          render({ preserveInput: true, preserveFocus: true });
          focusInput();
        }

        function goPrev() {
          if (state.stageIndex === 0) return;
          goToStage(state.stageIndex - 1, { selectText: true });
        }

        function retryRecall() {
          state.stageIndex = 4;
          state.itemIndexByStage.recall = 0;
          state.hintVisible = false;
          render({ selectText: true });
          setFeedback("재연습할 표현을 다시 입력하세요.", "", "<kbd>Enter</kbd> 확인 <kbd>Ctrl+H</kbd> 힌트");
        }

        function resetTrainer() {
          clearTimers();
          Object.assign(state, {
            stageIndex: 0,
            itemIndexByStage: { core: 0, expansion: 0, grammar: 0, recall: 0 },
            results: {},
            hintVisible: false,
            activeInputId: "typingInput",
            composing: false
          });
          lastRenderKey = "";
          localStorage.removeItem(STORAGE_KEY);
          els.typingInput.value = "";
          setFeedback('한글 입력 모드에서 "운동"을 입력하세요.', "", "<kbd>자동</kbd> 정확히 입력하면 이동");
          render({ selectText: true });
        }

        function renderProgressDots() {
          els.progressDots.innerHTML = STAGES.map((stage, index) => {
            const classes = ["progress-dot"];
            if (index === state.stageIndex) classes.push("is-current");
            if (stageDone(stage.id)) classes.push("is-done");
            return '<button class="' + classes.join(" ") + '" type="button" data-stage-index="' + index + '">' + (index + 1) + ". " + stage.label + "</button>";
          }).join("");
        }

        function renderReport() {
          const items = practiceItems();
          const results = Object.values(state.results);
          const correct = results.filter((result) => result.correct).length;
          const hints = results.filter((result) => result.hint).length;
          const review = items.filter((item) => {
            const result = state.results[item.id];
            return !result || !result.correct || result.hint || result.attempts > 1;
          });
          const fallback = items.filter((item) => !review.some((entry) => entry.id === item.id)).slice(-3);
          const reviewItems = review.concat(fallback).slice(0, 3);
          els.totalMetric.textContent = String(items.length);
          els.correctMetric.textContent = String(correct);
          els.hintMetric.textContent = String(hints);
          els.reviewList.innerHTML = reviewItems.map((item) => "<li>" + item.target + "</li>").join("");
          setFeedback("학습 리포트가 준비되었습니다.", "good", "<kbd>재연습</kbd> 또는 처음부터");
        }

        function renderTarget() {
          const stage = currentStage();
          const item = currentItem();
          if (stage.id === "warmup") {
            els.itemMeta.textContent = "시작 확인";
            els.targetText.textContent = WARMUP_TARGET;
            els.targetText.classList.remove("is-hidden-target");
            els.cueKo.textContent = "한글 입력 모드인지 확인합니다.";
            els.noteText.textContent = "정확히 입력하면 핵심 어휘로 이동합니다.";
            renderTranslations(WARMUP_TRANSLATIONS);
            els.hintPanel.hidden = true;
            els.typingInput.placeholder = WARMUP_TARGET;
            return;
          }
          if (!item) return;
          const items = stageItems(stage.id);
          els.itemMeta.textContent = stage.title + " " + (currentItemIndex() + 1) + " / " + items.length;
          els.cueKo.textContent = item.cueKo;
          els.noteText.textContent = item.note;
          renderTranslations(item.translations);
          els.typingInput.placeholder = stage.id === "recall" ? "기억나는 표현 입력" : "목표 표현 입력";
          if (stage.id === "recall") {
            els.targetText.textContent = state.hintVisible ? "힌트를 확인하고 입력" : "가려진 표현";
            els.targetText.classList.add("is-hidden-target");
            els.hintText.textContent = item.target;
            els.hintPanel.hidden = !state.hintVisible;
            return;
          }
          els.targetText.textContent = item.target;
          els.targetText.classList.remove("is-hidden-target");
          els.hintPanel.hidden = true;
        }

        function render(options) {
          const stage = currentStage();
          const item = currentItem();
          const renderKey = stage.id + ":" + (item ? item.id : "none");
          const isReport = stage.id === "report";
          els.stageMeta.textContent = stage.meta;
          els.stageTitle.textContent = stage.title;
          els.missionPrompt.textContent = stage.prompt;
          els.targetCard.hidden = isReport;
          els.inputWrap.hidden = isReport;
          els.reportPanel.hidden = !isReport;
          els.hintButton.hidden = stage.id !== "recall";
          els.checkButton.hidden = isReport;
          els.retryButton.hidden = !isReport;
          els.prevButton.disabled = state.stageIndex === 0;

          if (!options || !options.preserveInput) {
            if (renderKey !== lastRenderKey) els.typingInput.value = "";
          }
          lastRenderKey = renderKey;

          if (isReport) renderReport();
          else renderTarget();
          renderProgressDots();
          saveState();

          if (!options || !options.preserveFocus) {
            focusInput(Boolean(options && options.selectText));
          }
        }

        function checkCurrent() {
          const stage = currentStage();
          const value = normalize(els.typingInput.value);
          if (stage.id === "warmup") {
            if (value === WARMUP_TARGET) completeWarmup();
            else setFeedback('"운동"을 입력하세요.', "warn", "<kbd>자동</kbd> 정확히 입력하면 이동");
            return;
          }
          if (stage.id === "recall") {
            submitRecallItem();
            return;
          }
          const item = currentItem();
          if (item && value === item.target) completeCopyItem(item);
          else setFeedback("목표 표현을 그대로 입력하세요.", "warn", "<kbd>자동</kbd> 정확히 치면 이동");
        }

        document.addEventListener("click", (event) => {
          const stageButton = event.target.closest("[data-stage-index]");
          if (stageButton) goToStage(Number(stageButton.dataset.stageIndex), { selectText: true });
        });

        document.addEventListener("compositionstart", () => {
          state.composing = true;
          clearTimers();
        });

        document.addEventListener("compositionend", () => {
          state.composing = false;
          handleTypingInput();
          focusInput();
        });

        els.typingInput.addEventListener("input", handleTypingInput);
        els.typingInput.addEventListener("keydown", (event) => {
          if (event.ctrlKey && event.key.toLowerCase() === "h") {
            event.preventDefault();
            showHint();
            return;
          }
          if (event.key === "Enter") {
            event.preventDefault();
            if (currentStage().id === "recall") submitRecallItem();
            else checkCurrent();
          }
        });
        els.prevButton.addEventListener("click", goPrev);
        els.hintButton.addEventListener("click", showHint);
        els.checkButton.addEventListener("click", checkCurrent);
        els.retryButton.addEventListener("click", retryRecall);
        els.resetTrainer.addEventListener("click", resetTrainer);

        loadState();
        setFeedback('한글 입력 모드에서 "운동"을 입력하세요.', "", "<kbd>자동</kbd> 정확히 입력하면 이동");
        render({ selectText: true });
      })();
    </script>
    <script src="../shared/multilang-toggle.js"></script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
  </body>
</html>
