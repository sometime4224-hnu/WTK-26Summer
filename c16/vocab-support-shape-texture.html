<html lang="ko">
<head>

  <meta charset="UTF-8">

  <title>모양, 형태, 촉감 설명하기 | 16과 어휘 보조자료2</title>
  <style>
    :root {
      --ink: #20272a;
      --muted: #5e6c71;
      --page: #f4f7f2;
      --paper: #fffdf8;
      --line: rgba(32, 39, 42, 0.14);
      --shape: #c94e36;
      --shape-soft: #fff0eb;
      --form: #19716c;
      --form-soft: #e9f7f4;
      --touch: #80631d;
      --touch-soft: #fff7dc;
      --good: #187441;
      --bad: #b63b35;
    }

    * { box-sizing: border-box; }

    html { background: var(--page); }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf8 0%, var(--page) 56%, #edf4f2 100%);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    button { font: inherit; }

    button:focus-visible,
    a:focus-visible {
      outline: 3px solid #2563a8;
      outline-offset: 3px;
    }

    .topbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.96);
    }

    .topbar__links {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .topbar a {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(32, 39, 42, 0.06);
      font-size: 0.8rem;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .topbar__title {
      overflow: hidden;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-shell {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 16px 14px 36px;
    }

    .lesson-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      line-height: 1.22;
      font-weight: 900;
    }

    .progress-label {
      flex: 0 0 auto;
      min-width: 58px;
      margin: 0;
      padding: 7px 9px;
      border: 1px solid rgba(25, 113, 108, 0.22);
      border-radius: 999px;
      color: #155d58;
      background: #eef9f6;
      font-size: 0.84rem;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .activity-card,
    .complete-card,
    .storage-notice {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.94);
      box-shadow: 0 12px 28px rgba(32, 39, 42, 0.07);
    }

    .activity-card { padding: clamp(12px, 3vw, 20px); }

    .instruction {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 750;
      line-height: 1.5;
    }

    .photo-frame {
      position: relative;
      display: grid;
      min-height: 210px;
      margin: 0;
      overflow: hidden;
      place-items: center;
      border: 1px solid rgba(32, 39, 42, 0.12);
      border-radius: 10px;
      background:
        linear-gradient(45deg, rgba(32, 39, 42, 0.035) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(32, 39, 42, 0.035) 25%, transparent 25%),
        #fff;
      background-size: 20px 20px;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      height: clamp(210px, 34svh, 310px);
      object-fit: contain;
      background: #fff;
    }

    .object-name {
      position: absolute;
      right: 10px;
      bottom: 10px;
      max-width: calc(100% - 20px);
      margin: 0;
      padding: 6px 9px;
      border-radius: 7px;
      color: #fff;
      background: rgba(32, 39, 42, 0.84);
      font-size: 0.82rem;
      font-weight: 850;
      line-height: 1.35;
    }

    .choice-groups {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-group {
      --category: var(--shape);
      --category-soft: var(--shape-soft);
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(32, 39, 42, 0.1);
      border-radius: 10px;
      background: var(--category-soft);
    }

    .choice-group[data-category="form"] {
      --category: var(--form);
      --category-soft: var(--form-soft);
    }

    .choice-group[data-category="touch"] {
      --category: var(--touch);
      --category-soft: var(--touch-soft);
    }

    .choice-group__label {
      margin: 0;
      color: var(--category);
      font-size: 0.86rem;
      font-weight: 900;
      text-align: center;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .choice-button {
      min-height: 42px;
      border: 1px solid rgba(32, 39, 42, 0.16);
      border-radius: 8px;
      padding: 5px 7px;
      color: var(--ink);
      background: #fff;
      font-size: 0.9rem;
      font-weight: 850;
      line-height: 1.25;
      overflow-wrap: anywhere;
      cursor: pointer;
      touch-action: manipulation;
    }

    .choice-button[aria-pressed="true"] {
      border-color: var(--category);
      color: #fff;
      background: var(--category);
    }

    .choice-group.is-correct { border-color: rgba(24, 116, 65, 0.55); }
    .choice-group.is-wrong { border-color: rgba(182, 59, 53, 0.62); }

    .choice-group.is-wrong .choice-button[aria-pressed="true"] {
      border-color: var(--bad);
      background: var(--bad);
    }

    .choice-group.is-correct .choice-button[aria-pressed="true"] {
      border-color: var(--good);
      background: var(--good);
    }

    .feedback {
      min-height: 49px;
      display: flex;
      align-items: center;
      margin: 12px 0 0;
      padding: 9px 11px;
      border-radius: 9px;
      color: var(--muted);
      background: #f5f6f2;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.42;
    }

    .feedback.is-good { color: var(--good); background: #edf9f1; }
    .feedback.is-bad { color: var(--bad); background: #fff1ef; }

    .primary-action,
    .secondary-action {
      min-height: 46px;
      border-radius: 9px;
      padding: 0 16px;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .primary-action {
      width: 100%;
      margin-top: 12px;
      border: 0;
      color: #fff;
      background: var(--ink);
    }

    .primary-action:hover { background: #111719; }

    .complete-card {
      padding: 28px 20px;
      text-align: center;
    }

    .complete-card h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .complete-card p {
      margin: 9px 0 18px;
      color: var(--muted);
      font-weight: 750;
      line-height: 1.5;
    }

    .storage-notice {
      margin-top: 14px;
      padding: 12px;
      border-color: rgba(182, 59, 53, 0.34);
      background: #fff8f6;
    }

    .storage-notice p {
      margin: 0;
      color: #8d312c;
      font-size: 0.88rem;
      font-weight: 750;
      line-height: 1.45;
    }

    .storage-notice__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .secondary-action {
      border: 1px solid rgba(32, 39, 42, 0.2);
      color: var(--ink);
      background: #fff;
      font-size: 0.86rem;
    }

    [hidden] { display: none !important; }

    @media (max-width: 520px) {
      .topbar { padding-inline: 8px; }
      .topbar__title { display: none; }
      .page-shell { padding: 12px 8px 28px; }
      .lesson-header { margin-bottom: 10px; }
      .activity-card { padding: 10px; }
      .instruction { margin-bottom: 10px; font-size: 0.92rem; }
      .photo-frame { min-height: 184px; }
      .photo-frame img { height: min(27svh, 220px); min-height: 184px; }
      .choice-groups { gap: 7px; margin-top: 10px; }
      .choice-group { grid-template-columns: 50px minmax(0, 1fr); gap: 7px; padding: 7px; }
      .choice-group__label { font-size: 0.78rem; }
      .choices { gap: 5px; }
      .choice-button { min-height: 40px; padding: 4px; font-size: 0.82rem; }
      .feedback { min-height: 44px; margin-top: 10px; padding: 8px 9px; font-size: 0.86rem; }
      .primary-action { margin-top: 10px; }
    }

    @media (max-width: 340px) {
      .topbar a { padding-inline: 8px; font-size: 0.76rem; }
      .lesson-header { gap: 8px; }
      .progress-label { min-width: 54px; padding-inline: 7px; }
      h1 { font-size: 1.12rem; }
      .choice-group { grid-template-columns: 46px minmax(0, 1fr); }
      .choice-button { font-size: 0.78rem; }
    }

    @media (min-width: 521px) and (max-height: 600px) {
      .page-shell { padding-top: 8px; padding-bottom: 16px; }
      .lesson-header { margin-bottom: 7px; }
      h1 { font-size: 1.2rem; }
      .activity-card { padding: 10px; }
      .instruction { margin-bottom: 7px; font-size: 0.9rem; }
      .photo-frame { min-height: 136px; }
      .photo-frame img { height: 136px; }
      .choice-groups { gap: 7px; margin-top: 8px; }
      .choice-group { padding: 6px; }
      .choice-button { min-height: 40px; }
      .feedback { min-height: 42px; margin-top: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
    }
  </style>

  <main class="page-shell">
    <header class="lesson-header">
      <h1 id="pageTitle">모양·형태·촉감 설명하기</h1>
      <p id="progressLabel" class="progress-label" aria-live="polite">1 / 10</p>
    </header>

    <section id="activityCard" class="activity-card" aria-labelledby="pageTitle">
      <p class="instruction">사진을 보고 각 줄에서 알맞은 말 하나를 고르세요.</p>
      <figure id="photoFrame" class="photo-frame">
        <img id="roundImage" src="" alt="" fetchpriority="high" decoding="async">
        <figcaption id="objectName" class="object-name" hidden></figcaption>
      </figure>
      <div id="choiceGroups" class="choice-groups"></div>
      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      <button id="nextButton" class="primary-action" type="button" hidden>다음 사진</button>
    </section>

    <section id="completeCard" class="complete-card" aria-labelledby="completeTitle" hidden>
      <h2 id="completeTitle" tabindex="-1">10장 완료!</h2>
      <p>모양, 형태, 촉감을 모두 설명했어요.</p>
      <button id="restartButton" class="primary-action" type="button">처음부터 다시 하기</button>
    </section>

    <aside id="storageNotice" class="storage-notice" aria-live="polite" hidden>
      <p id="storageMessage"></p>
      <div class="storage-notice__actions">
        <button id="resetStoredProgress" class="secondary-action" type="button">저장 기록 초기화</button>
        <button id="copyProgress" class="secondary-action" type="button">진행 상태 복사</button>
      </div>
    </aside>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'c16-shape-texture-v2';
      const STORAGE_VERSION = 2;
      const assetBase = '../assets/c16/vocabulary/shape-texture-game/';
      const categories = {
        shape: { label: '모양', words: ['세모', '네모', '동그라미', '마름모'] },
        form: { label: '형태', words: ['둥글다', '평평하다', '뾰족하다', '울퉁불퉁하다'] },
        touch: { label: '촉감', words: ['딱딱하다', '매끄럽다', '부드럽다', '거칠다'] }
      };
      const categoryKeys = Object.keys(categories);
      const rounds = [
        { title: '세모 금속 조각', image: 'triangle-metal.webp', alt: '세모 모양의 금속 조각', answer: { shape: ['세모'], form: ['평평하다', '뾰족하다'], touch: ['딱딱하다', '매끄럽다'] } },
        { title: '네모 유리 타일', image: 'square-glass-tile.webp', alt: '네모난 유리 타일', answer: { shape: ['네모'], form: ['평평하다'], touch: ['딱딱하다', '매끄럽다'] } },
        { title: '동그라미 쿠션', image: 'circle-cushion.webp', alt: '동그라미 모양의 둥근 쿠션', answer: { shape: ['동그라미'], form: ['둥글다'], touch: ['부드럽다'] } },
        { title: '마름모 돌 타일', image: 'diamond-stone-tile.webp', alt: '마름모 모양의 거친 돌 타일', answer: { shape: ['네모', '마름모'], form: ['평평하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] } },
        { title: '세모 현무암 조각', image: 'triangle-basalt.webp', alt: '세모 모양의 검은 현무암 조각', answer: { shape: ['세모'], form: ['뾰족하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] } },
        { title: '둥근 네모 쿠션', image: 'rounded-square-cushion.webp', alt: '모서리가 둥근 네모 쿠션', answer: { shape: ['네모'], form: ['둥글다'], touch: ['부드럽다'] } },
        { title: '세모 천 조각', image: 'triangle-cloth.webp', alt: '세모 모양의 천 조각', answer: { shape: ['세모'], form: ['평평하다', '뾰족하다'], touch: ['부드럽다'] } },
        { title: '네모 콘크리트 블록', image: 'concrete-block.webp', alt: '네모난 콘크리트 블록', answer: { shape: ['네모'], form: ['평평하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] } },
        { title: '동그라미 나무 받침', image: 'circle-wood-stand.webp', alt: '동그라미 모양의 나무 받침', answer: { shape: ['동그라미'], form: ['둥글다', '평평하다'], touch: ['딱딱하다', '매끄럽다'] } },
        { title: '마름모 거울 조각', image: 'diamond-mirror.webp', alt: '마름모 모양의 거울 조각', answer: { shape: ['마름모'], form: ['평평하다', '뾰족하다'], touch: ['딱딱하다', '매끄럽다'] } }
      ];

      const elements = {
        activityCard: document.getElementById('activityCard'),
        choiceGroups: document.getElementById('choiceGroups'),
        completeCard: document.getElementById('completeCard'),
        completeTitle: document.getElementById('completeTitle'),
        feedback: document.getElementById('feedback'),
        nextButton: document.getElementById('nextButton'),
        objectName: document.getElementById('objectName'),
        progressLabel: document.getElementById('progressLabel'),
        restartButton: document.getElementById('restartButton'),
        roundImage: document.getElementById('roundImage'),
        storageMessage: document.getElementById('storageMessage'),
        storageNotice: document.getElementById('storageNotice'),
        resetStoredProgress: document.getElementById('resetStoredProgress'),
        copyProgress: document.getElementById('copyProgress')
      };

      let storageBlocked = false;
      let storageMessage = '';
      let state = readInitialState();

      function blankSelection() {
        return { shape: '', form: '', touch: '' };
      }

      function createDefaultState() {
        return {
          currentRound: 0,
          selections: rounds.map(() => blankSelection()),
          solvedRounds: [],
          completed: false
        };
      }

      function validSelection(selection) {
        if (!selection || typeof selection !== 'object' || Array.isArray(selection)) return null;
        const normalized = blankSelection();
        for (const category of categoryKeys) {
          const word = selection[category];
          if (word === '' || categories[category].words.includes(word)) normalized[category] = word;
          else return null;
        }
        return normalized;
      }

      function normalizeStoredState(candidate) {
        if (!candidate || typeof candidate !== 'object' || Array.isArray(candidate) || candidate.version !== STORAGE_VERSION) return null;
        if (!Number.isInteger(candidate.currentRound) || candidate.currentRound < 0 || candidate.currentRound >= rounds.length) return null;
        if (!Array.isArray(candidate.selections) || candidate.selections.length !== rounds.length) return null;
        if (!Array.isArray(candidate.solvedRounds) || typeof candidate.completed !== 'boolean') return null;

        const selections = candidate.selections.map(validSelection);
        if (selections.some((selection) => !selection)) return null;
        const solvedRounds = [...new Set(candidate.solvedRounds)].filter((index) => Number.isInteger(index) && index >= 0 && index < rounds.length);
        const completed = candidate.completed && solvedRounds.length === rounds.length;
        return { currentRound: candidate.currentRound, selections, solvedRounds, completed };
      }

      function blockStorage(message, requiresReset = false) {
        storageBlocked = requiresReset;
        storageMessage = message;
      }

      function readInitialState() {
        let raw;
        try {
          raw = window.localStorage.getItem(STORAGE_KEY);
        } catch (error) {
          blockStorage('이 기기에서는 진행 상태를 저장할 수 없어요. 현재 활동은 저장되지 않습니다.', true);
          return createDefaultState();
        }
        if (!raw) return createDefaultState();
        try {
          const normalized = normalizeStoredState(JSON.parse(raw));
          if (normalized) return normalized;
        } catch (error) {
          // The original record is intentionally kept until the learner explicitly resets it.
        }
        blockStorage('저장된 학습 기록을 읽을 수 없어요. 기록을 초기화하기 전까지 현재 활동은 저장되지 않습니다.', true);
        return createDefaultState();
      }

      function serialiseState() {
        return {
          version: STORAGE_VERSION,
          currentRound: state.currentRound,
          selections: state.selections.map((selection) => ({ ...selection })),
          solvedRounds: [...state.solvedRounds],
          completed: state.completed
        };
      }

      function saveState() {
        if (storageBlocked) return false;
        try {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(serialiseState()));
          if (storageMessage) {
            storageMessage = '';
            renderStorageNotice();
          }
          return true;
        } catch (error) {
          blockStorage('진행 상태를 저장하지 못했어요. 현재 활동은 계속할 수 있으며, 다음 선택 때 다시 저장을 시도합니다.');
          renderStorageNotice();
          return false;
        }
      }

      function isSolved(index = state.currentRound) {
        return state.solvedRounds.includes(index);
      }

      function selectedCount(selection) {
        return categoryKeys.filter((category) => selection[category]).length;
      }

      function isCategoryCorrect(index, category) {
        const selected = state.selections[index][category];
        return Boolean(selected) && rounds[index].answer[category].includes(selected);
      }

      function roundIsCorrect(index) {
        return categoryKeys.every((category) => isCategoryCorrect(index, category));
      }

      function addSolvedRound(index) {
        if (!isSolved(index)) state.solvedRounds.push(index);
      }

      function feedbackState() {
        const index = state.currentRound;
        const selection = state.selections[index];
        if (isSolved(index)) {
          return {
            type: 'good',
            text: `좋아요. ${categoryKeys.map((category) => selection[category]).join(' · ')}`
          };
        }
        if (selectedCount(selection) === categoryKeys.length) {
          return { type: 'bad', text: '아닌 단어가 있어요. 고친 뒤 다시 고르세요.' };
        }
        return { type: '', text: '사진을 보고 각 줄에서 알맞은 말 하나를 고르세요.' };
      }

      function renderChoices() {
        const index = state.currentRound;
        const selection = state.selections[index];
        const fullySelected = selectedCount(selection) === categoryKeys.length;
        const solved = isSolved(index);
        elements.choiceGroups.replaceChildren();

        categoryKeys.forEach((category) => {
          const group = document.createElement('section');
          group.className = 'choice-group';
          group.dataset.category = category;
          group.setAttribute('aria-labelledby', `category-${category}`);
          if (fullySelected) group.classList.add(isCategoryCorrect(index, category) ? 'is-correct' : 'is-wrong');

          const label = document.createElement('h2');
          label.id = `category-${category}`;
          label.className = 'choice-group__label';
          label.textContent = categories[category].label;

          const choices = document.createElement('div');
          choices.className = 'choices';
          choices.setAttribute('role', 'group');
          choices.setAttribute('aria-label', `${categories[category].label} 단어 선택`);

          categories[category].words.forEach((word) => {
            const button = document.createElement('button');
            const selected = selection[category] === word;
            button.className = 'choice-button';
            button.type = 'button';
            button.dataset.category = category;
            button.dataset.word = word;
            button.setAttribute('aria-pressed', String(selected));
            button.disabled = solved;
            button.textContent = word;
            button.addEventListener('click', () => selectWord(category, word));
            choices.append(button);
          });

          group.append(label, choices);
          elements.choiceGroups.append(group);
        });
      }

      function renderActivity() {
        const index = state.currentRound;
        const round = rounds[index];
        const solved = isSolved(index);
        const result = feedbackState();
        elements.progressLabel.textContent = `${index + 1} / ${rounds.length}`;
        elements.roundImage.src = `${assetBase}${round.image}`;
        elements.roundImage.alt = round.alt;
        elements.objectName.textContent = solved ? round.title : '';
        elements.objectName.hidden = !solved;
        elements.feedback.className = `feedback${result.type ? ` is-${result.type}` : ''}`;
        elements.feedback.textContent = result.text;
        elements.nextButton.hidden = !solved;
        elements.nextButton.textContent = index === rounds.length - 1 ? '완료하기' : '다음 사진';
        renderChoices();
      }

      function renderStorageNotice() {
        elements.storageNotice.hidden = !storageMessage;
        if (storageMessage) elements.storageMessage.textContent = storageMessage;
      }

      function render() {
        elements.activityCard.hidden = state.completed;
        elements.completeCard.hidden = !state.completed;
        if (!state.completed) renderActivity();
        else elements.progressLabel.textContent = `${rounds.length} / ${rounds.length}`;
        renderStorageNotice();
      }

      function selectWord(category, word) {
        const index = state.currentRound;
        if (state.completed || isSolved(index)) return;
        state.selections[index][category] = word;
        if (roundIsCorrect(index)) addSolvedRound(index);
        saveState();
        render();
      }

      function goToNextRound() {
        if (!isSolved()) return;
        if (state.currentRound === rounds.length - 1) {
          state.completed = true;
          saveState();
          render();
          elements.completeTitle.focus();
          return;
        }
        state.currentRound += 1;
        saveState();
        render();
        elements.choiceGroups.querySelector('button')?.focus();
      }

      function copyRecoveryState() {
        const text = `${STORAGE_KEY}\n${JSON.stringify(serialiseState())}`;
        const copied = () => {
          storageMessage = '진행 상태를 복사했어요. 필요하면 안전한 곳에 붙여 넣으세요.';
          renderStorageNotice();
        };
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(copied).catch(() => fallbackCopy(text, copied));
          return;
        }
        fallbackCopy(text, copied);
      }

      function fallbackCopy(text, onCopied) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.append(textarea);
        textarea.select();
        try {
          if (document.execCommand('copy')) onCopied();
          else {
            storageMessage = '진행 상태를 복사하지 못했어요. 아래 저장 기록을 초기화하거나 현재 활동을 계속하세요.';
            renderStorageNotice();
          }
        } finally {
          textarea.remove();
        }
      }

      function resetStoredProgress() {
        if (!window.confirm('이 페이지의 저장된 학습 기록만 삭제하고 처음부터 시작할까요?')) return;
        try {
          window.localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          storageMessage = '저장 기록을 초기화하지 못했어요. 현재 활동은 계속할 수 있습니다.';
          renderStorageNotice();
          return;
        }
        storageBlocked = false;
        storageMessage = '';
        state = createDefaultState();
        saveState();
        render();
        elements.choiceGroups.querySelector('button')?.focus();
      }

      function restart() {
        if (!window.confirm('이 페이지의 학습 기록을 지우고 처음부터 다시 할까요?')) return;
        state = createDefaultState();
        saveState();
        render();
        elements.choiceGroups.querySelector('button')?.focus();
      }

      elements.nextButton.addEventListener('click', goToNextRound);
      elements.restartButton.addEventListener('click', restart);
      elements.resetStoredProgress.addEventListener('click', resetStoredProgress);
      elements.copyProgress.addEventListener('click', copyRecoveryState);
      window.addEventListener('pagehide', saveState);
      window.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveState();
      });

      render();
    })();
  </script>
  <script src="../shared/site-copyright.js"></script>
  <script src="../shared/page-qr.js"></script>
</body>
</html>
