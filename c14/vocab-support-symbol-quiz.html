<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f4f8f1">
    <title>상징으로 익히는 14과 어휘</title>
    <link rel="stylesheet" href="vocab-support-symbol-quiz.css">
</head>
<body>
    <nav class="topbar" aria-label="상단 이동">
        <a href="index.html">← 14과</a>
        <a href="vocabulary.html">어휘 카드</a>
        <a href="vocab-support-lab.html">유형별 활동</a>
    </nav>

    <main class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">14과 어휘 보조 활동</p>
                <h1>상징으로 익히는 14과 어휘</h1>
                <p class="hero__lead">상징의 뜻을 살펴본 뒤, 표현만 보고 어휘를 맞혀 보세요.</p>
            </div>
            <div class="hero__status" aria-label="학습 진행">
                <span><b id="study-count">0</b><small>익힌 카드</small></span>
                <span><b id="quiz-count">0</b><small>푼 문제</small></span>
                <em id="save-status" role="status">자동 저장</em>
            </div>
        </header>

        <div class="mode-tabs" role="tablist" aria-label="활동 단계">
            <button id="study-tab" class="mode-tab" type="button" role="tab" aria-controls="activity-panel" data-mode="study">
                <span>1</span> 상징 익히기
            </button>
            <button id="quiz-tab" class="mode-tab" type="button" role="tab" aria-controls="activity-panel" data-mode="quiz">
                <span>2</span> 표현 맞히기
            </button>
        </div>

        <section id="activity-panel" class="activity-panel" role="tabpanel" tabindex="-1">
            <div id="activity-mount"></div>
        </section>

        <section class="category-map" aria-labelledby="category-title">
            <div class="category-map__head">
                <div>
                    <p>28개 어휘</p>
                    <h2 id="category-title">어휘 묶음</h2>
                </div>
                <button class="reset-button" type="button" data-reset-all>기록 지우기</button>
            </div>
            <div id="category-groups" class="category-groups"></div>
        </section>

        <nav class="footer-nav" aria-label="하단 이동">
            <a href="vocabulary.html">어휘 카드로</a>
            <a href="index.html">14과 목록으로</a>
        </nav>
    </main>

    <div id="live-region" class="sr-only live-region" aria-live="polite" aria-atomic="true"></div>
    <noscript>이 활동은 자바스크립트를 켜야 사용할 수 있습니다.</noscript>
    <script src="vocab-support-symbol-quiz.js"></script>
</body>
</html>
