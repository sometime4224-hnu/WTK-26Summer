    <meta charset="UTF-8">

    <title>17과 어휘 보조자료4 | 말하는 태도 렌즈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --ink: #172033;
            --muted: #667085;
            --paper: #ffffff;
            --page: #f5f8fa;
            --line: #d8e1ea;
            --chance: #0f766e;
            --detail: #4f46e5;
            --clear: #b45309;
            --honest: #be123c;
            --tone: var(--chance);
            --shadow: 0 18px 44px rgba(17, 24, 39, 0.08);
            --topbar-height: 48px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--page);
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, #fbfdff 0%, #f5f8fa 58%, #f3f7f2 100%);
            font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
            letter-spacing: 0;
        }

        button {
            font: inherit;
            cursor: pointer;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            min-height: var(--topbar-height);
            display: grid;
            grid-template-columns: minmax(0, auto) minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid rgba(216, 225, 234, 0.92);
            backdrop-filter: blur(14px);
        }

        .topbar__links {
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 0;
            overflow-x: auto;
        }

        .topbar a {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: rgba(23, 32, 51, 0.04);
            color: var(--ink);
            padding: 0 10px;
            font-size: 0.8rem;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar__title {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #475467;
            font-size: 0.9rem;
            font-weight: 900;
        }

        .shell {
            width: min(1180px, 100% - 28px);
            margin: 0 auto;
            padding: 18px 0 34px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 18px;
            padding: 18px 0 14px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--chance);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.9rem, 4vw, 3.6rem);
            line-height: 1.08;
            letter-spacing: 0;
        }

        .hero__copy {
            max-width: 780px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.65;
            font-weight: 700;
        }

        .lens-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(84px, 1fr));
            gap: 8px;
            min-width: 420px;
        }

        .lens-chip {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--tone);
            font-size: 0.84rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .activity {
            display: grid;
            grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
            gap: 14px;
            margin-top: 16px;
        }

        .panel {
            border: 1px solid rgba(216, 225, 234, 0.95);
            border-radius: 8px;
            background: var(--paper);
            box-shadow: 0 12px 30px rgba(17, 24, 39, 0.05);
            overflow: hidden;
        }

        .panel__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 15px;
            border-bottom: 1px solid var(--line);
        }

        .panel__head h2 {
            margin: 0;
            font-size: 1.06rem;
            line-height: 1.25;
        }

        .badge {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 9px;
            border-radius: 999px;
            background: #eef4f6;
            color: #475467;
            font-size: 0.76rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .scenario-list {
            display: grid;
            gap: 8px;
            padding: 12px;
        }

        .scenario-btn {
            width: 100%;
            min-height: 74px;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 11px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: inherit;
            text-align: left;
        }

        .scenario-btn.active {
            border-color: var(--tone);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--tone) 14%, transparent);
        }

        .scenario-btn__icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: #f3f6f8;
            color: #475467;
        }

        .scenario-btn__num {
            display: none;
        }

        .scenario-btn strong {
            display: block;
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .scenario-btn span:last-child {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .workspace {
            display: grid;
            gap: 14px;
            padding: 15px;
        }

        .preview {
            display: grid;
            grid-template-columns: 164px minmax(0, 1fr);
            gap: 14px;
            min-height: 230px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 249, 252, 0.92)),
                radial-gradient(circle at 18% 24%, color-mix(in srgb, var(--tone) 14%, transparent), transparent 36%),
                radial-gradient(circle at 84% 74%, rgba(15, 118, 110, 0.08), transparent 30%);
        }

        .preview__image {
            position: relative;
            min-height: 178px;
            border-radius: 8px;
            overflow: hidden;
            background: #edf2f7;
        }

        .preview__image img {
            width: 100%;
            height: 100%;
            min-height: 178px;
            display: block;
            object-fit: cover;
        }

        .preview__content {
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 11px;
        }

        .target-sentence {
            margin: 0;
            font-size: clamp(1.35rem, 2.6vw, 2.2rem);
            line-height: 1.24;
            font-weight: 900;
            letter-spacing: 0;
        }

        .target-sentence mark {
            display: inline-flex;
            min-height: 38px;
            align-items: center;
            padding: 0 10px;
            border-radius: 8px;
            background: color-mix(in srgb, var(--tone) 13%, #fff);
            color: var(--tone);
        }

        .scenario-clue {
            margin: 0;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.55;
        }

        .focus-box {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 9px;
            align-items: center;
            padding: 10px;
            border: 1px solid color-mix(in srgb, var(--tone) 22%, var(--line));
            border-radius: 8px;
            background: color-mix(in srgb, var(--tone) 8%, #fff);
        }

        .focus-box i {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: #fff;
            color: var(--tone);
        }

        .focus-box strong {
            display: block;
            color: var(--tone);
            font-size: 0.92rem;
        }

        .focus-box span {
            display: block;
            margin-top: 2px;
            color: #475467;
            font-size: 0.84rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 9px;
        }

        .choice-btn {
            min-height: 74px;
            display: grid;
            place-items: center;
            gap: 4px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--item-tone);
            font-weight: 900;
            text-align: center;
            line-height: 1.22;
        }

        .choice-btn i {
            font-size: 1.08rem;
        }

        .choice-btn.active {
            border-color: var(--item-tone);
            background: color-mix(in srgb, var(--item-tone) 10%, #fff);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--item-tone) 14%, transparent);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-btn {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            padding: 0 13px;
            font-weight: 900;
        }

        .action-btn.primary {
            border-color: var(--tone);
            background: var(--tone);
            color: #fff;
        }

        .feedback {
            min-height: 88px;
            display: grid;
            align-content: center;
            gap: 5px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .feedback strong {
            color: var(--tone);
            font-size: 1rem;
        }

        .feedback p {
            margin: 0;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.48;
        }

        .reference {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .reference-card {
            min-height: 196px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.04);
        }

        .reference-card img {
            width: 100%;
            height: 102px;
            display: block;
            object-fit: cover;
        }

        .reference-card__body {
            padding: 11px;
        }

        .reference-card h3 {
            margin: 0;
            color: var(--item-tone);
            font-size: 1rem;
            line-height: 1.25;
        }

        .reference-card p {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.45;
            font-weight: 800;
        }

        @media (max-width: 980px) {
            .hero,
            .activity {
                grid-template-columns: 1fr;
            }

            .lens-strip {
                min-width: 0;
            }

            .reference {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 12px, 1180px);
                padding-top: 8px;
                padding-bottom: 18px;
            }

            .topbar {
                grid-template-columns: 1fr;
                min-height: 42px;
                padding: 6px;
                overflow: hidden;
            }

            .topbar__links {
                min-width: 0;
                overflow-x: auto;
                flex-wrap: nowrap;
                scrollbar-width: none;
            }

            .topbar__links::-webkit-scrollbar {
                display: none;
            }

            .topbar a {
                flex: 0 0 auto;
                min-height: 30px;
                padding: 0 9px;
                font-size: 0.78rem;
            }

            .topbar__title {
                display: none;
            }

            .hero {
                gap: 8px;
                padding: 10px 0 8px;
            }

            .eyebrow {
                margin-bottom: 4px;
                font-size: 0.68rem;
            }

            h1 {
                font-size: 1.55rem;
                line-height: 1.12;
            }

            .hero__copy {
                display: none;
            }

            .lens-strip {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
            }

            .lens-chip {
                min-height: 32px;
                gap: 4px;
                padding: 0 5px;
                font-size: 0.72rem;
            }

            .activity {
                gap: 8px;
            }

            .panel__head {
                padding: 10px;
            }

            .panel__head h2 {
                font-size: 0.98rem;
            }

            .badge {
                min-height: 24px;
                padding: 0 8px;
                font-size: 0.72rem;
            }

            .scenario-list {
                display: grid;
                grid-template-columns: repeat(8, minmax(0, 1fr));
                gap: 5px;
                padding: 0 10px 10px;
            }

            .scenario-btn {
                min-height: 38px;
                grid-template-columns: 1fr;
                place-items: center;
                padding: 0;
            }

            .scenario-btn__icon,
            .scenario-btn > span:last-child {
                display: none;
            }

            .scenario-btn__num {
                display: grid;
                width: 100%;
                height: 100%;
                place-items: center;
                color: #475467;
                font-size: 0.82rem;
                font-weight: 900;
            }

            .scenario-btn.active .scenario-btn__num {
                color: var(--tone);
            }

            .workspace {
                gap: 8px;
                padding: 10px;
            }

            .preview {
                grid-template-columns: 76px minmax(0, 1fr);
                gap: 9px;
                min-height: 0;
                padding: 9px;
            }

            .preview__image,
            .preview__image img {
                min-height: 86px;
            }

            .preview__content {
                gap: 6px;
                justify-content: flex-start;
            }

            .target-sentence {
                font-size: 1rem;
                line-height: 1.28;
            }

            .target-sentence mark {
                min-height: 28px;
                padding: 0 7px;
            }

            .scenario-clue {
                font-size: 0.78rem;
                line-height: 1.34;
            }

            .focus-box {
                grid-template-columns: auto minmax(0, 1fr);
                gap: 6px;
                padding: 7px;
            }

            .focus-box i {
                width: 28px;
                height: 28px;
                font-size: 0.86rem;
            }

            .focus-box strong {
                font-size: 0.82rem;
            }

            .focus-box span {
                margin-top: 0;
                font-size: 0.72rem;
                line-height: 1.28;
            }

            .choice-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
            }

            .choice-btn {
                min-height: 46px;
                gap: 2px;
                padding: 6px 4px;
                font-size: 0.74rem;
            }

            .choice-btn i {
                font-size: 0.9rem;
            }

            .actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }

            .action-btn {
                min-height: 36px;
                padding: 0 8px;
                font-size: 0.8rem;
            }

            #reset-btn {
                grid-column: 1 / -1;
            }

            .feedback {
                min-height: 58px;
                padding: 9px;
            }

            .feedback strong {
                font-size: 0.88rem;
            }

            .feedback p {
                font-size: 0.78rem;
                line-height: 1.34;
            }

            .reference {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
                margin-top: 8px;
            }

            .reference-card {
                min-height: 0;
            }

            .reference-card img {
                display: none;
            }

            .reference-card__body {
                padding: 8px;
            }

            .reference-card h3 {
                font-size: 0.86rem;
            }

            .reference-card p {
                margin-top: 4px;
                font-size: 0.72rem;
                line-height: 1.3;
            }
        }
    </style>
</head>

    <main class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Vocabulary Support 4</p>
                <h1>말하는 태도 렌즈</h1>
                <p class="hero__copy">같은 문장이라도 부사가 바뀌면 우연성, 정보량, 확실성, 솔직한 입장 중 어디에 초점이 있는지가 달라집니다.</p>
            </div>
            <div class="lens-strip" aria-label="태도 표현">
                <span class="lens-chip" style="--tone: var(--chance);"><i class="fa-solid fa-shuffle"></i> 우연히</span>
                <span class="lens-chip" style="--tone: var(--detail);"><i class="fa-solid fa-list-ul"></i> 자세히</span>
                <span class="lens-chip" style="--tone: var(--clear);"><i class="fa-solid fa-eye"></i> 분명히</span>
                <span class="lens-chip" style="--tone: var(--honest);"><i class="fa-solid fa-heart"></i> 솔직히</span>

        </header>

        <section class="activity" aria-label="말하는 태도 선택 활동">
            <aside class="panel">
                <div class="panel__head">
                    <h2>상황 카드</h2>
                    <span id="progress-badge" class="badge">1 / 8</span>
                </div>
                <div id="scenario-list" class="scenario-list"></div>
            </aside>

            <section class="panel">
                <div class="panel__head">
                    <h2>문장 렌즈</h2>
                    <span id="selected-badge" class="badge">우연히</span>
                </div>
                <div class="workspace">
                    <div class="preview">
                        <div class="preview__image">
                            <img id="preview-image" src="../assets/c17/vocabulary/images/cards/attitude-by-chance.webp" alt="">
                        </div>
                        <div class="preview__content">
                            <p id="target-sentence" class="target-sentence"></p>
                            <p id="scenario-clue" class="scenario-clue"></p>
                            <div class="focus-box">
                                <i id="focus-icon" class="fa-solid fa-shuffle"></i>
                                <span>
                                    <strong id="focus-title">의도하지 않음</strong>
                                    <span id="focus-copy">우연히는 계획하지 않았는데 그렇게 된 상황을 보여 줍니다.</span>
                                </span>
                            </div>
                        </div>

                    <div id="feedback" class="feedback" aria-live="polite">
                        <strong>부사를 선택하세요.</strong>
                        <p>상황의 단서를 보고 문장의 빈칸에 가장 자연스러운 부사를 넣습니다.</p>
                    </div>
                </div>
            </section>

        <section id="reference" class="reference" aria-label="말하는 태도 어휘 정리"></section>

    <script>
        const imageBasePath = "../assets/c17/vocabulary/images/cards";

        const adverbs = [
            {
                id: "by-chance",
                label: "우연히",
                color: "#0f766e",
                icon: "fa-shuffle",
                focus: "의도하지 않음",
                description: "계획하지 않았는데 그렇게 된 상황을 보여 줍니다.",
                image: `${imageBasePath}/attitude-by-chance.webp`,
                meaning: "뜻하지 않게, 어쩌다가"
            },
            {
                id: "in-detail",
                label: "자세히",
                color: "#4f46e5",
                icon: "fa-list-ul",
                focus: "정보를 세세하게",
                description: "내용을 구체적으로 알고 있거나 설명하는 상황에 어울립니다.",
                image: `${imageBasePath}/attitude-in-detail.webp`,
                meaning: "구체적이고 세세하게"
            },
            {
                id: "clearly",
                label: "분명히",
                color: "#b45309",
                icon: "fa-eye",
                focus: "확실하게",
                description: "본 것, 들은 것, 기억하는 것이 확실하다는 느낌을 줍니다.",
                image: `${imageBasePath}/attitude-clearly.webp`,
                meaning: "확실하게, 뚜렷하게"
            },
            {
                id: "honestly",
                label: "솔직히",
                color: "#be123c",
                icon: "fa-heart",
                focus: "숨기지 않는 입장",
                description: "말하는 사람의 진짜 생각이나 감정을 드러냅니다.",
                image: `${imageBasePath}/attitude-honestly.webp`,
                meaning: "숨기지 않고 정직하게"
            }
        ];

        const scenarios = [
            {
                title: "복도에서 친구들의 대화를 들었어요.",
                clue: "일부러 들으려고 한 것이 아니라 지나가다가 들었습니다.",
                sentence: "저는 그 소문을 ___ 들었어요.",
                answer: "by-chance",
                reason: "계획하지 않았는데 듣게 된 상황이므로 우연히가 자연스럽습니다."
            },
            {
                title: "선생님이 사건의 앞뒤를 설명해 주셨어요.",
                clue: "누가, 언제, 왜 그랬는지 세부 내용까지 알려 주셨습니다.",
                sentence: "선생님께서 상황을 ___ 설명해 주셨어요.",
                answer: "in-detail",
                reason: "내용을 세세하게 설명하는 상황이므로 자세히가 어울립니다."
            },
            {
                title: "저는 두 사람이 같이 있는 장면을 봤어요.",
                clue: "어두운 곳이 아니라 바로 앞에서 똑똑히 봤습니다.",
                sentence: "저는 두 사람이 같이 있는 것을 ___ 봤어요.",
                answer: "clearly",
                reason: "본 사실이 확실하다는 뜻이므로 분명히가 자연스럽습니다."
            },
            {
                title: "친구에게 제 생각을 말해야 해요.",
                clue: "좋게만 말하기보다 진짜 마음을 숨기지 않고 말하려고 합니다.",
                sentence: "___ 말하면, 저는 아직 조금 서운해요.",
                answer: "honestly",
                reason: "말하는 사람의 진짜 마음을 드러내므로 솔직히가 알맞습니다."
            },
            {
                title: "친구의 휴대전화 알림을 봤어요.",
                clue: "친구가 보여 준 것이 아니라 책상 위에 떠 있어서 보게 됐습니다.",
                sentence: "제가 그 메시지를 ___ 봤어요.",
                answer: "by-chance",
                reason: "의도하지 않고 보게 된 상황이므로 우연히가 맞습니다."
            },
            {
                title: "반장이 소문의 출처를 설명했어요.",
                clue: "처음 말한 사람과 전달 과정을 하나씩 말했습니다.",
                sentence: "반장이 소문의 과정을 ___ 말했어요.",
                answer: "in-detail",
                reason: "전달 과정을 구체적으로 말하므로 자세히가 어울립니다."
            },
            {
                title: "약속 시간을 들은 기억이 있어요.",
                clue: "아마 그런 것 같다가 아니라 정확히 기억합니다.",
                sentence: "저는 약속 시간이 3시라고 ___ 들었어요.",
                answer: "clearly",
                reason: "들은 내용이 확실하다는 판단을 말하므로 분명히가 자연스럽습니다."
            },
            {
                title: "친구의 행동에 대한 제 의견을 말해요.",
                clue: "다른 사람 눈치를 보지 않고 제 생각을 그대로 말합니다.",
                sentence: "___ 저는 그 행동이 조금 실망스러웠어요.",
                answer: "honestly",
                reason: "자기 생각을 숨기지 않고 말하는 태도이므로 솔직히가 맞습니다."
            }
        ];

        const scenarioListEl = document.getElementById("scenario-list");
        const progressBadgeEl = document.getElementById("progress-badge");
        const selectedBadgeEl = document.getElementById("selected-badge");
        const previewImageEl = document.getElementById("preview-image");
        const targetSentenceEl = document.getElementById("target-sentence");
        const scenarioClueEl = document.getElementById("scenario-clue");
        const focusIconEl = document.getElementById("focus-icon");
        const focusTitleEl = document.getElementById("focus-title");
        const focusCopyEl = document.getElementById("focus-copy");
        const choiceGridEl = document.getElementById("choice-grid");
        const feedbackEl = document.getElementById("feedback");
        const referenceEl = document.getElementById("reference");
        const checkBtn = document.getElementById("check-btn");
        const nextBtn = document.getElementById("next-btn");
        const resetBtn = document.getElementById("reset-btn");

        let currentIndex = 0;
        let selectedAdverbId = "by-chance";
        let checkedScenarios = new Set();

        function getAdverb(id) {
            return adverbs.find((item) => item.id === id);
        }

        function currentScenario() {
            return scenarios[currentIndex];
        }

        function sentenceWithAdverb(sentence, adverb) {
            return sentence.replace("___", `<mark>${adverb.label}</mark>`);
        }

        function setTone(adverb) {
            document.documentElement.style.setProperty("--tone", adverb.color);
        }

        function renderScenarioList() {
            scenarioListEl.innerHTML = scenarios.map((scenario, index) => {
                const active = index === currentIndex ? " active" : "";
                const icon = checkedScenarios.has(index) ? "fa-circle-check" : "fa-circle";
                return `
                    <button class="scenario-btn${active}" data-index="${index}" type="button">
                        <span class="scenario-btn__icon"><i class="fa-solid ${icon}"></i></span>
                        <span class="scenario-btn__num">${index + 1}</span>
                        <span>
                            <strong>${index + 1}. ${scenario.title}</strong>
                            <span>빈칸 부사 선택</span>
                        </span>
                    </button>
                `;
            }).join("");
        }

        function renderChoices() {
            choiceGridEl.innerHTML = adverbs.map((adverb) => `
                <button class="choice-btn${adverb.id === selectedAdverbId ? " active" : ""}" data-adverb="${adverb.id}" style="--item-tone: ${adverb.color};" type="button">
                    <i class="fa-solid ${adverb.icon}"></i>
                    <span>${adverb.label}</span>
                </button>
            `).join("");
        }

        function renderReference() {
            referenceEl.innerHTML = adverbs.map((adverb) => `
                <article class="reference-card" style="--item-tone: ${adverb.color};">
                    <img src="${adverb.image}" alt="">
                    <div class="reference-card__body">
                        <h3>${adverb.label}</h3>
                        <p>${adverb.meaning}<br>${adverb.focus}</p>
                    </div>
                </article>
            `).join("");
        }

        function updateSelectedAdverb(id) {
            selectedAdverbId = id;
            const adverb = getAdverb(id);
            setTone(adverb);
            selectedBadgeEl.textContent = adverb.label;
            previewImageEl.src = adverb.image;
            targetSentenceEl.innerHTML = sentenceWithAdverb(currentScenario().sentence, adverb);
            focusIconEl.className = `fa-solid ${adverb.icon}`;
            focusTitleEl.textContent = adverb.focus;
            focusCopyEl.textContent = adverb.description;
            renderChoices();
        }

        function showScenario(index) {
            currentIndex = index;
            const scenario = currentScenario();
            progressBadgeEl.textContent = `${currentIndex + 1} / ${scenarios.length}`;
            scenarioClueEl.textContent = scenario.clue;
            feedbackEl.innerHTML = `
                <strong>부사를 선택하세요.</strong>
                <p>상황 단서가 의도, 정보량, 확실성, 속마음 중 무엇을 가리키는지 봅니다.</p>
            `;
            updateSelectedAdverb("by-chance");
            renderScenarioList();
        }

        function checkAnswer() {
            const scenario = currentScenario();
            const answer = getAdverb(scenario.answer);
            const selected = getAdverb(selectedAdverbId);
            checkedScenarios.add(currentIndex);
            if (selected.id === answer.id) {
                feedbackEl.innerHTML = `
                    <strong>맞아요. ${answer.label}</strong>
                    <p>${scenario.reason}</p>
                `;
            } else {
                feedbackEl.innerHTML = `
                    <strong>다시 볼 표현: ${answer.label}</strong>
                    <p>${scenario.reason}</p>
                `;
            }
            updateSelectedAdverb(answer.id);
            renderScenarioList();
        }

        function nextScenario() {
            showScenario((currentIndex + 1) % scenarios.length);
        }

        scenarioListEl.addEventListener("click", (event) => {
            const button = event.target.closest(".scenario-btn");
            if (!button) return;
            showScenario(Number(button.dataset.index));
        });

        choiceGridEl.addEventListener("click", (event) => {
            const button = event.target.closest(".choice-btn");
            if (!button) return;
            updateSelectedAdverb(button.dataset.adverb);
        });

        checkBtn.addEventListener("click", checkAnswer);
        nextBtn.addEventListener("click", nextScenario);
        resetBtn.addEventListener("click", () => {
            checkedScenarios = new Set();
            showScenario(0);
        });

        renderReference();
        showScenario(0);
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
