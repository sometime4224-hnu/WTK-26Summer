    <title>12과 문법 3 보조활동 1 | -(으)ㄴ/는 모양이다 설명 이미지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg: #f5f8f6;
            --panel: #ffffff;
            --ink: #162033;
            --muted: #5f6f86;
            --line: #d7e3e2;
            --soft: #f8fafc;
            --teal: #0f766e;
            --teal-dark: #115e59;
            --blue: #1d4ed8;
            --amber: #b45309;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--ink);
            background: var(--bg);
            font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        }

        img {
            display: block;
            max-width: 100%;
        }

        button,
        a {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 52px;
            padding: 9px max(14px, calc((100vw - 1320px) / 2 + 14px));
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .topbar__links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .topbar a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 0 10px;
            border-radius: 8px;
            color: var(--teal-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .topbar a:hover {
            background: #ecfdf5;
        }

        .topbar strong {
            color: #475569;
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
        }

        .shell {
            width: min(1320px, calc(100% - 24px));
            margin: 10px auto 26px;
        }

        .viewer {
            display: grid;
            grid-template-columns: 258px minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-height: calc(100dvh - 88px);
        }

        .rail,
        .stage {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .rail {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
        }

        .rail__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .eyebrow {
            margin: 0 0 4px;
            color: var(--teal);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        h1 {
            color: #0f172a;
            font-size: 24px;
            line-height: 1.2;
        }

        h2 {
            color: #0f172a;
            font-size: 19px;
            line-height: 1.3;
        }

        .count {
            flex: 0 0 auto;
            min-width: 48px;
            padding: 5px 8px;
            border-radius: 8px;
            background: #fffbeb;
            color: var(--amber);
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .thumb-list {
            display: grid;
            gap: 8px;
            overflow: auto;
            padding-right: 2px;
        }

        .thumb-button {
            display: grid;
            grid-template-columns: 82px minmax(0, 1fr);
            align-items: center;
            gap: 9px;
            width: 100%;
            min-height: 76px;
            padding: 7px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: #1f2937;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
        }

        .thumb-button:hover,
        .thumb-button[aria-current="true"] {
            border-color: #14b8a6;
            background: #f0fdfa;
            box-shadow: 0 10px 22px rgba(20, 184, 166, 0.12);
        }

        .thumb-button:focus-visible,
        .icon-button:focus-visible {
            outline: 3px solid rgba(20, 184, 166, 0.35);
            outline-offset: 2px;
        }

        .thumb-button img {
            width: 82px;
            height: 46px;
            aspect-ratio: 1672 / 941;
            border: 1px solid #dce6ee;
            border-radius: 6px;
            object-fit: contain;
            background: var(--soft);
        }

        .thumb-title {
            display: block;
            color: #0f172a;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.35;
        }

        .thumb-meta {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.35;
        }

        .rail__nav {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: auto;
        }

        .rail__link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 38px;
            padding: 0 9px;
            border: 1px solid #ccfbf1;
            border-radius: 8px;
            background: #ffffff;
            color: var(--teal-dark);
            font-size: 12px;
            font-weight: 900;
            text-decoration: none;
        }

        .stage {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .stage__bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 2px 8px;
        }

        .stage__title {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-width: 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #075985;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .icon-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            text-decoration: none;
        }

        .icon-button:hover {
            border-color: #14b8a6;
            color: var(--teal-dark);
            background: #f0fdfa;
        }

        .button-symbol {
            font-size: 21px;
            font-weight: 900;
            line-height: 1;
        }

        .stage__viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            overflow: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .stage__image {
            width: 100%;
            height: auto;
            max-height: calc(100dvh - 154px);
            object-fit: contain;
            background: #ffffff;
        }

        @media (max-width: 900px) {
            .shell {
                width: min(100% - 16px, 1320px);
                margin-top: 8px;
            }

            .viewer {
                grid-template-columns: 1fr;
                min-height: 0;
            }

            .rail {
                padding: 10px;
            }

            .thumb-list {
                grid-template-columns: repeat(4, minmax(146px, 1fr));
                overflow-x: auto;
                padding-bottom: 2px;
            }

            .thumb-button {
                grid-template-columns: 1fr;
                align-content: start;
                min-height: 118px;
            }

            .thumb-button img {
                width: 100%;
                height: auto;
            }

            .rail__nav {
                display: flex;
                flex-wrap: wrap;
                margin-top: 0;
            }

            .stage__image {
                max-height: none;
            }
        }

        @media (max-width: 520px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            h1 {
                font-size: 21px;
            }

            h2 {
                font-size: 17px;
            }

            .stage__bar {
                align-items: flex-start;
                flex-direction: column;
            }

            .icon-actions {
                width: 100%;
            }

            .icon-button {
                flex: 1 1 0;
            }
        }
    </style>
</head>
<body>

    <main class="shell">
        <section class="viewer" aria-labelledby="activityTitle">
            <aside class="rail" aria-label="이미지 목록">
                <header class="rail__header">
                    <div>
                        <p class="eyebrow">Grammar 3 Support 1</p>
                        <h1 id="activityTitle">문법 3 보조활동 1</h1>
                    </div>
                    <span class="count"><span id="currentNo">1</span>/4</span>
                </header>

                <div class="stage__bar">
                    <div class="stage__title">
                        <span id="stageTag" class="tag">개념</span>
                        <h2 id="stageTitle">보고 듣고 알고 나서 추측할 때</h2>
                    </div>
                    <div class="icon-actions">
                        <button id="prevBtn" class="icon-button" type="button" aria-label="이전 이미지" title="이전 이미지">
                            <span class="button-symbol" aria-hidden="true">&lsaquo;</span>
                        </button>
                        <button id="nextBtn" class="icon-button" type="button" aria-label="다음 이미지" title="다음 이미지">
                            <span class="button-symbol" aria-hidden="true">&rsaquo;</span>
                        </button>
                        <a id="openAsset" class="icon-button" href="../assets/c12/grammar/images/grammar3-support-activity1/01-inference-overview.webp" target="_blank" rel="noopener" aria-label="새 탭에서 열기" title="새 탭에서 열기">
                            <span class="button-symbol" aria-hidden="true">&#8599;</span>
                        </a>
                    </div>
                </div>
                <div class="stage__viewport">
                    <img
                        id="stageImage"
                        class="stage__image"
                        data-testid="c12-grammar3-support-main-image"
                        src="../assets/c12/grammar/images/grammar3-support-activity1/01-inference-overview.webp"
                        alt="V-(으)ㄴ/는 모양이다를 보고 듣고 알고 나서 추측할 때 쓰는 표현으로 설명하는 이미지"
                        width="1672"
                        height="941"
                        decoding="async" />
                </div>
            </section>
        </section>
    </main>

    <script>
        const ASSET_BASE = "../assets/c12/grammar/images/grammar3-support-activity1/";
        const ITEMS = [
            {
                tag: "개념",
                title: "보고 듣고 알고 나서 추측할 때",
                file: "01-inference-overview.webp",
                alt: "V-(으)ㄴ/는 모양이다를 보고 듣고 알고 나서 추측할 때 쓰는 표현으로 설명하는 이미지"
            },
            {
                tag: "형태",
                title: "형태와 만들기",
                file: "02-form-guide.webp",
                alt: "V-는 모양이다, V-(으)ㄴ 모양이다, V-(으)ㄹ 모양이다의 현재 과거 미래 형태를 설명하는 이미지"
            },
            {
                tag: "비교",
                title: "비슷한 표현과 차이",
                file: "03-expression-compare.webp",
                alt: "모양이다와 -나 보다의 근거와 말투 차이를 비교하는 이미지"
            },
            {
                tag: "연습",
                title: "연습해 봐요",
                file: "04-practice.webp",
                alt: "그림과 단서를 보고 V-(으)ㄴ/는 모양이다 문장을 완성하는 연습 이미지"
            }
        ];

        const refs = {
            currentNo: document.getElementById("currentNo"),
            thumbList: document.getElementById("thumbList"),
            stageTag: document.getElementById("stageTag"),
            stageTitle: document.getElementById("stageTitle"),
            stageImage: document.getElementById("stageImage"),
            openAsset: document.getElementById("openAsset"),
            prevBtn: document.getElementById("prevBtn"),
            nextBtn: document.getElementById("nextBtn")
        };

        let currentIndex = 0;

        function assetPath(item) {
            return ASSET_BASE + item.file;
        }

        function renderThumbs() {
            refs.thumbList.innerHTML = ITEMS.map((item, index) => `
                <button class="thumb-button" type="button" data-index="${index}" aria-current="${index === currentIndex ? "true" : "false"}">
                    <img src="${assetPath(item)}" alt="" width="1672" height="941" loading="eager" decoding="async" />
                    <span>
                        <span class="thumb-title">${index + 1}. ${item.title}</span>
                        <span class="thumb-meta">${item.tag}</span>
                    </span>
                </button>
            `).join("");
        }

        function setCurrent(index) {
            currentIndex = (index + ITEMS.length) % ITEMS.length;
            const item = ITEMS[currentIndex];
            const src = assetPath(item);

            refs.currentNo.textContent = String(currentIndex + 1);
            refs.stageTag.textContent = item.tag;
            refs.stageTitle.textContent = item.title;
            refs.stageImage.src = src;
            refs.stageImage.alt = item.alt;
            refs.openAsset.href = src;

            refs.thumbList.querySelectorAll(".thumb-button").forEach((button, buttonIndex) => {
                button.setAttribute("aria-current", buttonIndex === currentIndex ? "true" : "false");
            });
        }

        renderThumbs();
        refs.thumbList.addEventListener("click", (event) => {
            const button = event.target.closest(".thumb-button");
            if (!button) return;
            setCurrent(Number(button.dataset.index));
        });

        refs.prevBtn.addEventListener("click", () => setCurrent(currentIndex - 1));
        refs.nextBtn.addEventListener("click", () => setCurrent(currentIndex + 1));
        window.addEventListener("keydown", (event) => {
            if (event.key === "ArrowLeft") setCurrent(currentIndex - 1);
            if (event.key === "ArrowRight") setCurrent(currentIndex + 1);
        });
    </script>
