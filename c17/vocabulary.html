        :root {

        .topbar {

        .shell {

        .hero {

            align-items: end;
            gap: 20px;
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--brand);
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;

        h1 {

            font-size: clamp(2rem, 4.5vw, 4rem);
            line-height: 1.04;

        .hero__subtitle {
            max-width: 720px;
            margin: 14px 0 0;
            color: var(--muted);
            font-size: clamp(1rem, 1.6vw, 1.15rem);

        .hero__stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(92px, 1fr));
            gap: 10px;
            min-width: 220px;

        .stat {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.04);

        .stat strong {
            display: block;
            font-size: 1.55rem;
            line-height: 1;

        .stat span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 20px 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.76);
        }

        .segmented,
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .segmented button,
        .category-filter button,
        .control-btn {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: #344054;
            font-weight: 800;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;

        .segmented button {
            min-width: 104px;
            padding: 0 14px;

        .category-filter button {
            min-width: 90px;
            padding: 0 12px;
            font-size: 0.9rem;
        }

        .segmented button:hover,
        .category-filter button:hover,
        .control-btn:hover {
            transform: translateY(-1px);
            border-color: #98a2b3;
        }

        .segmented button.active,
        .category-filter button.active {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;

        .search {
            position: relative;
            width: min(100%, 330px);

        .search i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);

        .search input {
            width: 100%;
            min-height: 42px;
            padding: 0 14px 0 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);

        .search input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .view {
            display: none;

        .view.active {
            display: block;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 14px;
        }

        .vocab-card {
            min-height: 430px;
            perspective: 1000px;
        }

        .vocab-card__inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 430px;
            transform-style: preserve-3d;
            transition: transform 0.45s ease;
        }

        .vocab-card.is-flipped .vocab-card__inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 12px 28px rgba(17, 24, 39, 0.06);
            backface-visibility: hidden;
        }

        .card-face.back {
            transform: rotateY(180deg);
            justify-content: space-between;
            background: #fdfefe;
        }

        .visual-slot {
            display: grid;
            place-items: center;
            min-height: 0;
            height: 200px;
            border-radius: 8px;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(217, 119, 6, 0.12)),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.78) 0 10px, rgba(255, 255, 255, 0.42) 10px 20px);
            border: 1px solid rgba(217, 225, 236, 0.78);
        }

        .visual-slot[data-category="possibility"] {
            background:
                linear-gradient(135deg, rgba(79, 70, 229, 0.13), rgba(15, 118, 110, 0.12)),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.78) 0 10px, rgba(255, 255, 255, 0.42) 10px 20px);
        }

        .visual-slot[data-category="attitude"] {
            background:
                linear-gradient(135deg, rgba(217, 119, 6, 0.14), rgba(190, 18, 60, 0.1)),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.78) 0 10px, rgba(255, 255, 255, 0.42) 10px 20px);
        }

        .visual-slot[data-category="repair"] {
            background:
                linear-gradient(135deg, rgba(190, 18, 60, 0.11), rgba(15, 118, 110, 0.12)),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.78) 0 10px, rgba(255, 255, 255, 0.42) 10px 20px);
        }

        .visual-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #fffaf0;
        }

        .visual-initial {
            width: 64px;
            height: 64px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.86);
            color: var(--brand-dark);
            font-size: 1.45rem;
            font-weight: 900;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);

            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .word {
            margin: 0;
            font-size: clamp(1.25rem, 2.5vw, 1.7rem);
            font-weight: 900;
            line-height: 1.22;
            overflow-wrap: anywhere;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            width: max-content;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #e8f3f1;
            color: var(--brand-dark);
            font-size: 0.78rem;
            font-weight: 900;
            white-space: nowrap;

        .category-badge[data-category="possibility"] {

        .category-badge[data-category="attitude"] {
            background: #fff7ed;

        .category-badge[data-category="repair"] {
            background: #fff1f2;
            color: var(--rose);
        }

        .example {
            margin: auto 0 0;
            color: #475467;
            line-height: 1.58;
            font-weight: 600;
        }

        .definition {
            margin: 0;
            color: #344054;
            font-size: 1.02rem;
            line-height: 1.65;
            font-weight: 700;
        }

        .english {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .flip-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 36px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: #344054;
            font-size: 0.86rem;
            font-weight: 900;
        }

        .list-panel {
            display: grid;
            gap: 18px;
            min-width: 0;
        }

        .category-section {
            min-width: 0;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        .category-section:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .category-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 10px;
        }

        .category-heading h2 {
            margin: 0;
            font-size: 1.28rem;
        }

        .table-wrap {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        table {
            width: 100%;
            min-width: 720px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            color: #475467;
            font-size: 0.84rem;
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        td:first-child {
            font-weight: 900;
            color: var(--ink);
            white-space: nowrap;
        }

        .quiz-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 18px;
            align-items: start;
        }

        .quiz-stage,
        .progress-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 12px 28px rgba(17, 24, 39, 0.05);
        }

        .quiz-stage {
            padding: 22px;
        }

        .quiz-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            color: var(--muted);
            font-weight: 900;
        }

        .quiz-question {
            min-height: 96px;
            margin: 18px 0;
            padding: 18px;
            border-radius: 8px;
            background: var(--soft);
            color: var(--ink);
            font-size: clamp(1.15rem, 2.5vw, 1.55rem);
            line-height: 1.55;
            font-weight: 900;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .option-btn {
            min-height: 58px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            font-weight: 900;
            text-align: left;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--brand);
        }

        .option-btn.correct {
            border-color: #16a34a;
            background: #dcfce7;
        }

        .option-btn.wrong {
            border-color: #e11d48;
            background: #ffe4e6;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .quiz-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .control-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 14px;
        }

        .control-btn.primary {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        .control-btn.primary:hover {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
        }

        .feedback {
            min-height: 30px;
            margin-top: 12px;
            color: #475467;
            font-weight: 900;
        }

        .feedback.good {
            color: #15803d;
        }

        .feedback.bad {
            color: #be123c;
        }

        .progress-panel {
            padding: 16px;
        }

        .score {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .score div {
            padding: 12px;
            border-radius: 8px;
            background: #f8fafc;
        }

        .score strong {
            display: block;
            font-size: 1.45rem;
        }

        .score span {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .mini-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .mini-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 34px;
            padding: 7px 9px;
            border-radius: 8px;
            background: #f8fafc;
            color: #667085;
            font-size: 0.88rem;
            font-weight: 800;
        }

        .mini-item.done {
            color: #15803d;
            background: #f0fdf4;
        }

        .empty-state {
            display: none;
            padding: 30px;
            border: 1px dashed #b8c4d4;
            border-radius: 8px;
            color: var(--muted);
            text-align: center;
            font-weight: 800;
        }

        .empty-state.active {
            display: block;
        }

        @media (max-width: 900px) {
            .hero,
            .quiz-layout {
                grid-template-columns: 1fr;
            }

            .hero__stats {
                min-width: 0;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 20px, 1180px);
                margin-top: 12px;
            }

            .hero {
                padding-top: 16px;
            }

            .toolbar {
                align-items: stretch;
            }

            .segmented,
            .category-filter,
            .search {
                width: 100%;
            }

            .segmented {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .segmented button,
            .category-filter button {
                min-width: 0;
            }

            .category-filter {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .word-grid {
                grid-template-columns: 1fr;
            }

            .vocab-card,
            .vocab-card__inner {
                min-height: 460px;
            }

            .visual-slot {
                height: 220px;
            }

            .quiz-options {
                grid-template-columns: 1fr;
            }
        }
    </style>

        const cardImageBasePath = "../assets/c17/vocabulary/images/cards";

        const vocabulary = [
            {
                id: "rumor-appear",

                korean: "소문을 퍼뜨리다",
                meaning: "이야기를 여기저기에 전하다",
                english: "to spread a rumor",
                example: "확인하지 않은 소문을 퍼뜨리면 안 돼요.",

            },
            {

                english: "to have no reason for something; not possible",
                example: "두 사람이 헤어졌다는 말은 그럴 리가 없어요.",

            },
            {

                example: "그 이야기는 아직도 믿어지지 않아요.",
                image: `${cardImageBasePath}/possibility-hard-to-believe.webp`
            },
            {

                korean: "그럴 수 있다",

                example: "바쁘면 약속을 잊을 수도 있어요. 그럴 수 있죠.",

            },

            },

                image: `${cardImageBasePath}/attitude-in-detail.webp`
            },
            {
                id: "clearly",

                korean: "분명히",
                meaning: "확실하게, 뚜렷하게",

                example: "저는 분명히 그 사람을 봤어요.",

            },
            {
                id: "honestly",
                category: "attitude",
                korean: "솔직히",
                meaning: "숨기지 않고 정직하게",
                english: "frankly; honestly",
                example: "솔직히 말해서 저는 믿기 어려워요.",
                image: `${cardImageBasePath}/attitude-honestly.webp`
            },
            {
                id: "disappointed",
                category: "repair",
                korean: "실망하다",
                meaning: "기대와 달라 마음이 상하다",
                english: "to be disappointed",
                example: "친구가 거짓말해서 너무 실망했어요.",
                image: `${cardImageBasePath}/repair-disappointed.webp`
            },
            {
                id: "argue",
                category: "repair",
                korean: "다투다",
                meaning: "서로 말이나 행동으로 싸우다",
                english: "to argue",
                example: "오해 때문에 두 사람이 다퉜어요.",
                image: `${cardImageBasePath}/repair-argue.webp`
            },
            {
                id: "misunderstand",
                category: "repair",
                korean: "오해하다",
                meaning: "잘못 이해하다",
                english: "to misunderstand",
                example: "제 말을 오해하지 마세요.",
                image: `${cardImageBasePath}/repair-misunderstand.webp`
            },
            {
                id: "solve-misunderstanding",
                category: "repair",
                korean: "오해를 풀다",
                meaning: "잘못 이해한 것을 바로잡다",
                english: "to solve a misunderstanding",
                example: "서로 이야기해서 오해를 풀었어요.",
                image: `${cardImageBasePath}/repair-solve-reconcile.webp`
            },
            {
                id: "reconcile",
                category: "repair",
                korean: "화해하다",
                meaning: "다툰 뒤 관계를 다시 좋게 하다",
                english: "to reconcile",
                example: "두 사람은 다시 화해했어요.",
                image: `${cardImageBasePath}/repair-solve-reconcile.webp`
            }
        ];

        const categories = [
            { id: "all", label: "전체", icon: "fa-layer-group" },
            { id: "rumor", label: "소문", icon: "fa-comments" },
            { id: "possibility", label: "가능성", icon: "fa-scale-balanced" },
            { id: "attitude", label: "태도", icon: "fa-magnifying-glass-chart" },
            { id: "repair", label: "오해·화해", icon: "fa-handshake" }
        ];

        const categoryLabels = Object.fromEntries(categories.map((category) => [category.id, category.label]));
        let activeCategory = "all";
        let activeView = "cards";
        let quizItems = [];
        let quizIndex = 0;
        let correctCount = 0;
        let answeredCurrent = false;

        const totalCountEl = document.getElementById("total-count");
        const categoryFilterEl = document.getElementById("category-filter");
        const searchInputEl = document.getElementById("search-input");
        const wordGridEl = document.getElementById("word-grid");
        const cardsEmptyEl = document.getElementById("cards-empty");
        const listPanelEl = document.getElementById("list-panel");
        const quizProgressEl = document.getElementById("quiz-progress");
        const quizQuestionEl = document.getElementById("quiz-question");
        const quizOptionsEl = document.getElementById("quiz-options");
        const quizFeedbackEl = document.getElementById("quiz-feedback");
        const nextQuestionBtn = document.getElementById("next-question-btn");
        const restartQuizBtn = document.getElementById("restart-quiz-btn");
        const correctCountEl = document.getElementById("correct-count");
        const remainingCountEl = document.getElementById("remaining-count");
        const quizWordListEl = document.getElementById("quiz-word-list");

        function getInitials(word) {
            return word
                .replace(/\s/g, "")
                .split("")
                .slice(0, 2)
                .join("");
        }

        function shuffle(items) {
            const copied = [...items];
            for (let i = copied.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }

        function getFilteredVocabulary() {
            const query = searchInputEl.value.trim().toLowerCase();
            return vocabulary.filter((item) => {
                const inCategory = activeCategory === "all" || item.category === activeCategory;
                const inSearch = !query || [item.korean, item.meaning, item.english, item.example]
                    .join(" ")
                    .toLowerCase()
                    .includes(query);
                return inCategory && inSearch;
            });
        }

        function renderCategoryFilter() {
            categoryFilterEl.innerHTML = categories.map((category) => `
                <button class="${category.id === activeCategory ? "active" : ""}" data-category="${category.id}" type="button">
                    <i class="fa-solid ${category.icon}"></i> ${category.label}
                </button>
            `).join("");
        }

        function renderVisual(item) {
            if (item.image) {
                return `<img src="${item.image}" alt="${item.korean}">`;
            }

            return `<span class="visual-initial">${getInitials(item.korean)}</span>`;
        }

        function renderCards() {
            const filtered = getFilteredVocabulary();
            cardsEmptyEl.classList.toggle("active", filtered.length === 0);
            wordGridEl.innerHTML = filtered.map((item) => `
                <article class="vocab-card" data-id="${item.id}">
                    <div class="vocab-card__inner">
                        <div class="card-face front">
                            <div class="visual-slot" data-category="${item.category}">
                                ${renderVisual(item)}
                            </div>
                            <div class="word-row">
                                <h2 class="word">${item.korean}</h2>
                                <span class="category-badge" data-category="${item.category}">${categoryLabels[item.category]}</span>
                            </div>
                            <p class="example">${item.example}</p>
                            <button class="flip-btn" type="button"><i class="fa-solid fa-rotate"></i> 뜻</button>
                        </div>
                        <div class="card-face back">
                            <span class="category-badge" data-category="${item.category}">${categoryLabels[item.category]}</span>
                            <h2 class="word">${item.korean}</h2>
                            <p class="definition">${item.meaning}</p>
                            <p class="english">${item.english}</p>
                            <button class="flip-btn" type="button"><i class="fa-solid fa-arrow-left"></i> 카드</button>
                        </div>
                    </div>
                </article>
            `).join("");
        }

        function renderList() {
            const query = searchInputEl.value.trim().toLowerCase();
            const visibleCategories = categories
                .filter((category) => category.id !== "all")
                .filter((category) => activeCategory === "all" || category.id === activeCategory);
            const sections = visibleCategories.map((category) => {
                const items = vocabulary
                    .filter((item) => item.category === category.id)
                    .filter((item) => !query || [item.korean, item.meaning, item.english, item.example]
                        .join(" ")
                        .toLowerCase()
                        .includes(query));

                if (items.length === 0) return "";

                return `
                    <section class="category-section">
                        <div class="category-heading">
                            <h2>${category.label}</h2>
                            <span class="category-badge" data-category="${category.id}">${items.length}개</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>어휘</th>
                                        <th>학습용 의미</th>
                                        <th>영어</th>
                                        <th>예문</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${items.map((item) => `
                                        <tr>
                                            <td>${item.korean}</td>
                                            <td>${item.meaning}</td>
                                            <td>${item.english}</td>
                                            <td>${item.example}</td>
                                        </tr>
                                    `).join("")}
                                </tbody>
                            </table>
                        </div>
                    </section>
                `;
            }).join("");

            listPanelEl.innerHTML = sections || '<div class="empty-state active">검색 결과가 없습니다.</div>';
        }

        function makeOptions(answer) {
            const distractors = shuffle(vocabulary.filter((item) => item.id !== answer.id)).slice(0, 3);
            return shuffle([answer, ...distractors]);
        }

        function startQuiz() {
            quizItems = shuffle(vocabulary);
            quizIndex = 0;
            correctCount = 0;
            answeredCurrent = false;
            renderQuizWordList();
            renderQuizQuestion();
        }

        function renderQuizWordList() {
            quizWordListEl.innerHTML = quizItems.map((item, index) => `
                <div class="mini-item" data-index="${index}">
                    <span>${item.korean}</span>
                    <i class="fa-solid fa-circle"></i>
                </div>
            `).join("");
        }

        function renderQuizQuestion() {
            const item = quizItems[quizIndex];
            const options = makeOptions(item);
            answeredCurrent = false;
            quizFeedbackEl.textContent = "";
            quizFeedbackEl.className = "feedback";
            quizProgressEl.textContent = `문제 ${quizIndex + 1} / ${quizItems.length}`;
            quizQuestionEl.textContent = item.meaning;
            correctCountEl.textContent = correctCount;
            remainingCountEl.textContent = Math.max(quizItems.length - quizIndex, 0);
            nextQuestionBtn.disabled = true;
            nextQuestionBtn.innerHTML = quizIndex === quizItems.length - 1
                ? '<i class="fa-solid fa-check"></i> 완료'
                : '<i class="fa-solid fa-arrow-right"></i> 다음';
            quizOptionsEl.innerHTML = options.map((option) => `
                <button class="option-btn" data-id="${option.id}" type="button">${option.korean}</button>
            `).join("");
        }

        function answerQuiz(selectedId) {
            if (answeredCurrent) return;

            const answer = quizItems[quizIndex];
            const isCorrect = selectedId === answer.id;
            answeredCurrent = true;
            nextQuestionBtn.disabled = false;

            if (isCorrect) {
                correctCount += 1;
                quizFeedbackEl.textContent = "정답입니다.";
                quizFeedbackEl.className = "feedback good";
            } else {
                quizFeedbackEl.textContent = `정답: ${answer.korean}`;
                quizFeedbackEl.className = "feedback bad";
            }

            correctCountEl.textContent = correctCount;

            quizOptionsEl.querySelectorAll(".option-btn").forEach((button) => {
                button.disabled = true;
                if (button.dataset.id === answer.id) {
                    button.classList.add("correct");
                } else if (button.dataset.id === selectedId) {
                    button.classList.add("wrong");
                }
            });

            const miniItem = quizWordListEl.querySelector(`[data-index="${quizIndex}"]`);
            if (miniItem) {
                miniItem.classList.add("done");
                miniItem.querySelector("i").className = isCorrect
                    ? "fa-solid fa-check"
                    : "fa-solid fa-minus";
            }
        }

        function nextQuestion() {
            if (!answeredCurrent) return;
            if (quizIndex >= quizItems.length - 1) {
                quizQuestionEl.textContent = `완료: ${quizItems.length}문제 중 ${correctCount}문제 정답`;
                quizOptionsEl.innerHTML = "";
                quizFeedbackEl.textContent = "다시 풀면서 헷갈린 표현만 한 번 더 확인해 보세요.";
                quizFeedbackEl.className = "feedback";
                nextQuestionBtn.disabled = true;
                remainingCountEl.textContent = 0;
                return;
            }
            quizIndex += 1;
            renderQuizQuestion();
        }

        function switchView(viewName) {
            activeView = viewName;
            document.querySelectorAll(".segmented button").forEach((button) => {
                button.classList.toggle("active", button.dataset.view === viewName);
            });
            document.querySelectorAll(".view").forEach((view) => {
                view.classList.remove("active");
            });
            document.getElementById(`${viewName}-view`).classList.add("active");

            if (viewName === "quiz" && quizItems.length === 0) {
                startQuiz();
            }
        }

        function bindEvents() {
            document.querySelector(".segmented").addEventListener("click", (event) => {
                const button = event.target.closest("button[data-view]");
                if (!button) return;
                switchView(button.dataset.view);
            });

            categoryFilterEl.addEventListener("click", (event) => {
                const button = event.target.closest("button[data-category]");
                if (!button) return;
                activeCategory = button.dataset.category;
                renderCategoryFilter();
                renderCards();
                renderList();
            });

            searchInputEl.addEventListener("input", () => {
                renderCards();
                renderList();
            });

            wordGridEl.addEventListener("click", (event) => {
                const button = event.target.closest(".flip-btn");
                const card = event.target.closest(".vocab-card");
                if (!button || !card) return;
                card.classList.toggle("is-flipped");
            });

            quizOptionsEl.addEventListener("click", (event) => {
                const button = event.target.closest(".option-btn");
                if (!button) return;
                answerQuiz(button.dataset.id);
            });

            nextQuestionBtn.addEventListener("click", nextQuestion);
            restartQuizBtn.addEventListener("click", startQuiz);
        }

        function init() {
            totalCountEl.textContent = vocabulary.length;
            renderCategoryFilter();
            renderCards();
            renderList();
            bindEvents();
        }

        init();
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
