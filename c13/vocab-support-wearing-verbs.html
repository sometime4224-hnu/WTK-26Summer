<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>13과 어휘 보조 | 의류·장신구 착용 동사</title>
    <link rel="stylesheet" href="../shared/design-tokens.css" />
    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --viewer-bg: #f7fafc;
            --viewer-panel: rgba(255, 255, 255, 0.96);
            --viewer-line: rgba(148, 163, 184, 0.34);
            --viewer-ink: #172033;
            --viewer-muted: #64748b;
            --viewer-accent: #0f766e;
            --viewer-warm: #f97316;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-padding-top: 52px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--viewer-ink);
            background:
                linear-gradient(135deg, rgba(240, 253, 250, 0.96) 0%, rgba(248, 250, 252, 0.98) 46%, rgba(255, 247, 237, 0.98) 100%);
            font-family: var(--font-sans, "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(215, 224, 234, 0.92);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
        }

        .topbar a,
        .topbar span {
            color: var(--viewer-accent);
            font-size: 12px;
            font-weight: 900;
            line-height: 1.1;
            text-decoration: none;
            white-space: nowrap;
        }

        .topbar span {
            color: var(--viewer-muted);
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 16px auto 34px;
            display: grid;
            gap: 14px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 14px;
            border: 1px solid var(--viewer-line);
            border-radius: 8px;
            padding: 16px 18px;
            background: var(--viewer-panel);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.07);
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--viewer-warm);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            line-height: 1.16;
        }

        .hero__meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            border: 1px solid var(--viewer-line);
            border-radius: 999px;
            padding: 0 11px;
            background: #fff;
            color: var(--viewer-muted);
            font-size: 12px;
            font-weight: 900;
        }

        .viewer {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .tabs {
            display: grid;
            gap: 10px;
            position: sticky;
            top: 62px;
            border: 1px solid var(--viewer-line);
            border-radius: 8px;
            padding: 12px;
            background: var(--viewer-panel);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
        }

        .tab {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            min-height: 56px;
            border: 1px solid #d7e0ea;
            border-radius: 8px;
            padding: 9px 10px;
            background: #fff;
            color: #334155;
            font: inherit;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }

        .tab:hover {
            border-color: rgba(15, 118, 110, 0.38);
        }

        .tab[aria-selected="true"] {
            border-color: rgba(15, 118, 110, 0.46);
            background: #f0fdfa;
            box-shadow: 0 10px 22px rgba(15, 118, 110, 0.1);
        }

        .tab__number {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e0f2fe;
            color: #075985;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .tab[aria-selected="true"] .tab__number {
            background: var(--viewer-accent);
            color: #fff;
        }

        .tab__title {
            display: block;
            min-width: 0;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.25;
        }

        .tab__sub {
            display: block;
            margin-top: 3px;
            color: var(--viewer-muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.25;
        }

        .figure-panel {
            border: 1px solid var(--viewer-line);
            border-radius: 8px;
            padding: 12px;
            background: var(--viewer-panel);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.07);
        }

        .figure-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .figure-title {
            margin: 0;
            font-size: 22px;
            line-height: 1.25;
        }

        .open-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            border: 1px solid #fed7aa;
            border-radius: 999px;
            padding: 0 13px;
            background: #fff7ed;
            color: #9a3412;
            font-size: 12px;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .image-wrap {
            display: grid;
            place-items: center;
            min-height: 420px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            overflow: auto;
        }

        .image-wrap img {
            display: block;
            width: min(900px, 100%);
            height: auto;
            background: #fff;
        }

        @media (max-width: 820px) {
            .shell {
                width: min(100% - 14px, 1180px);
                margin-top: 8px;
                gap: 10px;
            }

            .hero {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 9px;
                padding: 10px 12px;
            }

            h1 {
                font-size: 24px;
                line-height: 1.14;
            }

            .hero__meta {
                justify-content: flex-start;
                gap: 6px;
            }

            .pill {
                min-height: 30px;
                padding: 0 9px;
                font-size: 11px;
            }

            .viewer {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .tabs {
                position: static;
                display: flex;
                gap: 7px;
                overflow-x: auto;
                padding: 7px;
                scrollbar-width: none;
            }

            .tabs::-webkit-scrollbar {
                display: none;
            }

            .tab {
                flex: 0 0 188px;
                min-height: 52px;
                gap: 8px;
                padding: 7px 8px;
            }

            .tab__title {
                font-size: 13px;
            }

            .tab__sub {
                font-size: 10px;
            }

            .figure-panel {
                padding: 8px;
            }

            .figure-head {
                align-items: start;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 8px;
            }

            .figure-title {
                font-size: 19px;
            }

            .open-link {
                min-height: 40px;
                border-radius: 8px;
            }

            .image-wrap {
                align-items: start;
                justify-items: center;
                min-height: 300px;
                max-height: calc(100dvh - 300px);
            }
        }

        @media (max-width: 430px) {
            .hero {
                padding: 9px 10px;
            }

            h1 {
                font-size: 22px;
            }

            .tab {
                flex-basis: 176px;
            }

            .tab__number {
                width: 30px;
                height: 30px;
            }

            .image-wrap {
                min-height: 280px;
                max-height: calc(100dvh - 292px);
            }
        }
    </style>
</head>
<body>
    <nav class="topbar" aria-label="상단 이동">
        <a href="../index.html">메인</a>
        <span>|</span>
        <a href="index.html">13과</a>
        <span>|</span>
        <a href="vocabulary.html">어휘</a>
    </nav>

    <main class="shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Chapter 13 Vocabulary Support</p>
                <h1>의류·장신구 착용 동사</h1>
            </div>
            <div class="hero__meta" aria-label="자료 요약">
                <span class="pill">자료 5장</span>
                <span class="pill">WebP 경량본</span>
                <span class="pill">900px</span>
            </div>
        </section>

        <section class="viewer" aria-label="착용 동사 이미지 자료">
            <div class="tabs" role="tablist" aria-label="자료 선택">
                <button class="tab" type="button" role="tab" aria-selected="true" data-index="0">
                    <span class="tab__number">1</span>
                    <span>
                        <span class="tab__title">입다·신다·쓰다</span>
                        <span class="tab__sub">세로 동사 / 가로 예문</span>
                    </span>
                </button>
                <button class="tab" type="button" role="tab" aria-selected="false" data-index="1">
                    <span class="tab__number">2</span>
                    <span>
                        <span class="tab__title">매다·메다·들다</span>
                        <span class="tab__sub">헷갈리기 쉬운 동사</span>
                    </span>
                </button>
                <button class="tab" type="button" role="tab" aria-selected="false" data-index="2">
                    <span class="tab__number">3</span>
                    <span>
                        <span class="tab__title">자주 쓰는 표현</span>
                        <span class="tab__sub">입다·신다·끼다·차다</span>
                    </span>
                </button>
                <button class="tab" type="button" role="tab" aria-selected="false" data-index="3">
                    <span class="tab__number">4</span>
                    <span>
                        <span class="tab__title">매다·메다 기억 1</span>
                        <span class="tab__sub">묶으면 매다 / 어깨에 메다</span>
                    </span>
                </button>
                <button class="tab" type="button" role="tab" aria-selected="false" data-index="4">
                    <span class="tab__number">5</span>
                    <span>
                        <span class="tab__title">매다·메다 기억 2</span>
                        <span class="tab__sub">그림으로 구분하기</span>
                    </span>
                </button>
            </div>

            <section class="figure-panel" aria-live="polite">
                <div class="figure-head">
                    <h2 id="figure-title" class="figure-title">의류·장신구 착용 동사 1</h2>
                    <a id="open-image-link" class="open-link" href="../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-01.webp" target="_blank" rel="noopener">이미지 열기</a>
                </div>
                <div class="image-wrap">
                    <img
                        id="viewer-image"
                        src="../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-01.webp"
                        alt="의류·장신구 착용 동사 1: 입다, 신다, 쓰다, 걸치다, 두르다 예문"
                        width="900"
                        height="1272"
                        fetchpriority="high"
                        decoding="async"
                    />
                </div>
            </section>
        </section>
    </main>

    <script>
    (() => {
        const assets = [
            {
                title: "의류·장신구 착용 동사 1",
                src: "../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-01.webp",
                alt: "의류·장신구 착용 동사 1: 입다, 신다, 쓰다, 걸치다, 두르다 예문",
                width: 900,
                height: 1272
            },
            {
                title: "의류·장신구 착용 동사 2",
                src: "../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-02.webp",
                alt: "의류·장신구 착용 동사 2: 매다, 메다, 들다, 차다, 끼다, 하다 예문",
                width: 900,
                height: 1272
            },
            {
                title: "의류·장신구 착용 동사 3",
                src: "../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-03.webp",
                alt: "의류·장신구 착용 동사 3: 자주 쓰는 착용 표현 예문",
                width: 900,
                height: 1272
            },
            {
                title: "매다·메다 쉽게 외우기 1",
                src: "../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-04.webp",
                alt: "매다와 메다 쉽게 외우기 1: 묶으면 매다, 어깨에 걸치면 메다",
                width: 900,
                height: 1125
            },
            {
                title: "매다·메다 쉽게 외우기 2",
                src: "../assets/c13/vocabulary/images/wearing-verbs/wearing-verbs-05.webp",
                alt: "매다와 메다 쉽게 외우기 2: 매다와 메다를 그림으로 구분하는 자료",
                width: 900,
                height: 1125
            }
        ];

        const tabs = [...document.querySelectorAll(".tab")];
        const title = document.getElementById("figure-title");
        const image = document.getElementById("viewer-image");
        const openLink = document.getElementById("open-image-link");

        function selectAsset(index) {
            const asset = assets[index] || assets[0];
            tabs.forEach((tab, tabIndex) => {
                tab.setAttribute("aria-selected", String(tabIndex === index));
            });
            title.textContent = asset.title;
            image.src = asset.src;
            image.alt = asset.alt;
            image.setAttribute("width", String(asset.width));
            image.setAttribute("height", String(asset.height));
            openLink.href = asset.src;
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => selectAsset(Number(tab.dataset.index)));
        });
    })();
    </script>
    <script src="../shared/site-copyright.js"></script>
    <script src="../shared/page-qr.js"></script>
</body>
</html>
